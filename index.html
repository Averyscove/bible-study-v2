d said, \"John I beheaded, but who is this, about whom I hear such things?\" He sought to see him."}, {"c": 9, "n": 10, "text": "The apostles, when they had returned, told him what things they had done. He took them, and withdrew apart to a deserted place of a city called Bethsaida."}, {"c": 9, "n": 11, "text": "But the multitudes, perceiving it, followed him. He welcomed them, and spoke to them of the kingdom of God, and he cured those who needed healing."}, {"c": 9, "n": 12, "text": "The day began to wear away; and the twelve came, and said to him, \"Send the multitude away, that they may go into the surrounding villages and farms, and lodge, and get provisions, for we are here in a desert place.\""}, {"c": 9, "n": 13, "text": "But he said to them, \"You give them something to eat.\" They said, \"We have no more than five loaves and two fish, unless we should go and buy food for all these people.\""}, {"c": 9, "n": 14, "text": "For they were about five thousand men. He said to his disciples, \"Make them sit down in groups of about fifty each.\""}, {"c": 9, "n": 15, "text": "They did so, and made them all sit down."}, {"c": 9, "n": 16, "text": "He took the five loaves and the two fish, and looking up to the sky, he blessed them, and broke them, and gave them to the disciples to set before the multitude."}, {"c": 9, "n": 17, "text": "They ate, and were all filled. They gathered up twelve baskets of broken pieces that were left over."}, {"c": 9, "n": 18, "text": "It happened, as he was praying alone, the disciples were with him, and he asked them, \"Who do the multitudes say that I am?\""}, {"c": 9, "n": 19, "text": "They answered, \"'John the Baptizer,' but others say, 'Elijah,' and others, that one of the old prophets is risen again.\""}, {"c": 9, "n": 20, "text": "He said to them, \"But who do you say that I am?\" Peter answered, \"The Christ of God.\""}, {"c": 9, "n": 21, "text": "But he warned them, and commanded them to tell this to no one,"}, {"c": 9, "n": 22, "text": "saying, \"The Son of Man must suffer many things, and be rejected by the elders, chief priests, and scribes, and be killed, and the third day be raised up.\""}, {"c": 9, "n": 23, "text": "He said to all, \"If anyone desires to come after me, let him deny himself, take up his cross, and follow me."}, {"c": 9, "n": 24, "text": "For whoever desires to save his life will lose it, but whoever will lose his life for my sake, the same will save it."}, {"c": 9, "n": 25, "text": "For what does it profit a man if he gains the whole world, and loses or forfeits his own self?"}, {"c": 9, "n": 26, "text": "For whoever will be ashamed of me and of my words, of him will the Son of Man be ashamed, when he comes in the glory of himself, of the Father, and of the holy angels."}, {"c": 9, "n": 27, "text": "But I tell you the truth: There are some of those who stand here, who will in no way taste of death, until they see the kingdom of God.\""}, {"c": 9, "n": 28, "text": "It happened about eight days after these sayings, that he took with him Peter, John, and James, and went up onto the mountain to pray."}, {"c": 9, "n": 29, "text": "As he was praying, the appearance of his face was altered, and his clothing became white and dazzling."}, {"c": 9, "n": 30, "text": "Behold, two men talked with him, who were Moses and Elijah,"}, {"c": 9, "n": 31, "text": "who appeared in glory, and spoke of his departure, which he was about to accomplish at Jerusalem."}, {"c": 9, "n": 32, "text": "Now Peter and those who were with him were heavy with sleep, but when they were fully awake, they saw his glory, and the two men who stood with him."}, {"c": 9, "n": 33, "text": "It happened, as they were parting from him, that Peter said to Jesus, \"Master, it is good for us to be here. Let's make three tents: one for you, and one for Moses, and one for Elijah,\" not knowing what he said."}, {"c": 9, "n": 34, "text": "While he said these things, a cloud came and overshadowed them, and they were afraid as they entered into the cloud."}, {"c": 9, "n": 35, "text": "A voice came out of the cloud, saying, \"This is my beloved Son. Listen to him!\""}, {"c": 9, "n": 36, "text": "When the voice came, Jesus was found alone. They were silent, and told no one in those days any of the things which they had seen."}, {"c": 9, "n": 37, "text": "It happened on the next day, when they had come down from the mountain, that a great multitude met him."}, {"c": 9, "n": 38, "text": "Behold, a man from the crowd called out, saying, \"Teacher, I beg you to look at my son, for he is my only child."}, {"c": 9, "n": 39, "text": "Behold, a spirit takes him, he suddenly cries out, and it convulses him so that he foams, and it hardly departs from him, bruising him severely."}, {"c": 9, "n": 40, "text": "I begged your disciples to cast it out, and they couldn't.\""}, {"c": 9, "n": 41, "text": "Jesus answered, \"Faithless and perverse generation, how long will I be with you and bear with you? Bring your son here.\""}, {"c": 9, "n": 42, "text": "While he was still coming, the demon threw him down and convulsed him violently. But Jesus rebuked the unclean spirit, and healed the boy, and gave him back to his father."}, {"c": 9, "n": 43, "text": "They were all astonished at the majesty of God. But while all were marveling at all the things which Jesus did, he said to his disciples,"}, {"c": 9, "n": 44, "text": "\"Let these words sink into your ears, for the Son of Man will be delivered up into the hands of men.\""}, {"c": 9, "n": 45, "text": "But they didn't understand this saying. It was concealed from them, that they should not perceive it, and they were afraid to ask him about this saying."}, {"c": 9, "n": 46, "text": "There arose an argument among them about which of them was the greatest."}, {"c": 9, "n": 47, "text": "Jesus, perceiving the reasoning of their heart, took a little child, and set him by his side,"}, {"c": 9, "n": 48, "text": "and said to them, \"Whoever receives this little child in my name receives me. Whoever receives me receives him who sent me. For whoever is least among you all, this one will be great.\""}, {"c": 9, "n": 49, "text": "John answered, \"Master, we saw someone casting out demons in your name, and we forbade him, because he doesn't follow with us.\""}, {"c": 9, "n": 50, "text": "Jesus said to him, \"Don't forbid him, for he who is not against us is for us.\""}, {"c": 9, "n": 51, "text": "It came to pass, when the days were near that he should be taken up, he intently set his face to go to Jerusalem,"}, {"c": 9, "n": 52, "text": "and sent messengers before his face. They went, and entered into a village of the Samaritans, so as to prepare for him."}, {"c": 9, "n": 53, "text": "They didn't receive him, because he was traveling with his face set towards Jerusalem."}, {"c": 9, "n": 54, "text": "When his disciples, James and John, saw this, they said, \"Lord, do you want us to command fire to come down from the sky, and destroy them, just as Elijah did?\""}, {"c": 9, "n": 55, "text": "But he turned and rebuked them, \"You don't know what kind of spirit you are of."}, {"c": 9, "n": 56, "text": "For the Son of Man didn't come to destroy men's lives, but to save them.\" They went to another village."}, {"c": 9, "n": 57, "text": "As they went on the way, a certain man said to him, \"I want to follow you wherever you go, Lord.\""}, {"c": 9, "n": 58, "text": "Jesus said to him, \"The foxes have holes, and the birds of the sky have nests, but the Son of Man has no place to lay his head.\""}, {"c": 9, "n": 59, "text": "He said to another, \"Follow me.\" But he said, \"Lord, allow me first to go and bury my father.\""}, {"c": 9, "n": 60, "text": "But Jesus said to him, \"Leave the dead to bury their own dead, but you go and announce the kingdom of God.\""}, {"c": 9, "n": 61, "text": "Another also said, \"I want to follow you, Lord, but first allow me to bid farewell to those who are at my house.\""}, {"c": 9, "n": 62, "text": "But Jesus said to him, \"No one, having put his hand to the plow, and looking back, is fit for the kingdom of God.\""}]}, "luke_10": {"id": "luke_10", "ref": "Luke 10", "verses": [{"c": 10, "n": 1, "text": "Now after these things the Lord also appointed seventy others, and sent them two by two before his face into every city and place, where he himself was about to come."}, {"c": 10, "n": 2, "text": "Then he said to them, \"The harvest is indeed plentiful, but the laborers are few. Pray therefore to the Lord of the harvest, that he may send out laborers into his harvest."}, {"c": 10, "n": 3, "text": "Go your ways. Behold, I send you out as lambs in the midst of wolves."}, {"c": 10, "n": 4, "text": "Carry no purse, nor wallet, nor sandals. Greet no one on the way."}, {"c": 10, "n": 5, "text": "Into whatever house you enter, first say, 'Peace be to this house.'"}, {"c": 10, "n": 6, "text": "If a son of peace is there, your peace will rest on him; but if not, it will return to you."}, {"c": 10, "n": 7, "text": "Remain in that same house, eating and drinking the things they give, for the laborer is worthy of his wages. Don't go from house to house."}, {"c": 10, "n": 8, "text": "Into whatever city you enter, and they receive you, eat the things that are set before you."}, {"c": 10, "n": 9, "text": "Heal the sick who are therein, and tell them, 'The kingdom of God has come near to you.'"}, {"c": 10, "n": 10, "text": "But into whatever city you enter, and they don't receive you, go out into the streets of it and say,"}, {"c": 10, "n": 11, "text": "'Even the dust from your city that clings to us, we wipe off against you. Nevertheless know this, that the kingdom of God has come near to you.'"}, {"c": 10, "n": 12, "text": "I tell you, it will be more tolerable in that day for Sodom than for that city."}, {"c": 10, "n": 13, "text": "\"Woe to you, Chorazin! Woe to you, Bethsaida! For if the mighty works had been done in Tyre and Sidon which were done in you, they would have repented long ago, sitting in sackcloth and ashes."}, {"c": 10, "n": 14, "text": "But it will be more tolerable for Tyre and Sidon in the judgment than for you."}, {"c": 10, "n": 15, "text": "You, Capernaum, who are exalted to heaven, will be brought down to Hades."}, {"c": 10, "n": 16, "text": "Whoever listens to you listens to me, and whoever rejects you rejects me. Whoever rejects me rejects him who sent me.\""}, {"c": 10, "n": 17, "text": "The seventy returned with joy, saying, \"Lord, even the demons are subject to us in your name.\""}, {"c": 10, "n": 18, "text": "He said to them, \"I saw Satan having fall like lightning from heaven."}, {"c": 10, "n": 19, "text": "Behold, I give you authority to tread on serpents and scorpions, and over all the power of the enemy. Nothing will in any way hurt you."}, {"c": 10, "n": 20, "text": "Nevertheless, don't rejoice in this, that the spirits are subject to you, but rejoice that your names are written in heaven.\""}, {"c": 10, "n": 21, "text": "In that same hour Jesus rejoiced in the Holy Spirit, and said, \"I thank you, O Father, Lord of heaven and earth, that you have hidden these things from the wise and understanding, and revealed them to little children. Yes, Father, for so it was well-pleasing in your sight.\""}, {"c": 10, "n": 22, "text": "Turning to the disciples, he said, \"All things have been delivered to me from my Father. No one knows who the Son is, except the Father, and who the Father is, except the Son, and he to whoever the Son desires to reveal him.\""}, {"c": 10, "n": 23, "text": "Turning to the disciples, he said privately, \"Blessed are the eyes which see the things that you see,"}, {"c": 10, "n": 24, "text": "for I tell you that many prophets and kings desired to see the things which you see, and didn't see them, and to hear the things which you hear, and didn't hear them.\""}, {"c": 10, "n": 25, "text": "Behold, a certain lawyer stood up and tested him, saying, \"Teacher, what will I do to inherit eternal life?\""}, {"c": 10, "n": 26, "text": "He said to him, \"What is written in the law? How do you read it?\""}, {"c": 10, "n": 27, "text": "He answered, \"You shall love the Lord your God with all your heart, with all your soul, with all your strength, and with all your mind; and your neighbor as yourself.\""}, {"c": 10, "n": 28, "text": "He said to him, \"You have answered correctly. Do this, and you will live.\""}, {"c": 10, "n": 29, "text": "But he, desiring to justify himself, asked Jesus, \"Who is my neighbor?\""}, {"c": 10, "n": 30, "text": "Jesus answered, \"A certain man was going down from Jerusalem to Jericho, and he fell among robbers, who both stripped him and beat him, and departed, leaving him half dead."}, {"c": 10, "n": 31, "text": "By chance a certain priest was going down that way. When he saw him, he passed by on the other side."}, {"c": 10, "n": 32, "text": "In the same way a Levite also, when he came to the place, and saw him, passed by on the other side."}, {"c": 10, "n": 33, "text": "But a certain Samaritan, as he journeyed, came where he was. When he saw him, he was moved with compassion,"}, {"c": 10, "n": 34, "text": "came to him, and bound up his wounds, pouring on oil and wine. He set him on his own animal, and brought him to an inn, and took care of him."}, {"c": 10, "n": 35, "text": "On the next day, when he departed, he took out two denarii, and gave them to the host, and said to him, 'Take care of him. Whatever you spend beyond that, I will repay you when I return.'"}, {"c": 10, "n": 36, "text": "Now which of these three do you think seemed to be a neighbor to him who fell among the robbers?\""}, {"c": 10, "n": 37, "text": "He said, \"He who showed mercy on him.\" Then Jesus said to him, \"Go and do likewise.\""}, {"c": 10, "n": 38, "text": "It happened as they went on their way, he entered into a certain village, and a certain woman named Martha received him into her house."}, {"c": 10, "n": 39, "text": "She had a sister called Mary, who also sat at Jesus' feet, and heard his word."}, {"c": 10, "n": 40, "text": "But Martha was distracted with much serving, and she came up to him, and said, \"Lord, don't you care that my sister left me to serve alone? Ask her therefore to help me.\""}, {"c": 10, "n": 41, "text": "Jesus answered her, \"Martha, Martha, you are anxious and troubled about many things,"}, {"c": 10, "n": 42, "text": "but one thing is needed. Mary has chosen the good part, which will not be taken away from her.\""}]}, "luke_11": {"id": "luke_11", "ref": "Luke 11", "verses": [{"c": 11, "n": 1, "text": "It happened, that when he finished praying in a certain place, one of his disciples said to him, \"Lord, teach us to pray, just as John also taught his disciples.\""}, {"c": 11, "n": 2, "text": "He said to them, \"When you pray, say, 'Our Father in heaven, May your name be kept holy. May your kingdom come. May your desire be done on Earth, as it is in heaven."}, {"c": 11, "n": 3, "text": "Give us day by day our daily bread."}, {"c": 11, "n": 4, "text": "Forgive us our sins, for we ourselves also forgive everyone who is indebted to us. Bring us not into temptation, but deliver us from the evil one.'\""}, {"c": 11, "n": 5, "text": "He said to them, \"Which of you, if you go to a friend at midnight, and tell him, 'Friend, lend me three loaves of bread,"}, {"c": 11, "n": 6, "text": "for a friend of mine has come to me from a journey, and I have nothing to set before him,'"}, {"c": 11, "n": 7, "text": "and he from within will answer and say, 'Don't bother me. The door is now shut, and my children are with me in bed. I can't get up and give it to you'?"}, {"c": 11, "n": 8, "text": "I tell you, although he will not rise and give it to him because he is his friend, yet because of his persistence, he will get up and give him as many as he needs."}, {"c": 11, "n": 9, "text": "I tell you, keep asking, and it will be given you. Keep seeking, and you will find. Keep knocking, and it will be opened to you."}, {"c": 11, "n": 10, "text": "For everyone who asks receives. He who seeks finds. To him who knocks it will be opened."}, {"c": 11, "n": 11, "text": "Which of you fathers, if your son asks for bread, will give him a stone? Or if he asks for a fish, he won't give him a snake instead of a fish, will he?"}, {"c": 11, "n": 12, "text": "Or if he asks for an egg, he won't give him a scorpion, will he?"}, {"c": 11, "n": 13, "text": "If you then, being evil, know how to give good gifts to your children, how much more will your heavenly Father give the Holy Spirit to those who ask him?\""}, {"c": 11, "n": 14, "text": "He was casting out a demon, and it was mute. It happened, when the demon had gone out, the mute man spoke; and the multitudes marveled."}, {"c": 11, "n": 15, "text": "But some of them said, \"He casts out demons by Beelzebul, the prince of the demons.\""}, {"c": 11, "n": 16, "text": "Others, testing him, sought from him a sign from heaven."}, {"c": 11, "n": 17, "text": "But he, knowing their thoughts, said to them, \"Every kingdom divided against itself is brought to desolation. A house divided against itself falls."}, {"c": 11, "n": 18, "text": "If Satan also is divided against himself, how will his kingdom stand? Because you say that I cast out demons by Beelzebul."}, {"c": 11, "n": 19, "text": "But if I cast out demons by Beelzebul, by whom do your sons cast them out? Therefore will they be your judges."}, {"c": 11, "n": 20, "text": "But if I by the finger of God cast out demons, then is the kingdom of God come to you."}, {"c": 11, "n": 21, "text": "When the strong man, fully armed, guards his own dwelling, his goods are safe."}, {"c": 11, "n": 22, "text": "But when someone stronger comes on him, and overcomes him, he takes from him his whole armor in which he trusted, and divides his spoils."}, {"c": 11, "n": 23, "text": "He that is not with me is against me. He who doesn't gather with me scatters."}, {"c": 11, "n": 24, "text": "The unclean spirit, when he has gone out of the man, passes through dry places, seeking rest, and finding none, he says, 'I will turn back to my house whence I came out.'"}, {"c": 11, "n": 25, "text": "When he returns, he finds it swept and put in order."}, {"c": 11, "n": 26, "text": "Then he goes, and takes seven other spirits more evil than himself, and they enter in and dwell there. The last state of that man becomes worse than the first.\""}, {"c": 11, "n": 27, "text": "It came to pass, as he said these things, a certain woman out of the multitude lifted up her voice, and said to him, \"Blessed is the womb that bore you, and the breasts which nursed you!\""}, {"c": 11, "n": 28, "text": "But he said, \"On the contrary, blessed are those who hear the word of God, and keep it.\""}, {"c": 11, "n": 29, "text": "When the multitudes were gathering together to him, he began to say, \"This is an evil generation. It seeks after a sign. No sign will be given to it but the sign of Jonah, the prophet."}, {"c": 11, "n": 30, "text": "For even as Jonah became a sign to the Ninevites, so will also the Son of Man be to this generation."}, {"c": 11, "n": 31, "text": "The Queen of the South will rise up in the judgment with the men of this generation, and will condemn them: for she came from the ends of the earth to hear the wisdom of Solomon; and behold, one greater than Solomon is here."}, {"c": 11, "n": 32, "text": "The men of Nineveh will stand up in the judgment with this generation, and will condemn it: for they repented at the preaching of Jonah, and behold, one greater than Jonah is here."}, {"c": 11, "n": 33, "text": "No man, when he has lit a lamp, puts it in a cellar, nor under a basket, but on the stand, that they which enter in may see the light."}, {"c": 11, "n": 34, "text": "The lamp of the body is the eye. Therefore when your eye is good, your whole body also is full of light; but when it is evil, your body also is full of darkness."}, {"c": 11, "n": 35, "text": "Therefore see whether the light that is in you isn't darkness."}, {"c": 11, "n": 36, "text": "If therefore your whole body is full of light, having no part dark, it will be wholly full of light, as when the lamp with its bright shining gives you light.\""}, {"c": 11, "n": 37, "text": "Now as he spoke, a certain Pharisee asked him to dine with him. He went in, and sat at the table."}, {"c": 11, "n": 38, "text": "When the Pharisee saw it, he marveled that he had not first washed himself before dinner."}, {"c": 11, "n": 39, "text": "The Lord said to him, \"Now you Pharisees cleanse the outside of the cup and of the platter, but your inward part is full of extortion and wickedness."}, {"c": 11, "n": 40, "text": "You foolish ones, didn't he who made the outside make the inside also?"}, {"c": 11, "n": 41, "text": "But give for alms those things which are within, and behold, all things will be clean to you."}, {"c": 11, "n": 42, "text": "But woe to you Pharisees! For you tithe mint and rue and every herb, and bypass justice and the love of God. You ought to have done these, and not to leave the other undone."}, {"c": 11, "n": 43, "text": "Woe to you Pharisees! For you love the best seats in the synagogues, and the greetings in the marketplaces."}, {"c": 11, "n": 44, "text": "Woe to you, scribes and Pharisees, hypocrites! For you are like hidden graves, and the men who walk over them don't know it.\""}, {"c": 11, "n": 45, "text": "One of the lawyers answered him, \"Teacher, in saying this you insult us also.\""}, {"c": 11, "n": 46, "text": "He said, \"Woe to you lawyers also! For you load men with burdens that are difficult to carry, and you yourselves won't even lift one finger to help carry those burdens."}, {"c": 11, "n": 47, "text": "Woe to you! For you build the tombs of the prophets, and your fathers killed them."}, {"c": 11, "n": 48, "text": "So you testify and consent to the works of your fathers. For they killed them, and you build their tombs."}, {"c": 11, "n": 49, "text": "Therefore also the wisdom of God said, 'I will send to them prophets and apostles; and some of them they will kill and persecute,"}, {"c": 11, "n": 50, "text": "that the blood of all the prophets, which was shed from the foundation of the world, may be required of this generation;"}, {"c": 11, "n": 51, "text": "from the blood of Abel to the blood of Zachariah, who perished between the altar and the sanctuary.' Yes, I tell you, it will be required of this generation."}, {"c": 11, "n": 52, "text": "Woe to you lawyers! For you took away the key of knowledge. You didn't enter in yourselves, and those who were entering in, you hindered.\""}, {"c": 11, "n": 53, "text": "As he said these things to them, the scribes and the Pharisees began to be terribly angry, and to draw many things out of him;"}, {"c": 11, "n": 54, "text": "laying in wait for him, and seeking to catch him in something he might say, that they might accuse him."}]}, "luke_12": {"id": "luke_12", "ref": "Luke 12", "verses": [{"c": 12, "n": 1, "text": "Meanwhile, when a multitude of many thousands had gathered together, so much so that they trampled on each other, he began to tell his disciples first of all, \"Beware of the yeast of the Pharisees, which is hypocrisy."}, {"c": 12, "n": 2, "text": "But there is nothing covered up, that will not be revealed, nor hidden, that will not be known."}, {"c": 12, "n": 3, "text": "Therefore whatever you have said in the darkness will be heard in the light. What you have spoken in the ear in the inner chambers will be proclaimed on the housetops."}, {"c": 12, "n": 4, "text": "I tell you, my friends, don't be afraid of those who kill the body, and after that have no more that they can do."}, {"c": 12, "n": 5, "text": "But I will warn you whom you shall fear. Fear him, who after he has killed, has power to cast into Gehenna. Yes, I tell you, fear him."}, {"c": 12, "n": 6, "text": "Aren't five sparrows sold for two assaria? Not one of them is forgotten by God."}, {"c": 12, "n": 7, "text": "But the very hairs of your head are all numbered. Therefore don't be afraid. You are of more value than many sparrows."}, {"c": 12, "n": 8, "text": "I tell you, everyone who confesses me before men, him will the Son of Man also confess before the angels of God;"}, {"c": 12, "n": 9, "text": "but he who denies me in the presence of men will be denied in the presence of the angels of God."}, {"c": 12, "n": 10, "text": "Everyone who speaks a word against the Son of Man will be forgiven, but those who blaspheme against the Holy Spirit will not be forgiven."}, {"c": 12, "n": 11, "text": "When they bring you before the synagogues, the rulers, and the authorities, don't be anxious how or what you will answer, or what you will say;"}, {"c": 12, "n": 12, "text": "for the Holy Spirit will teach you in that same hour what you must say.\""}, {"c": 12, "n": 13, "text": "One of the multitude said to him, \"Teacher, tell my brother to divide the inheritance with me.\""}, {"c": 12, "n": 14, "text": "But he said to him, \"Man, who made me a judge or an arbitrator over you?\""}, {"c": 12, "n": 15, "text": "He said to them, \"Beware! Keep yourselves from covetousness, for a man's life doesn't consist of the abundance of the things which he possesses.\""}, {"c": 12, "n": 16, "text": "He spoke a parable to them, saying, \"The ground of a certain rich man brought forth abundantly."}, {"c": 12, "n": 17, "text": "He reasoned within himself, saying, 'What will I do, because I don't have room to store my crops?'"}, {"c": 12, "n": 18, "text": "He said, 'This is what I will do. I will pull down my barns, and build bigger ones, and there I will store all my grain and my goods."}, {"c": 12, "n": 19, "text": "I will tell my soul, \"Soul, you have many goods laid up for many years. Take your ease, eat, drink, be merry.\"'"}, {"c": 12, "n": 20, "text": "But God said to him, 'You foolish one, tonight your soul is required of you. The things which you have prepared -- whose will they be?'"}, {"c": 12, "n": 21, "text": "So is he who lays up treasure for himself, and is not rich toward God.\""}, {"c": 12, "n": 22, "text": "He said to his disciples, \"Therefore I tell you, don't be anxious for your life, what you will eat, nor yet for your body, what you will wear."}, {"c": 12, "n": 23, "text": "Life is more than food, and the body than clothing."}, {"c": 12, "n": 24, "text": "Consider the ravens: they don't sow, they don't reap, they have no warehouse or barn, and God feeds them. How much more valuable are you than birds!"}, {"c": 12, "n": 25, "text": "Which of you by being anxious can add a cubit to his height?"}, {"c": 12, "n": 26, "text": "If then you aren't able to do even the least things, why are you anxious about the rest?"}, {"c": 12, "n": 27, "text": "Consider the lilies, how they grow. They don't toil, neither do they spin; yet I tell you, even Solomon in all his glory was not arrayed like one of these."}, {"c": 12, "n": 28, "text": "But if this is how God clothes the grass in the field, which today exists, and tomorrow is cast into the oven, how much more will he clothe you, you of little faith?"}, {"c": 12, "n": 29, "text": "Don't seek what you will eat or what you will drink; neither be anxious."}, {"c": 12, "n": 30, "text": "For the nations of the world seek after all of these things, but your Father knows that you need these things."}, {"c": 12, "n": 31, "text": "Yet seek God's kingdom, and all these things will be added to you."}, {"c": 12, "n": 32, "text": "Don't be afraid, little flock, for it is your Father's good pleasure to give you the kingdom."}, {"c": 12, "n": 33, "text": "Sell that which you have, and give alms. Make for yourselves purses which don't grow old, a treasure in the heavens that doesn't fail, where no thief approaches, neither moth destroys."}, {"c": 12, "n": 34, "text": "For where your treasure is, there will your heart be also."}, {"c": 12, "n": 35, "text": "Let your loins be girded about, and your lamps burning."}, {"c": 12, "n": 36, "text": "Be like men looking for their lord, when he will return from the marriage feast; that, when he comes and knocks, they may immediately open to him."}, {"c": 12, "n": 37, "text": "Blessed are those servants, whom the lord will find watching when he comes. Most assuredly I tell you, that he will gird himself, and make them recline, and will come and serve them."}, {"c": 12, "n": 38, "text": "They will be blessed if he comes in the second or third watch, and finds them so."}, {"c": 12, "n": 39, "text": "But know this, that if the master of the house had known in what hour the thief was coming, he would have watched, and not allowed his house to be broken into."}, {"c": 12, "n": 40, "text": "Therefore be ready also, for the Son of Man is coming in an hour that you don't expect him.\""}, {"c": 12, "n": 41, "text": "Peter said to him, \"Lord, are you telling this parable to us, or to everybody?\""}, {"c": 12, "n": 42, "text": "The Lord said, \"Who then is the faithful and wise steward, whom his lord will set over his household, to give them their portion of food at the right times?"}, {"c": 12, "n": 43, "text": "Blessed is that servant whom his lord will find doing so when he comes."}, {"c": 12, "n": 44, "text": "Truly I tell you, that he will set him over all that he has."}, {"c": 12, "n": 45, "text": "But if that servant says in his heart, 'My lord delays his coming,' and begins to beat the menservants and the maidservants, and to eat and drink, and to be drunken,"}, {"c": 12, "n": 46, "text": "then the lord of that servant will come in a day when he isn't expecting him, and in an hour that he doesn't know, and will cut him apart, and place his portion with the unfaithful."}, {"c": 12, "n": 47, "text": "That servant, who knew his lord's will, and didn't prepare, nor do what he wanted, will be beaten with many stripes,"}, {"c": 12, "n": 48, "text": "but he who didn't know, and did things worthy of stripes, will be beaten with few stripes. To whoever much is given, of him will much be required; and to whom they deposit much, of him will they ask more."}, {"c": 12, "n": 49, "text": "\"I came to throw fire on the earth, I wish it were already kindled."}, {"c": 12, "n": 50, "text": "But I have a baptism to be baptized with, and how distressed I am until it is accomplished!"}, {"c": 12, "n": 51, "text": "Do you think that I have come to give peace in the earth? I tell you, no, but rather division."}, {"c": 12, "n": 52, "text": "For from now on, there will be five in one house divided, three against two, and two against three."}, {"c": 12, "n": 53, "text": "They will be divided, father against son, and son against father; mother against daughter, and daughter against her mother; mother in law against her daughter in law, and daughter in law against her mother in law.\""}, {"c": 12, "n": 54, "text": "He said to the multitudes also, \"When you see a cloud rising from the west, immediately you say, 'A shower is coming,' and so it happens."}, {"c": 12, "n": 55, "text": "When a south wind blows, you say, 'There will be a scorching heat,' and it happens."}, {"c": 12, "n": 56, "text": "You hypocrites! You know how to interpret the appearance of the earth and the sky, but how is it that you don't interpret this time?"}, {"c": 12, "n": 57, "text": "Why don't you judge for yourselves what is right?"}, {"c": 12, "n": 58, "text": "For as you are going with your adversary before the magistrate, try diligently on the way to be freed from him, lest perhaps he drag you to the judge, and the judge deliver you to the officer, and the officer throw you into prison."}, {"c": 12, "n": 59, "text": "I tell you, you will by no means get out of there, until you have paid the very last lepton.\""}]}, "luke_13": {"id": "luke_13", "ref": "Luke 13", "verses": [{"c": 13, "n": 1, "text": "Now there were some present at the same time who told him about the Galilaeans, whose blood Pilate had mixed with their sacrifices."}, {"c": 13, "n": 2, "text": "Jesus answered them, \"Do you think that these Galilaeans were worse sinners than all the other Galilaeans, because they suffered such things?"}, {"c": 13, "n": 3, "text": "I tell you, no, but, unless you repent, you will all perish in the same way."}, {"c": 13, "n": 4, "text": "Or those eighteen, on whom the tower in Siloam fell, and killed them; do you think that they were worse offenders than all the men who dwell in Jerusalem?"}, {"c": 13, "n": 5, "text": "I tell you, no, but, unless you repent, you will all perish in the same way.\""}, {"c": 13, "n": 6, "text": "He spoke this parable. \"A certain man had a fig tree planted in his vineyard, and he came seeking fruit on it, and found none."}, {"c": 13, "n": 7, "text": "He said to the vine dresser, 'Behold, these three years I came seeking fruit on this fig tree, and found none. Cut it down. Why does it waste the soil?'"}, {"c": 13, "n": 8, "text": "He answered, 'Lord, leave it alone this year also, until I dig around it, and fertilize it."}, {"c": 13, "n": 9, "text": "If it bears fruit, fine; but if not, after that, you can cut it down.'\""}, {"c": 13, "n": 10, "text": "He was teaching in one of the synagogues on the Sabbath day."}, {"c": 13, "n": 11, "text": "Behold, there was a woman who had a spirit of infirmity eighteen years, and she was bent over, and could in no way lift herself up."}, {"c": 13, "n": 12, "text": "When Jesus saw her, he called her, and said to her, \"Woman, you are freed from your infirmity.\""}, {"c": 13, "n": 13, "text": "He laid his hands on her, and immediately she stood up straight, and glorified God."}, {"c": 13, "n": 14, "text": "The ruler of the synagogue, being moved with indignation because Jesus had healed on the Sabbath, answered to the multitude, \"There are six days in which men ought to work. Therefore come on those days and be healed, and not on the Sabbath day!\""}, {"c": 13, "n": 15, "text": "Therefore the Lord answered him, \"You hypocrites! Doesn't each one of you free his ox or his donkey from the stall on the Sabbath, and lead him away to water?"}, {"c": 13, "n": 16, "text": "Ought not this woman, being a daughter of Abraham, whom Satan had bound eighteen long years, to have been freed from this bondage on the Sabbath day?\""}, {"c": 13, "n": 17, "text": "As he said these things, all his adversaries were put to shame, and all the multitude rejoiced for all the glorious things that were done by him."}, {"c": 13, "n": 18, "text": "He said, \"To what is the kingdom of God like? To what shall I compare it?"}, {"c": 13, "n": 19, "text": "It is like a grain of mustard seed, which a man took, and threw into his own garden. It grew, and became a large tree, and the birds of the sky lodged in the branches of it.\""}, {"c": 13, "n": 20, "text": "Again he said, \"What shall I compare to the kingdom of God?"}, {"c": 13, "n": 21, "text": "It is like yeast, which a woman took and hid in three sata of flour, until it was all leavened.\""}, {"c": 13, "n": 22, "text": "He went on his way through cities and villages, teaching, and traveling on to Jerusalem."}, {"c": 13, "n": 23, "text": "One said to him, \"Lord, are they few who are saved?\" He said to them,"}, {"c": 13, "n": 24, "text": "\"Strive to enter in by the narrow door, for many, I tell you, will seek to enter in, and will not be able."}, {"c": 13, "n": 25, "text": "When once the master of the house has risen up, and has shut the door, and you begin to stand outside, and to knock at the door, saying, 'Lord, Lord, open to us!' then he will answer and tell you, 'I don't know you or where you come from.'"}, {"c": 13, "n": 26, "text": "Then you will begin to say, 'We ate and drink in your presence, and you taught in our streets.'"}, {"c": 13, "n": 27, "text": "He will say, 'I tell you, I don't know where you come from. Depart from me, all you workers of iniquity.'"}, {"c": 13, "n": 28, "text": "There will be weeping and gnashing of teeth, when you see Abraham, Isaac, Jacob, and all the prophets, in the kingdom of God, and yourselves being thrown outside."}, {"c": 13, "n": 29, "text": "They will come from the east, west, north, and south, and will sit down in the kingdom of God."}, {"c": 13, "n": 30, "text": "Behold, there are some who are last who will be first, and there are some who are first who will be last.\""}, {"c": 13, "n": 31, "text": "On that same day, some Pharisees came, saying to him, \"Get out of here, and go away, for Herod wants to kill you.\""}, {"c": 13, "n": 32, "text": "He said to them, \"Go and tell that fox, 'Behold, I cast out demons and perform cures today and tomorrow, and the third day I complete my mission."}, {"c": 13, "n": 33, "text": "Nevertheless I must go on my way today and tomorrow and the next day, for it can't be that a prophet perish out of Jerusalem.'"}, {"c": 13, "n": 34, "text": "\"Jerusalem, Jerusalem, that kills the prophets, and stones those who are sent to her! How often I wanted to gather your children together, like a hen gathers her own brood under her wings, and you refused!"}, {"c": 13, "n": 35, "text": "Behold, your house is left to you desolate. I tell you, you will not see me, until you say, 'Blessed is he who comes in the name of the Lord!'\""}]}, "luke_14": {"id": "luke_14", "ref": "Luke 14", "verses": [{"c": 14, "n": 1, "text": "It happened, when he went into the house of one of the rulers of the Pharisees on a Sabbath to eat bread, that they were watching him."}, {"c": 14, "n": 2, "text": "Behold, a certain man who had dropsy was in front of him."}, {"c": 14, "n": 3, "text": "Jesus, answering, spoke to the lawyers and Pharisees, saying, \"Is it lawful to heal on the Sabbath?\""}, {"c": 14, "n": 4, "text": "But they were silent. He took him, and healed him, and let him go."}, {"c": 14, "n": 5, "text": "He answered them, \"Which of you, if your son or an ox fell into a well, wouldn't immediately pull him out on a Sabbath day?\""}, {"c": 14, "n": 6, "text": "They couldn't answer him regarding these things."}, {"c": 14, "n": 7, "text": "He spoke a parable to those who were invited, when he noticed how they chose the best seats, and said to them,"}, {"c": 14, "n": 8, "text": "\"When you are invited by anyone to a marriage feast, don't sit in the best seat, since perhaps a more honorable man than you might be invited by him,"}, {"c": 14, "n": 9, "text": "and he who invited both of you would come and tell you, 'Make room for this man.' Then you would begin, with shame, to take the lowest place."}, {"c": 14, "n": 10, "text": "But when you are invited, go and sit in the lowest place, so that when he who invited you comes, he may tell you, 'Friend, move up higher.' Then you will have glory in the presence of all who sit at the table with you."}, {"c": 14, "n": 11, "text": "For everyone who exalts himself will be humbled, and whoever humbles himself will be exalted.\""}, {"c": 14, "n": 12, "text": "He also said to the one who had invited him, \"When you make a dinner or a supper, don't call your friends, nor your brothers, nor your kinsmen, nor rich neighbors, or perhaps they might also return the favor, and pay you back."}, {"c": 14, "n": 13, "text": "But when you make a feast, ask the poor, the maimed, the lame, or the blind;"}, {"c": 14, "n": 14, "text": "and you will be blessed, because they don't have the resources to repay you. For you will be repaid in the resurrection of the righteous.\""}, {"c": 14, "n": 15, "text": "When one of those who sat at the table with him heard these things, he said to him, \"Blessed is he who will feast in the kingdom of God!\""}, {"c": 14, "n": 16, "text": "But he said to him, \"A certain man made a great supper, and he invited many people."}, {"c": 14, "n": 17, "text": "He sent out his servant at supper time to tell those who were invited, 'Come, for everything is ready now.'"}, {"c": 14, "n": 18, "text": "They all as one began to make excuses. The first said to him, 'I have bought a field, and I must go and see it. Please have me excused.'"}, {"c": 14, "n": 19, "text": "Another said, 'I have bought five yoke of oxen, and I must go try them out. Please have me excused.'"}, {"c": 14, "n": 20, "text": "Another said, 'I have married a wife, and therefore I can't come.'"}, {"c": 14, "n": 21, "text": "That servant came, and told his lord these things. Then the master of the house, being angry, said to his servant, 'Go out quickly into the streets and lanes of the city, and bring in here the poor, maimed, blind, and lame.'"}, {"c": 14, "n": 22, "text": "The servant said, 'Lord, it is done as you commanded, and there is still room.'"}, {"c": 14, "n": 23, "text": "The lord said to the servant, 'Go out into the highways and hedges, and compel them to come in, that my house may be filled."}, {"c": 14, "n": 24, "text": "For I tell you that none of those men who were invited will taste of my supper.'\""}, {"c": 14, "n": 25, "text": "Now great multitudes went with him. He turned and said to them,"}, {"c": 14, "n": 26, "text": "\"If any man comes to me, and doesn't hate his own father, mother, wife, children, brothers, and sisters, yes, and his own life also, he can't be my disciple."}, {"c": 14, "n": 27, "text": "Whoever doesn't bear his own cross, and come after me, can't be my disciple."}, {"c": 14, "n": 28, "text": "For which of you, desiring to build a tower, doesn't first sit down and count the cost, to see if he has enough to complete it?"}, {"c": 14, "n": 29, "text": "Or perhaps, when he has laid a foundation, and is not able to finish, everyone who sees begins to mock him,"}, {"c": 14, "n": 30, "text": "saying, 'This man began to build, and wasn't able to finish.'"}, {"c": 14, "n": 31, "text": "Or what king, as he goes to encounter another king in war, will not sit down first and consider whether he is able with ten thousand to meet him who comes against him with twenty thousand?"}, {"c": 14, "n": 32, "text": "Or else, while the other is yet a great way off, he sends an envoy, and asks for conditions of peace."}, {"c": 14, "n": 33, "text": "So therefore whoever of you who doesn't renounce all that he has, he can't be my disciple."}, {"c": 14, "n": 34, "text": "Salt is good, but if the salt becomes flat and tasteless, with what do you season it?"}, {"c": 14, "n": 35, "text": "It is fit neither for the soil nor for the manure pile. It is thrown out. He who has ears to hear, let him hear.\""}]}, "luke_15": {"id": "luke_15", "ref": "Luke 15", "verses": [{"c": 15, "n": 1, "text": "Now all the tax collectors and sinners were coming close to him to hear him."}, {"c": 15, "n": 2, "text": "The Pharisees and the scribes murmured, saying, \"This man welcomes sinners, and eats with them.\""}, {"c": 15, "n": 3, "text": "He told them this parable."}, {"c": 15, "n": 4, "text": "\"Which of you men, if you had one hundred sheep, and lost one of them, wouldn't leave the ninety-nine in the wilderness, and go after the one that was lost, until he found it?"}, {"c": 15, "n": 5, "text": "When he has found it, he carries it on his shoulders, rejoicing."}, {"c": 15, "n": 6, "text": "When he comes home, he calls together his friends and his neighbors, saying to them, 'Rejoice with me, for I have found my sheep which was lost!'"}, {"c": 15, "n": 7, "text": "I tell you that even so there will be more joy in heaven over one sinner who repents, than over ninety-nine righteous people who need no repentance."}, {"c": 15, "n": 8, "text": "Or what woman, if she had ten drachma coins, if she lost one drachma, wouldn't light a lamp, sweep the house, and seek diligently until she found it?"}, {"c": 15, "n": 9, "text": "When she has found it, she calls together her friends and neighbors, saying, 'Rejoice with me, for I have found the drachma which I had lost.'"}, {"c": 15, "n": 10, "text": "Even so, I tell you, there is joy in the presence of the angels of God over one sinner repenting.\""}, {"c": 15, "n": 11, "text": "He said, \"A certain man had two sons."}, {"c": 15, "n": 12, "text": "The younger of them said to his father, 'Father, give me my share of your property.' He divided his living to them."}, {"c": 15, "n": 13, "text": "Not many days after, the younger son gathered all of this together and took his journey into a far country. There he wasted his property with riotous living."}, {"c": 15, "n": 14, "text": "When he had spent all of it, there arose a severe famine in that country, and he began to be in need."}, {"c": 15, "n": 15, "text": "He went and joined himself to one of the citizens of that country, and he sent him into his fields to feed pigs."}, {"c": 15, "n": 16, "text": "He wanted to fill his belly with the husks that the pigs ate, but no one gave him any."}, {"c": 15, "n": 17, "text": "But when he came to himself he said, 'How many hired servants of my father's have bread enough to spare, and I'm dying with hunger!"}, {"c": 15, "n": 18, "text": "I will get up and go to my father, and will tell him, \"Father, I have sinned against heaven, and in your sight."}, {"c": 15, "n": 19, "text": "I am no more worthy to be called your son. Make me as one of your hired servants.\"'"}, {"c": 15, "n": 20, "text": "He arose, and came to his father. But while he was still far off, his father saw him, and was moved with compassion, and ran, and fell on his neck, and kissed him."}, {"c": 15, "n": 21, "text": "The son said to him, 'Father, I have sinned against heaven, and in your sight. I am no more worthy to be called your son.'"}, {"c": 15, "n": 22, "text": "But the father said to his servants, 'Bring out the best robe, and put it on him. Put a ring on his hand, and shoes on his feet."}, {"c": 15, "n": 23, "text": "Bring the fattened calf, kill it, and let us eat, and celebrate;"}, {"c": 15, "n": 24, "text": "for this, my son, was dead, and is alive again. He was lost, and is found.' They began to be merry."}, {"c": 15, "n": 25, "text": "Now his elder son was in the field. As he came and drew near to the house, he heard music and dancing."}, {"c": 15, "n": 26, "text": "He called one of the servants to him, and asked what was going on."}, {"c": 15, "n": 27, "text": "He said to him, 'Your brother has come, and your father has killed the fattened calf, because he has received him safe and sound.'"}, {"c": 15, "n": 28, "text": "But he was angry, and would not go in. Therefore his father came out, and begged him."}, {"c": 15, "n": 29, "text": "But he answered his father, 'Behold, these many years I served you, and I never disobeyed a commandment of yours, and you never gave me a goat, that I might celebrate with my friends."}, {"c": 15, "n": 30, "text": "But when this, your son, came, who has devoured your living with prostitutes, you killed the fattened calf for him.'"}, {"c": 15, "n": 31, "text": "He said to him, 'Son, you are always with me, and all that is mine is yours."}, {"c": 15, "n": 32, "text": "But it was appropriate to celebrate and be glad, for this, your brother, was dead, and is alive again. He was lost, and is found.'\""}]}, "luke_16": {"id": "luke_16", "ref": "Luke 16", "verses": [{"c": 16, "n": 1, "text": "He said also to his disciples, \"There was a certain rich man, who had a manager. The same was accused to him of wasting his possessions."}, {"c": 16, "n": 2, "text": "He called him, and said to him, 'What is this that I hear about you? Give an accounting of your management, for you can no longer be manager.'"}, {"c": 16, "n": 3, "text": "The steward said within himself, 'What will I do, seeing that my lord is taking away the management position from me? I don't have strength to dig. I am ashamed to beg."}, {"c": 16, "n": 4, "text": "I know what I will do, so that when I am removed from management, they may receive me into their houses.'"}, {"c": 16, "n": 5, "text": "Calling each one of his lord's debtors to him, he said to the first, 'How much do you owe to my lord?'"}, {"c": 16, "n": 6, "text": "He said, 'A hundred batos of oil.' He said to him, 'Take your bill, and sit down quickly and write fifty.'"}, {"c": 16, "n": 7, "text": "Then said he to another, 'How much do you owe?' He said, 'A hundred cors of wheat.' He said to him, 'Take your bill, and write eighty.'"}, {"c": 16, "n": 8, "text": "His lord commended the unrighteous steward because he had done wisely, for the sons of this world are, in their own generation, wiser than the sons of the light."}, {"c": 16, "n": 9, "text": "I tell you, make for yourselves friends by means of unrighteous mammon, so that when you fail, they may receive you into the eternal tents."}, {"c": 16, "n": 10, "text": "He who is faithful in a very little is faithful also in much. He who is unrighteous in a very little is also unrighteous in much."}, {"c": 16, "n": 11, "text": "If therefore you have not been faithful in the unrighteous mammon, who will commit to your trust the true riches?"}, {"c": 16, "n": 12, "text": "If you have not been faithful in that which is another's, who will give you that which is your own?"}, {"c": 16, "n": 13, "text": "No servant can serve two masters, for either he will hate the one, and love the other; or else he will hold to one, and despise the other. You aren't able to serve God and mammon.\""}, {"c": 16, "n": 14, "text": "The Pharisees, who were lovers of money, also heard all these things, and they scoffed at him."}, {"c": 16, "n": 15, "text": "He said to them, \"You are those who justify yourselves in the sight of men, but God knows your hearts. For that which is exalted among men is an abomination in the sight of God."}, {"c": 16, "n": 16, "text": "The law and the prophets were until John. From that time the gospel of the kingdom of God is preached, and everyone is forcing his way into it."}, {"c": 16, "n": 17, "text": "But it is easier for heaven and earth to pass away, than for one tiny stroke of a pen in the law to fall."}, {"c": 16, "n": 18, "text": "Everyone who divorces his wife, and marries another, commits adultery. He who marries one who is put away from a husband commits adultery."}, {"c": 16, "n": 19, "text": "\"Now there was a certain rich man, and he was clothed in purple and fine linen, living in luxury every day."}, {"c": 16, "n": 20, "text": "A certain beggar, named Lazarus, was laid at his gate, full of sores,"}, {"c": 16, "n": 21, "text": "and desiring to be fed with the crumbs that fell from the rich man's table. Yes, even the dogs came and licked his sores."}, {"c": 16, "n": 22, "text": "It happened that the beggar died, and that he was carried away by the angels to Abraham's bosom. The rich man also died, and was buried."}, {"c": 16, "n": 23, "text": "In Hades, he lifted up his eyes, being in torment, and saw Abraham far off, and Lazarus at his bosom."}, {"c": 16, "n": 24, "text": "He cried and said, 'Father Abraham, have mercy on me, and send Lazarus, that he may dip the tip of his finger in water, and cool my tongue! For I am in anguish in this flame.'"}, {"c": 16, "n": 25, "text": "But Abraham said, 'Son, remember that you, in your lifetime, received your good things, and Lazarus, in like manner, bad things. But now here he is comforted and you are in anguish."}, {"c": 16, "n": 26, "text": "Besides all this, between us and you there is a great gulf fixed, that those who want to pass from here to you are not able, and that none may cross over from there to us.'"}, {"c": 16, "n": 27, "text": "He said, 'I ask you therefore, father, that you would send him to my father's house;"}, {"c": 16, "n": 28, "text": "for I have five brothers, that he may testify to them, lest they also come into this place of torment.'"}, {"c": 16, "n": 29, "text": "But Abraham said to him, 'They have Moses and the prophets. Let them listen to them.'"}, {"c": 16, "n": 30, "text": "He said, 'No, father Abraham, but if one goes to them from the dead, they will repent.'"}, {"c": 16, "n": 31, "text": "He said to him, 'If they don't listen to Moses and the prophets, neither will they be persuaded if one rises from the dead.'\""}]}, "luke_17": {"id": "luke_17", "ref": "Luke 17", "verses": [{"c": 17, "n": 1, "text": "He said to the disciples, \"It is impossible that occasions of stumbling should not come, but woe to him through whom they come!"}, {"c": 17, "n": 2, "text": "It would be better for him if a millstone were hanged about his neck, and he were thrown into the sea, rather than that he should cause one of these little ones to stumble."}, {"c": 17, "n": 3, "text": "Be careful. If your brother sins against you, rebuke him. If he repents, forgive him."}, {"c": 17, "n": 4, "text": "If he sins against you seven times in the day, and seven times turns again, saying, 'I repent,' you shall forgive him.\""}, {"c": 17, "n": 5, "text": "The apostles said to the Lord, \"Increase our faith.\""}, {"c": 17, "n": 6, "text": "The Lord said, \"If you had faith as a grain of mustard seed, you would tell this sycamore tree, 'Be uprooted, and be planted in the sea,' and it would obey you."}, {"c": 17, "n": 7, "text": "But who is there of you, having a servant plowing or keeping sheep, that will say, when he comes in from the field, 'Come immediately and sit down at the table,'"}, {"c": 17, "n": 8, "text": "and will not rather tell him, 'Prepare my supper, clothe yourself properly, and serve me, while I eat and drink. Afterward you will eat and drink?'"}, {"c": 17, "n": 9, "text": "Does he thank that servant because he did the things that were commanded? I think not."}, {"c": 17, "n": 10, "text": "Even so you also, when you have done all the things that are commanded you, say, 'We are unworthy servants. We have done our duty.'\""}, {"c": 17, "n": 11, "text": "It happened, as he was on his way to Jerusalem, that he was passing along the borders of Samaria and Galilee."}, {"c": 17, "n": 12, "text": "As he entered into a certain village, ten men who were lepers met him, who stood far away."}, {"c": 17, "n": 13, "text": "They lifted up their voices, saying, \"Jesus, Master, have mercy on us!\""}, {"c": 17, "n": 14, "text": "When he saw them, he said to them, \"Go and show yourselves to the priests.\" It happened, as they went, they were cleansed."}, {"c": 17, "n": 15, "text": "One of them, when he saw that he was healed, turned back, glorifying God with a loud voice."}, {"c": 17, "n": 16, "text": "He fell on his face at his feet, giving him thanks. He was a Samaritan."}, {"c": 17, "n": 17, "text": "Jesus answered, \"Weren't the ten cleansed? But where are the nine?"}, {"c": 17, "n": 18, "text": "Were there none found who returned to give glory to God, except this stranger?\""}, {"c": 17, "n": 19, "text": "He said to him, \"Get up, and go your way. Your faith has healed you.\""}, {"c": 17, "n": 20, "text": "Being asked by the Pharisees when the kingdom of God would come, he answered them, \"The kingdom of God doesn't come with observation;"}, {"c": 17, "n": 21, "text": "neither will they say, 'Look, here!' or, 'Look, there!' for behold, the kingdom of God is within you.\""}, {"c": 17, "n": 22, "text": "He said to the disciples, \"The days will come, when you will desire to see one of the days of the Son of Man, and you will not see it."}, {"c": 17, "n": 23, "text": "They will tell you, 'Look, here!' or 'Look, there!' Don't go away, nor follow after them,"}, {"c": 17, "n": 24, "text": "for as the lightning, when it flashes out of the one part under the sky, shines to the other part under the sky; so will the Son of Man be in his day."}, {"c": 17, "n": 25, "text": "But first, he must suffer many things and be rejected by this generation."}, {"c": 17, "n": 26, "text": "As it happened in the days of Noah, even so will it be also in the days of the Son of Man."}, {"c": 17, "n": 27, "text": "They ate, they drank, they married, they were given in marriage, until the day that Noah entered into the ark, and the flood came, and destroyed them all."}, {"c": 17, "n": 28, "text": "Likewise, even as it happened in the days of Lot: they ate, they drank, they bought, they sold, they planted, they built;"}, {"c": 17, "n": 29, "text": "but in the day that Lot went out from Sodom, it rained fire and sulfur from the sky, and destroyed them all."}, {"c": 17, "n": 30, "text": "It will be the same way in the day that the Son of Man is revealed."}, {"c": 17, "n": 31, "text": "In that day, he who will be on the housetop, and his goods in the house, let him not go down to take them away. Let him who is in the field likewise not turn back."}, {"c": 17, "n": 32, "text": "Remember Lot's wife!"}, {"c": 17, "n": 33, "text": "Whoever seeks to gain his life loses it, but whoever loses his life preserves it."}, {"c": 17, "n": 34, "text": "I tell you, in that night there will be two people in one bed. The one will be taken, and the other will be left."}, {"c": 17, "n": 35, "text": "There will be two women grinding together. The one will be taken, and the other will be left.\""}, {"c": 17, "n": 36, "text": "dummy verses inserted by amos"}, {"c": 17, "n": 37, "text": "They answering, asked him, \"Where, Lord?\" He said to them, \"Where the body is, there will the vultures also be gathered together.\""}]}, "luke_18": {"id": "luke_18", "ref": "Luke 18", "verses": [{"c": 18, "n": 1, "text": "He also spoke a parable to them that they must always pray, and not give up,"}, {"c": 18, "n": 2, "text": "saying, \"A certain judge was in a city, who didn't fear God, and didn't respect man."}, {"c": 18, "n": 3, "text": "A widow was in that city, and she came often to him, saying, 'Defend me from my adversary!'"}, {"c": 18, "n": 4, "text": "He wouldn't for a while, but afterward he said to himself, 'Though I don't fear God, nor respect man,"}, {"c": 18, "n": 5, "text": "yet because this widow bothers me, I will defend her, or else she will wear me out by her continual coming.'\""}, {"c": 18, "n": 6, "text": "The Lord said, \"Listen to what the unrighteous judge says."}, {"c": 18, "n": 7, "text": "Won't God avenge his elect, who are crying out to him day and night, and yet he exercises patience with them?"}, {"c": 18, "n": 8, "text": "I tell you that he will avenge them quickly. Nevertheless, when the Son of Man comes, will he find faith on the earth?\""}, {"c": 18, "n": 9, "text": "He spoke also this parable to certain people who were convinced of their own righteousness, and who despised all others."}, {"c": 18, "n": 10, "text": "\"Two men went up into the temple to pray; one was a Pharisee, and the other was a tax collector."}, {"c": 18, "n": 11, "text": "The Pharisee stood and prayed to himself like this: 'God, I thank you, that I am not like the rest of men, extortioners, unrighteous, adulterers, or even like this tax collector."}, {"c": 18, "n": 12, "text": "I fast twice in the week. I give tithes of all that I get.'"}, {"c": 18, "n": 13, "text": "But the tax collector, standing far away, wouldn't even lift up as his eyes to heaven, but beat his breast, saying, 'God, be merciful to me, a sinner!'"}, {"c": 18, "n": 14, "text": "I tell you, this man went down to his house justified rather than the other; for everyone who exalts himself will be humbled, but he who humbles himself will be exalted.\""}, {"c": 18, "n": 15, "text": "They were also bringing their babies to him, that he might touch them. But when the disciples saw it, they rebuked them."}, {"c": 18, "n": 16, "text": "Jesus called them near, saying, \"Allow the little children to come to me, and don't hinder them, for the kingdom of God belongs to ones like these."}, {"c": 18, "n": 17, "text": "Most assuredly, I tell you, whoever doesn't receive the kingdom of God like a little child, he will in no way enter into it.\""}, {"c": 18, "n": 18, "text": "A certain ruler asked him, saying, \"Good Teacher, what do I do to inherit eternal life?\""}, {"c": 18, "n": 19, "text": "Jesus asked him, \"Why do you call me good? No one is good, except one -- God."}, {"c": 18, "n": 20, "text": "You know the commandments: 'Don't commit adultery,' 'Don't murder,' 'Don't steal,' 'Don't give false testimony,' 'Honor your father and your mother.'\""}, {"c": 18, "n": 21, "text": "He said, \"I have observed all these things from my youth up.\""}, {"c": 18, "n": 22, "text": "When Jesus heard these things, he said to him, \"You still lack one thing. Sell all that you have, and distribute it to the poor. You will have treasure in heaven. Come, follow me.\""}, {"c": 18, "n": 23, "text": "But when he heard these things, he became very sad, for he was very rich."}, {"c": 18, "n": 24, "text": "Jesus, seeing that he became very sad, said, \"How hard it is for those who have riches to enter into the kingdom of God!"}, {"c": 18, "n": 25, "text": "For it is easier for a camel to enter in through a needle's eye, than for a rich man to enter into the kingdom of God.\""}, {"c": 18, "n": 26, "text": "Those who heard it said, \"Then who can be saved?\""}, {"c": 18, "n": 27, "text": "But he said, \"The things which are impossible with men are possible with God.\""}, {"c": 18, "n": 28, "text": "Peter said, \"Look, we have left everything, and followed you.\""}, {"c": 18, "n": 29, "text": "He said to them, \"Most assuredly I tell you, there is no one who has left house, or wife, or brothers, or parents, or children, for the kingdom of God's sake,"}, {"c": 18, "n": 30, "text": "who will not receive many times more in this time, and in the world to come, eternal life.\""}, {"c": 18, "n": 31, "text": "He took the twelve aside, and said to them, \"Behold, we are going up to Jerusalem, and all the things that are written through the prophets concerning the Son of Man will be completed."}, {"c": 18, "n": 32, "text": "For he will be delivered up to the Gentiles, will be mocked, treated shamefully, and spit on."}, {"c": 18, "n": 33, "text": "They will scourge and kill him. On the third day, he will rise again.\""}, {"c": 18, "n": 34, "text": "They understood none of these things. This saying was hidden from them, and they didn't understand the things that were said."}, {"c": 18, "n": 35, "text": "It happened, as he came near Jericho, a certain blind man sat by the road, begging."}, {"c": 18, "n": 36, "text": "Hearing a multitude going by, he asked what this meant."}, {"c": 18, "n": 37, "text": "They told him that Jesus of Nazareth was passing by."}, {"c": 18, "n": 38, "text": "He cried out, \"Jesus, you son of David, have mercy on me!\""}, {"c": 18, "n": 39, "text": "Those who led the way rebuked him, that he should be quiet; but he cried out all the more, \"You son of David, have mercy on me!\""}, {"c": 18, "n": 40, "text": "Jesus, standing, commanded him to be brought to him. When he had come near, he asked him,"}, {"c": 18, "n": 41, "text": "\"What do you want me to do?\" He said, \"Lord, that I may see again.\""}, {"c": 18, "n": 42, "text": "Jesus said to him, \"Receive your sight. Your faith has healed you.\""}, {"c": 18, "n": 43, "text": "Immediately he received his sight, and followed him, glorifying God. All the people, when they saw it, praised God."}]}, "luke_19": {"id": "luke_19", "ref": "Luke 19", "verses": [{"c": 19, "n": 1, "text": "He entered and was passing through Jericho."}, {"c": 19, "n": 2, "text": "There was a man named Zacchaeus. He was a chief tax collector, and he was rich."}, {"c": 19, "n": 3, "text": "He was trying to see who Jesus was, and couldn't because of the crowd, because he was short."}, {"c": 19, "n": 4, "text": "He ran on ahead, and climbed up into a sycamore tree to see him, for he was to pass that way."}, {"c": 19, "n": 5, "text": "When Jesus came to the place, he looked up and saw him, and said to him, \"Zacchaeus, hurry and come down, for today I must stay at your house.\""}, {"c": 19, "n": 6, "text": "He hurried, came down, and received him joyfully."}, {"c": 19, "n": 7, "text": "When they saw it, they all murmured, saying, \"He has gone in to lodge with a man who is a sinner.\""}, {"c": 19, "n": 8, "text": "Zacchaeus stood and said to the Lord, \"Behold, Lord, half of my goods I give to the poor. If I have wrongfully exacted anything of anyone, I restore four times as much.\""}, {"c": 19, "n": 9, "text": "Jesus said to him, \"Today, salvation has come to this house, because he also is a son of Abraham."}, {"c": 19, "n": 10, "text": "For the Son of Man came to seek and to save that which was lost.\""}, {"c": 19, "n": 11, "text": "As they heard these things, he went on and told a parable, because he was near Jerusalem, and they supposed that the kingdom of God would be revealed immediately."}, {"c": 19, "n": 12, "text": "He said therefore, \"A certain nobleman went into a far country to receive for himself a kingdom, and to return."}, {"c": 19, "n": 13, "text": "He called ten servants of his, and gave them ten minas, and told them, 'Conduct business until I come.'"}, {"c": 19, "n": 14, "text": "But his citizens hated him, and sent an envoy after him, saying, 'We don't want this man to reign over us.'"}, {"c": 19, "n": 15, "text": "It happened, when he had come back again, having received the kingdom, that he commanded these servants, to whom he had given the money, to be called to him, that he might know what they had gained by conducting business."}, {"c": 19, "n": 16, "text": "The first came before him, saying, 'Lord, your mina has made ten more minas.'"}, {"c": 19, "n": 17, "text": "He said to him, 'Well done, you good servant! Because you were found faithful in a very little, you shall have authority over ten cities.'"}, {"c": 19, "n": 18, "text": "The second came, saying, 'Your mina, Lord, has made five minas.'"}, {"c": 19, "n": 19, "text": "He said to him also, 'You also are to be over five cities.'"}, {"c": 19, "n": 20, "text": "Another came, saying, 'Lord, behold, your mina, which I kept laid away in a handkerchief,"}, {"c": 19, "n": 21, "text": "for I feared you, because you are an exacting man. You take up that which didn't lay down, and reap that which you didn't sow.'"}, {"c": 19, "n": 22, "text": "He said to him, 'Out of your own mouth will I judge you, you wicked servant! You knew that I am an exacting man, taking up that which I didn't lay down, and reaping that which I didn't sow."}, {"c": 19, "n": 23, "text": "Then why didn't you deposit my money in the bank, and I at my coming might have earned interest on it?'"}, {"c": 19, "n": 24, "text": "He said to those who stood by, 'Take the mina away from him, and give it to him who has the ten minas.'"}, {"c": 19, "n": 25, "text": "They said to him, 'Lord, he has ten minas!'"}, {"c": 19, "n": 26, "text": "'For I tell you that to everyone who has, will more be given; but from him who doesn't have, even that which he has will be taken away from him."}, {"c": 19, "n": 27, "text": "But bring those enemies of mine who didn't want me to reign over them here, and kill them before me.'\""}, {"c": 19, "n": 28, "text": "When he had thus spoken, he went on ahead, going up to Jerusalem."}, {"c": 19, "n": 29, "text": "It happened, when he drew near to Bethsphage and Bethany, at the mountain that is called Olivet, he sent two of his disciples,"}, {"c": 19, "n": 30, "text": "saying, \"Go your way into the village on the other side, in which, as you enter, you will find a colt tied, whereon no man ever yet sat. Untie him, and bring him."}, {"c": 19, "n": 31, "text": "If anyone asks you, 'Why are you untying it?' say to him: 'The Lord needs it.'\""}, {"c": 19, "n": 32, "text": "Those who were sent went away, and found things just as he had told them."}, {"c": 19, "n": 33, "text": "As they were untying the colt, the owners of it said to them, 'Why are you untying the colt?'"}, {"c": 19, "n": 34, "text": "They said, 'The Lord needs it.'"}, {"c": 19, "n": 35, "text": "They brought it to Jesus. They threw their cloaks on the colt, and set Jesus on them."}, {"c": 19, "n": 36, "text": "As he went, they spread their cloaks in the way."}, {"c": 19, "n": 37, "text": "As he was now getting near, at the descent of the Mount of Olives, the whole multitude of the disciples began to rejoice and praise God with a loud voice for all the mighty works which they had seen,"}, {"c": 19, "n": 38, "text": "saying, \"Blessed is the King who comes in the name of the Lord! Peace in heaven, and glory in the highest!\""}, {"c": 19, "n": 39, "text": "Some of the Pharisees from the multitude said to him, \"Teacher, rebuke your disciples!\""}, {"c": 19, "n": 40, "text": "He answered them, \"I tell you that if these were silent, the stones would cry out.\""}, {"c": 19, "n": 41, "text": "When he drew near, he saw the city and wept over it,"}, {"c": 19, "n": 42, "text": "saying, \"If you, even you, had known today the things which belong to your peace! But now, they are hidden from your eyes."}, {"c": 19, "n": 43, "text": "For the days will come on you, when your enemies will throw up a barricade against you, surround you, hem you in on every side,"}, {"c": 19, "n": 44, "text": "and will dash you and your children within you to the ground. They will not leave in you one stone on another, because you didn't know the time of your visitation.\""}, {"c": 19, "n": 45, "text": "He entered into the temple, and began to drive out those who bought and sold in it,"}, {"c": 19, "n": 46, "text": "saying to them, \"It is written, 'My house is a house of prayer,' but you have made it a 'den of robbers'!\""}, {"c": 19, "n": 47, "text": "He was teaching daily in the temple, but the chief priests and the scribes and the leading men among the people sought to destroy him."}, {"c": 19, "n": 48, "text": "They couldn't find what they might do, for all the people hung on to every word that he said."}]}, "luke_20": {"id": "luke_20", "ref": "Luke 20", "verses": [{"c": 20, "n": 1, "text": "It happened on one of those days, as he was teaching the people in the temple and preaching the gospel, that the chief priests and scribes came to him with the elders."}, {"c": 20, "n": 2, "text": "They asked him, \"Tell us: by what authority do you do these things? Or who is giving you this authority?\""}, {"c": 20, "n": 3, "text": "He answered them, \"I also will ask you one question. Tell me:"}, {"c": 20, "n": 4, "text": "the baptism of John, was it from heaven, or from men?\""}, {"c": 20, "n": 5, "text": "They reasoned with themselves, saying, \"If we say, 'From heaven,' he will say, 'Why didn't you believe him?'"}, {"c": 20, "n": 6, "text": "But if we say, 'From men,' all the people will stone us, for they are persuaded that John was a prophet.\""}, {"c": 20, "n": 7, "text": "They answered that they didn't know where it was from."}, {"c": 20, "n": 8, "text": "Jesus said to them, \"Neither will I tell you by what authority I do these things.\""}, {"c": 20, "n": 9, "text": "He began to tell the people this parable. \"A man planted a vineyard, and rented it out to some farmers, and went into another country for a long time."}, {"c": 20, "n": 10, "text": "At the proper season, he sent a servant to the farmers to collect his share of the fruit of the vineyard. But the farmers beat him, and sent him away empty."}, {"c": 20, "n": 11, "text": "He sent yet another servant, and they also beat him, and treated him shamefully, and sent him away empty."}, {"c": 20, "n": 12, "text": "He sent yet a third, and they also wounded him, and threw him out."}, {"c": 20, "n": 13, "text": "The lord of the vineyard said, 'What will I do? I will send my beloved son. It may be that seeing him, they will respect him.'"}, {"c": 20, "n": 14, "text": "But when the farmers saw him, they reasoned among themselves, saying, 'This is the heir. Come, let's kill him, that the inheritance may be ours.'"}, {"c": 20, "n": 15, "text": "They threw him out of the vineyard, and killed him. What therefore will the lord of the vineyard do to them?"}, {"c": 20, "n": 16, "text": "He will come and destroy these farmers, and will give the vineyard to others.\" When they heard it, they said, \"God forbid!\""}, {"c": 20, "n": 17, "text": "But he looked at them, and said, \"Then what is this that is written, 'The stone which the builders rejected, The same was made the chief cornerstone?'"}, {"c": 20, "n": 18, "text": "\"Everyone who falls on that stone will be broken to pieces, but it will crush whoever it falls on to dust.\""}, {"c": 20, "n": 19, "text": "The chief priests and the scribes sought to lay hands on Him that very hour, but they feared the people -- for they knew He had spoken this parable against them."}, {"c": 20, "n": 20, "text": "They watched him, and sent out spies, who pretended to be righteous, that they might trap him in something he said, so as to deliver him up to the rule and to the authority of the governor."}, {"c": 20, "n": 21, "text": "They asked him, \"Teacher, we know that you say and teach what is right, and aren't partial to anyone, but truly teach the way of God."}, {"c": 20, "n": 22, "text": "Is it lawful for us to pay taxes to Caesar, or not?\""}, {"c": 20, "n": 23, "text": "But he perceived their slyness, and said to them, \"Why do you test me?"}, {"c": 20, "n": 24, "text": "Show me a denarius. Whose image and inscription are on it?\" They answered, \"Caesar's.\""}, {"c": 20, "n": 25, "text": "He said to them, \"Then give to Caesar the things that are Caesar's, and to God the things that are God's.\""}, {"c": 20, "n": 26, "text": "They weren't able to trap him in his words before the people. They marveled at his answer, and were silent."}, {"c": 20, "n": 27, "text": "Some of the Sadducees came to him, those who deny that there is a resurrection."}, {"c": 20, "n": 28, "text": "They asked him, \"Teacher, Moses wrote to us that if a man's brother dies having a wife, and he is childless, his brother should take the wife, and raise up children for his brother."}, {"c": 20, "n": 29, "text": "There were therefore seven brothers. The first took a wife, and died childless."}, {"c": 20, "n": 30, "text": "The second took her as wife, and he died childless."}, {"c": 20, "n": 31, "text": "The third took her, and likewise the seven all left no children, and died."}, {"c": 20, "n": 32, "text": "Afterward the woman also died."}, {"c": 20, "n": 33, "text": "Therefore in the resurrection whose wife of them will she be? For the seven had her as a wife.\""}, {"c": 20, "n": 34, "text": "Jesus said to them, \"The sons of this age marry, and are given in marriage."}, {"c": 20, "n": 35, "text": "But those who are considered worthy to attain to that age and the resurrection from the dead, neither marry, nor are given in marriage."}, {"c": 20, "n": 36, "text": "For neither can they die any more, for they are like the angels, and are sons of God, being sons of the resurrection."}, {"c": 20, "n": 37, "text": "But that the dead are raised, even Moses showed at the bush, when he called the Lord 'The God of Abraham, the God of Isaac, and the God of Jacob.'"}, {"c": 20, "n": 38, "text": "Now he is not the God of the dead, but of the living, for all are alive to him.\""}, {"c": 20, "n": 39, "text": "Some of the scribes answered, \"Teacher, you speak well.\""}, {"c": 20, "n": 40, "text": "They didn't dare to ask him any more questions."}, {"c": 20, "n": 41, "text": "He said to them, \"Why do they say that the Christ is David's son?"}, {"c": 20, "n": 42, "text": "David himself says in the book of Psalms, 'The Lord said to my Lord, \"Sit at my right hand,"}, {"c": 20, "n": 43, "text": "Until I make your enemies the footstool of your feet.\"'"}, {"c": 20, "n": 44, "text": "\"David therefore calls him Lord, so how is he his son?\""}, {"c": 20, "n": 45, "text": "In the hearing of all the people, he said to his disciples,"}, {"c": 20, "n": 46, "text": "\"Beware of the scribes, who desire to walk in long robes, and love greetings in the marketplaces, the best seats in the synagogues, and the best places at feasts;"}, {"c": 20, "n": 47, "text": "who devour widows' houses, and for a pretense make long prayers: these will receive greater condemnation.\""}]}, "luke_21": {"id": "luke_21", "ref": "Luke 21", "verses": [{"c": 21, "n": 1, "text": "He looked up, and saw the rich people who were putting their gifts into the treasury."}, {"c": 21, "n": 2, "text": "He saw a certain poor widow casting in two lepta."}, {"c": 21, "n": 3, "text": "He said, \"Truly I tell you, this poor widow put in more than all of them,"}, {"c": 21, "n": 4, "text": "for all these put in gifts for God from their abundance, but she, out of her lack, put in all that she had to live on.\""}, {"c": 21, "n": 5, "text": "As some were talking about the temple and how it was decorated with beautiful stones and gifts, he said,"}, {"c": 21, "n": 6, "text": "\"As for these things which you see, the days will come, in which there will not be left here one stone on another that will not be thrown down.\""}, {"c": 21, "n": 7, "text": "They asked him, \"Teacher, when therefore will these things be? What is the sign that these things are about to happen?\""}, {"c": 21, "n": 8, "text": "He said, \"Watch out that you don't get led astray, for many will come in my name, saying, 'I AM,' and, 'The time is at hand.' Therefore don't follow them."}, {"c": 21, "n": 9, "text": "When you hear of wars and disturbances, don't be terrified, for these things must happen first, but the end won't come immediately.\""}, {"c": 21, "n": 10, "text": "Then he said to them, \"Nation will rise against nation, and kingdom against kingdom."}, {"c": 21, "n": 11, "text": "There will be great earthquakes, famines, and plagues in various places. There will be terrors and great signs from heaven."}, {"c": 21, "n": 12, "text": "But before all these things, they will lay their hands on you and will persecute you, delivering you up to synagogues and prisons, bringing you before kings and governors for my name's sake."}, {"c": 21, "n": 13, "text": "It will turn out as a testimony to you."}, {"c": 21, "n": 14, "text": "Settle it therefore in your hearts not to meditate beforehand how to answer,"}, {"c": 21, "n": 15, "text": "for I will give you a mouth and wisdom which all your adversaries will not be able to withstand or to contradict."}, {"c": 21, "n": 16, "text": "But you will be handed over even by parents, brothers, relatives, and friends. Some of you will they cause to be put to death."}, {"c": 21, "n": 17, "text": "You will be hated by all men for my name's sake."}, {"c": 21, "n": 18, "text": "Not a hair of your head will perish."}, {"c": 21, "n": 19, "text": "By your endurance you will win your souls."}, {"c": 21, "n": 20, "text": "\"But when you see Jerusalem surrounded by armies, then know that its desolation is at hand."}, {"c": 21, "n": 21, "text": "Then let those who are in Judea flee to the mountains. Let them who are in the midst of her depart. Don't let those who are in the country enter therein."}, {"c": 21, "n": 22, "text": "For these are days of vengeance, that all things which are written may be fulfilled."}, {"c": 21, "n": 23, "text": "Woe to those who are pregnant and to those who nurse infants in those days! For there will be great distress in the land, and wrath to this people."}, {"c": 21, "n": 24, "text": "They will fall by the edge of the sword, and will be led captive into all the nations. Jerusalem will be trampled down by the Gentiles, until the times of the Gentiles are fulfilled."}, {"c": 21, "n": 25, "text": "There will be signs in the sun, moon, and stars; and on the earth anxiety of nations, in perplexity for the roaring of the sea and the waves;"}, {"c": 21, "n": 26, "text": "men fainting for fear, and for expectation of the things which are coming on the world: for the powers of the heavens will be shaken."}, {"c": 21, "n": 27, "text": "Then they will see the Son of Man coming in a cloud with power and great glory."}, {"c": 21, "n": 28, "text": "But when these things begin to happen, look up, and lift up your heads, because your redemption is near.\""}, {"c": 21, "n": 29, "text": "He told them a parable. \"See the fig tree, and all the trees."}, {"c": 21, "n": 30, "text": "When they are already budding, you see it and know by your own selves that the summer is already n
