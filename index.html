 and found many come together."}, {"c": 10, "n": 28, "text": "He said to them, \"You yourselves know how it is an unlawful thing for a man who is a Jew to join himself or come to one of another nation, but God has shown me that I shouldn't call any man unholy or unclean."}, {"c": 10, "n": 29, "text": "Therefore also I came without complaint when I was sent for. I ask therefore, why did you send for me?\""}, {"c": 10, "n": 30, "text": "Cornelius said, \"Four days ago, I was fasting until this hour, and at the ninth hour, I prayed in my house, and behold, a man stood before me in bright clothing,"}, {"c": 10, "n": 31, "text": "and said, 'Cornelius, your prayer is heard, and your alms are remembered in the sight of God."}, {"c": 10, "n": 32, "text": "Send therefore to Joppa, and call to you Simon, who is surnamed Peter. He lodges in the house of Simon a tanner, by the seaside. When he comes, he will speak to you.'"}, {"c": 10, "n": 33, "text": "Therefore I sent to you at once, and it was good of you to come. Now therefore we are all here present in the sight of God to hear all things that have been commanded you by God.\""}, {"c": 10, "n": 34, "text": "Peter opened his mouth and said, \"Truly I perceive that God doesn't show favoritism,"}, {"c": 10, "n": 35, "text": "but in every nation he who fears him, and works righteousness, is acceptable to him."}, {"c": 10, "n": 36, "text": "The word which he sent to the children of Israel, preaching good news of peace by Jesus Christ (he is Lord of all):"}, {"c": 10, "n": 37, "text": "that spoken word you yourselves know, which was proclaimed throughout all Judea, beginning from Galilee, after the baptism which John preached;"}, {"c": 10, "n": 38, "text": "even Jesus of Nazareth, how God anointed him with the Holy Spirit and with power, who went about doing good, and healing all who were oppressed by the devil; for God was with him."}, {"c": 10, "n": 39, "text": "We are witnesses of all things which he did both in the country of the Jews, and in Jerusalem; whom they also killed, hanging him on a tree."}, {"c": 10, "n": 40, "text": "God raised him up the third day, and gave him to be revealed,"}, {"c": 10, "n": 41, "text": "not to all the people, but to witnesses who were chosen before by God, to us, who ate and drank with him after he rose from the dead."}, {"c": 10, "n": 42, "text": "He charged us to preach to the people, and to testify that this is he who is appointed by God as the Judge of the living and the dead."}, {"c": 10, "n": 43, "text": "All the prophets testify about him, that through his name everyone who believes in him will receive remission of sins.\""}, {"c": 10, "n": 44, "text": "While Peter was still speaking these words, the Holy Spirit fell on all those who heard the word."}, {"c": 10, "n": 45, "text": "They of the circumcision who believed were amazed, as many as came with Peter, because the gift of the Holy Spirit was also poured out on the Gentiles."}, {"c": 10, "n": 46, "text": "For they heard them speak with other languages, and magnify God. Then Peter answered,"}, {"c": 10, "n": 47, "text": "\"Can any man forbid the water, that these who have received the Holy Spirit as well as we should not be baptized,?\""}, {"c": 10, "n": 48, "text": "He commanded them to be baptized in the name of Jesus Christ. Then they asked him to stay some days."}]}, "acts_11": {"id": "acts_11", "ref": "Acts 11", "verses": [{"c": 11, "n": 1, "text": "Now the apostles and the brothers who were in Judea heard that the Gentiles had also received the word of God."}, {"c": 11, "n": 2, "text": "When Peter had come up to Jerusalem, those who were of the circumcision contended with him,"}, {"c": 11, "n": 3, "text": "saying, \"You went in to uncircumcised men, and ate with them!\""}, {"c": 11, "n": 4, "text": "But Peter began, and explained to them in order, saying,"}, {"c": 11, "n": 5, "text": "\"I was in the city of Joppa praying, and in a trance I saw a vision: a certain container descending, like it was a great sheet let down from heaven by four corners. It came as far as me,"}, {"c": 11, "n": 6, "text": "on which, when I had looked intently, I considered, and saw the four-footed animals of the earth, wild animals, creeping things, and birds of the sky."}, {"c": 11, "n": 7, "text": "I also heard a voice saying to me, 'Rise, Peter, kill and eat!'"}, {"c": 11, "n": 8, "text": "But I said, 'Not so, Lord, for nothing unholy or unclean has ever entered into my mouth.'"}, {"c": 11, "n": 9, "text": "But a voice answered me the second time out of heaven, 'What God has cleansed, don't you make unholy.'"}, {"c": 11, "n": 10, "text": "This was done three times, and all were drawn up again into heaven."}, {"c": 11, "n": 11, "text": "Behold, immediately three men stood before the house where I was, having been sent from Caesarea to me."}, {"c": 11, "n": 12, "text": "The Spirit told me to go with them, without discriminating. These six brothers also accompanied me, and we entered into the man's house."}, {"c": 11, "n": 13, "text": "He told us how he had seen the angel standing in his house, and saying to him, 'Send to Joppa, and get Simon, whose surname is Peter,"}, {"c": 11, "n": 14, "text": "who will speak to you words whereby you will be saved, you and all your house.'"}, {"c": 11, "n": 15, "text": "As I began to speak, the Holy Spirit fell on them, even as on us at the beginning."}, {"c": 11, "n": 16, "text": "I remembered the word of the Lord, how he said, 'John indeed baptized with water, but you will be baptized in the Holy Spirit.'"}, {"c": 11, "n": 17, "text": "If then God gave to them the same gift as us, when we believed in the Lord Jesus Christ, who was I, that I could withstand God?\""}, {"c": 11, "n": 18, "text": "When they heard these things, they held their peace, and glorified God, saying, \"Then God has also granted to the Gentiles repentance to life!\""}, {"c": 11, "n": 19, "text": "They therefore who were scattered abroad by the oppression that arose about Stephen traveled as far as Phoenicia, Cyprus, and Antioch, speaking the word to no one except only to Jews."}, {"c": 11, "n": 20, "text": "But there were some of them, men of Cyprus and Cyrene, who, when they had come to Antioch, spoke to the Greeks, preaching the Lord Jesus."}, {"c": 11, "n": 21, "text": "The hand of the Lord was with them, and a great number believed and turned to the Lord."}, {"c": 11, "n": 22, "text": "The report concerning them came to the ears of the assembly which was in Jerusalem. They sent forth Barnabas to go as far as Antioch,"}, {"c": 11, "n": 23, "text": "who, when he had come, and had seen the grace of God, was glad. He exhorted them all, that with purpose of heart they would remain near to the Lord."}, {"c": 11, "n": 24, "text": "For he was a good man, and full of the Holy Spirit and of faith, and many people were added to the Lord."}, {"c": 11, "n": 25, "text": "Barnabas went forth to Tarsus to look for Saul."}, {"c": 11, "n": 26, "text": "When he had found him, he brought him to Antioch. It happened, that even for a whole year they were gathered together with the assembly, and taught many people. The disciples were first called Christians in Antioch."}, {"c": 11, "n": 27, "text": "Now in these days, prophets came down from Jerusalem to Antioch."}, {"c": 11, "n": 28, "text": "One of them named Agabus stood up, and indicated by the Spirit that there should be a great famine over all the world, which also happened in the days of Claudius."}, {"c": 11, "n": 29, "text": "The disciples, as anyone had plenty, each determined to send relief to the brothers who lived in Judea;"}, {"c": 11, "n": 30, "text": "which they also did, sending it to the elders by the hands of Barnabas and Saul."}]}, "acts_12": {"id": "acts_12", "ref": "Acts 12", "verses": [{"c": 12, "n": 1, "text": "Now about that time, Herod the king put forth his hands to oppress some of the assembly."}, {"c": 12, "n": 2, "text": "He killed James, the brother of John, with the sword."}, {"c": 12, "n": 3, "text": "When he saw that it pleased the Jews, he proceeded to seize Peter also. This was during the days of unleavened bread."}, {"c": 12, "n": 4, "text": "When he had captured him, he put him in prison, and delivered him to four squads of four soldiers each to guard him, intending to bring him out to the people after the Passover."}, {"c": 12, "n": 5, "text": "Peter therefore was kept in the prison, but constant prayer was made by the assembly to God for him."}, {"c": 12, "n": 6, "text": "The same night when Herod was about to bring him out, Peter was sleeping between two soldiers, bound with two chains. Guards in front of the door kept the prison."}, {"c": 12, "n": 7, "text": "Behold, an angel of the Lord stood by him, and a light shone in the cell. He struck Peter on the side, and woke him up, saying, \"Stand up quickly!\" His chains fell off from his hands."}, {"c": 12, "n": 8, "text": "The angel said to him, \"Put on your clothes, and tie on your sandals.\" He did so. He said to him, \"Wrap your cloak around you, and follow me.\""}, {"c": 12, "n": 9, "text": "He went out, and followed him. He didn't know that what was done by the angel was real, but thought he saw a vision."}, {"c": 12, "n": 10, "text": "When they were past the first and the second guard, they came to the iron gate that leads into the city, which opened to them by itself. They went out, and passed on through one street, and immediately the angel departed from him."}, {"c": 12, "n": 11, "text": "When Peter had come to himself, he said, \"Now I truly know that the Lord has sent forth his angel and delivered me out of the hand of Herod, and from everything the Jewish people were expecting.\""}, {"c": 12, "n": 12, "text": "Thinking about that, he came to the house of Mary, the mother of John whose surname was Mark, where many were gathered together and were praying."}, {"c": 12, "n": 13, "text": "When Peter knocked at the door of the gate, a maid named Rhoda came to answer."}, {"c": 12, "n": 14, "text": "When she recognized Peter's voice, she didn't open the gate for joy, but ran in, and reported that Peter stood before the gate."}, {"c": 12, "n": 15, "text": "They said to her, \"You are crazy!\" But she insisted that it was so. They said, \"It is his angel.\""}, {"c": 12, "n": 16, "text": "But Peter continued knocking. When they had opened, they saw him, and were amazed."}, {"c": 12, "n": 17, "text": "But he, beckoning to them with his hand to be silent, declared to them how the Lord had brought him forth out of the prison. He said, \"Tell these things to James, and to the brothers.\" He departed, and went to another place."}, {"c": 12, "n": 18, "text": "Now as soon as it was day, there was no small stir among the soldiers about what had become of Peter."}, {"c": 12, "n": 19, "text": "When Herod had sought for him, and didn't find him, he examined the guards, and commanded that they should be put to death. He went down from Judea to Caesarea, and stayed there."}, {"c": 12, "n": 20, "text": "Now Herod was highly displeased with those of Tyre and Sidon. They came with one accord to him, and, having made Blastus, the king's chamberlain, their friend, they asked for peace, because their country depended on the king's country for food."}, {"c": 12, "n": 21, "text": "On an appointed day, Herod dressed himself in royal clothing, sat on the throne, and gave a speech to them."}, {"c": 12, "n": 22, "text": "The people shouted, \"The voice of a god, and not of a man!\""}, {"c": 12, "n": 23, "text": "Immediately an angel of the Lord struck him, because he didn't give God the glory, and he was eaten by worms, and he died."}, {"c": 12, "n": 24, "text": "But the word of God grew and multiplied."}, {"c": 12, "n": 25, "text": "Barnabas and Saul returned to Jerusalem, when they had fulfilled their service, also taking with them John whose surname was Mark."}]}, "acts_13": {"id": "acts_13", "ref": "Acts 13", "verses": [{"c": 13, "n": 1, "text": "Now in the assembly that was at Antioch there were some prophets and teachers: Barnabas, Simeon who was called Niger, Lucius of Cyrene, Manaen the foster-brother of Herod the tetrarch, and Saul."}, {"c": 13, "n": 2, "text": "As they served the Lord and fasted, the Holy Spirit said, \"Separate Barnabas and Saul for me, for the work to which I have called them.\""}, {"c": 13, "n": 3, "text": "Then, when they had fasted and prayed and laid their hands on them, they sent them away."}, {"c": 13, "n": 4, "text": "So, being sent forth by the Holy Spirit, they went down to Seleucia. From there they sailed to Cyprus."}, {"c": 13, "n": 5, "text": "When they were at Salamis, they proclaimed the word of God in the synagogues of the Jews. They had also John as their attendant."}, {"c": 13, "n": 6, "text": "When they had gone through the island to Paphos, they found a certain sorcerer, a false prophet, a Jew, whose name was Bar-Jesus,"}, {"c": 13, "n": 7, "text": "who was with the proconsul, Sergius Paulus, a man of understanding. The same called Barnabas and Saul to him, and sought to hear the word of God."}, {"c": 13, "n": 8, "text": "But Elymas the sorcerer (for so is his name by interpretation) withstood them, seeking to turn aside the proconsul from the faith."}, {"c": 13, "n": 9, "text": "But Saul, who is also called Paul, filled with the Holy Spirit, fastened his eyes on him,"}, {"c": 13, "n": 10, "text": "and said, \"Full of all deceit and all cunning, you son of the devil, you enemy of all righteousness, will you not cease to pervert the right ways of the Lord?"}, {"c": 13, "n": 11, "text": "Now, behold, the hand of the Lord is on you, and you will be blind, not seeing the sun for a season!\" Immediately there fell on him a mist and darkness. He went around seeking someone to lead him by the hand."}, {"c": 13, "n": 12, "text": "Then the proconsul, when he saw what was done, believed, being astonished at the teaching of the Lord."}, {"c": 13, "n": 13, "text": "Now Paul and his company set sail from Paphos, and came to Perga in Pamphylia. John departed from them and returned to Jerusalem."}, {"c": 13, "n": 14, "text": "But they, passing through from Perga, came to Antioch of Pisidia. They went into the synagogue on the Sabbath day, and sat down."}, {"c": 13, "n": 15, "text": "After the reading of the law and the prophets, the rulers of the synagogue sent to them, saying, \"Brothers, if you have any word of exhortation for the people, speak.\""}, {"c": 13, "n": 16, "text": "Paul stood up, and beckoning with his hand said, \"Men of Israel, and you who fear God, listen."}, {"c": 13, "n": 17, "text": "The God of this people Israel chose our fathers, and exalted the people when they stayed as aliens in the land of Egypt, and with an uplifted arm, he led them forth out of it."}, {"c": 13, "n": 18, "text": "For about the time of forty years he put up with them in the wilderness."}, {"c": 13, "n": 19, "text": "When he had destroyed seven nations in the land of Canaan, he gave them their land for an inheritance, for about four hundred and fifty years."}, {"c": 13, "n": 20, "text": "After these things he gave them judges until Samuel, the prophet."}, {"c": 13, "n": 21, "text": "Afterward they asked for a king, and God gave to them Saul, the son of Kish, a man of the tribe of Benjamin, for forty years."}, {"c": 13, "n": 22, "text": "When he had removed him, he raised up David to be their king, to whom he also testified, 'I have found David, the son of Jesse, a man after my heart, who will do all my will.'"}, {"c": 13, "n": 23, "text": "From this man's seed, God has brought salvation to Israel according to his promise,"}, {"c": 13, "n": 24, "text": "before his coming, when John had first preached the baptism of repentance to all the people of Israel."}, {"c": 13, "n": 25, "text": "As John was fulfilling his course, he said, 'What do you suppose that I am? I am not he. But behold, there comes one after me the sandals of whose feet I am not worthy to untie.'"}, {"c": 13, "n": 26, "text": "Brothers, children of the stock of Abraham, and those among you who fear God, the word of this salvation is sent forth to you."}, {"c": 13, "n": 27, "text": "For those who dwell in Jerusalem, and their rulers, because they didn't know him, nor the voices of the prophets which are read every Sabbath, fulfilled them by condemning him."}, {"c": 13, "n": 28, "text": "Though they found no cause of death, they still asked Pilate to have him killed."}, {"c": 13, "n": 29, "text": "When they had fulfilled all things that were written about him, they took him down from the tree, and laid him in a tomb."}, {"c": 13, "n": 30, "text": "But God raised him from the dead,"}, {"c": 13, "n": 31, "text": "and he was seen for many days by those who came up with him from Galilee to Jerusalem, who are his witnesses to the people."}, {"c": 13, "n": 32, "text": "We bring you good news of the promise made to the fathers,"}, {"c": 13, "n": 33, "text": "that God has fulfilled the same to us, their children, in that he raised up Jesus. As it is also written in the second psalm, 'You are my Son. Today I have become your father.'"}, {"c": 13, "n": 34, "text": "\"Concerning that he raised him up from the dead, now no more to return to corruption, he has spoken thus: 'I will give you the holy and sure blessings of David.'"}, {"c": 13, "n": 35, "text": "Therefore he says also in another psalm, 'You will not allow your Holy One to see decay.'"}, {"c": 13, "n": 36, "text": "For David, after he had in his own generation served the counsel of God, fell asleep, and was laid with his fathers, and saw decay."}, {"c": 13, "n": 37, "text": "But he whom God raised up saw no decay."}, {"c": 13, "n": 38, "text": "Be it known to you therefore, brothers, that through this man is proclaimed to you remission of sins,"}, {"c": 13, "n": 39, "text": "and by him everyone who believes is justified from all things, from which you could not be justified by the law of Moses."}, {"c": 13, "n": 40, "text": "Beware therefore, lest that come on you which is spoken in the prophets:"}, {"c": 13, "n": 41, "text": "'Behold, you scoffers, and wonder, and perish; For I work a work in your days, A work which you will in no way believe, if one declares it to you.'\""}, {"c": 13, "n": 42, "text": "So when the Jews went out of the synagogue, the Gentiles begged that these words might be preached to them the next Sabbath."}, {"c": 13, "n": 43, "text": "Now when the synagogue broke up, many of the Jews and of the devout proselytes followed Paul and Barnabas; who, speaking to them, urged them to continue in the grace of God."}, {"c": 13, "n": 44, "text": "The next Sabbath almost the whole city was gathered together to hear the word of God."}, {"c": 13, "n": 45, "text": "But when the Jews saw the multitudes, they were filled with jealousy, and contradicted the things which were spoken by Paul, and blasphemed."}, {"c": 13, "n": 46, "text": "Paul and Barnabas spoke out boldly, and said, \"It was necessary that God's word should be spoken to you first. Since indeed you thrust it from you, and judge yourselves unworthy of eternal life, behold, we turn to the Gentiles."}, {"c": 13, "n": 47, "text": "For so has the Lord commanded us, saying, 'I have set you as a light of the Gentiles, That you should be for salvation to the uttermost parts of the earth.'\""}, {"c": 13, "n": 48, "text": "As the Gentiles heard this, they were glad, and glorified the word of God. As many as were appointed to eternal life believed."}, {"c": 13, "n": 49, "text": "The Lord's word was spread abroad throughout all the region."}, {"c": 13, "n": 50, "text": "But the Jews urged on the devout women of honorable estate, and the chief men of the city, and stirred up a persecution against Paul and Barnabas, and threw them out of their borders."}, {"c": 13, "n": 51, "text": "But they shook off the dust of their feet against them, and came to Iconium."}, {"c": 13, "n": 52, "text": "The disciples were filled with joy with the Holy Spirit."}]}, "acts_14": {"id": "acts_14", "ref": "Acts 14", "verses": [{"c": 14, "n": 1, "text": "It happened in Iconium that they entered together into the synagogue of the Jews, and so spoke that a great multitude both of Jews and of Greeks believed."}, {"c": 14, "n": 2, "text": "But the disobedient Jews stirred up and embittered the souls of the Gentiles against the brothers."}, {"c": 14, "n": 3, "text": "Therefore they stayed there a long time, speaking boldly in the Lord, who testified to the word of his grace, granting signs and wonders to be done by their hands."}, {"c": 14, "n": 4, "text": "But the multitude of the city was divided. Part sided with the Jews, and part with the apostles."}, {"c": 14, "n": 5, "text": "When some of both the Gentiles and the Jews, with their rulers, made a violent attempt to insult them and to stone them,"}, {"c": 14, "n": 6, "text": "they became aware of it, and fled to the cities of Lycaonia, Lystra, Derbe, and the surrounding region."}, {"c": 14, "n": 7, "text": "There they preached the gospel."}, {"c": 14, "n": 8, "text": "At Lystra a certain man sat, impotent in his feet, a cripple from his mother's womb, who never had walked."}, {"c": 14, "n": 9, "text": "He was listening to Paul speaking, who, fastening eyes on him, and seeing that he had faith to be made whole,"}, {"c": 14, "n": 10, "text": "said with a loud voice, \"Stand upright on your feet!\" He leaped up and walked."}, {"c": 14, "n": 11, "text": "When the multitude saw what Paul had done, they lifted up their voice, saying in the language of Lycaonia, \"The gods have come down to us in the likeness of men!\""}, {"c": 14, "n": 12, "text": "They called Barnabas \"Jupiter,\" and Paul \"Mercury,\" because he was the chief speaker."}, {"c": 14, "n": 13, "text": "The priest of Jupiter, whose temple was in front of their city, brought oxen and garlands to the gates, and would have made a sacrifice with the multitudes."}, {"c": 14, "n": 14, "text": "But when the apostles, Barnabas and Paul, heard of it, they tore their clothes, and sprang into the multitude, crying out,"}, {"c": 14, "n": 15, "text": "\"Men, why are you doing these things? We also are men of like passions with you, and bring you good news, that you should turn from these vain things to the living God, who made the sky and the earth and the sea, and all that is in them;"}, {"c": 14, "n": 16, "text": "who in the generations gone by allowed all the nations to walk in their own ways."}, {"c": 14, "n": 17, "text": "Yet he didn't leave himself without witness, in that he did good and gave you rains from the sky and fruitful seasons, filling our hearts with food and gladness.\""}, {"c": 14, "n": 18, "text": "Even saying these things, they hardly stopped the multitudes from making a sacrifice to them."}, {"c": 14, "n": 19, "text": "But some Jews from Antioch and Iconium came there, and having persuaded the multitudes, they stoned Paul, and dragged him out of the city, supposing that he was dead."}, {"c": 14, "n": 20, "text": "But as the disciples stood around him, he rose up, and entered into the city. On the next day he went out with Barnabas to Derbe."}, {"c": 14, "n": 21, "text": "When they had preached the gospel to that city, and had made many disciples, they returned to Lystra, Iconium, and Antioch,"}, {"c": 14, "n": 22, "text": "confirming the souls of the disciples, exhorting them to continue in the faith, and that through many afflictions we must enter into the kingdom of God."}, {"c": 14, "n": 23, "text": "When they had appointed elders for them in every assembly, and had prayed with fasting, they commended them to the Lord, on whom they had believed."}, {"c": 14, "n": 24, "text": "They passed through Pisidia, and came to Pamphylia."}, {"c": 14, "n": 25, "text": "When they had spoken the word in Perga, they went down to Attalia."}, {"c": 14, "n": 26, "text": "From there they sailed to Antioch, from where they had been committed to the grace of God for the work which they had fulfilled."}, {"c": 14, "n": 27, "text": "When they had arrived, and had gathered the assembly together, they reported all the things that God had done with them, and that he had opened a door of faith to the Gentiles."}, {"c": 14, "n": 28, "text": "They stayed there with the disciples for a long time."}]}, "acts_15": {"id": "acts_15", "ref": "Acts 15", "verses": [{"c": 15, "n": 1, "text": "Some men came down from Judea and taught the brothers, \"Unless you are circumcised after the custom of Moses, you can't be saved.\""}, {"c": 15, "n": 2, "text": "Therefore when Paul and Barnabas had no small discord and discussion with them, they appointed Paul and Barnabas, and some others of them, to go up to Jerusalem to the apostles and elders about this question."}, {"c": 15, "n": 3, "text": "They, being sent on their way by the assembly, passed through both Phoenicia and Samaria, declaring the conversion of the Gentiles. They caused great joy to all the brothers."}, {"c": 15, "n": 4, "text": "When they had come to Jerusalem, they were received by the assembly and the apostles and the elders, and they reported all things that God had done with them."}, {"c": 15, "n": 5, "text": "But some of the sect of the Pharisees who believed rose up, saying, \"It is necessary to circumcise them, and to charge them to keep the law of Moses.\""}, {"c": 15, "n": 6, "text": "The apostles and the elders were gathered together to see about this matter."}, {"c": 15, "n": 7, "text": "When there had been much discussion, Peter rose up and said to them, \"Brothers, you know that a good while ago God made choice among you, that by my mouth the Gentiles should hear the word of the gospel, and believe."}, {"c": 15, "n": 8, "text": "God, who knows the heart, testified about them, giving them the Holy Spirit, just like he did to us."}, {"c": 15, "n": 9, "text": "He made no distinction between us and them, cleansing their hearts by faith."}, {"c": 15, "n": 10, "text": "Now therefore why do you tempt God, that you should put a yoke on the neck of the disciples which neither our fathers nor we were able to bear?"}, {"c": 15, "n": 11, "text": "But we believe that we are saved through the grace of the Lord Jesus, just as they are.\""}, {"c": 15, "n": 12, "text": "All the multitude kept silence, and they listened to Barnabas and Paul reporting what signs and wonders God had done among the Gentiles through them."}, {"c": 15, "n": 13, "text": "After they were silent, James answered, \"Brothers, listen to me."}, {"c": 15, "n": 14, "text": "Simeon has reported how God first visited the Gentiles, to take out of them a people for his name."}, {"c": 15, "n": 15, "text": "This agrees with the words of the prophets. As it is written,"}, {"c": 15, "n": 16, "text": "'After these things I will return. I will again build the tent of David, which has fallen. I will again build its ruins. I will set it up:"}, {"c": 15, "n": 17, "text": "That the rest of men may seek after the Lord; All the Gentiles who are called by my name, Says the Lord, who does all these things."}, {"c": 15, "n": 18, "text": "All his works are known to God from eternity.'"}, {"c": 15, "n": 19, "text": "\"Therefore my judgment is that we don't trouble those from among the Gentiles who turn to God,"}, {"c": 15, "n": 20, "text": "but that we write to them that they abstain from the pollution of idols, from sexual immorality, from what is strangled, and from blood."}, {"c": 15, "n": 21, "text": "For Moses from generations of old has in every city those who preach him, being read in the synagogues every Sabbath.\""}, {"c": 15, "n": 22, "text": "Then it seemed good to the apostles and the elders, with the whole assembly, to choose men out of their company, and send them to Antioch with Paul and Barnabas: Judas called Barsabbas, and Silas, chief men among the brothers."}, {"c": 15, "n": 23, "text": "They wrote these things by their hand: \"The apostles, the elders, and the brothers, to the brothers who are of the Gentiles in Antioch and Syria and Cilicia: greetings."}, {"c": 15, "n": 24, "text": "Because we have heard that some who went out from us have troubled you with words, unsettling your souls, saying, 'You must be circumcised and keep the law,' to whom we gave no commandment;"}, {"c": 15, "n": 25, "text": "it seemed good to us, having come to one accord, to choose out men and send them to you with our beloved Barnabas and Paul,"}, {"c": 15, "n": 26, "text": "men who have risked their lives for the name of our Lord Jesus Christ."}, {"c": 15, "n": 27, "text": "We have sent therefore Judas and Silas, who themselves will also tell you the same things by word of mouth."}, {"c": 15, "n": 28, "text": "For it seemed good to the Holy Spirit, and to us, to lay no greater burden on you than these necessary things:"}, {"c": 15, "n": 29, "text": "that you abstain from things sacrificed to idols, from blood, from things strangled, and from sexual immorality, from which if you keep yourselves, it will be well with you. Farewell.\""}, {"c": 15, "n": 30, "text": "So, when they were sent off, they came to Antioch. Having gathered the multitude together, they delivered the letter."}, {"c": 15, "n": 31, "text": "When they had read it, they rejoiced for the consolation."}, {"c": 15, "n": 32, "text": "Judas and Silas, also being prophets themselves, encouraged the brothers with many words, and strengthened them."}, {"c": 15, "n": 33, "text": "After they had spent some time there, they were sent back with greetings from the brothers to the apostles."}, {"c": 15, "n": 34, "text": "dummy verses inserted by amos"}, {"c": 15, "n": 35, "text": "But Paul and Barnabas stayed in Antioch, teaching and preaching the word of the Lord, with many others also."}, {"c": 15, "n": 36, "text": "After some days Paul said to Barnabas, \"Let's return now and visit our brothers in every city in which we proclaimed the word of the Lord, to see how they are doing.\""}, {"c": 15, "n": 37, "text": "Barnabas planned to take John with them also, who was called Mark."}, {"c": 15, "n": 38, "text": "But Paul didn't think that it was a good idea to take with them someone who withdrew from them from Pamphylia, and didn't go with them to do the work."}, {"c": 15, "n": 39, "text": "Then there arose a sharp contention, so that they separated from each other. Barnabas took Mark with him, and sailed away to Cyprus,"}, {"c": 15, "n": 40, "text": "but Paul chose Silas, and went out, being commended by the brothers to the grace of God."}, {"c": 15, "n": 41, "text": "He went through Syria and Cilicia, strengthening the assemblies."}]}, "acts_16": {"id": "acts_16", "ref": "Acts 16", "verses": [{"c": 16, "n": 1, "text": "He came to Derbe and Lystra: and behold, a certain disciple was there, named Timothy, the son of a Jewess who believed; but his father was a Greek."}, {"c": 16, "n": 2, "text": "The brothers who were at Lystra and Iconium gave a good testimony about him."}, {"c": 16, "n": 3, "text": "Paul wanted to have him go forth with him, and he took and circumcised him because of the Jews who were in those parts; for they all knew that his father was a Greek."}, {"c": 16, "n": 4, "text": "As they went on their way through the cities, they delivered the decrees to them to keep which had been ordained by the apostles and elders who were at Jerusalem."}, {"c": 16, "n": 5, "text": "So the assemblies were strengthened in the faith, and increased in number daily."}, {"c": 16, "n": 6, "text": "When they had gone through the region of Phrygia and Galatia, they were forbidden by the Holy Spirit to speak the word in Asia."}, {"c": 16, "n": 7, "text": "When they had come opposite Mysia, they tried to go into Bithynia, but the Spirit didn't allow them."}, {"c": 16, "n": 8, "text": "Passing by Mysia, they came down to Troas."}, {"c": 16, "n": 9, "text": "A vision appeared to Paul in the night. There was a man of Macedonia standing, begging him, and saying, \"Come over into Macedonia and help us.\""}, {"c": 16, "n": 10, "text": "When he had seen the vision, immediately we sought to go forth into Macedonia, concluding that the Lord had called us to preach the gospel to them."}, {"c": 16, "n": 11, "text": "Setting sail therefore from Troas, we made a straight course to Samothrace, and the day following to Neapolis;"}, {"c": 16, "n": 12, "text": "and from there to Philippi, which is a city of Macedonia, the first of the district, a Roman colony. We were staying some days in this city."}, {"c": 16, "n": 13, "text": "On the Sabbath day we went forth outside of the city by a riverside, where we supposed there was a place of prayer, and we sat down, and spoke to the women who had come together."}, {"c": 16, "n": 14, "text": "A certain woman named Lydia, a seller of purple, of the city of Thyatira, one who worshipped God, heard us; whose heart the Lord opened to listen to the things which were spoken by Paul."}, {"c": 16, "n": 15, "text": "When she and her household were baptized, she begged us, saying, \"If you have judged me to be faithful to the Lord, come into my house, and stay.\" She urged us."}, {"c": 16, "n": 16, "text": "It happened, as we were going to prayer, that a certain girl having a spirit of divination met us, who brought her masters much gain by fortune telling."}, {"c": 16, "n": 17, "text": "The same, following after Paul and us, cried out, \"These men are servants of the Most High God, who proclaim to us the way of salvation!\""}, {"c": 16, "n": 18, "text": "This she did for many days. But Paul, becoming distressed, turned and said to the spirit, \"I charge you in the name of Jesus Christ to come out of her!\" It came out that very hour."}, {"c": 16, "n": 19, "text": "But when her masters saw that the hope of their gain was gone, they laid hold on Paul and Silas, and dragged them into the marketplace before the rulers."}, {"c": 16, "n": 20, "text": "When they had brought them to the magistrates, they said, \"These men, being Jews, are agitating our city,"}, {"c": 16, "n": 21, "text": "and set forth customs which it is not lawful for us to accept or to observe, being Romans.\""}, {"c": 16, "n": 22, "text": "The multitude rose up together against them, and the magistrates tore their clothes off of them, and commanded them to be beaten with rods."}, {"c": 16, "n": 23, "text": "When they had laid many stripes on them, they threw them into prison, charging the jailer to keep them safely,"}, {"c": 16, "n": 24, "text": "who, having received such a charge, threw them into the inner prison, and secured their feet in the stocks."}, {"c": 16, "n": 25, "text": "But about midnight Paul and Silas were praying and singing hymns to God, and the prisoners were listening to them."}, {"c": 16, "n": 26, "text": "Suddenly there was a great earthquake, so that the foundations of the prison were shaken; and immediately all the doors were opened, and everyone's bonds were loosened."}, {"c": 16, "n": 27, "text": "The jailer, being roused out of sleep and seeing the prison doors open, drew his sword and was about to kill himself, supposing that the prisoners had escaped."}, {"c": 16, "n": 28, "text": "But Paul cried with a loud voice, saying, \"Don't harm yourself, for we are all here!\""}, {"c": 16, "n": 29, "text": "He called for lights and sprang in, and, fell down trembling before Paul and Silas,"}, {"c": 16, "n": 30, "text": "and brought them out and said, \"Sirs, what must I do to be saved?\""}, {"c": 16, "n": 31, "text": "They said, \"Believe in the Lord Jesus Christ, and you will be saved, you and your house.\""}, {"c": 16, "n": 32, "text": "They spoke the word of the Lord to him, and to all who were in his house."}, {"c": 16, "n": 33, "text": "He took them the same hour of the night, and washed their stripes, and was immediately baptized, he and all his household."}, {"c": 16, "n": 34, "text": "He brought them up into his house, and set food before them, and rejoiced greatly, with all his house, having believed in God."}, {"c": 16, "n": 35, "text": "But when it was day, the magistrates sent the sergeants, saying, \"Let those men go.\""}, {"c": 16, "n": 36, "text": "The jailer reported these words to Paul, saying, \"The magistrates have sent to let you go; now therefore come out, and go in peace.\""}, {"c": 16, "n": 37, "text": "But Paul said to them, \"They have beaten us publicly, without a trial, men who are Romans, and have cast us into prison! Do they now release us secretly? No, most assuredly, but let them come themselves and bring us out!\""}, {"c": 16, "n": 38, "text": "The sergeants reported these words to the magistrates, and they were afraid when they heard that they were Romans,"}, {"c": 16, "n": 39, "text": "and they came and begged them. When they had brought them out, they asked them to depart from the city."}, {"c": 16, "n": 40, "text": "They went out of the prison, and entered into Lydia's house. When they had seen the brothers, they comforted them, and departed."}]}, "acts_17": {"id": "acts_17", "ref": "Acts 17", "verses": [{"c": 17, "n": 1, "text": "Now when they had passed through Amphipolis and Apollonia, they came to Thessalonica, where there was a synagogue of the Jews."}, {"c": 17, "n": 2, "text": "Paul, as was his custom, went in to them, and for three Sabbath days reasoned with them from the Scriptures,"}, {"c": 17, "n": 3, "text": "explaining and demonstrating that the Christ had to suffer, and to rise again from the dead, and saying, \"This Jesus, whom I proclaim to you, is the Christ.\""}, {"c": 17, "n": 4, "text": "Some of them were persuaded, and joined Paul and Silas, of the devout Greeks a great multitude, and not a few of the chief women."}, {"c": 17, "n": 5, "text": "But the disobedient Jews gathered some wicked men from the marketplace, and gathering a crowd, set the city in an uproar. Assaulting the house of Jason, they sought to bring them forth to the people."}, {"c": 17, "n": 6, "text": "When they didn't find them, they dragged Jason and certain brothers before the rulers of the city, crying, \"These who have turned the world upside down have come here also,"}, {"c": 17, "n": 7, "text": "whom Jason has received. These all act contrary to the decrees of Caesar, saying that there is another king, Jesus!\""}, {"c": 17, "n": 8, "text": "The multitude and the rulers of the city were troubled when they heard these things."}, {"c": 17, "n": 9, "text": "When they had taken security from Jason and the rest, they let them go."}, {"c": 17, "n": 10, "text": "The brothers immediately sent Paul and Silas away by night to Beroea. When they arrived, they went into the Jewish synagogue."}, {"c": 17, "n": 11, "text": "Now these were more noble than those in Thessalonica, in that they received the word with all readiness of the mind, examining the Scriptures daily, whether these things were so."}, {"c": 17, "n": 12, "text": "Many of them therefore believed; also of the Greek women of honorable estate, and not a few men."}, {"c": 17, "n": 13, "text": "But when the Jews of Thessalonica had knowledge that the word of God was proclaimed by Paul at Beroea also, they came there likewise, agitating the multitudes."}, {"c": 17, "n": 14, "text": "Then the brothers immediately sent forth Paul to go as far as to the sea, and Silas and Timothy still stayed there."}, {"c": 17, "n": 15, "text": "But those who escorted Paul brought him as far as Athens. Receiving a commandment to Silas and Timothy that they should come to him with all speed, they departed."}, {"c": 17, "n": 16, "text": "Now while Paul waited for them at Athens, his spirit was provoked within him as he saw the city full of idols."}, {"c": 17, "n": 17, "text": "So he reasoned in the synagogue with Jews and the devout persons, and in the marketplace every day with those who met him."}, {"c": 17, "n": 18, "text": "Some of the Epicurean and Stoic philosophers also encountered him. Some said, \"What does this babbler want to say?\" Others said, \"He seems to be advocating foreign demons,\" because he preached Jesus and the resurrection."}, {"c": 17, "n": 19, "text": "They took hold of him, and brought him to the Areopagus, saying, \"May we know what this new teaching is, which is spoken by you?"}, {"c": 17, "n": 20, "text": "For you bring certain strange things to our ears. We want to know therefore what these things mean.\""}, {"c": 17, "n": 21, "text": "Now all the Athenians and the strangers living there spent their time in nothing else, but either to tell or to hear some new thing."}, {"c": 17, "n": 22, "text": "Paul stood in the midst of the Areopagus, and said, \"You men of Athens, I perceive that you are very religious in all things."}, {"c": 17, "n": 23, "text": "For as I passed along, and observed the objects of your worship, I found also an altar with this inscription: 'TO AN UNKNOWN GOD.' What therefore you worship in ignorance, this I announce to you."}, {"c": 17, "n": 24, "text": "The God who made the world and all things in it, he, being Lord of heaven and earth, dwells not in temples made with hands,"}, {"c": 17, "n": 25, "text": "neither is he served by men's hands, as though he needed anything, seeing he himself gives to all life and breath, and all things."}, {"c": 17, "n": 26, "text": "He made from one blood every nation of men to dwell on all the surface of the earth, having determined appointed seasons, and the bounds of their habitation,"}, {"c": 17, "n": 27, "text": "that they should seek the Lord, if perhaps they might reach out for him and find him, though he is not far from each one of us."}, {"c": 17, "n": 28, "text": "'For in him we live, and move, and have our being.' As some of your own poets have said, 'For we are also his offspring.'"}, {"c": 17, "n": 29, "text": "Being then the offspring of God, we ought not to think that the Divine Nature is like gold, or silver, or stone, engraved by art and device of man."}, {"c": 17, "n": 30, "text": "The times of ignorance therefore God overlooked. But now he commands that all men everywhere should repent,"}, {"c": 17, "n": 31, "text": "because he has appointed a day in which he will judge the world in righteousness by the man whom he has ordained; whereof he has given assurance to all men, in that he has raised him from the dead.\""}, {"c": 17, "n": 32, "text": "Now when they heard of the resurrection of the dead, some mocked; but others said, \"We want to hear you yet again concerning this.\""}, {"c": 17, "n": 33, "text": "Thus Paul went out from among them."}, {"c": 17, "n": 34, "text": "But certain men joined with him, and believed, among whom also was Dionysius the Areopagite, and a woman named Damaris, and others with them."}]}, "acts_18": {"id": "acts_18", "ref": "Acts 18", "verses": [{"c": 18, "n": 1, "text": "After these things Paul departed from Athens, and came to Corinth."}, {"c": 18, "n": 2, "text": "He found a certain Jew named Aquila, a man of Pontus by race, who had recently come from Italy, with his wife Priscilla, because Claudius had commanded all the Jews to depart from Rome. He came to them,"}, {"c": 18, "n": 3, "text": "and because he practiced the same trade, he lived with them and worked, for by trade they were tent makers."}, {"c": 18, "n": 4, "text": "He reasoned in the synagogue every Sabbath, and persuaded Jews and Greeks."}, {"c": 18, "n": 5, "text": "But when Silas and Timothy came down from Macedonia, Paul was compelled by the Spirit, testifying to the Jews that Jesus was the Christ."}, {"c": 18, "n": 6, "text": "When they opposed him and blasphemed, he shook out his clothing and said to them, \"Your blood be on your own heads! I am clean. From now on, I will go to the Gentiles!\""}, {"c": 18, "n": 7, "text": "He departed there, and went into the house of a certain man named Justus, one who worshipped God, whose house was next door to the synagogue."}, {"c": 18, "n": 8, "text": "Crispus, the ruler of the synagogue, believed in the Lord with all his house. Many of the Corinthians, hearing, believed and were baptized."}, {"c": 18, "n": 9, "text": "The Lord said to Paul in the night by a vision, \"Don't be afraid, but speak and don't be silent;"}, {"c": 18, "n": 10, "text": "for I am with you, and no one will attack you to harm you, for I have many people in this city.\""}, {"c": 18, "n": 11, "text": "He lived there a year and six months, teaching the word of God among them."}, {"c": 18, "n": 12, "text": "But when Gallio was proconsul of Achaia, the Jews with one accord rose up against Paul and brought him before the judgment seat,"}, {"c": 18, "n": 13, "text": "saying, \"This man persuades men to worship God contrary to the law.\""}, {"c": 18, "n": 14, "text": "But when Paul was about to open his mouth, Gallio said to the Jews, \"If indeed it were a matter of wrong or of wicked crime, Jews, it would be reasonable that I should bear with you;"}, {"c": 18, "n": 15, "text": "but if they are questions about words and names and your own law, look to it yourselves. For I don't want to be a judge of these matters.\""}, {"c": 18, "n": 16, "text": "He drove them from the judgment seat."}, {"c": 18, "n": 17, "text": "Then all the Greeks laid hold on Sosthenes, the ruler of the synagogue, and beat him before the judgment seat. Gallio didn't care about any of these things."}, {"c": 18, "n": 18, "text": "Paul, having stayed after this yet many days, took his leave of the brothers, and sailed from there for Syria, and Priscilla and Aquila with him. He shaved his head in Cenchreae, for he had a vow."}, {"c": 18, "n": 19, "text": "He came to Ephesus, and he left them there; but he himself entered into the synagogue, and reasoned with the Jews."}, {"c": 18, "n": 20, "text": "When they asked him to stay a longer time, he declined;"}, {"c": 18, "n": 21, "text": "but taking his leave of them, and saying, \"I must by all means keep this coming feast in Jerusalem, but I will return again to you if God wills,\" he set sail from Ephesus."}, {"c": 18, "n": 22, "text": "When he had landed at Caesarea, he went up and greeted the assembly, and went down to Antioch."}, {"c": 18, "n": 23, "text": "Having spent some time there, he departed, and went through the region of Galatia, and Phrygia, in order, establishing all the disciples."}, {"c": 18, "n": 24, "text": "Now a certain Jew named Apollos, an Alexandrian by race, an eloquent man, came to Ephesus. He was mighty in the scriptures."}, {"c": 18, "n": 25, "text": "This man had been instructed in the way of the Lord; and being fervent in spirit, he spoke and taught accurately the things concerning Jesus, although he knew only the baptism of John."}, {"c": 18, "n": 26, "text": "He began to speak boldly in the synagogue. But when Priscilla and Aquila heard him, they took him aside, and explained to him the way of God more accurately."}, {"c": 18, "n": 27, "text": "When he had determined to pass over into Achaia, the brothers encouraged him, and wrote to the disciples to receive him. When he had come, he helped them much, who had believed through grace;"}, {"c": 18, "n": 28, "text": "for he powerfully refuted the Jews, publicly showing by the scriptures that Jesus was the Christ."}]}, "acts_19": {"id": "acts_19", "ref": "Acts 19", "verses": [{"c": 19, "n": 1, "text": "It happened that, while Apollos was at Corinth, Paul, having passed through the upper country, came to Ephesus, and found certain disciples."}, {"c": 19, "n": 2, "text": "He said to them, \"Did you receive the Holy Spirit when you believed?\" They said to him, \"No, we did not so much as hear whether there is a Holy Spirit.\""}, {"c": 19, "n": 3, "text": "He said, \"Into what then were you baptized?\" They said, \"Into John's baptism.\""}, {"c": 19, "n": 4, "text": "Paul said, \"John indeed baptized with the baptism of repentance, saying to the people that they should believe in the one who would come after him, that is, on Jesus.\""}, {"c": 19, "n": 5, "text": "When they heard this, they were baptized into the name of the Lord Jesus."}, {"c": 19, "n": 6, "text": "When Paul had laid his hands on them, the Holy Spirit came on them, and they spoke with other languages, and prophesied."}, {"c": 19, "n": 7, "text": "They were about twelve men in all."}, {"c": 19, "n": 8, "text": "He entered into the synagogue, and spoke boldly for a period of three months, reasoning and persuading about the things concerning the kingdom of God."}, {"c": 19, "n": 9, "text": "But when some were hardened and disobedient, speaking evil of the Way before the multitude, he departed from them, and separated the disciples, reasoning daily in the school of Tyrannus."}, {"c": 19, "n": 10, "text": "This continued for the space of two years, so that all those who lived in Asia heard the word of the Lord Jesus, both Jews and Greeks."}, {"c": 19, "n": 11, "text": "God worked special miracles by the hands of Paul,"}, {"c": 19, "n": 12, "text": "insomuch that handkerchiefs or aprons were carried away from his body to the sick, and the evil spirits went out."}, {"c": 19, "n": 13, "text": "But some of the itinerant Jews, exorcists, took on themselves to name over those who had the evil spirits the name of the Lord Jesus, saying, \"We adjure you by Jesus whom Paul preaches.\""}, {"c": 19, "n": 14, "text": "There were seven sons of one Sceva, a Jewish chief priest, who did this."}, {"c": 19, "n": 15, "text": "The evil spirit answered, \"Jesus I know, and Paul I know, but who are you?\""}, {"c": 19, "n": 16, "text": "The man in whom the evil spirit was leaped on them, and overpowered them, and prevailed against them, so that they fled out of that house naked and wounded."}, {"c": 19, "n": 17, "text": "This became known to all, both Jews and Greeks, who lived at Ephesus. Fear fell on them all, and the name of the Lord Jesus was magnified."}, {"c": 19, "n": 18, "text": "Many also of those who had believed came, confessing, and declaring their deeds."}, {"c": 19, "n": 19, "text": "Not a few of those who practiced magical arts brought their books together and burned them in the sight of all. They counted the price of them, and found it fifty thousand pieces of silver."}, {"c": 19, "n": 20, "text": "So the word of the Lord was growing and becoming mighty."}, {"c": 19, "n": 21, "text": "Now after these things had ended, Paul determined in the spirit, when he had passed through Macedonia and Achaia, to go to Jerusalem, saying, \"After I have been there, I must also see Rome.\""}, {"c": 19, "n": 22, "text": "Having sent into Macedonia two of those who ministered to him, Timothy and Erastus, he himself stayed in Asia for a while."}, {"c": 19, "n": 23, "text": "About that time there arose no small stir concerning the Way."}, {"c": 19, "n": 24, "text": "For a certain man named Demetrius, a silversmith, who made silver shrines of Artemis, brought no little business to the craftsmen,"}, {"c": 19, "n": 25, "text": "whom he gathered together, with the workmen of like occupation, and said, \"Sirs, you know that by this business we have our wealth."}, {"c": 19, "n": 26, "text": "You see and hear, that not at Ephesus alone, but almost throughout all Asia, this Paul has persuaded and turned away many people, saying that they are no gods, that are made with hands."}, {"c": 19, "n": 27, "text": "Not only is there danger that this our trade come into disrepute, but also that the temple of the great goddess Artemis will be counted as nothing, and her majesty destroyed, whom all Asia and the world worships.\""}, {"c": 19, "n": 28, "text": "When they heard this they were filled with wrath, and cried out, saying, \"Great is Artemis of the Ephesians!\""}, {"c": 19, "n": 29, "text": "The whole city was filled with confusion, and they rushed with one accord into the theater, having seized Gaius and Aristarchus, men of Macedonia, Paul's companions in travel."}, {"c": 19, "n": 30, "text": "When Paul wanted to enter in to the people, the disciples didn't allow him."}, {"c": 19, "n": 31, "text": "Certain also of the Asiarchs, being his friends, sent to him and begged him not to venture into the theater."}, {"c": 19, "n": 32, "text": "Some therefore cried one thing, and some another, for the assembly was in confusion. Most of them didn't know why they had come together."}, {"c": 19, "n": 33, "text": "They brought Alexander out of the multitude, the Jews putting him forward. Alexander beckoned with his hand, and would have made a defense to the people."}, {"c": 19, "n": 34, "text": "But when they perceived that he was a Jew, all with one voice for a time of about two hours cried out, \"Great is Artemis of the Ephesians!\""}, {"c": 19, "n": 35, "text": "When the town clerk had quieted the multitude, he said, \"You men of Ephesus, what man is there who doesn't know that the city of the Ephesians is temple-keeper of the great goddess Artemis, and of the image which fell down from Zeus?"}, {"c": 19, "n": 36, "text": "Seeing then that these things can't be denied, you ought to be quiet, and to do nothing rash."}, {"c": 19, "n": 37, "text": "For you have brought these men here, who are neither robbers of temples nor blasphemers of your goddess."}, {"c": 19, "n": 38, "text": "If therefore Demetrius and the craftsmen who are with him, have a matter against anyone, the courts are open, and there are proconsuls. Let them press charges against one another."}, {"c": 19, "n": 39, "text": "But if you seek anything about other matters, it will be settled in the regular assembly."}, {"c": 19, "n": 40, "text": "For indeed we are in danger of being accused concerning this day's riot, there being no cause. Concerning it, we wouldn't be able to give an account of this commotion.\""}, {"c": 19, "n": 41, "text": "When he had thus spoken, he dismissed the assembly."}]}, "acts_20": {"id": "acts_20", "ref": "Acts 20", "verses": [{"c": 20, "n": 1, "text": "After the uproar had ceased, Paul sent for the disciples, took leave of them, and departed to go into Macedonia."}, {"c": 20, "n": 2, "text": "When he had gone through those parts, and had encouraged them with many words, he came into Greece."}, {"c": 20, "n": 3, "text": "When he had spent three months there, and a plot was made against him by Jews as he was about to set sail for Syria, he determined to return through Macedonia."}, {"c": 20, "n": 4, "text": "These accompanied him as far as Asia: Sopater of Beroea; Aristarchus and Secundus of the Thessalonians; Gaius of Derbe; Timothy; and Tychicus and Trophimus of Asia."}, {"c": 20, "n": 5, "text": "But these had gone ahead, and were waiting for us at Troas."}, {"c": 20, "n": 6, "text": "We sailed away from Philippi after the days of unleavened bread, and came to them at Troas in five days, where we stayed seven days."}, {"c": 20, "n": 7, "text": "On the first day of the week, when the disciples were gathered together to break bread, Paul talked with them, intending to depart on the next day, and continued his speech until midnight."}, {"c": 20, "n": 8, "text": "There were many lights in the upper chamber where we were gathered together."}, {"c": 20, "n": 9, "text": "A certain young man named Eutychus sat in the window, weighed down with deep sleep. As Paul spoke still longer, being weighed down by his sleep, he fell down from the third story, and was taken up dead."}, {"c": 20, "n": 10, "text": "Paul went down, and fell on him, and embracing him said, \"Don't be troubled, for his life is in him.\""}, {"c": 20, "n": 11, "text": "When he had gone up, and had broken bread, and eaten, and had talked with them a long while, even until break of day, he departed."}, {"c": 20, "n": 12, "text": "They brought the boy alive, and were not a little comforted."}, {"c": 20, "n": 13, "text": "But we who went ahead to the ship set sail for Assos, there intending to take in Paul, for he had so arranged, intending himself to go by land."}, {"c": 20, "n": 14, "text": "When he met us at Assos, we took him in, and came to Mitylene."}, {"c": 20, "n": 15, "text": "Sailing from there, we came the following day opposite Chios. The next day we touched at Samos and stayed at Trogyllium, and the day after we came to Miletus."}, {"c": 20, "n": 16, "text": "For Paul had determined to sail past Ephesus, that he might not have to spend time in Asia; for he was hastening, if it were possible for him, to be at Jerusalem on the day of Pentecost."}, {"c": 20, "n": 17, "text": "From Miletus he sent to Ephesus, and called to himself the elders of the assembly."}, {"c": 20, "n": 18, "text": "When they had come to him, he said to them, \"You yourselves know, from the first day that I set foot in Asia, how I was with you all the time,"}, {"c": 20, "n": 19, "text": "serving the Lord with all humility, with many tears, and with trials which happened to me by the plots of the Jews;"}, {"c": 20, "n": 20, "text": "how I didn't shrink from declaring to you anything that was profitable, teaching you publicly and from house to house,"}, {"c": 20, "n": 21, "text": "testifying both to Jews and to Greeks repentance toward God, and faith toward our Lord Jesus Christ."}, {"c": 20, "n": 22, "text": "Now, behold, I go bound by the Spirit to Jerusalem, not knowing what will happen to me there;"}, {"c": 20, "n": 23, "text": "except that the Holy Spirit testifies in every city, saying that bonds and afflictions wait for me."}, {"c": 20, "n": 24, "text": "But these things don't count; nor do I hold my life dear to myself, so that I may finish my race with joy, and the ministry which I received from the Lord Jesus, to fully testify to the gospel of the grace of God."}, {"c": 20, "n": 25, "text": "Now, behold, I know that you all, among whom I went about preaching the kingdom of God, will see my face no more."}, {"c": 20, "n": 26, "text": "Therefore I testify to you this day that I am clean from the blood of all men,"}, {"c": 20, "n": 27, "text": "for I didn't shrink from declaring to you the whole counsel of God."}, {"c": 20, "n": 28, "text": "Take heed, therefore, to yourselves, and to all the flock, in which the Holy Spirit has made you overseers, to shepherd the assembly of the Lord and God which he purchased with his own blood."}, {"c": 20, "n": 29, "text": "For I know that after my departure, vicious wolves will enter in among you, not sparing the flock."}, {"c": 20, "n": 30, "text": "Men will arise from among your own selves, speaking perverse things, to draw away the disciples after them."}, {"c": 20, "n": 31, "text": "Therefore watch, remembering that for a period of three years I didn't cease to admonish everyone night and day with tears."}, {"c": 20, "n": 32, "text": "Now, brothers, I entrust you to God, and to the word of his grace, which is able to build up, and to give you the inheritance among all those who are sanctified."}, {"c": 20, "n": 33, "text": "I coveted no one's silver, or gold, or clothing."}, {"c": 20, "n": 34, "text": "You yourselves know that these hands ministered to my necessities, and to those who were with me."}, {"c": 20, "n": 35, "text": "In all things I gave you an example, that so laboring you ought to help the weak, and to remember the words of the Lord Jesus, that he himself said, 'It is more blessed to give than to receive.'\""}, {"c": 20, "n": 36, "text": "When he had spoken these things, he kneeled down and prayed with them all."}, {"c": 20, "n": 37, "text": "They all wept a lot, and fell on Paul's neck and kissed him,"}, {"c": 20, "n": 38, "text": "sorrowing most of all because of the word which he had spoken, that they should see his face no more. They brought him on his way to the ship."}]}, "acts_21": {"id": "acts_21", "ref": "Acts 21", "verses": [{"c": 21, "n": 1, "text": "When it happened that we had parted from them and had set sail, we came with a straight course to Cos, and the next day to Rhodes, and from there to Patara."}, {"c": 21, "n": 2, "text": "Having found a ship crossing over to Phoenicia, we went aboard, and set sail."}, {"c": 21, "n": 3, "text": "When we had come in sight of Cyprus, leaving it on the left hand, we sailed to Syria, and landed at Tyre, for there the ship was to unload her cargo."}, {"c": 21, "n": 4, "text": "Having found disciples, we stayed there seven days. These said to Paul through the Spirit, that he should not go up to Jerusalem."}, {"c": 21, "n": 5, "text": "When it happened that we had accomplished the days, we departed and went on our journey. They all, with wives and children, brought us on our way until we were out of the city. Kneeling down on the beach, we prayed."}, {"c": 21, "n": 6, "text": "After saying goodbye to each other, we went on board the ship, and they returned home again."}, {"c": 21, "n": 7, "text": "When we had finished the voyage from Tyre, we arrived at Ptolemais. We greeted the brothers, and stayed with them one day."}, {"c": 21, "n": 8, "text": "On the next day, we, who were Paul's companions, departed, and came to Caesarea. We entered into the house of Philip the evangelist, who was one of the seven, and stayed with him."}, {"c": 21, "n": 9, "text": "Now this man had four virgin daughters, who prophesied."}, {"c": 21, "n": 10, "text": "As we stayed there some days, a certain prophet, named Agabus, came down from Judea."}, {"c": 21, "n": 11, "text": "Coming to us, and taking Paul's belt, he bound his own feet and hands, and said, \"Thus says the Holy Spirit: 'So will the Jews at Jerusalem bind the man who owns this belt, and will deliver him into the hands of the Gentiles.'\""}, {"c": 21, "n": 12, "text": "When we heard these things, both we and they of that place begged him not to go up to Jerusalem."}, {"c": 21, "n": 13, "text": "Then Paul answered, \"What are you doing, weeping and breaking my heart? For I am ready not only to be bound, but also to die at Jerusalem for the name of the Lord Jesus.\""}, {"c": 21, "n": 14, "text": "When he would not be persuaded, we ceased, saying, \"The Lord's will be done.\""}, {"c": 21, "n": 15, "text": "After these days we took up our baggage and went up to Jerusalem."}, {"c": 21, "n": 16, "text": "Some of the disciples from Caesarea also went with us, bringing one Mnason of Cyprus, an early disciple, with whom we would stay."}, {"c": 21, "n": 17, "text": "When we had come to Jerusalem, the brothers received us gladly."}, {"c": 21, "n": 18, "text": "The day following, Paul went in with us to James; and all the elders were present."}, {"c": 21, "n": 19, "text": "When he had greeted them, he reported one by one the things which God had worked among the Gentiles through his ministry."}, {"c": 21, "n": 20, "text": "They, when they heard it, glorified God. They said to him, \"You see, brother, how many thousands there are among the Jews of those who have believed, and they are all zealous for the law."}, {"c": 21, "n": 21, "text": "They have been informed about you, that you teach all the Jews who are among the Gentiles to forsake Moses, telling them not to circumcise their children neither to walk after the customs."}, {"c": 21, "n": 22, "text": "What then? The assembly must certainly meet, for they will hear that you have come."}, {"c": 21, "n": 23, "text": "Therefore do what we tell you. We have four men who have a vow on them."}, {"c": 21, "n": 24, "text": "Take them, and purify yourself with them, and pay their expenses for them, that they may shave their heads. Then all will know that there is no truth in the things that they have been informed about you, but that you yourself also walk keeping the law."}, {"c": 21, "n": 25, "text": "But concerning the Gentiles who believe, we have written our decision that they should observe no such thing, except that they should keep themselves from food offered to idols, from blood, from strangled things, and from sexual immorality.\""}, {"c": 21, "n": 26, "text": "Then Paul took the men, and the next day, purified himself and went with them into the temple, declaring the fulfillment of the days of purification, until the offering was offered for every one of them."}, {"c": 21, "n": 27, "text": "When the seven days were almost completed, the Jews from Asia, when they saw him in the temple, stirred up all the multitude and laid hands on him,"}, {"c": 21, "n": 28, "text": "crying out, \"Men of Israel, help! This is the man who teaches all men everywhere against the people, and the law, and this place. Moreover, he also brought Greeks into the temple, and has defiled this holy place!\""}, {"c": 21, "n": 29, "text": "For they had seen Trophimus, the Ephesian, with him in the city, and they supposed that Paul had brought him into the temple."}, {"c": 21, "n": 30, "text": "All the city was moved, and the people ran together. They seized Paul and dragged him out of the temple. Immediately the doors were shut."}, {"c": 21, "n": 31, "text": "As they were trying to kill him, news came up to the commanding officer of the regiment that all Jerusalem was in an uproar."}, {"c": 21, "n": 32, "text": "Immediately he took soldiers and centurions, and ran down to them. They, when they saw the chief captain and the soldiers, stopped beating Paul."}, {"c": 21, "n": 33, "text": "Then the commanding officer came near, arrested him, commanded him to be bound with two chains, and inquired who he was and what he had done."}, {"c": 21, "n": 34, "text": "Some shouted one thing, some another, among the crowd. When he couldn't find out the truth because of the noise, he commanded him to be brought into the barracks."}, {"c": 21, "n": 35, "text": "When he came to the stairs, it happened that he was carried by the soldiers because of the violence of the crowd;"}, {"c": 21, "n": 36, "text": "for the multitude of the people followed after, crying out, \"Away with him!\""}, {"c": 21, "n": 37, "text": "As Paul was about to be brought into the barracks, he asked the commanding officer, \"May I say something to you?\" He said, \"Do you know Greek?"}, {"c": 21, "n": 38, "text": "Aren't you then the Egyptian, who before these days stirred up to sedition and led out into the wilderness the four thousand men of the Assassins?\""}, {"c": 21, "n": 39, "text": "But Paul said, \"I am a Jew, from Tarsus in Cilicia, a citizen of no insignificant city. I beg you, allow me to speak to the people.\""}, {"c": 21, "n": 40, "text": "When he had given him permission, Paul, standing on the stairs, beckoned with his hand to the people. When there was a great silence, he spoke to them in the Hebrew language, saying,"}]}, "acts_22": {"id": "acts_22", "ref": "Acts 22", "verses": [{"c": 22, "n": 1, "text": "\"Brothers and fathers, listen to the defense which I now make to you.\""}, {"c": 22, "n": 2, "text": "When they heard that he spoke to them in the Hebrew language, they were even more quiet. He said,"}, {"c": 22, "n": 3, "text": "\"I am indeed a Jew, born in Tarsus of Cilicia, but brought up in this city at the feet of Gamaliel, instructed according to the strict manner of the law of our fathers, being zealous for God, even as you all are this day."}, {"c": 22, "n": 4, "text": "I persecuted this Way to the death, binding and delivering into prisons both men and women."}, {"c": 22, "n": 5, "text": "As also the high priest and all the council of the elders testify, from whom also I received letters to the brothers, and journeyed to Damascus to bring them also who were there to Jerusalem in bonds to be punished."}, {"c": 22, "n": 6, "text": "It happened that, as I made my journey, and came close to Damascus, about noon, suddenly there shone from the sky a great light around me."}, {"c": 22, "n": 7, "text": "I fell to the ground, and heard a voice saying to me, 'Saul, Saul, why do you persecute me?'"}, {"c": 22, "n": 8, "text": "I answered, 'Who are you, Lord?' He said to me, 'I am Jesus of Nazareth, whom you persecute.'"}, {"c": 22, "n": 9, "text": "Those who were with me indeed saw the light and were afraid, but they didn't understand the voice of him who spoke to me."}, {"c": 22, "n": 10, "text": "I said, 'What will I do, Lord?' The Lord said to me, 'Arise, and go into Damascus. There you will be told about all things which are appointed for you to do.'"}, {"c": 22, "n": 11, "text": "When I couldn't see for the glory of that light, being led by the hand of those who were with me, I came into Damascus."}, {"c": 22, "n": 12, "text": "One Ananias, a devout man according to the law, well reported of by all the Jews who lived there,"}, {"c": 22, "n": 13, "text": "came to me, and standing by me said to me, 'Brother Saul, receive your sight!' In that very hour I looked up at him."}, {"c": 22, "n": 14, "text": "He said, 'The God of our fathers has appointed you to know his will, and to see the Righteous One, and to hear a voice from his mouth."}, {"c": 22, "n": 15, "text": "For you will be a witness for him to all men of what you have seen and heard."}, {"c": 22, "n": 16, "text": "Now why do you wait? Arise, be baptized, and wash away your sins, calling on the name of the Lord.'"}, {"c": 22, "n": 17, "text": "It happened that, when I had returned to Jerusalem, and while I prayed in the temple, I fell into a trance,"}, {"c": 22, "n": 18, "text": "and saw him saying to me, 'Hurry and get out of Jerusalem quickly, because they will not receive testimony concerning me from you.'"}, {"c": 22, "n": 19, "text": "I said, 'Lord, they themselves know that I imprisoned and beat in every synagogue those who believed in you."}, {"c": 22, "n": 20, "text": "When the blood of Stephen, your witness, was shed, I also was standing by, and consenting to his death, and guarding the cloaks of those who killed him.'"}, {"c": 22, "n": 21, "text": "He said to me, 'Depart, for I will send you forth far from here to the Gentiles.'\""}, {"c": 22, "n": 22, "text": "They listened to him until he said that, then they lifted up their voice, and said, \"Rid the earth of this fellow, for he isn't fit to live!\""}, {"c": 22, "n": 23, "text": "As they cried out, and threw off their cloaks, and threw dust into the air,"}, {"c": 22, "n": 24, "text": "the commanding officer commanded him to be brought into the barracks, ordering him to be examined by scourging, that he might know for what crime they shouted against him like that."}, {"c": 22, "n": 25, "text": "When they had tied him up with thongs, Paul asked the centurion who stood by, \"Is it lawful for you to scourge a man who is a Roman, and not found guilty?\""}, {"c": 22, "n": 26, "text": "When the centurion heard it, he went to the commanding officer and told him, \"Watch what you are about to do, for this man is a Roman!\""}, {"c": 22, "n": 27, "text": "The commanding officer came and asked him, \"Tell me, are you a Roman?\" He said, \"Yes.\""}, {"c": 22, "n": 28, "text": "The commanding officer answered, \"I bought my citizenship for a great price.\" Paul said, \"But I was born a Roman.\""}, {"c": 22, "n": 29, "text": "Immediately those who were about to examine him departed from him, and the commanding officer also was afraid when he realized that he was a Roman, because he had bound him."}, {"c": 22, "n": 30, "text": "But on the next day, desiring to know the truth about why he was accused by the Jews, he freed him from the bonds, and commanded the chief priests and all the council to come together, and brought Paul down and set him before them."}]}, "acts_23": {"id": "acts_23", "ref": "Acts 23", "verses": [{"c": 23, "n": 1, "text": "Paul, looking steadfastly at the council, said, \"Brothers, I have lived before God in all good conscience until this day.\""}, {"c": 23, "n": 2, "text": "The high priest, Ananias, commanded those who stood by him to strike him on the mouth."}, {"c": 23, "n": 3, "text": "Then said Paul to him, \"God will strike you, you whitewashed wall! Do you sit to judge me according to the law, and command me to be struck contrary to the law?\""}, {"c": 23, "n": 4, "text": "Those who stood by said, \"Do you malign God's high priest?\""}, {"c": 23, "n": 5, "text": "Paul said, \"I didn't know, brothers, that he was high priest. For it is written, 'You shall not speak evil of a ruler of your people.'\""}, {"c": 23, "n": 6, "text": "But when Paul perceived that the one part were Sadducees and the other Pharisees, he cried out in the council, \"Men and brothers, I am a Pharisee, a son of Pharisees. Concerning the hope and resurrection of the dead I am being judged!\""}, {"c": 23, "n": 7, "text": "When he had said this, there arose an argument between the Pharisees and Sadducees, and the assembly was divided."}, {"c": 23, "n": 8, "text": "For the Sadducees say that there is no resurrection, neither angel, nor spirit; but the Pharisees confess all of these."}, {"c": 23, "n": 9, "text": "A great clamor arose, and some of the scribes of the Pharisees part stood up, and contended, saying, \"We find no evil in this man. But if a spirit or angel has spoken to him, let's not fight against God!\""}, {"c": 23, "n": 10, "text": "When a great argument arose, the commanding officer, fearing that Paul would be torn in pieces by them, commanded the soldiers to go down and take him by force from among them, and bring him into the barracks."}, {"c": 23, "n": 11, "text": "The following night, the Lord stood by him, and said, \"Cheer up, Paul, for as you have testified about me at Jerusalem, so you must testify also at Rome.\""}, {"c": 23, "n": 12, "text": "When it was day, some of the Jews banded together, and bound themselves under a curse, saying that they would neither eat nor drink until they had killed Paul."}, {"c": 23, "n": 13, "text": "There were more than forty people who had made this conspiracy."}, {"c": 23, "n": 14, "text": "They came to the chief priests and the elders, and said, \"We have bound ourselves under a great curse, to taste nothing until we have killed Paul."}, {"c": 23, "n": 15, "text": "Now therefore, you with the council inform the commanding officer that he should bring him down to you tomorrow, as though you were going to judge his case more exactly. We are ready to kill him before he comes near.\""}, {"c": 23, "n": 16, "text": "But Paul's sister's son heard of their lying in wait, and he came and entered into the barracks and told Paul."}, {"c": 23, "n": 17, "text": "Paul summoned one of the centurions, and said, \"Bring this young man to the commanding officer, for he has something to tell him.\""}, {"c": 23, "n": 18, "text": "So he took him, and brought him to the commanding officer, and said, \"Paul, the prisoner, called me to himself, and asked me to bring this young man to you, who has something to tell you.\""}, {"c": 23, "n": 19, "text": "The commanding officer took him by the hand, and going aside, asked him privately, \"What is it that you have to tell me?\""}, {"c": 23, "n": 20, "text": "He said, \"The Jews have agreed to ask you to bring down Paul tomorrow to the council, as though intending to inquire somewhat more accurately concerning him."}, {"c": 23, "n": 21, "text": "Therefore don't yield to them, for more than forty men lie in wait for him, who have bound themselves under a curse neither to eat nor to drink until they have killed him. Now they are ready, looking for the promise from you.\""}, {"c": 23, "n": 22, "text": "So the commanding officer let the young man go, charging him, \"Tell no one that you have told these things to me.\""}, {"c": 23, "n": 23, "text": "He called to himself two of the centurions, and said, \"Prepare two hundred soldiers to go as far as Caesarea, with seventy horsemen, and two hundred men armed with spears, at the third hour of the night.\""}, {"c": 23, "n": 24, "text": "He asked them to provide animals, that they might set Paul on one, and bring him safely to Felix, the governor."}, {"c": 23, "n": 25, "text": "He wrote a letter like this:"}, {"c": 23, "n": 26, "text": "\"Claudius Lysias to the most excellent governor Felix: Greetings."}, {"c": 23, "n": 27, "text": "\"This man was seized by the Jews, and was about to be killed by them, when I came on them with the soldiers and rescued him, having learned that he was a Roman."}, {"c": 23, "n": 28, "text": "Desiring to know the cause why they accused him, I brought him down to their council."}, {"c": 23, "n": 29, "text": "I found him to be accused about questions of their law, but to have nothing laid to his charge worthy of death or of bonds."}, {"c": 23, "n": 30, "text": "When I was told that the Jews lay in wait for the man, I sent him to you immediately, charging his accusers also to bring their accusations against him before you. Farewell.\""}, {"c": 23, "n": 31, "text": "So the soldiers, carrying out their orders, took Paul and brought him by night to Antipatris."}, {"c": 23, "n": 32, "text": "But on the next day they left the horsemen to go with him, and returned to the barracks."}, {"c": 23, "n": 33, "text": "They, when they came to Caesarea and delivered the letter to the governor, presented Paul also before him."}, {"c": 23, "n": 34, "text": "When the governor had read it, he asked what province he was from. When he understood that he was from Cilicia, he said,"}, {"c": 23, "n": 35, "text": "\"I will hear you fully when your accusers also arrive.\" He commanded that he be kept in Herod's palace."}]}, "acts_24": {"id": "acts_24", "ref": "Acts 24", "verses": [{"c": 24, "n": 1, "text": "After five days, the high priest, Ananias, came down with certain elders and an orator, one Tertullus. They informed the governor against Paul."}, {"c": 24, "n": 2, "text": "When he was called, Tertullus began to accuse him, saying, \"Seeing that by you we enjoy much peace, and that excellent measures are coming to this nation,"}, {"c": 24, "n": 3, "text": "we accept it in all ways and in all places, most excellent Felix, with all thankfulness."}, {"c": 24, "n": 4, "text": "But, that I don't delay you, I entreat you to bear with us and hear a few words."}, {"c": 24, "n": 5, "text": "For we have found this man a pestilent fellow, and an instigator of insurrections among all the Jews throughout the world, and a ringleader of the sect of the Nazarenes."}, {"c": 24, "n": 6, "text": "He even tried to profane the temple. We arrested him."}, {"c": 24, "n": 7, "text": "empty verses content detected by amos"}, {"c": 24, "n": 8, "text": "By examining him yourself you may ascertain all these things of which we accuse him.\""}, {"c": 24, "n": 9, "text": "The Jews also joined in the attack, affirming that these things were so."}, {"c": 24, "n": 10, "text": "When the governor had beckoned to him to speak, Paul answered, \"Because I know that you have been a judge of this nation for many years, I cheerfully make my defense,"}, {"c": 24, "n": 11, "text": "seeing that you can recognize that it is not more than twelve days since I went up to worship at Jerusalem."}, {"c": 24, "n": 12, "text": "In the temple they didn't find me disputing with anyone or stirring up a crowd, either in the synagogues, or in the city."}, {"c": 24, "n": 13, "text": "Nor can they prove to you the things whereof they now accuse me."}, {"c": 24, "n": 14, "text": "But this I confess to you, that after the Way, which they call a sect, so I serve the God of our fathers, believing all things which are according to the law, and which are written in the prophets;"}, {"c": 24, "n": 15, "text": "having hope toward God, which these also themselves look for, that there will be a resurrection of the dead, both of the just and unjust."}, {"c": 24, "n": 16, "text": "Herein I also practice always having a conscience void of offense toward God and men."}, {"c": 24, "n": 17, "text": "Now after some years, I came to bring alms to my nation, and offerings;"}, {"c": 24, "n": 18, "text": "amid which they found me purified in the temple, with no crowd, nor yet with tumult. But certain Jews from Asia --"}, {"c": 24, "n": 19, "text": "who ought to have been here before you, and to make accusation, if they had anything against me."}, {"c": 24, "n": 20, "text": "Or else let these men themselves say what injustice they found in me when I stood before the counci
