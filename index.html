n": 1, "text": "\"I am the true vine, and my Father is the farmer."}, {"c": 15, "n": 2, "text": "Every branch in me that doesn't bear fruit, he takes away. Every branch that bears fruit, he prunes, that it may bear more fruit."}, {"c": 15, "n": 3, "text": "You are already pruned clean because of the word which I have spoken to you."}, {"c": 15, "n": 4, "text": "Remain in me, and I in you. As the branch can't bear fruit by itself, unless it remains in the vine, so neither can you, unless you remain in me."}, {"c": 15, "n": 5, "text": "I am the vine. You are the branches. He who remains in me, and I in him, the same bears much fruit, for apart from me you can do nothing."}, {"c": 15, "n": 6, "text": "If a man doesn't remain in me, he is thrown out as a branch, and is withered; and they gather them, throw them into the fire, and they are burned."}, {"c": 15, "n": 7, "text": "If you remain in me, and my words remain in you, you will ask whatever you desire, and it will be done to you."}, {"c": 15, "n": 8, "text": "In this is my Father glorified, that you bear much fruit; and so you will be my disciples."}, {"c": 15, "n": 9, "text": "Even as the Father has loved me, I also have loved you. Remain in my love."}, {"c": 15, "n": 10, "text": "If you keep my commandments, you will remain in my love; even as I have kept my Father's commandments, and remain in his love."}, {"c": 15, "n": 11, "text": "I have spoken these things to you, that my joy may be in you, and that your joy may be made full."}, {"c": 15, "n": 12, "text": "This is my commandment, that you love one another, even as I have loved you."}, {"c": 15, "n": 13, "text": "Greater love has no one than this, that a man lay down his life for his friends."}, {"c": 15, "n": 14, "text": "You are my friends, if you do whatever I command you."}, {"c": 15, "n": 15, "text": "No longer do I call you servants, for the servant doesn't know what his lord does. But I have called you friends, for everything that I heard from my Father, I have made known to you."}, {"c": 15, "n": 16, "text": "You didn't choose me, but I chose you, and appointed you, that you should go and bear fruit, and that your fruit should remain; that whatever you will ask of the Father in my name, he may give it to you."}, {"c": 15, "n": 17, "text": "I command these things to you, that you may love one another."}, {"c": 15, "n": 18, "text": "If the world hates you, you know that it has hated me before it hated you."}, {"c": 15, "n": 19, "text": "If you were of the world, the world would love its own. But because you are not of the world, since I chose you out of the world, therefore the world hates you."}, {"c": 15, "n": 20, "text": "Remember the word that I said to you: 'A servant is not greater than his lord.' If they persecuted me, they will also persecute you. If they kept my word, they will keep yours also."}, {"c": 15, "n": 21, "text": "But all these things will they do to you for my name's sake, because they don't know him who sent me."}, {"c": 15, "n": 22, "text": "If I had not come and spoken to them, they would not have had sin; but now they have no excuse for their sin."}, {"c": 15, "n": 23, "text": "He who hates me, hates my Father also."}, {"c": 15, "n": 24, "text": "If I hadn't done among them the works which none other did, they wouldn't have had sin. But now have they seen and also hated both me and my Father."}, {"c": 15, "n": 25, "text": "But that the word may be fulfilled that is written in their law, 'They hated me without a cause.'"}, {"c": 15, "n": 26, "text": "When the Counselor has come, whom I will send to you from the Father, the Spirit of truth, who proceeds from the Father, he will testify about me."}, {"c": 15, "n": 27, "text": "You will also testify, because you have been with me from the beginning."}]}, "john_16": {"id": "john_16", "ref": "John 16", "verses": [{"c": 16, "n": 1, "text": "\"These things have I spoken to you, so that you wouldn't be caused to stumble."}, {"c": 16, "n": 2, "text": "They will put you out of the synagogues. Yes, the time comes that whoever kills you will think that he offers service to God."}, {"c": 16, "n": 3, "text": "They will do these things because they have not known the Father, nor me."}, {"c": 16, "n": 4, "text": "But I have told you these things, so that when the time comes, you may remember that I told you about them. I didn't tell you these things from the beginning, because I was with you."}, {"c": 16, "n": 5, "text": "But now I am going to him who sent me, and none of you asks me, 'Where are you going?'"}, {"c": 16, "n": 6, "text": "But because I have told you these things, sorrow has filled your heart."}, {"c": 16, "n": 7, "text": "Nevertheless I tell you the truth: It is to your advantage that I go away, for if I don't go away, the Counselor won't come to you. But if I go, I will send him to you."}, {"c": 16, "n": 8, "text": "When he has come, he will convict the world in respect to sin, and righteousness, and judgment;"}, {"c": 16, "n": 9, "text": "of sin, because they don't believe in me;"}, {"c": 16, "n": 10, "text": "of righteousness, because I am going to my Father, and you see me no more;"}, {"c": 16, "n": 11, "text": "of judgment, because the prince of this world has been judged."}, {"c": 16, "n": 12, "text": "I have yet many things to tell you, but you can't bear them now."}, {"c": 16, "n": 13, "text": "However when he, the Spirit of truth, has come, he will guide you into all the truth, for he will not speak from himself; but whatever things he hears, he will speak. He will declare to you the things that are to come."}, {"c": 16, "n": 14, "text": "He will glorify me, for he will take from what is mine, and will declare it to you."}, {"c": 16, "n": 15, "text": "All things whatever the Father has are mine; therefore I said that he takes of mine, and will declare it to you."}, {"c": 16, "n": 16, "text": "A little while, and you will not see me. Again a little while, and you will see me.\""}, {"c": 16, "n": 17, "text": "Some of his disciples therefore said to one another, \"What is this that he says to us, 'A little while, and you won't see me, and again a little while, and you will see me;' and, 'Because I go to the Father?'\""}, {"c": 16, "n": 18, "text": "They said therefore, \"What is this that he says, 'A little while?' We don't know what he is saying.\""}, {"c": 16, "n": 19, "text": "Therefore Jesus perceived that they wanted to ask him, and he said to them, \"Do you inquire among yourselves concerning this, that I said, 'A little while, and you won't see me, and again a little while, and you will see me?'"}, {"c": 16, "n": 20, "text": "Most assuredly I tell you, that you will weep and lament, but the world will rejoice. You will be sorrowful, but your sorrow will be turned into joy."}, {"c": 16, "n": 21, "text": "A woman, when she is in travail, has sorrow, because her time has come. But when she has delivered the child, she doesn't remember the anguish any more, for the joy that a child is born into the world."}, {"c": 16, "n": 22, "text": "You therefore now have sorrow, but I will see you again, and your heart will rejoice, and no one will take your joy away from you."}, {"c": 16, "n": 23, "text": "In that day you will ask me no question. Most assuredly I tell you, whatever you may ask of the Father, he will give it to you in my name."}, {"c": 16, "n": 24, "text": "Until now, you have asked nothing in my name. Ask, and you will receive, that your joy may be made full."}, {"c": 16, "n": 25, "text": "I have spoken these things to you in figures of speech. But the time comes when I will no more speak to you in figures of speech, but will tell you plainly about the Father."}, {"c": 16, "n": 26, "text": "In that day you will ask in my name; and I don't say to you, that I will pray to the Father for you,"}, {"c": 16, "n": 27, "text": "for the Father himself loves you, because you have loved me, and have believed that I came forth from God."}, {"c": 16, "n": 28, "text": "I came out from the Father, and have come into the world. Again, I leave the world, and go to the Father.\""}, {"c": 16, "n": 29, "text": "His disciples said to him, \"Behold, now you speak plainly, and speak no figures of speech."}, {"c": 16, "n": 30, "text": "Now we know that you know all things, and don't need for anyone to question you. By this we believe that you came forth from God.\""}, {"c": 16, "n": 31, "text": "Jesus answered them, \"Do you now believe?"}, {"c": 16, "n": 32, "text": "Behold, the time comes, yes, has now come, that you will be scattered, everyone to his own place, and will leave me alone. Yet I am not alone, because the Father is with me."}, {"c": 16, "n": 33, "text": "I have told you these things, that in me you may have peace. In the world you have oppression; but cheer up! I have overcome the world.\""}]}, "john_17": {"id": "john_17", "ref": "John 17", "verses": [{"c": 17, "n": 1, "text": "Jesus said these things, and lifting up his eyes to heaven, he said, \"Father, the time has come. Glorify your Son, that your Son may also glorify you;"}, {"c": 17, "n": 2, "text": "even as you gave him authority over all flesh, that to all whom you have given him, he will give eternal life."}, {"c": 17, "n": 3, "text": "This is eternal life, that they should know you, the only true God, and him whom you sent, Jesus Christ."}, {"c": 17, "n": 4, "text": "I glorified you on the earth. I have accomplished the work which you have given me to do."}, {"c": 17, "n": 5, "text": "Now, Father, glorify me with your own self with the glory which I had with you before the world existed."}, {"c": 17, "n": 6, "text": "I revealed your name to the people whom you have given me out of the world. They were yours, and you have given them to me. They have kept your word."}, {"c": 17, "n": 7, "text": "Now they know that all things whatever you have given me are from you,"}, {"c": 17, "n": 8, "text": "for the words which you have given me I have given to them, and they received them, and knew for sure that I came forth from you, and they believed that you sent me."}, {"c": 17, "n": 9, "text": "I pray for them. I don't pray for the world, but for those whom you have given me, for they are yours."}, {"c": 17, "n": 10, "text": "All things that are mine are yours, and yours are mine, and I am glorified in them."}, {"c": 17, "n": 11, "text": "I am no more in the world, and these are in the world, and I am coming to you. Holy Father, keep them through your name which you have given me, that they may be one, even as we are."}, {"c": 17, "n": 12, "text": "While I was with them in the world, I kept them in your name. Those whom you have given me I have kept. None of them is lost, except the son of perdition, that the Scripture might be fulfilled."}, {"c": 17, "n": 13, "text": "But now I come to you, and I say these things in the world, that they may have my joy made full in themselves."}, {"c": 17, "n": 14, "text": "I have given them your word. The world hated them, because they are not of the world, even as I am not of the world."}, {"c": 17, "n": 15, "text": "I pray not that you would take them from the world, but that you would keep them from the evil one."}, {"c": 17, "n": 16, "text": "They are not of the world even as I am not of the world."}, {"c": 17, "n": 17, "text": "Sanctify them in your truth. Your word is truth."}, {"c": 17, "n": 18, "text": "As you sent me into the world, even so I sent them into the world."}, {"c": 17, "n": 19, "text": "For their sakes I sanctify myself, that they themselves also may be sanctified in truth."}, {"c": 17, "n": 20, "text": "Neither for these only do I pray, but for those also who believe in me through their word,"}, {"c": 17, "n": 21, "text": "that they may all be one; even as you, Father, are in me, and I in you, that they also may be one in us; that the world may believe that you sent me."}, {"c": 17, "n": 22, "text": "The glory which you have given me, I have given to them; that they may be one, even as we are one;"}, {"c": 17, "n": 23, "text": "I in them, and you in me, that they may be perfected into one; that the world may know that you sent me, and loved them, even as you loved me."}, {"c": 17, "n": 24, "text": "Father, I desire that they also whom you have given me be with me where I am, that they may see my glory, which you have given me, for you loved me before the foundation of the world."}, {"c": 17, "n": 25, "text": "Righteous Father, the world didn't know you, but I knew you; and these knew that you sent me."}, {"c": 17, "n": 26, "text": "I made known to them your name, and will make it known; that the love with which you loved me may be in them, and I in them.\""}]}, "john_18": {"id": "john_18", "ref": "John 18", "verses": [{"c": 18, "n": 1, "text": "When Jesus had spoken these words, he went forth with his disciples over the brook Kidron, where was a garden, into which he entered, himself and his disciples."}, {"c": 18, "n": 2, "text": "Now Judas, who betrayed him, also knew the place, for Jesus often resorted there with his disciples."}, {"c": 18, "n": 3, "text": "Judas then, having taken a detachment of soldiers and officers from the chief priests and the Pharisees, came there with lanterns, torches, and weapons."}, {"c": 18, "n": 4, "text": "Jesus therefore, knowing all the things that were coming on him, went forth, and said to them, \"Who are you looking for?\""}, {"c": 18, "n": 5, "text": "They answered him, \"Jesus of Nazareth.\" Jesus said to them, \"I AM.\" Judas also, who betrayed him, was standing with them."}, {"c": 18, "n": 6, "text": "When therefore he said to them, \"I AM,\" they went backward, and fell to the ground."}, {"c": 18, "n": 7, "text": "Again therefore he asked them, \"Who are you looking for?\" They said, \"Jesus of Nazareth.\""}, {"c": 18, "n": 8, "text": "Jesus answered, \"I told you that I AM. If therefore you seek me, let these go their way,\""}, {"c": 18, "n": 9, "text": "that the word might be fulfilled which he spoke, \"Of those whom you have given me, I have lost none.\""}, {"c": 18, "n": 10, "text": "Simon Peter therefore, having a sword, drew it, and struck the high priest's servant, and cut off his right ear. The servant's name was Malchus."}, {"c": 18, "n": 11, "text": "Jesus therefore said to Peter, \"Put up the sword into its sheath. The cup which the Father has given me, shall I not drink it?\""}, {"c": 18, "n": 12, "text": "So the detachment, the commanding officer, and the officers of the Jews, seized Jesus and bound him,"}, {"c": 18, "n": 13, "text": "and led him to Annas first, for he was father-in-law to Caiaphas, who was high priest that year."}, {"c": 18, "n": 14, "text": "Now it was Caiaphas who gave counsel to the Jews, that it was expedient that one man should die for the people."}, {"c": 18, "n": 15, "text": "Simon Peter followed Jesus, as did another disciple. Now that disciple was known to the high priest, and entered in with Jesus into the court of the high priest;"}, {"c": 18, "n": 16, "text": "but Peter was standing at the door outside. So the other disciple, who was known to the high priest, went out and spoke to her who kept the door, and brought in Peter."}, {"c": 18, "n": 17, "text": "Then the maid who kept the door said to Peter, \"Are you also one of this man's disciples?\" He said, \"I am not.\""}, {"c": 18, "n": 18, "text": "Now the servants and the officers were standing there, having made a fire of coals, for it was cold. They were warming themselves. Peter was with them, standing and warming himself."}, {"c": 18, "n": 19, "text": "The high priest therefore asked Jesus of his disciples, and of his teaching."}, {"c": 18, "n": 20, "text": "Jesus answered him, \"I spoke openly to the world. I always taught in synagogues, and in the temple, where the Jews always meet. I said nothing in secret."}, {"c": 18, "n": 21, "text": "Why do you ask me? Ask those who have heard me what I said to them. Behold, these know the things which I said.\""}, {"c": 18, "n": 22, "text": "When he had said this, one of the officers standing by slapped Jesus with his hand, saying, \"Do you answer the high priest like that?\""}, {"c": 18, "n": 23, "text": "Jesus answered him, \"If I have spoken evil, testify of the evil; but if well, why do you beat me?\""}, {"c": 18, "n": 24, "text": "Annas sent him bound to Caiaphas, the high priest."}, {"c": 18, "n": 25, "text": "Now Simon Peter was standing and warming himself. They said therefore to him, \"Are you also one of his disciples?\" He denied it, and said, \"I am not.\""}, {"c": 18, "n": 26, "text": "One of the servants of the high priest, being a relative of him whose ear Peter cut off, said, \"Didn't I see you in the garden with him?\""}, {"c": 18, "n": 27, "text": "Peter therefore denied again, and immediately the rooster crowed."}, {"c": 18, "n": 28, "text": "They led Jesus therefore from Caiaphas into the Praetorium. It was early, and they themselves didn't enter into the Praetorium, that they might not be defiled, but might eat the Passover."}, {"c": 18, "n": 29, "text": "Pilate therefore went out to them, and said, \"What accusation do you bring against this man?\""}, {"c": 18, "n": 30, "text": "They answered him, \"If this man weren't an evildoer, we wouldn't have delivered him up to you.\""}, {"c": 18, "n": 31, "text": "Pilate therefore said to them, \"Take him yourselves, and judge him according to your law.\" Therefore the Jews said to him, \"It is not lawful for us to put anyone to death,\""}, {"c": 18, "n": 32, "text": "that the word of Jesus might be fulfilled, which he spoke, signifying by what kind of death he should die."}, {"c": 18, "n": 33, "text": "Pilate therefore entered again into the Praetorium, called Jesus, and said to him, \"Are you the King of the Jews?\""}, {"c": 18, "n": 34, "text": "Jesus answered him, \"Do you say this of yourself, or did others tell it to you concerning me?\""}, {"c": 18, "n": 35, "text": "Pilate answered, \"Am I a Jew? Your own nation and the chief priests delivered you to me. What have you done?\""}, {"c": 18, "n": 36, "text": "Jesus answered, \"My kingdom is not of this world. If my kingdom were of this world, then my servants would fight, that I wouldn't be delivered to the Jews. But now my kingdom is not from here.\""}, {"c": 18, "n": 37, "text": "Pilate therefore said to him, \"Are you a king then?\" Jesus answered, \"You say that I am a king. To this end have I been born, and to this end I have come into the world, that I should testify to the truth. Everyone who is of the truth listens to my voice.\""}, {"c": 18, "n": 38, "text": "Pilate said to him, \"What is truth?\" When he had said this, he went out again to the Jews, and said to them, \"I find no basis for a charge against him."}, {"c": 18, "n": 39, "text": "But you have a custom, that I should release to you one at the Passover. Therefore do you desire that I release to you the King of the Jews?\""}, {"c": 18, "n": 40, "text": "Then they all cried out again, saying, \"Not this man, but Barabbas!\" Now Barabbas was a robber."}]}, "john_19": {"id": "john_19", "ref": "John 19", "verses": [{"c": 19, "n": 1, "text": "Then Pilate therefore took Jesus, and flogged him."}, {"c": 19, "n": 2, "text": "The soldiers twisted thorns into a crown, and put it on his head, and dressed him in a purple garment."}, {"c": 19, "n": 3, "text": "They said, \"Hail, King of the Jews!\" and they struck him with their hands."}, {"c": 19, "n": 4, "text": "Then Pilate went out again, and said to them, \"Behold, I bring him out to you, that you may know that I find no basis for a charge against him.\""}, {"c": 19, "n": 5, "text": "Jesus therefore came out, wearing the crown of thorns and the purple garment. Pilate said to them, \"Behold, the man!\""}, {"c": 19, "n": 6, "text": "When therefore the chief priests and the officers saw him, they cried out, saying, \"Crucify! Crucify!\" Pilate said to them, \"Take him yourselves, and crucify him, for I find no basis for a charge against him.\""}, {"c": 19, "n": 7, "text": "The Jews answered him, \"We have a law, and by our law he ought to die, because he made himself the Son of God.\""}, {"c": 19, "n": 8, "text": "When therefore Pilate heard this saying, he was more afraid."}, {"c": 19, "n": 9, "text": "He entered into the Praetorium again, and said to Jesus, \"Where are you from?\" But Jesus gave him no answer."}, {"c": 19, "n": 10, "text": "Pilate therefore said to him, \"Aren't you speaking to me? Don't you know that I have power to release you, and have power to crucify you?\""}, {"c": 19, "n": 11, "text": "Jesus answered, \"You would have no power at all against me, unless it were given to you from above. Therefore he who delivered me to you has greater sin.\""}, {"c": 19, "n": 12, "text": "At this, Pilate sought to release him, but the Jews cried out, saying, \"If you release this man, you aren't Caesar's friend! Everyone who makes himself a king speaks against Caesar!\""}, {"c": 19, "n": 13, "text": "When Pilate therefore heard these words, he brought Jesus out, and sat down on the judgment seat at a place called \"The Pavement,\" but in Hebrew, \"Gabbatha.\""}, {"c": 19, "n": 14, "text": "Now it was the Preparation of the Passover, at about the sixth hour. He said to the Jews, \"Behold, your King!\""}, {"c": 19, "n": 15, "text": "They cried out, \"Away with him! Away with him! Crucify him!\" Pilate said to them, \"Shall I crucify your King?\" The chief priests answered, \"We have no king but Caesar!\""}, {"c": 19, "n": 16, "text": "Then therefore he delivered him to them to be crucified. So they took Jesus and led him away."}, {"c": 19, "n": 17, "text": "He went out, bearing his cross, to the place called \"The place of a skull,\" which is called in Hebrew, \"Golgotha,\""}, {"c": 19, "n": 18, "text": "where they crucified him, and with him two others, on either side one, and Jesus in the middle."}, {"c": 19, "n": 19, "text": "Pilate wrote a title also, and put it on the cross. There was written, \"JESUS OF NAZARETH, THE KING OF THE JEWS.\""}, {"c": 19, "n": 20, "text": "Therefore many of the Jews read this title, for the place where Jesus was crucified was near the city; and it was written in Hebrew, in Latin, and in Greek."}, {"c": 19, "n": 21, "text": "The chief priests of the Jews therefore said to Pilate, \"Don't write, 'The King of the Jews,' but that, 'he said, I am King of the Jews.'\""}, {"c": 19, "n": 22, "text": "Pilate answered, \"What I have written, I have written.\""}, {"c": 19, "n": 23, "text": "Then the soldiers, when they had crucified Jesus, took his garments and made four parts, to every soldier a part; and also the coat. Now the coat was without seam, woven from the top throughout."}, {"c": 19, "n": 24, "text": "Then they said to one another, \"Let's not tear it, but cast lots for it, whose it will be,\" that the scripture might be fulfilled, which says, \"They parted my garments among them, For my cloak they cast lots.\" Therefore the soldiers did these things."}, {"c": 19, "n": 25, "text": "But there were standing by the cross of Jesus his mother, and his mother's sister, Mary the wife of Clopas, and Mary Magdalene."}, {"c": 19, "n": 26, "text": "Therefore when Jesus saw his mother, and the disciple whom he loved standing there, he said to his mother, \"Woman, behold your son!\""}, {"c": 19, "n": 27, "text": "Then he said to the disciple, \"Behold, your mother!\" From that hour, the disciple took her to his own home."}, {"c": 19, "n": 28, "text": "After this, Jesus, seeing that all things were now finished, that the scripture might be fulfilled, said, \"I am thirsty.\""}, {"c": 19, "n": 29, "text": "Now a vessel full of vinegar was set there; so they put a sponge full of the vinegar on hyssop, and brought it to his mouth."}, {"c": 19, "n": 30, "text": "When Jesus therefore had received the vinegar, he said, \"It is finished.\" He bowed his head, and gave up his spirit."}, {"c": 19, "n": 31, "text": "Therefore the Jews, because it was the Preparation, so that the bodies wouldn't remain on the cross on the Sabbath (for that Sabbath was a special one), asked of Pilate that their legs might be broken, and that they might be taken away."}, {"c": 19, "n": 32, "text": "Therefore the soldiers came, and broke the legs of the first, and of the other who was crucified with him;"}, {"c": 19, "n": 33, "text": "but when they came to Jesus, and saw that he was already dead, they didn't break his legs."}, {"c": 19, "n": 34, "text": "However one of the soldiers pierced his side with a spear, and immediately blood and water came out."}, {"c": 19, "n": 35, "text": "He who has seen has testified, and his testimony is true. He knows that he tells the truth, that you also may believe."}, {"c": 19, "n": 36, "text": "For these things happened, that the scripture might be fulfilled, \"A bone of him will not be broken.\""}, {"c": 19, "n": 37, "text": "Again another scripture says, \"They will look on him whom they pierced.\""}, {"c": 19, "n": 38, "text": "After these things, Joseph of Arimathaea, being a disciple of Jesus, but secretly for fear of the Jews, asked of Pilate that he might take away Jesus' body. Pilate gave him permission. He came therefore, and took away his body."}, {"c": 19, "n": 39, "text": "Nicodemus also came, he who at first came to Jesus by night, bringing a mixture of myrrh and aloes, about a hundred Roman pounds."}, {"c": 19, "n": 40, "text": "So they took Jesus' body, and bound it in linen cloths with the spices, as the custom of the Jews is to bury."}, {"c": 19, "n": 41, "text": "Now in the place where he was crucified there was a garden. In the garden a new tomb in which no man had ever yet been laid."}, {"c": 19, "n": 42, "text": "Then because of the Jews' Preparation (for the tomb was near at hand) they laid Jesus there."}]}, "john_20": {"id": "john_20", "ref": "John 20", "verses": [{"c": 20, "n": 1, "text": "Now on the first day of the week, Mary Magdalene came early, while it was yet dark, to the tomb, and saw the stone taken away from the tomb."}, {"c": 20, "n": 2, "text": "She ran therefore, and came to Simon Peter, and to the other disciple whom Jesus loved, and said to them, \"They have taken away the Lord out of the tomb, and we don't know where they have laid him!\""}, {"c": 20, "n": 3, "text": "Peter therefore went forth, and the other disciple, and they went toward the tomb."}, {"c": 20, "n": 4, "text": "They both ran together. The other disciple outran Peter, and came to the tomb first."}, {"c": 20, "n": 5, "text": "Stooping and looking in, he saw the linen cloths lying, yet he didn't enter in."}, {"c": 20, "n": 6, "text": "Then Simon Peter came, following him, and entered into the tomb. He saw the linen cloths lying,"}, {"c": 20, "n": 7, "text": "and the cloth that was on his head, not lying with the linen cloths, but rolled up in a place by itself."}, {"c": 20, "n": 8, "text": "Then the other disciple also entered in therefore, who came first to the tomb, and he saw, and believed."}, {"c": 20, "n": 9, "text": "For as yet they didn't know the scripture, that he must rise from the dead."}, {"c": 20, "n": 10, "text": "So the disciples went away again to their own homes."}, {"c": 20, "n": 11, "text": "But Mary was standing outside at the tomb weeping. So, as she wept, she stooped and looked into the tomb,"}, {"c": 20, "n": 12, "text": "and she saw two angels in white sitting, one at the head, and one at the feet, where the body of Jesus had lain."}, {"c": 20, "n": 13, "text": "They told her, \"Woman, why are you weeping?\" She said to them, \"Because they have taken away my Lord, and I don't know where they have laid him.\""}, {"c": 20, "n": 14, "text": "When she had said this, she turned herself back, and saw Jesus standing, and didn't know that it was Jesus."}, {"c": 20, "n": 15, "text": "Jesus said to her, \"Woman, why are you weeping? Who are you looking for?\" She, supposing him to be the gardener, said to him, \"Sir, if you have carried him away, tell me where you have laid him, and I will take him away.\""}, {"c": 20, "n": 16, "text": "Jesus said to her, \"Mary.\" She turned herself, and said to him, \"Rhabbouni!\" which is to say, \"Teacher!\""}, {"c": 20, "n": 17, "text": "Jesus said to her, \"Don't touch me, for I haven't yet ascended to my Father; but go to my brothers, and tell them, 'I am ascending to my Father and your Father, and my God and your God.'\""}, {"c": 20, "n": 18, "text": "Mary Magdalene came and told the disciples that she had seen the Lord, and that he had said these things to her."}, {"c": 20, "n": 19, "text": "When therefore it was evening, on that day, the first day of the week, and when the doors were locked where the disciples were assembled, for fear of the Jews, Jesus came and stood in the midst, and said to them, \"Peace be to you.\""}, {"c": 20, "n": 20, "text": "When he had said this, he showed to them his hands and his side. The disciples therefore were glad when they saw the Lord."}, {"c": 20, "n": 21, "text": "Jesus therefore said to them again, \"Peace be to you. As the Father has sent me, even so I send you.\""}, {"c": 20, "n": 22, "text": "When he had said this, he breathed on them, and said to them, \"Receive the Holy Spirit!"}, {"c": 20, "n": 23, "text": "Whoever's sins you forgive, they are forgiven to them. Whoever's sins you retain, they are retained.\""}, {"c": 20, "n": 24, "text": "But Thomas, one of the twelve, called Didymus, wasn't with them when Jesus came."}, {"c": 20, "n": 25, "text": "The other disciples therefore said to him, \"We have seen the Lord!\" But he said to them, \"Unless I see in his hands the print of the nails, and put my hand into his side, I will not believe.\""}, {"c": 20, "n": 26, "text": "After eight days again his disciples were within, and Thomas with them. Jesus came, the doors being locked, and stood in the midst, and said, \"Peace be to you.\""}, {"c": 20, "n": 27, "text": "Then he said to Thomas, \"Reach here your finger, and see my hands. Reach here your hand, and put it into my side. Don't be faithless, but believing.\""}, {"c": 20, "n": 28, "text": "Thomas answered him, \"My Lord and my God!\""}, {"c": 20, "n": 29, "text": "Jesus said to him, \"Because you have seen me, you have believed. Blessed are those who have not seen, and have believed.\""}, {"c": 20, "n": 30, "text": "Therefore Jesus did many other signs in the presence of his disciples, which are not written in this book;"}, {"c": 20, "n": 31, "text": "but these are written, that you may believe that Jesus is the Christ, the Son of God, and that believing you may have life in his name."}]}, "john_21": {"id": "john_21", "ref": "John 21", "verses": [{"c": 21, "n": 1, "text": "After these things, Jesus revealed himself again to the disciples at the sea of Tiberias. He revealed himself this way."}, {"c": 21, "n": 2, "text": "Simon Peter, Thomas called Didymus, Nathanael of Cana in Galilee, and the sons of Zebedee, and two others of his disciples were together."}, {"c": 21, "n": 3, "text": "Simon Peter said to them, \"I'm going fishing.\" They told him, \"We are also coming with you.\" They immediately went forth, and entered into the boat. That night, they caught nothing."}, {"c": 21, "n": 4, "text": "But when day was now breaking, Jesus stood on the beach, yet the disciples didn't know that it was Jesus."}, {"c": 21, "n": 5, "text": "Jesus therefore said to them, \"Children, have you anything to eat?\" They answered him, \"No.\""}, {"c": 21, "n": 6, "text": "He said to them, \"Cast the net on the right side of the boat, and you will find some.\" They cast therefore, and now they were not able to draw it in for the multitude of fish."}, {"c": 21, "n": 7, "text": "That disciple therefore whom Jesus loved said to Peter, \"It's the Lord!\" So when Simon Peter heard that it was the Lord, he wrapped his coat around him (for he was naked), and threw himself into the sea."}, {"c": 21, "n": 8, "text": "But the other disciples came in the little boat (for they were not far from the land, but about two hundred cubits away), dragging the net full of fish."}, {"c": 21, "n": 9, "text": "So when they got out on the land, they saw a fire of coals there, and fish laid on it, and bread."}, {"c": 21, "n": 10, "text": "Jesus said to them, \"Bring some of the fish which you have just caught.\""}, {"c": 21, "n": 11, "text": "Simon Peter went up, and drew the net to land, full of great fish, one hundred fifty-three; and even though there were so many, the net wasn't torn."}, {"c": 21, "n": 12, "text": "Jesus said to them, \"Come and eat breakfast.\" None of the disciples dared inquire of him, \"Who are you?\" knowing that it was the Lord."}, {"c": 21, "n": 13, "text": "Then Jesus came and took the bread, gave it to them, and the fish likewise."}, {"c": 21, "n": 14, "text": "This is now the third time that Jesus was revealed to his disciples, after he had risen from the dead."}, {"c": 21, "n": 15, "text": "So when they had eaten their breakfast, Jesus said to Simon Peter, \"Simon, son of Jonah, do you love me more than these?\" He said to him, \"Yes, Lord; you know that I have affection for you.\" He said to him, \"Feed my lambs.\""}, {"c": 21, "n": 16, "text": "He said to him again a second time, \"Simon, son of Jonah, do you love me?\" He said to him, \"Yes, Lord; you know that I have affection for you.\" He said to him, \"Tend my sheep.\""}, {"c": 21, "n": 17, "text": "He says to him the third time, \"Simon, son of Jonah, do you have affection for me?\" Peter was grieved because he asked him the third time, \"Do you have affection for me?\" He said to him, \"Lord, you know everything. You know that I have affection for you.\" Jesus said to him, \"Feed my sheep."}, {"c": 21, "n": 18, "text": "Most assuredly I tell you, when you were young, you dressed yourself, and walked where you wanted to. But when you are old, you will stretch out your hands, and another will dress you, and carry you where you don't want to go.\""}, {"c": 21, "n": 19, "text": "Now he said this, signifying by what kind of death he would glorify God. When he had said this, he said to him, \"Follow me.\""}, {"c": 21, "n": 20, "text": "Then Peter, turning around, saw a disciple following. This was the disciple whom Jesus sincerely loved, the one who had also leaned on Jesus' breast at the supper and asked, \"Lord, who is going to betray You?\""}, {"c": 21, "n": 21, "text": "Peter seeing him, said to Jesus, \"Lord, and what will this man do?\""}, {"c": 21, "n": 22, "text": "Jesus said to him, \"If I desire that he stay until I come, what is that to you? You follow me.\""}, {"c": 21, "n": 23, "text": "This saying therefore went forth among the brothers, that that disciple wouldn't die. Yet Jesus didn't say to him that he wouldn't die, but, \"If I desire that he stay until I come, what is that to you?\""}, {"c": 21, "n": 24, "text": "This is the disciple who testifies about these things, and wrote these things. We know that his witness is true."}, {"c": 21, "n": 25, "text": "There are also many other things which Jesus did, which if they would all be written, I suppose that even the world itself wouldn't contain the books that would be written."}]}, "romans_1": {"id": "romans_1", "ref": "Romans 1", "verses": [{"c": 1, "n": 1, "text": "Paul, a servant of Jesus Christ, called to be an apostle, set apart for the gospel of God,"}, {"c": 1, "n": 2, "text": "which he promised before through his prophets in the holy scriptures,"}, {"c": 1, "n": 3, "text": "concerning his Son, who was born of the seed of David according to the flesh,"}, {"c": 1, "n": 4, "text": "who was declared to be the Son of God with power, according to the spirit of holiness, by the resurrection from the dead, Jesus Christ our Lord,"}, {"c": 1, "n": 5, "text": "through whom we received grace and apostleship, to obedience of faith among all the nations, for his name's sake."}, {"c": 1, "n": 6, "text": "Among whom you are also called to be Jesus Christ's."}, {"c": 1, "n": 7, "text": "To all who are in Rome, beloved of God, called to be saints: Grace to you and peace from God our Father and the Lord Jesus Christ."}, {"c": 1, "n": 8, "text": "First, I thank my God through Jesus Christ for all of you, that your faith is proclaimed throughout the whole world."}, {"c": 1, "n": 9, "text": "For God is my witness, whom I serve in my spirit in the gospel of his Son, how unceasingly I make mention of you always in my prayers,"}, {"c": 1, "n": 10, "text": "requesting, if by any means now at length I may be prospered by the will of God to come to you."}, {"c": 1, "n": 11, "text": "For I long to see you, that I may impart to you some spiritual gift, to the end you may be established;"}, {"c": 1, "n": 12, "text": "that is, that I with you may be comforted in you, each of us by the other's faith, both yours and mine."}, {"c": 1, "n": 13, "text": "Now I don't desire to have you unaware, brothers, that often I planned to come to you, and was hindered so far, that I might have some fruit in you also, even as in the rest of the Gentiles."}, {"c": 1, "n": 14, "text": "I am debtor both to Greeks and to foreigners, both to the wise and to the foolish."}, {"c": 1, "n": 15, "text": "So, as much as in me is, I am ready to preach the gospel to you also who are in Rome."}, {"c": 1, "n": 16, "text": "For I am not ashamed of the gospel of Christ, for it is the power of God to salvation to everyone who believes; to the Jew first, and also to the Greek."}, {"c": 1, "n": 17, "text": "For therein is revealed a righteousness of God from faith to faith. As it is written, \"But the righteous shall live by faith.\""}, {"c": 1, "n": 18, "text": "For the wrath of God is revealed from heaven against all ungodliness and unrighteousness of men, who hinder the truth in unrighteousness,"}, {"c": 1, "n": 19, "text": "because that which is known by God is revealed in them, for God revealed it to them."}, {"c": 1, "n": 20, "text": "For the invisible things of him since the creation of the world are clearly seen, being perceived through the things that are made, even his everlasting power and divinity; that they may be without excuse."}, {"c": 1, "n": 21, "text": "Because, knowing God, they didn't glorify him as God, neither gave thanks, but became vain in their reasoning, and their senseless heart was darkened."}, {"c": 1, "n": 22, "text": "Professing themselves to be wise, they became fools,"}, {"c": 1, "n": 23, "text": "and traded the glory of the incorruptible God for the likeness of an image of corruptible man, and of birds, and four-footed animals, and creeping things."}, {"c": 1, "n": 24, "text": "Therefore God also gave them up in the lusts of their hearts to uncleanness, that their bodies should be dishonored among themselves,"}, {"c": 1, "n": 25, "text": "who exchanged the truth of God for a lie, and worshipped and served the creature rather than the Creator, who is blessed forever. Amen."}, {"c": 1, "n": 26, "text": "For this reason, God gave them up to vile passions. For their women changed the natural function into that which is against nature."}, {"c": 1, "n": 27, "text": "Likewise also the men, leaving the natural function of the woman, burned in their lust toward one another, men doing what is inappropriate with men, and receiving in themselves the due penalty of their error."}, {"c": 1, "n": 28, "text": "Even as they refused to have God in their knowledge, God gave them up to a reprobate mind, to do those things which are not fitting;"}, {"c": 1, "n": 29, "text": "being filled with all unrighteousness, sexual immorality, wickedness, covetousness, maliciousness; full of envy, murder, strife, deceit, evil habits, secret slanderers,"}, {"c": 1, "n": 30, "text": "backbiters, hateful to God, insolent, haughty, boastful, inventors of evil things, disobedient to parents,"}, {"c": 1, "n": 31, "text": "without understanding, covenant-breakers, without natural affection, unforgiving, unmerciful;"}, {"c": 1, "n": 32, "text": "who, knowing the ordinance of God, that those who practice such things are worthy of death, not only do the same, but also consent with those who practice them."}]}, "romans_2": {"id": "romans_2", "ref": "Romans 2", "verses": [{"c": 2, "n": 1, "text": "Therefore you are without excuse, man, whoever you are who judge. For in that which you judge another, you condemn yourself. For you who judge practice the same things."}, {"c": 2, "n": 2, "text": "We know that the judgment of God is according to truth against those who practice such things."}, {"c": 2, "n": 3, "text": "Do you know this, O man who judges those who practice such things, and do the same, that you will escape the judgment of God?"}, {"c": 2, "n": 4, "text": "Or do you despise the riches of his goodness, forbearance, and patience, not knowing that the goodness of God leads you to repentance?"}, {"c": 2, "n": 5, "text": "But according to your hardness and impenitent heart you are treasuring up for yourself wrath in the day of wrath and revelation of the righteous judgment of God;"}, {"c": 2, "n": 6, "text": "who \"will render to every man according to his works:\""}, {"c": 2, "n": 7, "text": "to those who by patience in well-doing seek for glory and honor and incorruptibility, eternal life;"}, {"c": 2, "n": 8, "text": "but to those who are self-seeking, and don't obey the truth, but obey unrighteousness, will be wrath and indignation,"}, {"c": 2, "n": 9, "text": "oppression and anguish, on every soul of man who works evil, on the Jew first, and also on the Greek."}, {"c": 2, "n": 10, "text": "But glory and honor and peace to every man who works good, to the Jew first, and also to the Greek."}, {"c": 2, "n": 11, "text": "For there is no partiality with God."}, {"c": 2, "n": 12, "text": "For as many as have sinned without law will also perish without the law. As many as have sinned under the law will be judged by the law."}, {"c": 2, "n": 13, "text": "For it isn't the hearers of the law who are righteous before God, but the doers of the law will be justified"}, {"c": 2, "n": 14, "text": "(for when Gentiles who don't have the law do by nature the things of the law, these, not having the law, are a law to themselves,"}, {"c": 2, "n": 15, "text": "in that they show the work of the law written in their hearts, their conscience testifying with them, and their thoughts among themselves accusing or else excusing them)"}, {"c": 2, "n": 16, "text": "in the day when God will judge the secrets of men, according to my gospel, by Jesus Christ."}, {"c": 2, "n": 17, "text": "Indeed you bear the name of a Jew, and rest on the law, and glory in God,"}, {"c": 2, "n": 18, "text": "and know his will, and approve the things that are excellent, being instructed out of the law,"}, {"c": 2, "n": 19, "text": "and are confident that you yourself are a guide of the blind, a light to those who are in darkness,"}, {"c": 2, "n": 20, "text": "a corrector of the foolish, a teacher of babies, having in the law the form of knowledge and of the truth."}, {"c": 2, "n": 21, "text": "You therefore who teach another, don't you teach yourself? You who preach that a man shouldn't steal, do you steal?"}, {"c": 2, "n": 22, "text": "You who say a man shouldn't commit adultery, do you commit adultery? You who abhor idols, do you rob temples?"}, {"c": 2, "n": 23, "text": "You who glory in the law, through your disobedience of the law do you dishonor God?"}, {"c": 2, "n": 24, "text": "For \"the name of God is blasphemed among the Gentiles because of you,\" just as it is written."}, {"c": 2, "n": 25, "text": "For circumcision indeed profits, if you be a doer of the law, but if you be a transgressor of the law, your circumcision has become uncircumcision."}, {"c": 2, "n": 26, "text": "If therefore the uncircumcised keep the ordinances of the law, won't his uncircumcision be accounted as circumcision?"}, {"c": 2, "n": 27, "text": "Won't the uncircumcision which is by nature, if it fulfills the law, judge you, who with the letter and circumcision are a transgressor of the law?"}, {"c": 2, "n": 28, "text": "For he is not a Jew who is one outwardly, neither is that circumcision which is outward in the flesh;"}, {"c": 2, "n": 29, "text": "but he is a Jew who is one inwardly, and circumcision is that of the heart, in the spirit not in the letter; whose praise is not from men, but from God."}]}, "romans_3": {"id": "romans_3", "ref": "Romans 3", "verses": [{"c": 3, "n": 1, "text": "Then what advantage does the Jew have? Or what is the profit of circumcision?"}, {"c": 3, "n": 2, "text": "Much in every way! Because first of all, that they were entrusted with the oracles of God."}, {"c": 3, "n": 3, "text": "For what if some were without faith? Will their lack of faith make of no effect the faithfulness of God?"}, {"c": 3, "n": 4, "text": "Certainly not! Yes, let God be found true, but every man a liar. As it is written, \"That you might be justified in your words, And might prevail when you come into judgment.\""}, {"c": 3, "n": 5, "text": "But if our unrighteousness commends the righteousness of God, what will we say? Is God unrighteous who inflicts wrath? I speak like men do."}, {"c": 3, "n": 6, "text": "Certainly not! For then how will God judge the world?"}, {"c": 3, "n": 7, "text": "For if the truth of God through my lie abounded to his glory, why am I also still judged as a sinner?"}, {"c": 3, "n": 8, "text": "Why not (as we are slanderously reported, and as some affirm that we say), \"Let us do evil, that good may come?\" Those who say so are justly condemned."}, {"c": 3, "n": 9, "text": "What then? Are we better than they? No, in no way. For we previously charged both Jews and Greeks, that they are all under sin."}, {"c": 3, "n": 10, "text": "As it is written, \"There is no one righteous. No, not one."}, {"c": 3, "n": 11, "text": "There is no one who understands. There is no one who seeks after God."}, {"c": 3, "n": 12, "text": "They have all turned aside. They have together become unprofitable. There is no one who does good, no, not, so much as one.\""}, {"c": 3, "n": 13, "text": "\"Their throat is an open tomb. With their tongues they have used deceit.\" \"The poison of vipers is under their lips;\""}, {"c": 3, "n": 14, "text": "\"Whose mouth is full of cursing and bitterness.\""}, {"c": 3, "n": 15, "text": "\"Their feet are swift to shed blood."}, {"c": 3, "n": 16, "text": "Destruction and misery are in their ways."}, {"c": 3, "n": 17, "text": "The way of peace, they haven't known.\""}, {"c": 3, "n": 18, "text": "\"There is no fear of God before their eyes.\""}, {"c": 3, "n": 19, "text": "Now we know that whatever things the law says, it speaks to those who are under the law, that every mouth may be closed, and all the world may be brought under the judgment of God."}, {"c": 3, "n": 20, "text": "Because by the works of the law, no flesh will be justified in his sight. For through the law comes the knowledge of sin."}, {"c": 3, "n": 21, "text": "But now apart from the law, a righteousness of God has been revealed, being testified by the law and the prophets;"}, {"c": 3, "n": 22, "text": "even the righteousness of God through faith in Jesus Christ to all and on all those who believe. For there is no distinction,"}, {"c": 3, "n": 23, "text": "for all have sinned, and fall short of the glory of God;"}, {"c": 3, "n": 24, "text": "being justified freely by his grace through the redemption that is in Christ Jesus;"}, {"c": 3, "n": 25, "text": "whom God set forth to be an atoning sacrifice, through faith, in his blood, to show his righteousness because of the passing over of the sins done before, in the forbearance of God;"}, {"c": 3, "n": 26, "text": "for the showing of his righteousness at this present time; that he might himself be just, and the justifier of him who has faith in Jesus."}, {"c": 3, "n": 27, "text": "Where then is the boasting? It is excluded. By what manner of law? Of works? No, but by a law of faith."}, {"c": 3, "n": 28, "text": "We maintain therefore that a man is justified by faith apart from the works of the law."}, {"c": 3, "n": 29, "text": "Or is God the God of Jews only? Isn't he the God of Gentiles also? Yes, of Gentiles also,"}, {"c": 3, "n": 30, "text": "if it is so that God is one. He will justify the circumcised by faith, and the uncircumcised through faith."}, {"c": 3, "n": 31, "text": "Do we then make the law of no effect through faith? Certainly not! No, we establish the law."}]}, "romans_4": {"id": "romans_4", "ref": "Romans 4", "verses": [{"c": 4, "n": 1, "text": "What then will we say that Abraham, our forefather, has found according to the flesh?"}, {"c": 4, "n": 2, "text": "For if Abraham was justified by works, he has something to boast about, but not toward God."}, {"c": 4, "n": 3, "text": "For what does the scripture say? \"Abraham believed God, and it was accounted to him for righteousness.\""}, {"c": 4, "n": 4, "text": "Now to him who works, the reward is not accounted as of grace, but as of debt."}, {"c": 4, "n": 5, "text": "But to him who doesn't work, but believes in him who justifies the ungodly, his faith is accounted for righteousness."}, {"c": 4, "n": 6, "text": "Even as David also pronounces blessing on the man to whom God counts righteousness apart from works,"}, {"c": 4, "n": 7, "text": "\"Blessed are they whose iniquities are forgiven, Whose sins are covered."}, {"c": 4, "n": 8, "text": "Blessed is the man to whom the Lord will not charge with sin.\""}, {"c": 4, "n": 9, "text": "Is this blessing then pronounced on the circumcised, or on the uncircumcised also? For we say that faith was accounted to Abraham for righteousness."}, {"c": 4, "n": 10, "text": "How then was it counted? When he was in circumcision, or in uncircumcision? Not in circumcision, but in uncircumcision."}, {"c": 4, "n": 11, "text": "He received the sign of circumcision, a seal of the righteousness of the faith which he had while he was in uncircumcision, that he might be the father of all those who believe, though they be in uncircumcision, that righteousness might also be accounted to them."}, {"c": 4, "n": 12, "text": "The father of circumcision to those who not only are of the circumcision, but who also walk in the steps of that faith of our father, Abraham, which he had in uncircumcision."}, {"c": 4, "n": 13, "text": "For not through the law was the promise to Abraham or to his seed that he should be heir of the world, but through the righteousness of faith."}, {"c": 4, "n": 14, "text": "For if those who are of the law are heirs, faith is made void, and the promise is made of no effect."}, {"c": 4, "n": 15, "text": "For the law works wrath, for where there is no law, neither is there disobedience."}, {"c": 4, "n": 16, "text": "For this cause it is of faith, that it may be according to grace, to the end that the promise may be sure to all the seed, not to that only which is of the law, but to that also which is of the faith of Abraham, who is the father of us all."}, {"c": 4, "n": 17, "text": "As it is written, \"I have made you a father of many nations.\" This is before him whom he believed, God, who gives life to the dead, and calls the things that are not, as though they were."}, {"c": 4, "n": 18, "text": "Who in hope believed against hope, to the end that he might become a father of many nations, according to that which had been spoken, \"So will your seed be.\""}, {"c": 4, "n": 19, "text": "Without being weakened in faith, he didn't consider his own body, already having been worn out, (he being about a hundred years old), and the deadness of Sarah's womb."}, {"c": 4, "n": 20, "text": "Yet, looking to the promise of God, he wavered not through unbelief, but grew strong through faith, giving glory to God,"}, {"c": 4, "n": 21, "text": "and being fully assured that what he had promised, he was able also to perform."}, {"c": 4, "n": 22, "text": "Therefore also it was \"reckoned to him for righteousness.\""}, {"c": 4, "n": 23, "text": "Now it was not written that it was accounted to him for his sake alone,"}, {"c": 4, "n": 24, "text": "but for our sake also, to whom it will be accounted, who believe in him who raised Jesus, our Lord, from the dead,"}, {"c": 4, "n": 25, "text": "who was delivered up for our trespasses, and was raised for our justification."}]}, "romans_5": {"id": "romans_5", "ref": "Romans 5", "verses": [{"c": 5, "n": 1, "text": "Being therefore justified by faith, we have peace with God through our Lord Jesus Christ;"}, {"c": 5, "n": 2, "text": "through whom we also have our access by faith into this grace in which we stand. We rejoice in hope of the glory of God."}, {"c": 5, "n": 3, "text": "Not only so, but we also rejoice in our sufferings, knowing that suffering works perseverance;"}, {"c": 5, "n": 4, "text": "and perseverance, proven character; and proven character, hope:"}, {"c": 5, "n": 5, "text": "and hope doesn't disappoint us, because God's love has been poured out into our hearts through the Holy Spirit which was given to us."}, {"c": 5, "n": 6, "text": "For while we were yet weak, at the right time Christ died for the ungodly."}, {"c": 5, "n": 7, "text": "For one will hardly die for a righteous man. For perhaps for a righteous person someone would even dare to die."}, {"c": 5, "n": 8, "text": "But God commends his own love toward us, in that while we were yet sinners, Christ died for us."}, {"c": 5, "n": 9, "text": "Much more then, being now justified by his blood, we will be saved from God's wrath through him."}, {"c": 5, "n": 10, "text": "For if, while we were enemies, we were reconciled to God through the death of his Son, much more, being reconciled, we will be saved by his life."}, {"c": 5, "n": 11, "text": "Not only so, but we also rejoice in God through our Lord Jesus Christ, through whom we have now received the reconciliation."}, {"c": 5, "n": 12, "text": "Therefore, as sin entered into the world through one man, and death through sin; and so death passed to all men, because all sinned."}, {"c": 5, "n": 13, "text": "For until the law, sin was in the world; but sin is not charged when there is no law."}, {"c": 5, "n": 14, "text": "Nevertheless death reigned from Adam until Moses, even over those whose sins weren't like Adam's disobedience, who is a foreshadowing of him who was to come."}, {"c": 5, "n": 15, "text": "But the free gift isn't like the trespass. For if by the trespass of the one the many died, much more did the grace of God, and the gift by the grace of the one man, Jesus Christ, abound to the many."}, {"c": 5, "n": 16, "text": "The gift is not as through one who sinned: for the judgment came by one to condemnation, but the free gift came of many trespasses to justification."}, {"c": 5, "n": 17, "text": "For if by the trespass of the one, death reigned through the one; so much more will those who receive the abundance of grace and of the gift of righteousness reign in life through the one, Jesus Christ."}, {"c": 5, "n": 18, "text": "So then as through one trespass, all men were condemned; even so through one act of righteousness, all men were justified to life."}, {"c": 5, "n": 19, "text": "For as through the one man's disobedience many were made sinners, even so through the obedience of the one will many be made righteous."}, {"c": 5, "n": 20, "text": "The law came in besides, that the trespass might abound; but where sin abounded, grace did abound more exceedingly;"}, {"c": 5, "n": 21, "text": "that as sin reigned in death, even so might grace reign through righteousness to eternal life through Jesus Christ our Lord."}]}, "romans_6": {"id": "romans_6", "ref": "Romans 6", "verses": [{"c": 6, "n": 1, "text": "What will we say then? Will we continue in sin, that grace may abound?"}, {"c": 6, "n": 2, "text": "Certainly not! We who died to sin, how could we live in it any longer?"}, {"c": 6, "n": 3, "text": "Or don't you know that all we who were baptized into Christ Jesus were baptized into his death?"}, {"c": 6, "n": 4, "text": "We were buried therefore with him through baptism to death, that just like Christ was raised from the dead through the glory of the Father, so we also might walk in newness of life."}, {"c": 6, "n": 5, "text": "For if we have become united with him in the likeness of his death, we will also be part of his resurrection;"}, {"c": 6, "n": 6, "text": "knowing this, that our old man was crucified with him, that the body of sin might be done away with, so that we would no longer be in bondage to sin."}, {"c": 6, "n": 7, "text": "For he who has died has been freed from sin."}, {"c": 6, "n": 8, "text": "But if we died with Christ, we believe that we will also live with him;"}, {"c": 6, "n": 9, "text": "knowing that Christ, being raised from the dead, dies no more. Death no more has dominion over him!"}, {"c": 6, "n": 10, "text": "For the death that he died, he died to sin once; but the life that he lives, he lives to God."}, {"c": 6, "n": 11, "text": "Thus also consider yourselves also to be dead to sin, but alive to God in Christ Jesus our Lord."}, {"c": 6, "n": 12, "text": "Therefore don't let sin reign in your mortal body, that you should obey it in its lusts."}, {"c": 6, "n": 13, "text": "Neither present your members to sin as instruments of unrighteousness, but present yourselves to God, as alive from the dead, and your members as instruments of righteousness to God."}, {"c": 6, "n": 14, "text": "For sin will not have dominion over you. For you are not under law, but under grace."}, {"c": 6, "n": 15, "text": "What then? Will we sin, because we are not under law, but under grace? Certainly not!"}, {"c": 6, "n": 16, "text": "Don't you know that to whom you present yourselves as servants to obedience, his servants you are whom you obey; whether of sin to death, or of obedience to righteousness?"}, {"c": 6, "n": 17, "text": "But thanks be to God, that, whereas you were servants of sin, you became obedient from the heart to that form of teaching whereunto you were delivered."}, {"c": 6, "n": 18, "text": "Being made free from sin, you became servants of righteousness."}, {"c": 6, "n": 19, "text": "I speak in human terms because of the weakness of your flesh, for as you presented your members as servants to uncleanness and to wickedness upon wickedness, even so now present your members as servants to righteousness for sanctification."}, {"c": 6, "n": 20, "text": "For when you were servants of sin, you were free in regard to righteousness."}, {"c": 6, "n": 21, "text": "What fruit then did you have at that time in the things of which you are now ashamed? For the end of those things is death."}, {"c": 6, "n": 22, "text": "But now, being made free from sin, and having become servants of God, you have your fruit of sanctification, and the result of eternal life."}, {"c": 6, "n": 23, "text": "For the wages of sin is death, but the free gift of God is eternal life in Christ Jesus our Lord."}]}, "romans_7": {"id": "romans_7", "ref": "Romans 7", "verses": [{"c": 7, "n": 1, "text": "Or don't you know, brothers (for I speak to men who know the law), that the law has dominion over a man for as long as he lives?"}, {"c": 7, "n": 2, "text": "For the woman that has a husband is bound by law to the husband while he lives, but if the husband dies, she is discharged from the law of the husband."}, {"c": 7, "n": 3, "text": "So then if, while the husband lives, she is joined to another man, she would be called an adulteress. But if the husband dies, she is free from the law, so that she is no adulteress, though she is joined to another man."}, {"c": 7, "n": 4, "text": "Therefore, my brothers, you also were made dead to the law through the body of Christ, that you would be joined to another, to him who was raised from the dead, that we might bring forth fruit to God."}, {"c": 7, "n": 5, "text": "For when we were in the flesh, the sinful passions which were through the law, worked in our members to bring forth fruit to death."}, {"c": 7, "n": 6, "text": "But now we have been discharged from the law, having died to that in which we were held; so that we serve in newness of the spirit, and not in oldness of the letter."}, {"c": 7, "n": 7, "text": "What will we say then? Is the law sin? Certainly not! However, I wouldn't have known sin, except through the law. For I wouldn't have known coveting, unless the law had said, \"You shall not covet.\""}, {"c": 7, "n": 8, "text": "But sin, finding occasion through the commandment, produced in me all kinds of coveting. For apart from the law, sin is dead."}, {"c": 7, "n": 9, "text": "I was alive apart from the law once, but when the commandment came, sin revived, and I died."}, {"c": 7, "n": 10, "text": "The commandment, which was to life, this I found to be to death;"}, {"c": 7, "n": 11, "text": "for sin, finding occasion through the commandment, deceived me, and through it killed me."}, {"c": 7, "n": 12, "text": "So that the law is holy, and the commandment holy, and righteous, and good."}, {"c": 7, "n": 13, "text": "Did then that which is good become death to me? Certainly not! But sin, that it might be shown to be sin, by working death to me through that which is good; that through the commandment sin might become exceeding sinful."}, {"c": 7, "n": 14, "text": "For we know that the law is spiritual, but I am fleshly, sold under sin."}, {"c": 7, "n": 15, "text": "For I don't know what I am doing. For I don't practice what I desire to do; but what I hate, that I do."}, {"c": 7, "n": 16, "text": "But if what I don't desire, that I do, I consent to the law that it is good."}, {"c": 7, "n": 17, "text": "So now it is no more I that do it, but sin which dwells in me."}, {"c": 7, "n": 18, "text": "For I know that in me, that is, in my flesh, dwells no good thing. For desire is present with me, but I don't find it doing that which is good."}, {"c": 7, "n": 19, "text": "For the good which I desire, I don't do; but the evil which I don't desire, that I practice."}, {"c": 7, "n": 20, "text": "But if what I don't desire, that I do, it is no more I that do it, but sin which dwells in me."}, {"c": 7, "n": 21, "text": "I find then the law, that, to me, while I desire to do good, evil is present."}, {"c": 7, "n": 22, "text": "For I delight in God's law after the inward man,"}, {"c": 7, "n": 23, "text": "but I see a different law in my members, warring against the law of my mind, and bringing me into captivity under the law of sin which is in my members."}, {"c": 7, "n": 24, "text": "What a wretched man I am! Who will deliver me out of the body of this death?"}, {"c": 7, "n": 25, "text": "I thank God through Jesus Christ, our Lord. So then I of myself with the mind, indeed serve the law of God, but with the flesh the law of sin."}]}, "romans_8": {"id": "romans_8", "ref": "Romans 8", "verses": [{"c": 8, "n": 1, "text": "There is therefore now no condemnation to those who are in Christ Jesus, who don't walk according to the flesh, but according to the Spirit."}, {"c": 8, "n": 2, "text": "For the law of the Spirit of life in Christ Jesus made me free from the law of sin and of death."}, {"c": 8, "n": 3, "text": "For what the law couldn't do, in that it was weak through the flesh, God, sending his own Son in the likeness of sinful flesh and for sin, condemned sin in the flesh;"}, {"c": 8, "n": 4, "text": "that the ordinance of the law might be fulfilled in us, who walk not after the flesh, but after the Spirit."}, {"c": 8, "n": 5, "text": "For those who are after the flesh set their minds on the things of the flesh, but those who are after the Spirit the things of the Spirit."}, {"c": 8, "n": 6, "text": "For the mind of the flesh is death, but the mind of the Spirit is life and peace;"}, {"c": 8, "n": 7, "text": "because the mind of the flesh is hostile towards God; for it is not subject to God's law, neither indeed can it be."}, {"c": 8, "n": 8, "text": "Those who are in the flesh can't please God."}, {"c": 8, "n": 9, "text": "But you are not in the flesh but in the Spirit, if it is so that the Spirit of God dwells in you. But if any man doesn't have the Spirit of Christ, he is not his."}, {"c": 8, "n": 10, "text": "If Christ is in you, the body is dead because of sin, but the spirit is alive because of righteousness."}, {"c": 8, "n": 11, "text": "But if the Spirit of him who raised up Jesus from the dead dwells in you, he who raised up Christ Jesus from the dead will also give life to your mortal bodies through his Spirit who dwells in you."}, {"c": 8, "n": 12, "text": "So then, brothers, we are debtors, not to the flesh, to live after the flesh."}, {"c": 8, "n": 13, "text": "For if you live after the flesh, you must die; but if by the Spirit you put to death the deeds of the body, you will live."}, {"c": 8, "n": 14, "text": "For as many as are led by the Spirit of God, these are children of God."}, {"c": 8, "n": 15, "text": "For you didn't receive the spirit of bondage again to fear, but you received the spirit of adoption, whereby we cry, \"Abba! Father!\""}, {"c": 8, "n": 16, "text": "The Spirit himself testifies with our spirit that we are children of God;"}, {"c": 8, "n": 17, "text": "and if children, then heirs; heirs of God, and joint-heirs with Christ; if indeed we suffer with him, that we may also be glorified with him."}, {"c": 8, "n": 18, "text": "For I consider that the sufferings of this present time are not worthy to be compared with the glory which will be revealed toward us."}, {"c": 8, "n": 19, "text": "For the creation waits with eager expectation for the sons of God to be revealed."}, {"c": 8, "n": 20, "text": "For the creation was subjected to vanity, not of its own will, but by reason of him who subjected it, in hope"}, {"c": 8, "n": 21, "text": "that the creation itself also will be delivered from the bondage of decay into the liberty of the glory of the children of God."}, {"c": 8, "n": 22, "text": "For we know that the whole creation groans and travails in pain together until now."}, {"c": 8, "n": 23, "text": "Not only so, but ourselves also, who have the first fruits of the Spirit, even we ourselves groan within ourselves, waiting for adoption, the redemption of our body."}, {"c": 8, "n": 24, "text": "For we were saved in hope, but hope that is seen is not hope. For who hopes for that which he sees?"}, {"c": 8, "n": 25, "text": "But if we hope for that which we don't see, we wait for it with patience."}, {"c": 8, "n": 26, "text": "In the same way, the Spirit also helps our weaknesses, for we don't know how to pray as we ought. But the Spirit himself makes intercession for us with groanings which can't be uttered."}, {"c": 8, "n": 27, "text": "He who searches the hearts knows what is on the Spirit's mind, because he makes intercession for the saints according to God."}, {"c": 8, "n": 28, "text": "We know that all things work together for good for those who love God, to those who are called according to his purpose."}, {"c": 8, "n": 29, "text": "For whom he foreknew, he also predestined to be conformed to the image of his Son, that he might be the firstborn among many brothers."}, {"c": 8, "n": 30, "text": "Whom he foreordained, them he also called. Whom he called, them he also justified. Whom he justified, them he also glorified."}, {"c": 8, "n": 31, "text": "What then will we say about these things? If God is for us, who can be against us?"}, {"c": 8, "n": 32, "text": "He who didn't spare his own Son, but delivered him up for us all, how would he not also with him freely give us all things?"}, {"c": 8, "n": 33, "text": "Who could bring a charge against God's elect? It is God who justifies."}, {"c": 8, "n": 34, "text": "Who is he who condemns? It is Christ who died, yes rather, who was raised from the dead, who is at the right hand of God, who also makes intercession for us."}, {"c": 8, "n": 35, "text": "Who shall separate us from the love of Christ? Could oppression, or anguish, or persecution, or famine, or nakedness, or peril, or sword?"}, {"c": 8, "n": 36, "text": "Even as it is written, \"For your sake we are killed all day long. We were accounted as sheep for the slaughter.\""}, {"c": 8, "n": 37, "text": "No, in all these things, we are more than conquerors through him who loved us."}, {"c": 8, "n": 38, "text": "For I am persuaded, that neither death, nor life, nor angels, nor principalities, nor things present, nor things to come, nor powers,"}, {"c": 8, "n": 39, "text": "nor height, nor depth, nor any other creature, will be able to separate us from the love of God, which is in Christ Jesus our Lord."}]}, "romans_9": {"id": "romans_9", "ref": "Romans 9", "verses": [{"c": 9, "n": 1, "text": "I tell the truth in Christ. I am not lying, my conscience testifying with me in the Holy Spirit,"}, {"c": 9, "n": 2, "text": "that I have great sorrow and unceasing pain in my heart."}, {"c": 9, "n": 3, "text": "For I could wish that I myself were accursed from Christ for my brothers' sake, my relatives according to the flesh,"}, {"c": 9, "n": 4, "text": "who are Israelites; whose is the adoption, the glory, the covenants, the giving of the law, the service, and the promises;"}, {"c": 9, "n": 5, "text": "whose are the fathers, and of whom is Christ as concerning the flesh, who is over all, God, blessed forever. Amen."}, {"c": 9, "n": 6, "text": "But it is not as though the word of God has come to nothing. For they are not all Israel, that are of Israel."}, {"c": 9, "n": 7, "text": "Neither, because they are Abraham's seed, are they all children. But, \"In Isaac will your seed be called.\""}, {"c": 9, "n": 8, "text": "That is, it is not the children of the flesh who are children of God, but the children of the promise are counted as a seed."}, {"c": 9, "n": 9, "text": "For this is a word of promise, \"At the appointed time I will come, and Sarah will have a son.\""}, {"c": 9, "n": 10, "text": "Not only so, but Rebecca also conceived by one, by our father Isaac."}, {"c": 9, "n": 11, "text": "For being not yet born, neither having done anything good or bad, that the purpose of God according to election might stand, not of works, but of him who calls,"}, {"c": 9, "n": 12, "text": "it was said to her, \"The elder will serve the younger.\""}, {"c": 9, "n": 13, "text": "Even as it is written, \"Jacob I loved, but Esau I hated.\""}, {"c": 9, "n": 14, "text": "What will we say then? Is there unrighteousness with God? Certainly not!"}, {"c": 9, "n": 15, "text": "For he said to Moses, \"I will have mercy on whom I have mercy, and I will have compassion on whom I have compassion.\""}, {"c": 9, "n": 16, "text": "So then it is not of him who wills, nor of him who runs, but of God who has mercy."}, {"c": 9, "n": 17, "text": "For the scripture says to Pharaoh, \"For this very purpose I caused you to be raised up, that I might show in you my power, and that my name might be published abroad in all the earth.\""}, {"c": 9, "n": 18, "text": "So then, he has mercy on whom he desires, and he hardens whom he desires."}, {"c": 9, "n": 19, "text": "You will say then to me, \"Why does he still find fault? For who withstands his will?\""}, {"c": 9, "n": 20, "text": "But no, man, who are you who replies against God? Will the thing formed ask him who formed it, \"Why did you make me like this?\""}, {"c": 9, "n": 21, "text": "Or hasn't the potter a right over the clay, from the same lump to make one part a vessel for honor, and another for dishonor?"}, {"c": 9, "n": 22, "text": "What if God, willing to show his wrath, and to make his power known, endured with much patience vessels of wrath made for destruction,"}, {"c": 9, "n": 23, "text": "and that he might make known the riches of his glory on vessels of mercy, which he prepared beforehand for glory,"}, {"c": 9, "n": 24, "text": "us, whom he also called, not from the Jews only, but also from the Gentiles?"}, {"c": 9, "n": 25, "text": "As he says also in Hosea, \"I will call them 'my people,' which were not my people; And her 'beloved,' who was not beloved.\""}, {"c": 9, "n": 26, "text": "\"It will be that in the place where it was said to them, 'You are not my people,' There will they be called 'sons of the living God.'\""}, {"c": 9, "n": 27, "text": "Isaiah cries concerning Israel, \"If the number of the children of Israel are as the sand of the sea, It is the remnant who will be saved;"}, {"c": 9, "n": 28, "text": "For He will finish the work and cut it short in righteousness, Because the LORD will make a short work upon the earth.\""}, {"c": 9, "n": 29, "text": "As Isaiah has said before, \"Unless the Lord of Hosts had left us a seed, We would have become like Sodom, And would have been made like Gomorrah.\""}, {"c": 9, "n": 30, "text": "What will we say then? That the Gentiles, who didn't follow after righteousness, attained to righteousness, even the righteousness which is of faith;"}, {"c": 9, "n": 31, "text": "but Israel, following after a law of righteousness, didn't arrive at the law of righteousness."}, {"c": 9, "n": 32, "text": "Why? Because they didn't seek it by faith, but as it were by works of the law. They stumbled over the stumbling stone;"}, {"c": 9, "n": 33, "text": "even as it is written, \"Behold, I lay in Zion a stone of stumbling and a rock of offense. And no one who believes in him will be put to shame.\""}]}, "romans_10": {"id": "romans_10", "ref": "Romans 10", "verses": [{"c": 10, "n": 1, "text": "Brothers, my heart's desire and my prayer to God is for Israel, that they may be saved."}, {"c": 10, "n": 2, "text": "For I testify about them that they have a zeal for God, but not according to knowledge."}, {"c": 10, "n": 3, "text": "For being ignorant of God's righteousness, and seeking to establish their own righteousness, they didn't subject themselves to the righteousness of God."}, {"c": 10, "n": 4, "text": "For Christ is the end of the law for righteousness to everyone who believes."}, {"c": 10, "n": 5, "text": "For Moses writes about the righteousness of the law, \"The one who does them will live by them.\""}, {"c": 10, "n": 6, "text": "But the righteousness which is of faith says this, \"Don't say in your heart, 'Who will ascend into heaven?' (that is, to bring Christ down);"}, {"c": 10, "n": 7, "text": "or, 'Who will descend into the abyss?' (that is, to bring Christ up from the dead.)\""}, {"c": 10, "n": 8, "text": "But what does it say? \"The word is near you, in your mouth, and in your heart;\" that is, the word of faith, which we preach:"}, {"c": 10, "n": 9, "text": "that if you will confess with your mouth the Lord Jesus, and believe in your heart that God raised him from the dead, you will be saved."}, {"c": 10, "n": 10, "text": "For with the heart, one believes unto righteousness; and with the mouth confession is made unto salvation."}, {"c": 10, "n": 11, "text": "For the scripture says, \"Whoever believes in him will not be put to shame.\""}, {"c": 10, "n": 12, "text": "For there is no distinction between Jew and Greek; for the same Lord is Lord of all, and is rich to all who call on him."}, {"c": 10, "n": 13, "text": "For, \"Whoever will call on the name of the Lord will be saved.\""}, {"c": 10, "n": 14, "text": "How then will they call on him in whom they have not believed? How will they believe in him whom they have not heard? How will they hear without a preacher?"}, {"c": 10, "n": 15, "text": "And how will they preach unless they are sent? As it is written: \"How beautiful are the feet of those who preach the gospel of peace, Who bring glad tidings of good things!\""}, {"c": 10, "n": 16, "text": "But they didn't all listen to the glad news. For Isaiah says, \"Lord, who has believed our report?\""}, {"c": 10, "n": 17, "text": "So faith comes by hearing, and hearing by the word of God."}, {"c": 10, "n": 18, "text": "But I say, didn't they hear? Yes, most assuredly, \"Their sound went out into all the earth, Their words to the ends of the world.\""}, {"c": 10, "n": 19, "text": "But I ask, didn't Israel know? First Moses says, \"I will provoke you to jealousy with that which is no nation, With a nation void of understanding I will make you angry.\""}, {"c": 10, "n": 20, "text": "Isaiah is very bold, and says, \"I was found by those who didn't seek me. I was revealed to those who didn't ask for me.\""}, {"c": 10, "n": 21, "text": "But as to Israel he says, \"All day long I stretched out my hands to a disobedient and contrary people."}]}, "romans_11": {"id": "romans_11", "ref": "Romans 11", "verses": [{"c": 11, "n": 1, "text": "I ask then, Did God reject his people? Certainly not! For I also am an Israelite, a descendant of Abraham, of the tribe of Benjamin."}, {"c": 11, "n": 2, "text": "God didn't reject his people, which he foreknew. Or don't you know what the scripture says about Elijah? How he pleads with God against Israel:"}, {"c": 11, "n": 3, "text": "\"Lord, they have killed your prophets, they have broken down your altars; and I am left alone, and they seek my life.\""}, {"c": 11, "n": 4, "text": "But how does God answer him? \"I have reserved for myself seven thousand men, who have not bowed the knee to Baal.\""}, {"c": 11, "n": 5, "text": "Even so then at this present time also there is a remnant according to the election of grace."}, {"c": 11, "n": 6, "text": "And if by grace, then it is no longer of works; otherwise grace is no longer grace. But if it is of works, it is no longer grace; otherwise work is no longer work."}, {"c": 11, "n": 7, "text": "What then? That which Israel seeks for, that he didn't obtain, but the election obtained it, and the rest were hardened."}, {"c": 11, "n": 8, "text": "According as it is written, \"God gave them a spirit of stupor, eyes that they should not see, and ears that they should not hear, to this very day.\""}, {"c": 11, "n": 9, "text": "David says, \"Let their table be made a snare, and a trap, A stumbling block, and a retribution to them."}, {"c": 11, "n": 10, "text": "Let their eyes be darkened, that they may not see. Bow down their back always.\""}, {"c": 11, "n": 11, "text": "I ask then, did they stumble that they might fall? Certainly not! But by their fall salvation has come to the Gentiles, to provoke them to jealousy."}, {"c": 11, "n": 12, "text": "Now if their fall is the riches of the world, and their loss the riches of the Gentiles; how much more their fullness?"}, {"c": 11, "n": 13, "text": "For I speak to you who are Gentiles. Since then as I am an apostle to Gentiles, I glorify my ministry;"}, {"c": 11, "n": 14, "text": "if by any means I may provoke to jealousy those who are my flesh, and may save some of them."}, {"c": 11, "n": 15, "text": "For if the rejection of them [is] the reconciling of the world, what would the receiving of them be, but life from the dead?"}, {"c": 11, "n": 16, "text": "If the first fruit is holy, so is the lump. If the root is holy, so are the branches."}, {"c": 11, "n": 17, "text": "But if some of the branches were broken off, and you, being a wild olive, were grafted in among them, and became partaker with them of the root of the richness of the olive tree;"}, {"c": 11, "n": 18, "text": "don't boast over the branches. But if you boast, it is not you who bear the root, but the root you."}, {"c": 11, "n": 19, "text": "You will say then, \"Branches were broken off, that I might be grafted in.\""}, {"c": 11, "n": 20, "text": "True; by their unbelief they were broken off, and you stand by your faith. Don't be conceited, but fear;"}, {"c": 11, "n": 21, "text": "for if God didn't spare the natural branches, neither will he spare you."}, {"c": 11, "n": 22, "text": "See then the goodness and severity of God. Toward those who fell, severity; but toward you, goodness, if you continue in his goodness; otherwise you also will be cut off."}, {"c": 11, "n": 23, "text": "They also, if they don't continue in their unbelief, will be grafted in, for God is able to graft them in again."}, {"c": 11, "n": 24, "text": "For if you
