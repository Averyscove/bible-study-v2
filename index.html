l,"}, {"c": 24, "n": 21, "text": "unless it is for this one thing that I cried standing among them, 'Concerning the resurrection of the dead I am being judged before you today!'\""}, {"c": 24, "n": 22, "text": "But Felix, having more exact knowledge concerning the Way, deferred them, saying, \"When Lysias, the commanding officer, comes down, I will decide your case.\""}, {"c": 24, "n": 23, "text": "He ordered the centurion that Paul should be kept in custody, and should have some privileges, and not to forbid any of his friends to serve him or to visit him."}, {"c": 24, "n": 24, "text": "But after some days, Felix came with Drusilla, his wife, who was a Jewess, and sent for Paul, and heard him concerning the faith in Christ Jesus."}, {"c": 24, "n": 25, "text": "As he reasoned about righteousness, self-control, and the judgment to come, Felix was terrified, and answered, \"Go your way for this time, and when it is convenient for me, I will call you to me.\""}, {"c": 24, "n": 26, "text": "He hoped that way that money would be given to him by Paul, that he might release him. Therefore also he sent for him more often, and talked with him."}, {"c": 24, "n": 27, "text": "But when two years were fulfilled, Felix was succeeded by Porcius Festus, and desiring to gain favor with the Jews, Felix left Paul in bonds."}]}, "acts_25": {"id": "acts_25", "ref": "Acts 25", "verses": [{"c": 25, "n": 1, "text": "Festus therefore, having come into the province, after three days went up to Jerusalem from Caesarea."}, {"c": 25, "n": 2, "text": "Then the high priest and the principal men of the Jews informed him against Paul, and they begged him,"}, {"c": 25, "n": 3, "text": "asking a favor against him, that he would send for him to Jerusalem; plotting to kill him on the way."}, {"c": 25, "n": 4, "text": "However Festus answered that Paul was kept in custody at Caesarea, and that he himself was about to depart shortly."}, {"c": 25, "n": 5, "text": "\"Let them therefore,\" said he, \"that are in power among you go down with me, and if there is anything wrong in the man, let them accuse him.\""}, {"c": 25, "n": 6, "text": "When he had stayed among them more than ten days, he went down to Caesarea, and on the next day he sat on the judgment seat, and commanded Paul to be brought."}, {"c": 25, "n": 7, "text": "When he had come, the Jews who had come down from Jerusalem stood around him, bringing against him many and grievous charges which they could not prove,"}, {"c": 25, "n": 8, "text": "while he said in his defense, \"Neither against the law of the Jews, nor against the temple, nor against Caesar, have I sinned at all.\""}, {"c": 25, "n": 9, "text": "But Festus, desiring to gain favor with the Jews, answered Paul and said, \"Will you go up to Jerusalem, and there be judged of these things before me?\""}, {"c": 25, "n": 10, "text": "But Paul said, \"I am standing before Caesar's judgment seat, where I ought to be tried. I have done no wrong to the Jews, as you also know very well."}, {"c": 25, "n": 11, "text": "For if I have done wrong, and have committed anything worthy of death, I don't refuse to die; but if none of those things is true that these accuse me of, no one can give me up to them. I appeal to Caesar!\""}, {"c": 25, "n": 12, "text": "Then Festus, when he had conferred with the council, answered, \"You have appealed to Caesar. To Caesar you will go.\""}, {"c": 25, "n": 13, "text": "Now when some days had passed, Agrippa, the King, and Bernice arrived at Caesarea, and greeted Festus."}, {"c": 25, "n": 14, "text": "As they stayed there many days, Festus laid Paul's case before the King, saying, \"There is a certain man left a prisoner by Felix;"}, {"c": 25, "n": 15, "text": "about whom, when I was at Jerusalem, the chief priests and the elders of the Jews informed me, asking for a sentence against him."}, {"c": 25, "n": 16, "text": "To whom I answered that it is not the custom of the Romans to give up any man to destruction, before the accused have met the accusers face to face, and have had opportunity to make his defense concerning the matter laid against him."}, {"c": 25, "n": 17, "text": "When therefore they were come together here, I didn't delay, but on the next day sat on the judgment seat, and commanded the man to be brought."}, {"c": 25, "n": 18, "text": "Concerning whom, when the accusers stood up, they brought no charge of such things as I supposed;"}, {"c": 25, "n": 19, "text": "but had certain questions against him of their own religion, and of one Jesus, who was dead, whom Paul affirmed to be alive."}, {"c": 25, "n": 20, "text": "I, being perplexed how to inquire concerning these things, asked whether he would go to Jerusalem and there be judged of these matters."}, {"c": 25, "n": 21, "text": "But when Paul had appealed to be kept for the decision of the emperor, I commanded him to be kept until I should send him to Caesar.\""}, {"c": 25, "n": 22, "text": "Agrippa said to Festus, \"I also would like to hear the man myself.\" \"Tomorrow,\" he said, \"you will hear him.\""}, {"c": 25, "n": 23, "text": "So on the next day, when Agrippa and Bernice had come with great pomp, and they had entered into the place of hearing with the commanding officers and principal men of the city, at the command of Festus, Paul was brought in."}, {"c": 25, "n": 24, "text": "Festus said, \"King Agrippa, and all men who are here present with us, you see this man, about whom all the multitude of the Jews petitioned me, both at Jerusalem and here, crying that he ought not to live any longer."}, {"c": 25, "n": 25, "text": "But when I found that he had committed nothing worthy of death, and as he himself appealed to the emperor I determined to send him."}, {"c": 25, "n": 26, "text": "Of whom I have no certain thing to write to my lord. Therefore I have brought him forth before you, and especially before you, king Agrippa, that, after examination, I may have something to write."}, {"c": 25, "n": 27, "text": "For it seems to me unreasonable, in sending a prisoner, not to also specify the charges against him.\""}]}, "acts_26": {"id": "acts_26", "ref": "Acts 26", "verses": [{"c": 26, "n": 1, "text": "Agrippa said to Paul, \"You may speak for yourself.\" Then Paul stretched out his hand, and made his defense."}, {"c": 26, "n": 2, "text": "\"I think myself happy, King Agrippa, that I am to make my defense before you this day concerning all the things whereof I am accused by the Jews,"}, {"c": 26, "n": 3, "text": "especially because you are expert in all customs and questions which are among the Jews. Therefore I beg you to hear me patiently."}, {"c": 26, "n": 4, "text": "\"Indeed, all the Jews know my way of life from my youth up, which was from the beginning among my own nation and at Jerusalem;"}, {"c": 26, "n": 5, "text": "having known me from the first, if they are willing to testify, that after the strictest sect of our religion I lived a Pharisee."}, {"c": 26, "n": 6, "text": "Now I stand here to be judged for the hope of the promise made by God to our fathers,"}, {"c": 26, "n": 7, "text": "which our twelve tribes, earnestly serving night and day, hope to attain. Concerning this hope I am accused by the Jews, King Agrippa!"}, {"c": 26, "n": 8, "text": "Why is it judged incredible with you, if God does raise the dead?"}, {"c": 26, "n": 9, "text": "\"I most assuredly thought with myself that I ought to do many things contrary to the name of Jesus of Nazareth."}, {"c": 26, "n": 10, "text": "This I also did in Jerusalem. I both shut up many of the saints in prisons, having received authority from the chief priests, and when they were put to death I gave my vote against them."}, {"c": 26, "n": 11, "text": "Punishing them often in all the synagogues, I tried to make them blaspheme. Being exceedingly enraged against them, I persecuted them even to foreign cities."}, {"c": 26, "n": 12, "text": "\"Whereupon as I journeyed to Damascus with the authority and commission from the chief priests,"}, {"c": 26, "n": 13, "text": "at noon, O King, I saw on the way a light from the sky, brighter than the sun, shining around me and those who traveled with me."}, {"c": 26, "n": 14, "text": "When we had all fallen to the earth, I heard a voice saying to me in the Hebrew language, 'Saul, Saul, why do you persecute me? It is hard for you to kick against the goad.'"}, {"c": 26, "n": 15, "text": "I said, 'Who are you, Lord?' He said, 'I am Jesus, whom you persecute."}, {"c": 26, "n": 16, "text": "But arise, and stand on your feet, for to this end have I appeared to you, to appoint you a servant and a witness both of the things which you have seen, and of the things which I will reveal to you;"}, {"c": 26, "n": 17, "text": "delivering you from the people, and from the Gentiles, to whom I send you,"}, {"c": 26, "n": 18, "text": "to open their eyes, that they may turn from darkness to light and from the power of Satan to God, that they may receive remission of sins and an inheritance among those who are sanctified by faith in me.'"}, {"c": 26, "n": 19, "text": "\"Therefore, King Agrippa, I was not disobedient to the heavenly vision,"}, {"c": 26, "n": 20, "text": "but declared first to them of Damascus, at Jerusalem, and throughout all the country of Judea, and also to the Gentiles, that they should repent and turn to God, doing works worthy of repentance."}, {"c": 26, "n": 21, "text": "For this reason the Jews seized me in the temple, and tried to kill me."}, {"c": 26, "n": 22, "text": "Having therefore obtained the help that is from God, I stand to this day testifying both to small and great, saying nothing but what the prophets and Moses did say should come,"}, {"c": 26, "n": 23, "text": "how the Christ must suffer, and how he first by the resurrection of the dead should proclaim light both to these people and to the Gentiles.\""}, {"c": 26, "n": 24, "text": "As he thus made his defense, Festus said with a loud voice, \"Paul, you are crazy! Your great learning is driving you insane!\""}, {"c": 26, "n": 25, "text": "But he said, \"I am not crazy, most excellent Festus, but speak forth words of truth and soberness."}, {"c": 26, "n": 26, "text": "For the king knows of these things, to whom also I speak freely. For I am persuaded that none of these things is hidden from him, for this has not been done in a corner."}, {"c": 26, "n": 27, "text": "King Agrippa, do you believe the prophets? I know that you believe.\""}, {"c": 26, "n": 28, "text": "Agrippa said to Paul, \"With a little persuasion are you trying to make me a Christian?\""}, {"c": 26, "n": 29, "text": "Paul said, \"I pray to God, that whether with little or with much, not only you, but also all that hear me this day, might become such as I am, except for these bonds.\""}, {"c": 26, "n": 30, "text": "The king rose up, and the governor, and Bernice, and those who sat with them."}, {"c": 26, "n": 31, "text": "When they had withdrawn, they spoke one to another, saying, \"This man does nothing worthy of death or of bonds.\""}, {"c": 26, "n": 32, "text": "Agrippa said to Festus, \"This man might have been set free if he had not appealed to Caesar.\""}]}, "acts_27": {"id": "acts_27", "ref": "Acts 27", "verses": [{"c": 27, "n": 1, "text": "When it was determined that we should sail for Italy, they delivered Paul and certain other prisoners to a centurion named Julius, of the Augustan band."}, {"c": 27, "n": 2, "text": "Embarking in a ship of Adramyttium, which was about to sail to places on the coast of Asia, we put to sea, Aristarchus, a Macedonian of Thessalonica, being with us."}, {"c": 27, "n": 3, "text": "The next day, we touched at Sidon. Julius treated Paul kindly, and gave him permission to go to his friends and refresh himself."}, {"c": 27, "n": 4, "text": "Putting to sea from there, we sailed under the lee of Cyprus, because the winds were contrary."}, {"c": 27, "n": 5, "text": "When we had sailed across the sea which is off Cilicia and Pamphylia, we came to Myra, a city of Lycia."}, {"c": 27, "n": 6, "text": "There the centurion found a ship of Alexandria sailing for Italy, and he put us on board."}, {"c": 27, "n": 7, "text": "When we had sailed slowly many days, and had come with difficulty opposite Cnidus, the wind not allowing us further, we sailed under the lee of Crete, opposite Salmone."}, {"c": 27, "n": 8, "text": "With difficulty sailing along it we came to a certain place called Fair Havens, near the city of Lasea."}, {"c": 27, "n": 9, "text": "When much time was spent, and the voyage was now dangerous, because the Fast had now already gone by, Paul admonished them,"}, {"c": 27, "n": 10, "text": "and said to them, \"Sirs, I perceive that the voyage will be with injury and much loss, not only of the cargo and the ship, but also of our lives.\""}, {"c": 27, "n": 11, "text": "But the centurion gave more heed to the master and to the owner of the ship than to those things which were spoken by Paul."}, {"c": 27, "n": 12, "text": "Because the haven was not suitable to winter in, the majority advised to put to sea from there, if by any means they could reach Phoenix, and winter there, which is a port of Crete, looking northeast and southeast."}, {"c": 27, "n": 13, "text": "When the south wind blew softly, supposing that they had obtained their purpose, they weighed anchor and sailed along Crete, close to shore."}, {"c": 27, "n": 14, "text": "But after no long time there beat down from it a tempestuous wind, which is called Euroclydon."}, {"c": 27, "n": 15, "text": "When the ship was caught, and couldn't face the wind, we gave way to it, and were driven along."}, {"c": 27, "n": 16, "text": "Running under the lee of a small island called Clauda, we were able, with difficulty, to secure the boat."}, {"c": 27, "n": 17, "text": "When they had hoisted it up, they used cables to help reinforce the ship. Fearing that they would run aground on the Syrtis sand bars, they lowered the sea anchor, and so were driven."}, {"c": 27, "n": 18, "text": "As we labored exceedingly with the storm, the next day they began to throw things overboard."}, {"c": 27, "n": 19, "text": "On the third day, they threw out the ship's tackle with their own hands."}, {"c": 27, "n": 20, "text": "When neither sun nor stars shone on us for many days, and no small tempest pressed on us, all hope that we should be saved was now taken away."}, {"c": 27, "n": 21, "text": "When they had been long without food, Paul stood up in the midst of them, and said, \"Sirs, you should have listened to me, and not have set sail from Crete, and have gotten this injury and loss."}, {"c": 27, "n": 22, "text": "Now I exhort you to cheer up, for there will be no loss of life among you, but only of the ship."}, {"c": 27, "n": 23, "text": "For there stood by me this night an angel, belonging to the God whose I am and whom I serve,"}, {"c": 27, "n": 24, "text": "saying, 'Don't be afraid, Paul. You must stand before Caesar. Behold, God has granted you all those who sail with you.'"}, {"c": 27, "n": 25, "text": "Therefore, sirs, cheer up! For I believe God, that it will be just as it has been spoken to me."}, {"c": 27, "n": 26, "text": "But we must run aground on a certain island.\""}, {"c": 27, "n": 27, "text": "But when the fourteenth night was come, as we were driven back and forth in the Adriatic Sea, about midnight the sailors surmised that they were drawing near to some land."}, {"c": 27, "n": 28, "text": "They took soundings, and found twenty fathoms. After a little while, they took soundings again, and found fifteen fathoms."}, {"c": 27, "n": 29, "text": "Fearing that we would run aground on rocky ground, they let go four anchors from the stern, and wished for daylight."}, {"c": 27, "n": 30, "text": "As the sailors were trying to flee out of the ship, and had lowered the boat into the sea, pretending that they would lay out anchors from the bow,"}, {"c": 27, "n": 31, "text": "Paul said to the centurion and to the soldiers, \"Unless these stay in the ship, you can't be saved.\""}, {"c": 27, "n": 32, "text": "Then the soldiers cut away the ropes of the boat, and let her fall off."}, {"c": 27, "n": 33, "text": "While the day was coming on, Paul begged them all to take some food, saying, \"This day is the fourteenth day that you wait and continue fasting, having taken nothing."}, {"c": 27, "n": 34, "text": "Therefore I beg you to take some food, for this is for your safety; for there will not a hair perish from the head of any of you.\""}, {"c": 27, "n": 35, "text": "When he had said this, and had taken bread, he gave thanks to God in the presence of all, and he broke it, and began to eat."}, {"c": 27, "n": 36, "text": "Then were they all of good cheer, and they also took food."}, {"c": 27, "n": 37, "text": "We were in all in the ship two hundred seventy-six souls."}, {"c": 27, "n": 38, "text": "When they had eaten enough, they lightened the ship, throwing out the wheat into the sea."}, {"c": 27, "n": 39, "text": "When it was day, they didn't recognize the land, but they noticed a certain bay with a beach, and they decided to try to drive the ship onto it."}, {"c": 27, "n": 40, "text": "Casting off the anchors, they left them in the sea, at the same time untying the rudder ropes. Hoisting up the foresail to the wind, they made for the beach."}, {"c": 27, "n": 41, "text": "But coming to a place where two seas met, they ran the vessel aground. The bow struck and remained immovable, but the stern began to break up by the violence of the waves."}, {"c": 27, "n": 42, "text": "The soldiers' counsel was to kill the prisoners, so that none of them would swim out and escape."}, {"c": 27, "n": 43, "text": "But the centurion, desiring to save Paul, stopped them from their purpose, and commanded that those who could swim should throw themselves overboard first to go to the land;"}, {"c": 27, "n": 44, "text": "and the rest, some on planks, and some on other things from the ship. So it happened that they all escaped safely to the land."}]}, "acts_28": {"id": "acts_28", "ref": "Acts 28", "verses": [{"c": 28, "n": 1, "text": "When we had escaped, then we knew that the island was called Malta."}, {"c": 28, "n": 2, "text": "The natives showed us no common kindness; for they kindled a fire, and received us all, because of the present rain, and because of the cold."}, {"c": 28, "n": 3, "text": "But when Paul had gathered a bundle of sticks and laid them on the fire, a viper came out because of the heat, and fastened on his hand."}, {"c": 28, "n": 4, "text": "When the natives saw the creature hanging from his hand, they said one to another, \"No doubt this man is a murderer, whom, though he has escaped from the sea, yet Justice has not allowed to live.\""}, {"c": 28, "n": 5, "text": "However he shook off the creature into the fire, and wasn't harmed."}, {"c": 28, "n": 6, "text": "But they expected that he would have swollen, or fallen down dead suddenly, but when they were long in expectation and saw nothing bad happen to him, they changed their minds, and said that he was a god."}, {"c": 28, "n": 7, "text": "Now in the neighborhood of that place were lands belonging to the chief man of the island, named Publius, who received us, and courteously entertained us three days."}, {"c": 28, "n": 8, "text": "It was so, that the father of Publius lay sick of fever and dysentery. Paul entered in to him, prayed, and laying his hands on him, healed him."}, {"c": 28, "n": 9, "text": "Then when this was done, the rest also that had diseases in the island came, and were cured."}, {"c": 28, "n": 10, "text": "They also honored us with many honors, and when we sailed, they put on board the things that we needed."}, {"c": 28, "n": 11, "text": "After three months, we set sail in a ship of Alexandria which had wintered in the island, whose sign was \"The Twin Brothers.\""}, {"c": 28, "n": 12, "text": "Touching at Syracuse, we stayed there three days."}, {"c": 28, "n": 13, "text": "From there we circled around and arrived at Rhegium. After one day, a south wind sprang up, and on the second day we came to Puteoli,"}, {"c": 28, "n": 14, "text": "where we found brothers, and were entreated to stay with them seven days. So we came to Rome."}, {"c": 28, "n": 15, "text": "From there the brothers, when they heard of us, came to meet us as far as The Market of Appius and The Three Taverns; whom when Paul saw, he thanked God, and took courage."}, {"c": 28, "n": 16, "text": "When we entered into Rome, the centurion delivered the prisoners to the captain of the guard, but Paul was allowed to stay by himself with the soldier who guarded him."}, {"c": 28, "n": 17, "text": "It happened, that after three days Paul called together those who were the leaders of the Jews. When they had come together, he said to them, \"I, brothers, though I had done nothing against the people, or the customs of our fathers, still was delivered prisoner from Jerusalem into the hands of the Romans,"}, {"c": 28, "n": 18, "text": "who, when they had examined me, desired to set me free, because there was no cause of death in me."}, {"c": 28, "n": 19, "text": "But when the Jews spoke against it, I was constrained to appeal to Caesar, not that I had anything about which to accuse my nation."}, {"c": 28, "n": 20, "text": "For this cause therefore did I ask you to see and to speak with me. For because of the hope of Israel I am bound with this chain.\""}, {"c": 28, "n": 21, "text": "They said to him, \"We neither received letters from Judea concerning you, nor did any of the brothers come here and report or speak any evil of you."}, {"c": 28, "n": 22, "text": "But we desire to hear of you what you think. For, as concerning this sect, it is known to us that everywhere it is spoken against.\""}, {"c": 28, "n": 23, "text": "When they had appointed him a day, they came to him into his lodging in great number. He explained to them, testifying about the kingdom of God, and persuading them concerning Jesus, both from the law of Moses and from the prophets, from morning until evening."}, {"c": 28, "n": 24, "text": "Some believed the things which were spoken, and some disbelieved."}, {"c": 28, "n": 25, "text": "When they didn't agree among themselves, they departed after Paul had spoken one word, \"The Holy Spirit spoke well through Isaiah, the prophet, to our fathers,"}, {"c": 28, "n": 26, "text": "saying, 'Go to this people, and say, In hearing, you will hear, and will in no way understand. In seeing, you will see, and will in no way perceive."}, {"c": 28, "n": 27, "text": "For this people's heart has grown callous. Their ears are dull of hearing. Their eyes they have closed. Lest they should see with their eyes, Hear with their ears, Understand with their heart, Would turn again, And I would heal them.'"}, {"c": 28, "n": 28, "text": "\"Be it known therefore to you, that the salvation of God is sent to the Gentiles. They will also hear.\""}, {"c": 28, "n": 29, "text": "When he had said these words, the Jews departed, having a great dispute among themselves."}, {"c": 28, "n": 30, "text": "Paul stayed two whole years in his own rented house, and received all who went in to him,"}, {"c": 28, "n": 31, "text": "preaching the kingdom of God, and teaching the things concerning the Lord Jesus Christ with all boldness, without hinderance."}]}, "gen_1_3": {"id": "gen_1_3", "ref": "Genesis 1–3", "verses": [{"c": 1, "n": 1, "text": "In the beginning God created the heavens and the earth."}, {"c": 1, "n": 2, "text": "Now the earth was formless and empty. Darkness was on the surface of the deep. God's Spirit was hovering over the surface of the waters."}, {"c": 1, "n": 3, "text": "God said, \"Let there be light,\" and there was light."}, {"c": 1, "n": 4, "text": "God saw the light, and saw that it was good. God divided the light from the darkness."}, {"c": 1, "n": 5, "text": "God called the light Day, and the darkness he called Night. There was evening and there was morning, one day."}, {"c": 1, "n": 6, "text": "God said, \"Let there be an expanse in the midst of the waters, and let it divide the waters from the waters.\""}, {"c": 1, "n": 7, "text": "God made the expanse, and divided the waters which were under the expanse from the waters which were above the expanse, and it was so."}, {"c": 1, "n": 8, "text": "God called the expanse sky. There was evening and there was morning, a second day."}, {"c": 1, "n": 9, "text": "God said, \"Let the waters under the sky be gathered together to one place, and let the dry land appear,\" and it was so."}, {"c": 1, "n": 10, "text": "God called the dry land Earth, and the gathering together of the waters he called Seas. God saw that it was good."}, {"c": 1, "n": 11, "text": "God said, \"Let the earth put forth grass, herbs yielding seed, and fruit trees bearing fruit after their kind, with its seed in it, on the earth,\" and it was so."}, {"c": 1, "n": 12, "text": "The earth brought forth grass, herbs yielding seed after their kind, and trees bearing fruit, with its seed in it, after their kind: and God saw that it was good."}, {"c": 1, "n": 13, "text": "There was evening and there was morning, a third day."}, {"c": 1, "n": 14, "text": "God said, \"Let there be lights in the expanse of sky to divide the day from the night; and let them be for signs, and for seasons, and for days and years;"}, {"c": 1, "n": 15, "text": "and let them be for lights in the expanse of sky to give light on the earth,\" and it was so."}, {"c": 1, "n": 16, "text": "God made the two great lights: the greater light to rule the day, and the lesser light to rule the night. He also made the stars."}, {"c": 1, "n": 17, "text": "God set them in the expanse of sky to give light to the earth,"}, {"c": 1, "n": 18, "text": "and to rule over the day and over the night, and to divide the light from the darkness. God saw that it was good."}, {"c": 1, "n": 19, "text": "There was evening and there was morning, a fourth day."}, {"c": 1, "n": 20, "text": "God said, \"Let the waters swarm with swarms of living creatures, and let birds fly above the earth in the open expanse of sky.\""}, {"c": 1, "n": 21, "text": "God created the large sea creatures, and every living creature that moves, with which the waters swarmed, after their kind, and every winged bird after its kind. God saw that it was good."}, {"c": 1, "n": 22, "text": "God blessed them, saying, \"Be fruitful, and multiply, and fill the waters in the seas, and let birds multiply on the earth.\""}, {"c": 1, "n": 23, "text": "There was evening and there was morning, a fifth day."}, {"c": 1, "n": 24, "text": "God said, \"Let the earth bring forth living creatures after their kind, cattle, creeping things, and animals of the earth after their kind,\" and it was so."}, {"c": 1, "n": 25, "text": "God made the animals of the earth after their kind, and the cattle after their kind, and everything that creeps on the ground after its kind. God saw that it was good."}, {"c": 1, "n": 26, "text": "God said, \"Let us make man in our image, after our likeness: and let them have dominion over the fish of the sea, and over the birds of the sky, and over the cattle, and over all the earth, and over every creeping thing that creeps on the earth.\""}, {"c": 1, "n": 27, "text": "God created man in his own image. In God's image he created him; male and female he created them."}, {"c": 1, "n": 28, "text": "God blessed them. God said to them, \"Be fruitful, and multiply, and replenish the earth, and subdue it. Have dominion over the fish of the sea, and over the birds of the sky, and over every living thing that moves on the earth.\""}, {"c": 1, "n": 29, "text": "God said, \"Behold, I have given you every herb yielding seed, which is on the surface of all the earth, and every tree, which bears fruit yielding seed. It will be your food."}, {"c": 1, "n": 30, "text": "To every animal of the earth, and to every bird of the sky, and to everything that creeps on the earth, in which there is life, I have given every green herb for food.\" And it was so."}, {"c": 1, "n": 31, "text": "God saw everything that he had made, and, behold, it was very good. There was evening and there was morning, the sixth day."}, {"c": 2, "n": 1, "text": "The heavens and the earth were finished, and all the host of them."}, {"c": 2, "n": 2, "text": "On the seventh day God finished his work which he had made; and he rested on the seventh day from all his work which he had made."}, {"c": 2, "n": 3, "text": "God blessed the seventh day, and made it holy, because he rested in it from all his work which he had created and made."}, {"c": 2, "n": 4, "text": "This is the history of the generations of the heavens and of the earth when they were created, in the day that Yahweh God made earth and the heavens."}, {"c": 2, "n": 5, "text": "No plant of the field was yet in the earth, and no herb of the field had yet sprung up; for Yahweh God had not caused it to rain on the earth. There was not a man to till the ground,"}, {"c": 2, "n": 6, "text": "but a mist went up from the earth, and watered the whole surface of the ground."}, {"c": 2, "n": 7, "text": "Yahweh God formed man from the dust of the ground, and breathed into his nostrils the breath of life; and man became a living soul."}, {"c": 2, "n": 8, "text": "Yahweh God planted a garden eastward, in Eden, and there he put the man whom he had formed."}, {"c": 2, "n": 9, "text": "Out of the ground Yahweh God made every tree to grow that is pleasant to the sight, and good for food; the tree of life also in the midst of the garden, and the tree of the knowledge of good and evil."}, {"c": 2, "n": 10, "text": "A river went out of Eden to water the garden; and from there it was parted, and became four heads."}, {"c": 2, "n": 11, "text": "The name of the first is Pishon: this is the one which flows through the whole land of Havilah, where there is gold;"}, {"c": 2, "n": 12, "text": "and the gold of that land is good. There is aromatic resin and the onyx stone."}, {"c": 2, "n": 13, "text": "The name of the second river is Gihon: the same river that flows through the whole land of Cush."}, {"c": 2, "n": 14, "text": "The name of the third river is Hiddekel: this is the one which flows in front of Assyria. The fourth river is the Euphrates."}, {"c": 2, "n": 15, "text": "Yahweh God took the man, and put him into the garden of Eden to dress it and to keep it."}, {"c": 2, "n": 16, "text": "Yahweh God commanded the man, saying, \"Of every tree of the garden you may freely eat:"}, {"c": 2, "n": 17, "text": "but of the tree of the knowledge of good and evil, you shall not eat of it: for in the day that you eat of it you will surely die.\""}, {"c": 2, "n": 18, "text": "Yahweh God said, \"It is not good that the man should be alone; I will make him a helper suitable for him.\""}, {"c": 2, "n": 19, "text": "Out of the ground Yahweh God formed every animal of the field, and every bird of the sky, and brought them to the man to see what he would call them. Whatever the man called every living creature, that was its name."}, {"c": 2, "n": 20, "text": "The man gave names to all cattle, and to the birds of the sky, and to every animal of the field; but for man there was not found a helper suitable for him."}, {"c": 2, "n": 21, "text": "Yahweh God caused a deep sleep to fall on the man, and he slept; and he took one of his ribs, and closed up the flesh in its place."}, {"c": 2, "n": 22, "text": "He made the rib, which Yahweh God had taken from the man, into a woman, and brought her to the man."}, {"c": 2, "n": 23, "text": "The man said, \"This is now bone of my bones, and flesh of my flesh. She will be called Woman, because she was taken out of Man.\""}, {"c": 2, "n": 24, "text": "Therefore a man will leave his father and his mother, and will join with his wife, and they will be one flesh."}, {"c": 2, "n": 25, "text": "They were both naked, the man and his wife, and were not ashamed."}, {"c": 3, "n": 1, "text": "Now the serpent was more subtle than any animal of the field which Yahweh God had made. He said to the woman, \"Yes, has God said, 'You shall not eat of any tree of the garden?'\""}, {"c": 3, "n": 2, "text": "The woman said to the serpent, \"Of the fruit of the trees of the garden we may eat,"}, {"c": 3, "n": 3, "text": "but of the fruit of the tree which is in the midst of the garden, God has said, 'You shall not eat of it, neither shall you touch it, lest you die.'\""}, {"c": 3, "n": 4, "text": "The serpent said to the woman, \"You won't surely die,"}, {"c": 3, "n": 5, "text": "for God knows that in the day you eat it, your eyes will be opened, and you will be as God, knowing good and evil.\""}, {"c": 3, "n": 6, "text": "When the woman saw that the tree was good for food, and that it was a delight to the eyes, and that the tree was to be desired to make one wise, she took of the fruit of it, and ate; and she gave some to her husband with her, and he ate."}, {"c": 3, "n": 7, "text": "Both of their eyes were opened, and they knew that they were naked. They sewed fig leaves together, and made themselves aprons."}, {"c": 3, "n": 8, "text": "They heard the voice of Yahweh God walking in the garden in the cool of the day, and the man and his wife hid themselves from the presence of Yahweh God among the trees of the garden."}, {"c": 3, "n": 9, "text": "Yahweh God called to the man, and said to him, \"Where are you?\""}, {"c": 3, "n": 10, "text": "The man said, \"I heard your voice in the garden, and I was afraid, because I was naked; and I hid myself.\""}, {"c": 3, "n": 11, "text": "God said, \"Who told you that you were naked? Have you eaten from the tree that I commanded you not to eat from?\""}, {"c": 3, "n": 12, "text": "The man said, \"The woman whom you gave to be with me, she gave me of the tree, and I ate.\""}, {"c": 3, "n": 13, "text": "Yahweh God said to the woman, \"What is this you have done?\" The woman said, \"The serpent deceived me, and I ate.\""}, {"c": 3, "n": 14, "text": "Yahweh God said to the serpent, \"Because you have done this, cursed are you above all cattle, and above every animal of the field. On your belly shall you go, and you shall eat dust all the days of your life."}, {"c": 3, "n": 15, "text": "I will put enmity between you and the woman, and between your offspring and her offspring. He will bruise your head, and you will bruise his heel.\""}, {"c": 3, "n": 16, "text": "To the woman he said, \"I will greatly multiply your pain in childbirth. In pain you will bring forth children. Your desire will be for your husband, and he will rule over you.\""}, {"c": 3, "n": 17, "text": "To Adam he said, \"Because you have listened to your wife's voice, and have eaten of the tree, of which I commanded you, saying, 'You shall not eat of it,' cursed is the ground for your sake. In toil you will eat of it all the days of your life."}, {"c": 3, "n": 18, "text": "Thorns also and thistles will it bring forth to you; and you will eat the herb of the field."}, {"c": 3, "n": 19, "text": "By the sweat of your face will you eat bread until you return to the ground, for out of it you were taken. For you are dust, and to dust you shall return.\""}, {"c": 3, "n": 20, "text": "The man called his wife Eve, because she was the mother of all living."}, {"c": 3, "n": 21, "text": "Yahweh God made coats of skins for Adam and for his wife, and clothed them."}, {"c": 3, "n": 22, "text": "Yahweh God said, \"Behold, the man has become like one of us, knowing good and evil. Now, lest he put forth his hand, and also take of the tree of life, and eat, and live forever...\""}, {"c": 3, "n": 23, "text": "Therefore Yahweh God sent him forth from the garden of Eden, to till the ground from whence he was taken."}, {"c": 3, "n": 24, "text": "So he drove out the man; and he placed Cherubs at the east of the garden of Eden, and the flame of a sword which turned every way, to guard the way to the tree of life."}]}, "gen_12": {"id": "gen_12", "ref": "Genesis 12", "verses": [{"c": 12, "n": 1, "text": "Now Yahweh said to Abram, \"Get out of your country, and from your relatives, and from your father's house, to the land that I will show you."}, {"c": 12, "n": 2, "text": "I will make of you a great nation. I will bless you, and make your name great. You will be a blessing."}, {"c": 12, "n": 3, "text": "I will bless those who bless you, and I will curse him who curses you. In you will all of the families of the earth be blessed.\""}, {"c": 12, "n": 4, "text": "So Abram went, as Yahweh had spoken to him. Lot went with him. Abram was seventy-five years old when he departed out of Haran."}, {"c": 12, "n": 5, "text": "Abram took Sarai his wife, Lot his brother's son, all their substance that they had gathered, and the souls who they had gotten in Haran; and they went forth to go into the land of Canaan. Into the land of Canaan they came."}, {"c": 12, "n": 6, "text": "Abram passed through the land to the place of Shechem, to the oak of Moreh. The Canaanite was then in the land."}, {"c": 12, "n": 7, "text": "Yahweh appeared to Abram, and said, \"To your descendants I will give this land.\" He built an altar there to Yahweh, who appeared to him."}, {"c": 12, "n": 8, "text": "He left from there to the mountain on the east of Bethel, and pitched his tent, having Bethel on the west, and Ai on the east. There he built an altar to Yahweh, and called on the name of Yahweh."}, {"c": 12, "n": 9, "text": "Abram journeyed, going on still toward the South."}, {"c": 12, "n": 10, "text": "There was a famine in the land. Abram went down into Egypt to sojourn there, for the famine was sore in the land."}, {"c": 12, "n": 11, "text": "It happened, when he was come near to enter into Egypt, that he said to Sarai his wife, \"See now, I know that you are a beautiful woman to look on."}, {"c": 12, "n": 12, "text": "It will happen, when the Egyptians will see you, that they will say, 'This is his wife.' They will kill me, but they will save you alive."}, {"c": 12, "n": 13, "text": "Please say that you are my sister, that it may be well with me for your sake, and that my soul may live because of you.\""}, {"c": 12, "n": 14, "text": "It happened that when Abram had come into Egypt, the Egyptians saw that the woman was very beautiful."}, {"c": 12, "n": 15, "text": "The princes of Pharaoh saw her, and praised her to Pharaoh; and the woman was taken into Pharaoh's house."}, {"c": 12, "n": 16, "text": "He dealt well with Abram for her sake. He had sheep, and oxen, and he-asses, and men-servants, and maid-servants, and she-asses, and camels."}, {"c": 12, "n": 17, "text": "Yahweh plagued Pharaoh and his house with great plagues because of Sarai, Abram's wife."}, {"c": 12, "n": 18, "text": "Pharaoh called Abram, and said, \"What is this that you have done to me? Why didn't you tell me that she was your wife?"}, {"c": 12, "n": 19, "text": "Why did you say, 'She is my sister,' so that I took her to be my wife? Now therefore, see your wife, take her, and go your way.\""}, {"c": 12, "n": 20, "text": "Pharaoh gave men charge concerning him: and they brought him on the way, and his wife, and all that he had."}]}, "gen_22": {"id": "gen_22", "ref": "Genesis 22", "verses": [{"c": 22, "n": 1, "text": "It happened after these things, that God tested Abraham, and said to him, \"Abraham!\" He said, \"Here I am.\""}, {"c": 22, "n": 2, "text": "He said, \"Now take your son, your only son, whom you love, even Isaac, and go into the land of Moriah. Offer him there for a burnt offering on one of the mountains which I will tell you of.\""}, {"c": 22, "n": 3, "text": "Abraham rose early in the morning, and saddled his donkey, and took two of his young men with him, and Isaac his son. He split the wood for the burnt offering, and rose up, and went to the place of which God had told him."}, {"c": 22, "n": 4, "text": "On the third day Abraham lifted up his eyes, and saw the place far off."}, {"c": 22, "n": 5, "text": "Abraham said to his young men, \"Stay here with the donkey. The boy and I will go yonder. We will worship, and come back to you."}, {"c": 22, "n": 6, "text": "Abraham took the wood of the burnt offering and laid it on Isaac his son. He took in his hand the fire and the knife. They both went together."}, {"c": 22, "n": 7, "text": "Isaac spoke to Abraham his father, and said, \"My father?\" He said, \"Here I am, my son.\" He said, \"Here is the fire and the wood, but where is the lamb for a burnt offering?\""}, {"c": 22, "n": 8, "text": "Abraham said, \"God will provide himself the lamb for a burnt offering, my son.\" So they both went together."}, {"c": 22, "n": 9, "text": "They came to the place which God had told him of. Abraham built the altar there, and laid the wood in order, bound Isaac his son, and laid him on the altar, on the wood."}, {"c": 22, "n": 10, "text": "Abraham stretched forth his hand, and took the knife to kill his son."}, {"c": 22, "n": 11, "text": "The angel of Yahweh called to him out of the sky, and said, \"Abraham, Abraham!\" He said, \"Here I am.\""}, {"c": 22, "n": 12, "text": "He said, \"Don't lay your hand on the boy, neither do anything to him. For now I know that you fear God, seeing you have not withheld your son, your only son, from me.\""}, {"c": 22, "n": 13, "text": "Abraham lifted up his eyes, and looked, and saw that behind him was a ram caught in the thicket by his horns. Abraham went and took the ram, and offered him up for a burnt offering instead of his son."}, {"c": 22, "n": 14, "text": "Abraham called the name of that place Yahweh-jireh. As it is said to this day, \"In Yahweh's mountain it will be provided."}, {"c": 22, "n": 15, "text": "The angel of Yahweh called to Abraham a second time out of the sky,"}, {"c": 22, "n": 16, "text": "and said, \"I have sworn by myself, says Yahweh, because you have done this thing, and have not withheld your son, your only son,"}, {"c": 22, "n": 17, "text": "that in blessing I will bless you, and in multiplying I will multiply your seed as the stars of the heavens, and as the sand which is on the seashore. Your seed will possess the gate of his enemies."}, {"c": 22, "n": 18, "text": "In your seed will all the nations of the earth be blessed, because you have obeyed my voice.\""}, {"c": 22, "n": 19, "text": "So Abraham returned to his young men, and they rose up and went together to Beersheba. Abraham lived at Beersheba."}, {"c": 22, "n": 20, "text": "It happened after these things, that it was told Abraham, saying, \"Behold, Milcah, she also has borne children to your brother Nahor:"}, {"c": 22, "n": 21, "text": "Uz his firstborn, Buz his brother, Kemuel the father of Aram,"}, {"c": 22, "n": 22, "text": "Chesed, Hazo, Pildash, Jidlaph, and Bethuel.\""}, {"c": 22, "n": 23, "text": "Bethuel became the father of Rebekah. These eight Milcah bore to Nahor, Abraham's brother."}, {"c": 22, "n": 24, "text": "His concubine, whose name was Reumah, also bare Tebah, Gaham, Tahash, and Maacah."}]}, "exo_1_3": {"id": "exo_1_3", "ref": "Exodus 1–3", "verses": [{"c": 1, "n": 1, "text": "Now these are the names of the sons of Israel, who came into Egypt (every man and his household came with Jacob):"}, {"c": 1, "n": 2, "text": "Reuben, Simeon, Levi, and Judah,"}, {"c": 1, "n": 3, "text": "Issachar, Zebulun, and Benjamin,"}, {"c": 1, "n": 4, "text": "Dan and Naphtali, Gad and Asher."}, {"c": 1, "n": 5, "text": "All the souls who came out of the Jacob's body were seventy souls, and Joseph was in Egypt already."}, {"c": 1, "n": 6, "text": "Joseph died, as did all his brothers, and all that generation."}, {"c": 1, "n": 7, "text": "The children of Israel were fruitful, and increased abundantly, and multiplied, and grew exceedingly mighty; and the land was filled with them."}, {"c": 1, "n": 8, "text": "Now there arose a new king over Egypt, who didn't know Joseph."}, {"c": 1, "n": 9, "text": "He said to his people, \"Behold, the people of the children of Israel are more and mightier than we."}, {"c": 1, "n": 10, "text": "Come, let us deal wisely with them, lest they multiply, and it happen that when any war breaks out, they also join themselves to our enemies, and fight against us, and escape out of the land.\""}, {"c": 1, "n": 11, "text": "Therefore they set taskmasters over them to afflict them with their burdens. They built storage cities for Pharaoh: Pithom and Raamses."}, {"c": 1, "n": 12, "text": "But the more they afflicted them, the more they multiplied and the more they spread out. They were grieved because of the children of Israel."}, {"c": 1, "n": 13, "text": "The Egyptians ruthlessly made the children of Israel serve,"}, {"c": 1, "n": 14, "text": "and they made their lives bitter with hard service, in mortar and in brick, and in all manner of service in the field, all their service, in which they ruthlessly made them serve."}, {"c": 1, "n": 15, "text": "The king of Egypt spoke to the Hebrew midwives, of whom the name of the one was Shiphrah, and the name of the other Puah,"}, {"c": 1, "n": 16, "text": "and he said, \"When you perform the duty of a midwife to the Hebrew women, and see them on the birth stool; if it is a son, then you shall kill him; but if it is a daughter, then she shall live.\""}, {"c": 1, "n": 17, "text": "But the midwives feared God, and didn't do what the king of Egypt commanded them, but saved the baby boys alive."}, {"c": 1, "n": 18, "text": "The king of Egypt called for the midwives, and said to them, \"Why have you done this thing, and have saved the men-children alive?\""}, {"c": 1, "n": 19, "text": "The midwives said to Pharaoh, \"Because the Hebrew women aren't like the Egyptian women; for they are vigorous, and give birth before the midwife comes to them.\""}, {"c": 1, "n": 20, "text": "God dealt well with the midwives, and the people multiplied, and grew very mighty."}, {"c": 1, "n": 21, "text": "It happened, because the midwives feared God, that he gave them families."}, {"c": 1, "n": 22, "text": "Pharaoh charged all his people, saying, \"You shall cast every son who is born into the river, and every daughter you shall save alive.\""}, {"c": 2, "n": 1, "text": "A man of the house of Levi went and took a daughter of Levi as his wife."}, {"c": 2, "n": 2, "text": "The woman conceived, and bore a son. When she saw that he was a fine child, she hid him three months."}, {"c": 2, "n": 3, "text": "When she could no longer hide him, she took a papyrus basket for him, and coated it with tar and with pitch. She put the child in it, and laid it in the reeds by the river's bank."}, {"c": 2, "n": 4, "text": "His sister stood far off, to see what would be done to him."}, {"c": 2, "n": 5, "text": "Pharaoh's daughter came down to bathe at the river. Her maidens walked along by the riverside. She saw the basket among the reeds, and sent her handmaid to get it."}, {"c": 2, "n": 6, "text": "She opened it, and saw the child, and, behold, the baby cried. She had compassion on him, and said, \"This is one of the Hebrews' children.\""}, {"c": 2, "n": 7, "text": "Then his sister said to Pharaoh's daughter, \"Should I go and call a nurse for you from the Hebrew women, that she may nurse the child for you?\""}, {"c": 2, "n": 8, "text": "Pharaoh's daughter said to her, \"Go.\" The maiden went and called the child's mother."}, {"c": 2, "n": 9, "text": "Pharaoh's daughter said to her, \"Take this child away, and nurse him for me, and I will give you your wages.\" The woman took the child, and nursed it."}, {"c": 2, "n": 10, "text": "The child grew, and she brought him to Pharaoh's daughter, and he became her son. She named him Moses, and said, \"Because I drew him out of the water.\""}, {"c": 2, "n": 11, "text": "It happened in those days, when Moses had grown up, that he went out to his brothers, and looked at their burdens. He saw an Egyptian striking a Hebrew, one of his brothers."}, {"c": 2, "n": 12, "text": "He looked this way and that way, and when he saw that there was no one, he killed the Egyptian, and hid him in the sand."}, {"c": 2, "n": 13, "text": "He went out the second day, and, behold, two men of the Hebrews were fighting with each other. He said to him who did the wrong, \"Why do you strike your fellow?\""}, {"c": 2, "n": 14, "text": "He said, \"Who made you a prince and a judge over us? Do you plan to kill me, as you killed the Egyptian?\" Moses was afraid, and said, \"Surely this thing is known.\""}, {"c": 2, "n": 15, "text": "Now when Pharaoh heard this thing, he sought to kill Moses. But Moses fled from the face of Pharaoh, and lived in the land of Midian, and he sat down by a well."}, {"c": 2, "n": 16, "text": "Now the priest of Midian had seven daughters. They came and drew water, and filled the troughs to water their father's flock."}, {"c": 2, "n": 17, "text": "The shepherds came and drove them away; but Moses stood up and helped them, and watered their flock."}, {"c": 2, "n": 18, "text": "When they came to Reuel, their father, he said, \"How is it that you have returned so early today?\""}, {"c": 2, "n": 19, "text": "They said, \"An Egyptian delivered us out of the hand of the shepherds, and moreover he drew water for us, and watered the flock.\""}, {"c": 2, "n": 20, "text": "He said to his daughters, \"Where is he? Why is it that you have left the man? Call him, that he may eat bread.\""}, {"c": 2, "n": 21, "text": "Moses was content to dwell with the man. He gave Moses Zipporah, his daughter."}, {"c": 2, "n": 22, "text": "She bore a son, and he named him Gershom, for he said, \"I have been a sojourner in a foreign land.\""}, {"c": 2, "n": 23, "text": "It happened in the course of those many days, that the king of Egypt died, and the children of Israel sighed because of the bondage, and they cried, and their cry came up to God because of the bondage."}, {"c": 2, "n": 24, "text": "God heard their groaning, and God remembered his covenant with Abraham, with Isaac, and with Jacob."}, {"c": 2, "n": 25, "text": "God saw the children of Israel, and God was concerned about them."}, {"c": 3, "n": 1, "text": "Now Moses was keeping the flock of Jethro, his father-in-law, the priest of Midian, and he led the flock to the back of the wilderness, and came to God's mountain, to Horeb."}, {"c": 3, "n": 2, "text": "The angel of Yahweh appeared to him in a flame of fire out of the midst of a bush. He looked, and behold, the bush burned with fire, and the bush was not consumed."}, {"c": 3, "n": 3, "text": "Moses said, I will turn aside now, and see this great sight, why the bush is not burnt."}, {"c": 3, "n": 4, "text": "When Yahweh saw that he turned aside to see, God called to him out of the midst of the bush, and said, \"Moses! Moses!\" He said, \"Here I am.\""}, {"c": 3, "n": 5, "text": "He said, \"Don't come close. Take off your sandals from off your feet, for the place you are standing on is holy ground.\""}, {"c": 3, "n": 6, "text": "Moreover he said, \"I am the God of your father, the God of Abraham, the God of Isaac, and the God of Jacob.\" Moses hid his face; for he was afraid to look at God."}, {"c": 3, "n": 7, "text": "Yahweh said, \"I have surely seen the affliction of my people who are in Egypt, and have heard their cry because of their taskmasters, for I know their sorrows."}, {"c": 3, "n": 8, "text": "I have come down to deliver them out of the hand of the Egyptians, and to bring them up out of that land to a good and large land, to a land flowing with milk and honey; to the place of the Canaanite, the Hittite, the Amorite, the Perizzite, the Hivite, and the Jebusite."}, {"c": 3, "n": 9, "text": "Now, behold, the cry of the children of Israel has come to me. Moreover I have seen the oppression with which the Egyptians oppress them."}, {"c": 3, "n": 10, "text": "Come now therefore, and I will send you to Pharaoh, that you may bring forth my people, the children of Israel, out of Egypt.\""}, {"c": 3, "n": 11, "text": "Moses said to God, \"Who am I, that I should go to Pharaoh, and that I should bring forth the children of Israel out of Egypt?\""}, {"c": 3, "n": 12, "text": "He said, \"Certainly I will be with you. This will be the token to you, that I have sent you: when you have brought forth the people out of Egypt, you shall serve God on this mountain.\""}, {"c": 3, "n": 13, "text": "Moses said to God, \"Behold, when I come to the children of Israel, and tell them, 'The God of your fathers has sent me to you;' and they ask me, 'What is his name?' What should I tell them?\""}, {"c": 3, "n": 14, "text": "God said to Moses, \"I AM WHO I AM,\" and he said, \"You shall tell the children of Israel this: \"I AM has sent me to you.\""}, {"c": 3, "n": 15, "text": "God said moreover to Moses, \"You shall tell the children of Israel this, 'Yahweh, the God of your fathers, the God of Abraham, the God of Isaac, and the God of Jacob, has sent me to you.' This is my name forever, and this is my memorial to all generations."}, {"c": 3, "n": 16, "text": "Go, and gather the elders of Israel together, and tell them, 'Yahweh, the God of your fathers, the God of Abraham, of Isaac, and of Jacob, has appeared to me, saying, \"I have surely visited you, and seen that which is done to you in Egypt;"}, {"c": 3, "n": 17, "text": "and I have said, I will bring you up out of the affliction of Egypt to the land of the Canaanite, the Hittite, the Amorite, the Perizzite, the Hivite, and the Jebusite, to a land flowing with milk and honey.\"'"}, {"c": 3, "n": 18, "text": "They will listen to your voice, and you shall come, you and the elders of Israel, to the king of Egypt, and you shall tell him, 'Yahweh, the God of the Hebrews, has met with us. Now please let us go three days' journey into the wilderness, that we may sacrifice to Yahweh, our God.'"}, {"c": 3, "n": 19, "text": "I know that the king of Egypt won't give you permission to go, no, not by a mighty hand."}, {"c": 3, "n": 20, "text": "I will put forth my hand and strike Egypt with all my wonders which I will do in the midst of it, and after that he will let you go."}, {"c": 3, "n": 21, "text": "I will give this people favor in the sight of the Egyptians, and it will happen that when you go, you shall not go empty-handed."}, {"c": 3, "n": 22, "text": "But every woman shall ask of her neighbor, and of her who sojourns in her house, jewels of silver, jewels of gold, and clothing; and you shall put them on your sons, and on your daughters. You shall despoil the Egyptians."}]}, "exo_12": {"id": "exo_12", "ref": "Exodus 12", "verses": [{"c": 12, "n": 1, "text": "Yahweh spoke to Moses and Aaron in the land of Egypt, saying,"}, {"c": 12, "n": 2, "text": "\"This month shall be to you the beginning of months. It shall be the first month of the year to you."}, {"c": 12, "n": 3, "text": "Speak to all the congregation of Israel, saying, 'On the tenth day of this month, they shall take to them every man a lamb, according to their fathers' houses, a lamb for a household;"}, {"c": 12, "n": 4, "text": "and if the household be too little for a lamb, then he and his neighbor next to his house shall take one according to the number of the souls; according to everyone can eat you shall make your count for the lamb."}, {"c": 12, "n": 5, "text": "Your lamb shall be without blemish, a male a year old. You shall take it from the sheep, or from the goats:"}, {"c": 12, "n": 6, "text": "and you shall keep it until the fourteenth day of the same month; and the whole assembly of the congregation of Israel shall kill it at evening."}, {"c": 12, "n": 7, "text": "They shall take same of the blood, and put it on the two side-posts and on the lintel, on the houses in which they shall eat it."}, {"c": 12, "n": 8, "text": "They shall eat the flesh in that night, roasted with fire, and unleavened bread. They shall eat it with bitter herbs."}, {"c": 12, "n": 9, "text": "Don't eat it raw, nor boiled at all with water, but roasted with fire; with its head, its legs and its inner parts."}, {"c": 12, "n": 10, "text": "You shall let nothing of it remain until the morning; but that which remains of it until the morning you shall burn with fire."}, {"c": 12, "n": 11, "text": "This is how you shall eat it: with your loins girded, your shoes on your feet, and your staff in your hand; and you shall eat it in haste: it is Yahweh's Passover."}, {"c": 12, "n": 12, "text": "For I will go through the land of Egypt in that night, and will strike all the firstborn in the land of Egypt, both man and animal. Against all the gods of Egypt I will execute judgments: I am Yahweh."}, {"c": 12, "n": 13, "text": "The blood shall be to you for a token on the houses where you are: and when I see the blood, I will pass over you, and there shall no plague be on you to destroy you, when I strike the land of Egypt."}, {"c": 12, "n": 14, "text": "This day shall be to you for a memorial, and you shall keep it a feast to Yahweh: throughout your generations you shall keep it a feast by an ordinance forever."}, {"c": 12, "n": 15, "text": "Seven days shall you eat unleavened bread; even the first day you shall put away yeast out of your houses, for whoever eats leavened bread from the first day until the seventh day, that soul shall be cut off from Israel."}, {"c": 12, "n": 16, "text": "In the first day there shall be to you a holy convocation, and in the seventh day a holy convocation; no manner of work shall be done in them, except that which every man must eat, that only may be done by you."}, {"c": 12, "n": 17, "text": "You shall observe the feast of unleavened bread; for in this same day have I brought your hosts out of the land of Egypt: therefore shall you observe this day throughout your generations by an ordinance forever."}, {"c": 12, "n": 18, "text": "In the first month, on the fourteenth day of the month at evening, you shall eat unleavened bread, until the twenty first day of the month at evening."}, {"c": 12, "n": 19, "text": "Seven days shall there be no yeast found in your houses, for whoever eats that which is leavened, that soul shall be cut off from the congregation of Israel, whether he be a sojourner, or one who is born in the land."}, {"c": 12, "n": 20, "text": "You shall eat nothing leavened. In all your habitations you shall eat unleavened bread.'\""}, {"c": 12, "n": 21, "text": "Then Moses called for all the elders of Israel, and said to them, \"Draw out, and take lambs according to your families, and kill the Passover."}, {"c": 12, "n": 22, "text": "You shall take a bunch of hyssop, and dip it in the blood that is in the basin, and strike the lintel and the two side-posts with the blood that is in the basin; and none of you shall go out of the door of his house until the morning."}, {"c": 12, "n": 23, "text": "For Yahweh will pass through to strike the Egyptians; and when he sees the blood on the lintel, and on the two side-posts, Yahweh will pass over the door, and will not allow the destroyer to come in to your houses to strike you."}, {"c": 12, "n": 24, "text": "You shall observe this thing for an ordinance to you and to your sons forever."}, {"c": 12, "n": 25, "text": "It shall happen when you have come to the land which Yahweh will give you, according as he has promised, that you shall keep this service."}, {"c": 12, "n": 26, "text": "It will happen, when your children ask you, 'What do you mean by this service?'"}, {"c": 12, "n": 27, "text": "that you shall say, 'It is the sacrifice of Yahweh's Passover, who passed over the houses of the children of Israel in Egypt, when he struck the Egyptians, and spared our houses.'\" The people bowed their heads and worshipped."}, {"c": 12, "n": 28, "text": "The children of Israel went and did so; as Yahweh had commanded Moses and Aaron, so they did."}, {"c": 12, "n": 29, "text": "It happened at midnight, that Yahweh struck all the firstborn in the land of Egypt, from the firstborn of Pharaoh who sat on his throne to the firstborn of the captive who was in the dungeon; and all the firstborn of cattle."}, {"c": 12, "n": 30, "text": "Pharaoh rose up in the night, he, and all his servants, and all the Egyptians; and there was a great cry in Egypt, for there was not a house where there was not one dead."}, {"c": 12, "n": 31, "text": "He called for Moses and Aaron by night, and said, \"Rise up, get out from among my people, both you and the children of Israel; and go, serve Yahweh, as you have said!"}, {"c": 12, "n": 32, "text": "Take both your flocks and your herds, as you have said, and be gone; and bless me also!\""}, {"c": 12, "n": 33, "text": "The Egyptians were urgent with the people, to send them out of the land in haste, for they said, \"We are all dead men.\""}, {"c": 12, "n": 34, "text": "The people took their dough before it was leavened, their kneading-troughs being bound up in their clothes on their shoulders."}, {"c": 12, "n": 35, "text": "The children of Israel did according to the word of Moses; and they asked of the Egyptians jewels of silver, and jewels of gold, and clothing."}, {"c": 12, "n": 36, "text": "Yahweh gave the people favor in the sight of the Egyptians, so that they let them have what they asked. They despoiled the Egyptians."}, {"c": 12, "n": 37, "text": "The children of Israel journeyed from Rameses to Succoth, about six hundred thousand on foot who were men, besides children."}, {"c": 12, "n": 38, "text": "A mixed multitude went up also with them, with flocks, herds, and even very much cattle."}, {"c": 12, "n": 39, "text": "They baked unleavened cakes of the dough which they brought forth out of Egypt; for it wasn't leavened, because they were thrust out of Egypt, and couldn't wait, neither had they prepared for themselves any food."}, {"c": 12, "n": 40, "text": "Now the time that the children of Israel lived in Egypt was four hundred thirty years."}, {"c": 12, "n": 41, "text": "It happened at the end of four hundred thirty years, even the same day it happened, that all the hosts of Yahweh went out from the land of Egypt."}, {"c": 12, "n": 42, "text": "It is a night to be much observed to Yahweh for bringing them out from the land of Egypt. This is that night of Yahweh, to be much observed of all the children of Israel throughout their generations."}, {"c": 12, "n": 43, "text": "Yahweh said to Moses and Aaron, \"This is the ordinance of the Passover. There shall no foreigner eat of it,"}, {"c": 12, "n": 44, "text": "but every man's servant who is bought for money, when you have circumcised him, then shall he eat of it."}, {"c": 12, "n": 45, "text": "A sojourner and a hired servant shall not eat of it."}, {"c": 12, "n": 46, "text": "In one house shall it be eaten; you shall not carry forth anything of the flesh abroad out of the house; neither shall you break a bone of it."}, {"c": 12, "n": 47, "text": "All the congregation of Israel shall keep it."}, {"c": 12, "n": 48, "text": "When a stranger shall sojourn with you, and will keep the Passover to Yahweh, let all his males be circumcised, and then let him come near and keep it; and he shall be as one who is born in the land: but no uncircumcised person shall eat of it."}, {"c": 12, "n": 49, "text": "One law shall be to him who is born at home, and to the stranger who sojourns among you.\""}, {"c": 12, "n": 50, "text": "Thus did all the children of Israel. As Yahweh commanded Moses and Aaron, so they did."}, {"c": 12, "n": 51, "text": "It happened the same day, that Yahweh brought the children of Israel out of the land of Egypt by their hosts."}]}, "exo_20": {"id": "exo_20", "ref": "Exodus 20", "verses": [{"c": 20, "n": 1, "text": "God spoke all these words, saying,"}, {"c": 20, "n": 2, "text": "\"I am Yahweh your God, who brought you out of the land of Egypt, out of the house of bondage."}, {"c": 20, "n": 3, "text": "You shall have no other gods before me."}, {"c": 20, "n": 4, "text": "\"You shall not make for yourselves an idol, nor any image of anything that is in the heavens above, or that is in the earth beneath, or that is in the water under the earth:"}, {"c": 20, "n": 5, "text": "you shall not bow yourself down to them, nor serve them, for I, Yahweh your God, am a jealous God, visiting the iniquity of the fathers on the children, on the third and on the fourth generation of those who hate me,"}, {"c": 20, "n": 6, "text": "and showing lovingkindness to thousands of those who love me and keep my commandments."}, {"c": 20, "n": 7, "text": "\"You shall not take the name of Yahweh your God in vain, for Yahweh will not hold him guiltless who takes his name in vain."}, {"c": 20, "n": 8, "text": "\"Remember the Sabbath day, to keep it holy."}, {"c": 20, "n": 9, "text": "You shall labor six days, and do all your work,"}, {"c": 20, "n": 10, "text": "but the seventh day is a Sabbath to Yahweh your God. You shall not do any work in it, you, nor your son, nor your daughter, your man-servant, nor your maid-servant, nor your cattle, nor your stranger who is within your gates;"}, {"c": 20, "n": 11, "text": "for in six days Yahweh made heaven and earth, the sea, and all that is in them, and rested the seventh day; therefore Yahweh blessed the Sabbath day, and made it holy."}, {"c": 20, "n": 12, "text": "\"Honor your father and your mother, that your days may be long in the land which Yahweh your God gives you."}, {"c": 20, "n": 13, "text": "\"You shall not murder."}, {"c": 20, "n": 14, "text": "\"You shall not commit adultery."}, {"c": 20, "n": 15, "text": "\"You shall not steal."}, {"c": 20, "n": 16, "text": "\"You shall not give false testimony against your neighbor."}, {"c": 20, "n": 17, "text": "\"You shall not covet your neighbor's house. You shall not covet your neighbor's wife, nor his man-servant, nor his maid-servant, nor his ox, nor his donkey, nor anything that is your neighbor's.\""}, {"c": 20, "n": 18, "text": "All the people perceived the thunderings, the lightnings, the sound of the trumpet, and the mountain smoking. When the people saw it, they trembled, and stayed at a distance."}, {"c": 20, "n": 19, "text": "They said to Moses, \"Speak with us yourself, and we will listen; but don't let God speak with us, lest we die.\""}, {"c": 20, "n": 20, "text": "Moses said to the people, \"Don't be afraid, for God has come to test you, and that his fear may be before you, that you won't sin.\""}, {"c": 20, "n": 21, "text": "The people stayed at a distance, and Moses drew near to the thick darkness where God was."}, {"c": 20, "n": 22, "text": "Yahweh said to Moses, \"This is what you shall tell the children of Israel: 'You yourselves have seen that I have talked with you from heaven."}, {"c": 20, "n": 23, "text": "You shall most certainly not make alongside of me gods of silver, or gods of gold for yourselves."}, {"c": 20, "n": 24, "text": "You shall make an altar of earth for me, and shall sacrifice on it your burnt offerings and your peace-offerings, your sheep and your oxen. In every place where I record my name I will come to you and I will bless you."}, {"c": 20, "n": 25, "text": "If you make me an altar of stone, you shall not build it of hewn stones; for if you lift up your tool on it, you have polluted it."}, {"c": 20, "n": 26, "text": "Neither shall you go up by steps to my altar, that your nakedness may not be exposed to it.'"}]}, "psa_23": {"id": "psa_23", "ref": "Psalm 23", "verses": [{"c": 23, "n": 1, "text": "Yahweh is my shepherd: I shall lack nothing."}, {"c": 23, "n": 2, "text": "He makes me to lie down in green pastures. He leads me beside still waters."}, {"c": 23, "n": 3, "text": "He restores my soul. He guides me in the paths of righteousness for his name's sake."}, {"c": 23, "n": 4, "text": "Even though I walk through the valley of the shadow of death, I will fear no evil, for you are with me. Your rod and your staff, they comfort me."}, {"c": 23, "n": 5, "text": "You prepare a table before me in the presence of my enemies. You have anointed my head with oil. My cup runs over."}, {"c": 23, "n": 6, "text": "Surely goodness and lovingkindness shall follow me all the days of my life, And I shall dwell in Yahweh's house forever. Psalm 24 A Psalm by David."}]}, "psa_51": {"id": "psa_51", "ref": "Psalm 51", "verses": [{"c": 51, "n": 1, "text": "Have mercy on me, God, according to your lovingkindness. According to the multitude of your tender mercies, blot out my transgressions."}, {"c": 51, "n": 2, "text": "Wash me thoroughly from my iniquity. Cleanse me from my sin."}, {"c": 51, "n": 3, "text": "For I know my transgressions. My sin is constantly before me."}, {"c": 51, "n": 4, "text": "Against you, and you only, have I sinned, And done that which is evil in your sight; That you may be proved right when you speak, And justified when you judge."}, {"c": 51, "n": 5, "text": "Behold, I was brought forth in iniquity. In sin did my mother conceive me."}, {"c": 51, "n": 6, "text": "Behold, you desire truth in the inward parts. You teach me wisdom in the inmost place."}, {"c": 51, "n": 7, "text": "Purify me with hyssop, and I will be clean. Wash me, and I will be whiter than snow."}, {"c": 51, "n": 8, "text": "Let me hear joy and gladness, That the bones which you have broken may rejoice."}, {"c": 51, "n": 9, "text": "Hide your face from my sins, And blot out all of my iniquities."}, {"c": 51, "n": 10, "text": "Create in me a clean heart, God. Renew a right spirit within me."}, {"c": 51, "n": 11, "text": "Don't throw me away from your presence. Don't take your holy Spirit from me."}, {"c": 51, "n": 12, "text": "Restore to me the joy of your salvation. Uphold me with a willing spirit."}, {"c": 51, "n": 13, "text": "Then I will teach transgressors your ways. Sinners shall be converted to you."}, {"c": 51, "n": 14, "text": "Deliver me from bloodguiltiness, God, you God of my salvation. My tongue shall sing aloud of your righteousness."}, {"c": 51, "n": 15, "text": "Lord, open my lips. My mouth shall declare your praise."}, {"c": 51, "n": 16, "text": "For you don't delight in sacrifice, or else I would give it. You have no pleasure in burnt offering."}, {"c": 51, "n": 17, "text": "The sacrifices of God are a broken spirit. A broken and contrite heart, God, you will not despise."}, {"c": 51, "n": 18, "text": "Do well in your good pleasure to Zion. Build the walls of Jerusalem."}, {"c": 51, "n": 19, "text": "Then will you delight in the sacrifices of righteousness, In burnt offerings and in whole burnt offerings. Then they will offer bulls on your altar. Psalm 52 For the Chief Musician. A contemplation by David, when Doeg the Edomite came and told Saul, \"David has come to Abimelech's house.\""}]}, "psa_91": {"id": "psa_91", "ref": "Psalm 91", "verses": [{"c": 91, "n": 1, "text": "He who dwells in the secret place of the Most High Will rest in the shadow of the Almighty."}, {"c": 91, "n": 2, "text": "I will say of Yahweh, \"He is my refuge and my fortress; My God, in whom I trust.\""}, {"c": 91, "n": 3, "text": "For he will deliver you from the snare of the fowler, From the deadly pestilence."}, {"c": 91, "n": 4, "text": "He will cover you with his pinions, Under his wings you will take refuge. His truth is a shield and a buckler."}, {"c": 91, "n": 5, "text": "You will not be afraid of the terror by night, Nor of the arrow that flies by day;"}, {"c": 91, "n": 6, "text": "Nor of the pestilence that walks in darkness, Nor for the destruction that wastes at noonday."}, {"c": 91, "n": 7, "text": "A thousand shall fall at your side, And ten thousand at your right hand; But it will not come near you."}, {"c": 91, "n": 8, "text": "You will only look with your eyes, And see the reward of the wicked."}, {"c": 91, "n": 9, "text": "For you, Yahweh, are my refuge! You have made the Most High your habitation."}, {"c": 91, "n": 10, "text": "No evil will happen to you, Neither shall any plague come near your tent."}, {"c": 91, "n": 11, "text": "For he will give his angels charge over you, To guard you in all your ways."}, {"c": 91, "n": 12, "text": "They will bear you up in their hands, So that you won't dash your foot against a stone."}, {"c": 91, "n": 13, "text": "You will tread on the lion and cobra. You will trample the young lion and the serpent underfoot."}, {"c": 91, "n": 14, "text": "Because he has set his love on me, therefore I will deliver him. I will set him on high, because he has known my name."}, {"c": 91, "n": 15, "text": "He will call on me, and I will answer him. I will be with him in trouble. I will deliver him, and honor him."}, {"c": 91, "n": 16, "text": "I will satisfy him with long life, And show him my salvation. Psalm 92 A Psalm. A song for the Sabbath day."}]}, "pro_1": {"id": "pro_1", "ref": "Proverbs 1", "verses": [{"c": 1, "n": 1, "text": "The proverbs of Solomon, the son of David, king of Israel:"}, {"c": 1, "n": 2, "text": "To know wisdom and instruction; To discern the words of understanding;"}, {"c": 1, "n": 3, "text": "To receive instruction in wise dealing, In righteousness, justice, and equity;"}, {"c": 1, "n": 4, "text": "To give prudence to the simple, Knowledge and discretion to the young man:"}, {"c": 1, "n": 5, "text": "That the wise man may hear, and increase in learning; That the man of understanding may attain to sound counsel:"}, {"c": 1, "n": 6, "text": "To understand a proverb, and parables, The words and riddles of the wise."}, {"c": 1, "n": 7, "text": "The fear of Yahweh is the beginning of knowledge; But the foolish despise wisdom and instruction."}, {"c": 1, "n": 8, "text": "My son, listen to your father's instruction, And don't forsake your mother's teaching:"}, {"c": 1, "n": 9, "text": "For they will be a garland to grace your head, And chains around your neck."}, {"c": 1, "n": 10, "text": "My son, if sinners entice you, don't consent."}, {"c": 1, "n": 11, "text": "If they say, \"Come with us, Let's lay in wait for blood; Let's lurk secretly for the innocent without cause;"}, {"c": 1, "n": 12, "text": "Let's swallow them up alive like Sheol, And whole, like those who go down into the pit."}, {"c": 1, "n": 13, "text": "We'll find all valuable wealth. We'll fill our houses with spoil."}, {"c": 1, "n": 14, "text": "You shall cast your lot among us. We'll all have one purse.\""}, {"c": 1, "n": 15, "text": "My son, don't walk in the way with them. Keep your foot from their path,"}, {"c": 1, "n": 16, "text": "For their feet run to evil. They hurry to shed blood."}, {"c": 1, "n": 17, "text": "For in vain is the net spread in the sight of any bird:"}, {"c": 1, "n": 18, "text": "These lay wait for their own blood. They lurk secretly for their own lives."}, {"c": 1, "n": 19, "text": "So are the ways of everyone who is greedy of gain. It takes away the life of its owners."}, {"c": 1, "n": 20, "text": "Wisdom calls aloud in the street. She utters her voice in the public squares."}, {"c": 1, "n": 21, "text": "She calls at the head of noisy places. At the entrance of the city gates, she utters her words:"}, {"c": 1, "n": 22, "text": "\"How long, you simple ones, will you love simplicity? How long will mockers delight themselves in mockery, And fools hate knowledge?"}, {"c": 1, "n": 23, "text": "Turn at my reproof. Behold, I will pour out my spirit on you. I will make known my words to you."}, {"c": 1, "n": 24, "text": "Because I have called, and you have refused; I have stretched out my hand, and no one has paid attention;"}, {"c": 1, "n": 25, "text": "But you have ignored all my counsel, And wanted none of my reproof;"}, {"c": 1, "n": 26, "text": "I also will laugh at your disaster. I will mock when calamity overtakes you;"}, {"c": 1, "n": 27, "text": "When calamity overtakes you like a storm, When your disaster comes on like a whirlwind; When distress and anguish come on you."}, {"c": 1, "n": 28, "text": "Then will they call on me, but I will not answer. They will seek me diligently, but they will not find me;"}, {"c": 1, "n": 29, "text": "Because they hated knowledge, And didn't choose the fear of Yahweh."}, {"c": 1, "n": 30, "text": "They wanted none of my counsel. They despised all my reproof."}, {"c": 1, "n": 31, "text": "Therefore they will eat of the fruit of their own way, And be filled with their own schemes."}, {"c": 1, "n": 32, "text": "For the backsliding of the simple will kill them. The careless ease of fools will destroy them."}, {"c": 1, "n": 33, "text": "But whoever listens to me will dwell securely, And will be at ease, without fear of harm.\""}]}, "pro_3": {"id": "pro_3", "ref": "Proverbs 3", "verses": [{"c": 3, "n": 1, "text": "My son, don't forget my teaching; But let your heart keep my commandments:"}, {"c": 3, "n": 2, "text": "For length of days, and years of life, And peace, will they add to you."}, {"c": 3, "n": 3, "text": "Don't let kindness and truth forsake you. Bind them around your neck. Write them on the tablet of your heart."}, {"c": 3, "n": 4, "text": "So you will find favor and good understanding in the sight of God and man."}, {"c": 3, "n": 5, "text": "Trust in Yahweh with all your heart, And don't lean on your own understanding."}, {"c": 3, "n": 6, "text": "In all your ways acknowledge him, And he will direct your paths."}, {"c": 3, "n": 7, "text": "Don't be wise in your own eyes. Fear Yahweh, and depart from evil."}, {"c": 3, "n": 8, "text": "It will be health to your body, And nourishment to your bones."}, {"c": 3, "n": 9, "text": "Honor Yahweh with your substance, With the first fruits of all your increase:"}, {"c": 3, "n": 10, "text": "So your barns will be filled with plenty, And your vats will overflow with new wine."}, {"c": 3, "n": 11, "text": "My son, don't despise Yahweh's discipline, Neither be weary of his reproof:"}, {"c": 3, "n": 12, "text": "For whom Yahweh loves, he reproves; Even as a father the son in whom he delights."}, {"c": 3, "n": 13, "text": "Happy is the man who finds wisdom, The man who gets understanding."}, {"c": 3, "n": 14, "text": "For the gaining of it is better than the gaining of silver, The profit of it better than fine gold."}, {"c": 3, "n": 15, "text": "She is more precious than rubies. None of the things you can desire are to be compared to her."}, {"c": 3, "n": 16, "text": "Length of days is in her right hand. In her left hand are riches and honor."}, {"c": 3, "n": 17, "text": "Her ways are ways of pleasantness. All her paths are peace."}, {"c": 3, "n": 18, "text": "She is a tree of life to those who lay hold of her. Happy is everyone who retains her."}, {"c": 3, "n": 19, "text": "By wisdom Yahweh founded the earth. By understanding, he established the heavens."}, {"c": 3, "n": 20, "text": "By his knowledge, the depths were broken up, And the skies drop down the dew."}, {"c": 3, "n": 21, "text": "My son, let them not depart from your eyes. Keep sound wisdom and discretion:"}, {"c": 3, "n": 22, "text": "So they will be life to your soul, And grace for your neck."}, {"c": 3, "n": 23, "text": "Then you shall walk in your way securely. Your foot won't stumble."}, {"c": 3, "n": 24, "text": "When you lie down, you will not be afraid. Yes, you will lie down, and your sleep will be sweet."}, {"c": 3, "n": 25, "text": "Don't be afraid of sudden fear, Neither of the desolation of the wicked, when it comes:"}, {"c": 3, "n": 26, "text": "For Yahweh will be your confidence, And will keep your foot from being taken."}, {"c": 3, "n": 27, "text": "Don't withhold good from those to whom it is due, When it is in the power of your hand to do it."}, {"c": 3, "n": 28, "text": "Don't say to your neighbor, \"Go, and come again, Tomorrow I will give,\" When you have it by you."}, {"c": 3, "n": 29, "text": "Don't devise evil against your neighbor, Seeing he dwells securely by you."}, {"c": 3, "n": 30, "text": "Don't strive with a man without cause, If he has done you no harm."}, {"c": 3, "n": 31, "text": "Don't envy the man of violence. Choose none of his ways."}, {"c": 3, "n": 32, "text": "For the perverse is an abomination to Yahweh, But his friendship is with the upright."}, {"c": 3, "n": 33, "text": "The curse of Yahweh is in the house of the wicked, But he blesses the habitation of the righ
