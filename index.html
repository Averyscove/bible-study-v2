"text": "and because he didn't need for anyone to testify concerning man; for he himself knew what was in man."}]}, "john_3": {"id": "john_3", "ref": "John 3", "verses": [{"c": 3, "n": 1, "text": "Now there was a man of the Pharisees named Nicodemus, a ruler of the Jews."}, {"c": 3, "n": 2, "text": "The same came to him by night, and said to him, \"Rabbi, we know that you are a teacher come from God, for no one can do these signs that you do, unless God is with him.\""}, {"c": 3, "n": 3, "text": "Jesus answered him, \"Most assuredly, I tell you, unless one is born anew, he can't see the kingdom of God.\""}, {"c": 3, "n": 4, "text": "Nicodemus said to him, \"How can a man be born when he is old? Can he enter a second time into his mother's womb, and be born?\""}, {"c": 3, "n": 5, "text": "Jesus answered, \"Most assuredly I tell you, unless one is born of water and the Spirit, he can't enter into the kingdom of God!"}, {"c": 3, "n": 6, "text": "That which is born of the flesh is flesh. That which is born of the Spirit is spirit."}, {"c": 3, "n": 7, "text": "Don't marvel that I said to you, 'You must be born anew.'"}, {"c": 3, "n": 8, "text": "The wind blows where it wants to, and you hear its sound, but don't know where it comes from and where it is going. So is everyone who is born of the Spirit.\""}, {"c": 3, "n": 9, "text": "Nicodemus answered him, \"How can these things be?\""}, {"c": 3, "n": 10, "text": "Jesus answered him, \"Are you the teacher of Israel, and don't understand these things?"}, {"c": 3, "n": 11, "text": "Most assuredly I tell you, we speak that which we know, and testify of that which we have seen, and you don't receive our witness."}, {"c": 3, "n": 12, "text": "If I told you earthly things and you don't believe, how will you believe if I tell you heavenly things?"}, {"c": 3, "n": 13, "text": "No one has ascended into heaven, but he who descended out of heaven, the Son of Man, who is in heaven."}, {"c": 3, "n": 14, "text": "As Moses lifted up the serpent in the wilderness, even so must the Son of Man be lifted up,"}, {"c": 3, "n": 15, "text": "that whoever believes in him should not perish, but have eternal life."}, {"c": 3, "n": 16, "text": "For God so loved the world, that he gave his one and only Son, that whoever believes in him should not perish, but have eternal life."}, {"c": 3, "n": 17, "text": "For God didn't send his Son into the world to judge the world, but that the world should be saved through him."}, {"c": 3, "n": 18, "text": "He who believes in him is not judged. He who doesn't believe has been judged already, because he has not believed in the name of the only born Son of God."}, {"c": 3, "n": 19, "text": "This is the judgment, that the light has come into the world, and men loved the darkness rather than the light; for their works were evil."}, {"c": 3, "n": 20, "text": "For everyone who does evil hates the light, and doesn't come to the light, for fear that his works would be reproved."}, {"c": 3, "n": 21, "text": "But he who does the truth comes to the light, that his works may be revealed, that they have been done with God.\""}, {"c": 3, "n": 22, "text": "After these things, Jesus came with his disciples into the land of Judea. He stayed there with them, and baptized."}, {"c": 3, "n": 23, "text": "John also was baptizing in Enon near Salim, because there was much water there. They came, and were baptized."}, {"c": 3, "n": 24, "text": "For John was not yet thrown into prison."}, {"c": 3, "n": 25, "text": "There arose therefore a questioning on the part of John's disciples with some Jews about purification."}, {"c": 3, "n": 26, "text": "They came to John, and said to him, \"Rabbi, he who was with you beyond the Jordan, to whom you have testified, behold, the same baptizes, and all men come to him.\""}, {"c": 3, "n": 27, "text": "John answered, \"A man can receive nothing, unless it has been given him from heaven."}, {"c": 3, "n": 28, "text": "You yourselves testify about me, that I said, 'I am not the Christ,' but, 'I have been sent before him.'"}, {"c": 3, "n": 29, "text": "He who has the bride is the bridegroom; but the friend of the bridegroom, who stands and hears him, rejoices greatly because of the bridegroom's voice. This, my joy, therefore is made full."}, {"c": 3, "n": 30, "text": "He must increase, but I must decrease."}, {"c": 3, "n": 31, "text": "He who comes from above is above all. He who is from the Earth belongs to the Earth, and speaks of the Earth. He who comes from heaven is above all."}, {"c": 3, "n": 32, "text": "What he has seen and heard, of that he testifies; and no one receives his witness."}, {"c": 3, "n": 33, "text": "He who has received his witness has set his seal to this, that God is true."}, {"c": 3, "n": 34, "text": "For he whom God has sent speaks the words of God; for God gives the Spirit without measure."}, {"c": 3, "n": 35, "text": "The Father loves the Son, and has given all things into his hand."}, {"c": 3, "n": 36, "text": "He who believes in the Son has eternal life, but he who disobeys the Son won't see life, but the wrath of God remains on him.\""}]}, "john_4": {"id": "john_4", "ref": "John 4", "verses": [{"c": 4, "n": 1, "text": "Therefore when the Lord knew that the Pharisees had heard that Jesus was making and baptizing more disciples than John"}, {"c": 4, "n": 2, "text": "(although Jesus himself didn't baptize, but his disciples),"}, {"c": 4, "n": 3, "text": "he left Judea, and departed again into Galilee."}, {"c": 4, "n": 4, "text": "He needed to pass through Samaria."}, {"c": 4, "n": 5, "text": "So he came to a city of Samaria, called Sychar, near the parcel of ground that Jacob gave to his son, Joseph."}, {"c": 4, "n": 6, "text": "Jacob's well was there. Jesus therefore, being tired from his journey, sat down by the well. It was about the sixth hour."}, {"c": 4, "n": 7, "text": "A woman of Samaria came to draw water. Jesus said to her, \"Give me a drink.\""}, {"c": 4, "n": 8, "text": "For his disciples had gone away into the city to buy food."}, {"c": 4, "n": 9, "text": "The Samaritan woman therefore said to him, \"How is it that you, being a Jew, ask for a drink from me, a Samaritan woman?\" (For Jews have no dealings with Samaritans.)"}, {"c": 4, "n": 10, "text": "Jesus answered her, \"If you knew the gift of God, and who it is who says to you, 'Give me a drink,' you would have asked him, and he would have given you living water.\""}, {"c": 4, "n": 11, "text": "The woman said to him, \"Sir, you have nothing to draw with, and the well is deep. From where then have you that living water?"}, {"c": 4, "n": 12, "text": "Are you greater than our father, Jacob, who gave us the well, and drank of it himself, as did his sons, and his cattle?\""}, {"c": 4, "n": 13, "text": "Jesus answered her, \"Everyone who drinks of this water will thirst again,"}, {"c": 4, "n": 14, "text": "but whoever drinks of the water that I will give him will never thirst; but the water that I will give him will become in him a well of water springing up to eternal life.\""}, {"c": 4, "n": 15, "text": "The woman said to him, \"Sir, give me this water, so that I don't get thirsty, neither come all the way here to draw.\""}, {"c": 4, "n": 16, "text": "Jesus said to her, \"Go, call your husband, and come here.\""}, {"c": 4, "n": 17, "text": "The woman answered, \"I have no husband.\" Jesus said to her, \"You said well, 'I have no husband,'"}, {"c": 4, "n": 18, "text": "for you have had five husbands; and he whom you now have is not your husband. This you have said truly.\""}, {"c": 4, "n": 19, "text": "The woman said to him, \"Sir, I perceive that you are a prophet."}, {"c": 4, "n": 20, "text": "Our fathers worshipped in this mountain, and you Jews say that in Jerusalem is the place where people ought to worship.\""}, {"c": 4, "n": 21, "text": "Jesus said to her, \"Woman, believe me, the hour comes, when neither in this mountain, nor in Jerusalem, will you worship the Father."}, {"c": 4, "n": 22, "text": "You worship that which you don't know. We worship that which we know; for salvation is from the Jews."}, {"c": 4, "n": 23, "text": "But the hour comes, and now is, when the true worshippers will worship the Father in spirit and truth, for the Father seeks such to be his worshippers."}, {"c": 4, "n": 24, "text": "God is a Spirit, and those who worship him must worship in spirit and truth.\""}, {"c": 4, "n": 25, "text": "The woman said to him, \"I know that Messiah comes,\" (he who is called Christ). \"When he has come, he will declare to us all things.\""}, {"c": 4, "n": 26, "text": "Jesus said to her, \"I who speak to you am he.\""}, {"c": 4, "n": 27, "text": "At this, his disciples came. They marveled that he was speaking with a woman; yet no one said, \"What are you looking for?\" or, \"Why do you speak with her?\""}, {"c": 4, "n": 28, "text": "So the woman left her water pot, and went away into the city, and said to the people,"}, {"c": 4, "n": 29, "text": "\"Come, see a man who told me everything that I did. Can this be the Christ?\""}, {"c": 4, "n": 30, "text": "They went out of the city, and were coming to him."}, {"c": 4, "n": 31, "text": "In the meanwhile, the disciples urged him, saying, \"Rabbi, eat.\""}, {"c": 4, "n": 32, "text": "But he said to them, \"I have food to eat that you don't know about.\""}, {"c": 4, "n": 33, "text": "The disciples therefore said one to another, \"Has anyone brought him something to eat?\""}, {"c": 4, "n": 34, "text": "Jesus said to them, \"My food is to do the will of him who sent me, and to accomplish his work."}, {"c": 4, "n": 35, "text": "Don't you say, 'There are yet four months until the harvest?' Behold, I tell you, lift up your eyes, and look at the fields, that they are white already to harvest."}, {"c": 4, "n": 36, "text": "He who reaps receives wages, and gathers fruit to eternal life; that both he who sows and he who reaps may rejoice together."}, {"c": 4, "n": 37, "text": "For in this the saying is true, 'One sows, and another reaps.'"}, {"c": 4, "n": 38, "text": "I sent you to reap that for which you haven't labored. Others have labored, and you have entered into their labor.\""}, {"c": 4, "n": 39, "text": "From that city many of the Samaritans believed in him because of the word of the woman, who testified, 'He told me everything that I did.\""}, {"c": 4, "n": 40, "text": "So when the Samaritans came to him, they begged him to stay with them. He stayed there two days."}, {"c": 4, "n": 41, "text": "Many more believed because of his word."}, {"c": 4, "n": 42, "text": "They said to the woman, \"Now we believe, not because of your speaking; for we have heard for ourselves, and know that this is indeed the Christ, the Savior of the world.\""}, {"c": 4, "n": 43, "text": "After the two days he went forth from there and went into Galilee."}, {"c": 4, "n": 44, "text": "For Jesus himself testified that a prophet has no honor in his own country."}, {"c": 4, "n": 45, "text": "So when he came into Galilee, the Galilaeans received him, having seen all the things that he did in Jerusalem at the feast, for they also went to the feast."}, {"c": 4, "n": 46, "text": "He came therefore again to Cana of Galilee, where he made the water into wine. There was a certain nobleman whose son was sick at Capernaum."}, {"c": 4, "n": 47, "text": "When he heard that Jesus had come out of Judea into Galilee, he went to him, and begged him that he would come down and heal his son, for he was at the point of death."}, {"c": 4, "n": 48, "text": "Jesus therefore said to him, \"Unless you see signs and wonders, you will in no way believe.\""}, {"c": 4, "n": 49, "text": "The nobleman said to him, \"Sir, come down before my child dies.\""}, {"c": 4, "n": 50, "text": "Jesus said to him, \"Go your way. Your son lives.\" The man believed the word that Jesus spoke to him, and he went his way."}, {"c": 4, "n": 51, "text": "As he was now going down, his servants met him and reported, saying \"your child lives!\""}, {"c": 4, "n": 52, "text": "So he inquired of them the hour when he began to get better. They said therefore to him, \"Yesterday at the seventh hour, the fever left him.\""}, {"c": 4, "n": 53, "text": "So the father knew that it was at that hour in which Jesus said to him, \"Your son lives.\" He believed, as did his whole house."}, {"c": 4, "n": 54, "text": "This is again the second sign that Jesus did, having come out of Judea into Galilee."}]}, "john_5": {"id": "john_5", "ref": "John 5", "verses": [{"c": 5, "n": 1, "text": "After these things, there was a feast of the Jews, and Jesus went up to Jerusalem."}, {"c": 5, "n": 2, "text": "Now in Jerusalem by the sheep gate, there is a pool, which is called in Hebrew, \"Bethesda,\" having five porches."}, {"c": 5, "n": 3, "text": "In these lay a great multitude of those who were sick, blind, lame, or paralyzed, waiting for the moving of the water;"}, {"c": 5, "n": 4, "text": "for an angel of the Lord went down at certain times into the pool, and stirred up the water. Whoever stepped in first after the stirring of the water was made whole of whatever disease he was afflicted with."}, {"c": 5, "n": 5, "text": "A certain man was there, who had been sick for thirty-eight years."}, {"c": 5, "n": 6, "text": "When Jesus saw him lying there, and knew that he had been sick for a long time, he asked him, \"Do you want to be made well?\""}, {"c": 5, "n": 7, "text": "The sick man answered him, \"Sir, I have no one to put me into the pool when the water is stirred up, but while I'm coming, another steps down before me.\""}, {"c": 5, "n": 8, "text": "Jesus said to him, \"Arise, take up your mat, and walk.\""}, {"c": 5, "n": 9, "text": "Immediately, the man was made well, and took up his mat and walked. Now it was the Sabbath on that day."}, {"c": 5, "n": 10, "text": "So the Jews said to him who was cured, \"It is the Sabbath. It is not lawful for you to carry your mat.\""}, {"c": 5, "n": 11, "text": "He answered them, \"He who made me well, the same said to me, 'Take up your mat, and walk.'\""}, {"c": 5, "n": 12, "text": "Then they asked him, \"Who is the man who said to you, 'Take up your mat, and walk'?\""}, {"c": 5, "n": 13, "text": "But he who was healed didn't know who it was, for Jesus had withdrawn, a crowd being in the place."}, {"c": 5, "n": 14, "text": "Afterward Jesus found him in the temple, and said to him, \"Behold, you are made well. Sin no more, so that nothing worse happens to you.\""}, {"c": 5, "n": 15, "text": "The man went away, and told the Jews that it was Jesus who had made him well."}, {"c": 5, "n": 16, "text": "For this cause the Jews persecuted Jesus, and sought to kill him, because he did these things on the Sabbath."}, {"c": 5, "n": 17, "text": "But Jesus answered them, \"My Father is still working, so I am working, too.\""}, {"c": 5, "n": 18, "text": "For this cause therefore the Jews sought the more to kill him, because he not only broke the Sabbath, but also called God his own Father, making himself equal with God."}, {"c": 5, "n": 19, "text": "Jesus therefore answered them, \"Most assuredly, I tell you, the Son can do nothing of himself, but what he sees the Father doing. For whatever things he does, these the Son also does likewise."}, {"c": 5, "n": 20, "text": "For the Father loves the Son, and shows him all things that he himself does. He will show him greater works than these, that you may marvel."}, {"c": 5, "n": 21, "text": "For as the Father raises the dead and gives them life, even so the Son also gives life to whom he desires."}, {"c": 5, "n": 22, "text": "For neither does the Father judge any man, but he has given all judgment to the Son,"}, {"c": 5, "n": 23, "text": "that all may honor the Son, even as they honor the Father. He who doesn't honor the Son doesn't honor the Father who sent him."}, {"c": 5, "n": 24, "text": "Most assuredly I tell you, he who hears my word, and believes him who sent me, has eternal life, and doesn't come into judgment, but has passed out of death into life."}, {"c": 5, "n": 25, "text": "Most assuredly, I tell you, the hour comes, and now is, when the dead will hear the Son of God's voice; and those who hear will live."}, {"c": 5, "n": 26, "text": "For as the Father has life in himself, even so he gave to the Son also to have life in himself."}, {"c": 5, "n": 27, "text": "He also gave him authority to execute judgment, because he is a son of man."}, {"c": 5, "n": 28, "text": "Don't marvel at this, for the hour comes, in which all that are in the tombs will hear his voice,"}, {"c": 5, "n": 29, "text": "and will come forth; those who have done good, to the resurrection of life; and those who have done evil, to the resurrection of judgment."}, {"c": 5, "n": 30, "text": "I can of myself do nothing. As I hear, I judge, and my judgment is righteous; because I don't seek my own will, but the will of my Father who sent me."}, {"c": 5, "n": 31, "text": "\"If I testify about myself, my witness is not valid."}, {"c": 5, "n": 32, "text": "It is another who testifies about me. I know that the testimony which he testifies about me is true."}, {"c": 5, "n": 33, "text": "You have sent to John, and he has testified to the truth."}, {"c": 5, "n": 34, "text": "But the testimony which I receive is not from man. However, I say these things that you may be saved."}, {"c": 5, "n": 35, "text": "He was the lamp that burns and shines, and you were willing to rejoice for a while in his light."}, {"c": 5, "n": 36, "text": "But the testimony which I have is greater than that of John, for the works which the Father has given me to accomplish, the very works that I do, testify about me, that the Father has sent me."}, {"c": 5, "n": 37, "text": "The Father himself, who sent me, has testified about me. You have neither heard his voice at any time, nor seen his form."}, {"c": 5, "n": 38, "text": "You don't have his word living in you; for whom he sent, him you don't believe."}, {"c": 5, "n": 39, "text": "You search the scriptures, because you think that in them you have eternal life; and these are they which testify about me."}, {"c": 5, "n": 40, "text": "Yet you will not come to me, that you may have life."}, {"c": 5, "n": 41, "text": "I don't receive glory from men."}, {"c": 5, "n": 42, "text": "But I know you, that you don't have God's love in yourselves."}, {"c": 5, "n": 43, "text": "I have come in my Father's name, and you don't receive me. If another comes in his own name, you will receive him."}, {"c": 5, "n": 44, "text": "How can you believe, who receive glory from one another, and you don't seek the glory that comes from the only God?"}, {"c": 5, "n": 45, "text": "\"Don't think that I will accuse you to the Father. There is one who accuses you, even Moses, on whom you have set your hope."}, {"c": 5, "n": 46, "text": "For if you believed Moses, you would believe me; for he wrote about me."}, {"c": 5, "n": 47, "text": "But if you don't believe his writings, how will you believe my words?\""}]}, "john_6": {"id": "john_6", "ref": "John 6", "verses": [{"c": 6, "n": 1, "text": "After these things, Jesus went away to the other side of the sea of Galilee, which is also called the Sea of Tiberias."}, {"c": 6, "n": 2, "text": "A great multitude followed him, because they saw the signs which he did on those who were sick."}, {"c": 6, "n": 3, "text": "Jesus went up into the mountain, and he sat there with his disciples."}, {"c": 6, "n": 4, "text": "Now the Passover, the feast of the Jews, was at hand."}, {"c": 6, "n": 5, "text": "Jesus therefore lifting up his eyes, and seeing that a great multitude was coming to him, said to Philip, \"Where are we to buy bread, that these may eat?\""}, {"c": 6, "n": 6, "text": "This he said to test him, for he himself knew what he would do."}, {"c": 6, "n": 7, "text": "Philip answered him, \"Two hundred denarii worth of bread is not sufficient for them, that everyone of them may receive a little.\""}, {"c": 6, "n": 8, "text": "One of his disciples, Andrew, Simon Peter's brother, said to him,"}, {"c": 6, "n": 9, "text": "\"There is a boy here who has five barley loaves and two fish, but what are these among so many?\""}, {"c": 6, "n": 10, "text": "Jesus said, \"Have the people sit down.\" Now there was much grass in that place. So the men sat down, in number about five thousand."}, {"c": 6, "n": 11, "text": "Jesus took the loaves; and having given thanks, he distributed to the disciples, and the disciples to those who were sitting down; likewise also of the fish as much as they desired."}, {"c": 6, "n": 12, "text": "When they were filled, he said to his disciples, \"Gather up the broken pieces which are left over, that nothing be lost.\""}, {"c": 6, "n": 13, "text": "So they gathered them up, and filled twelve baskets with broken pieces from the five barley loaves, which were left over by those who had eaten."}, {"c": 6, "n": 14, "text": "When therefore the people saw the sign which Jesus did, they said, \"This is truly the prophet who comes into the world.\""}, {"c": 6, "n": 15, "text": "Jesus therefore, perceiving that they were about to come and take him by force, to make him king, withdrew again into the mountain by himself."}, {"c": 6, "n": 16, "text": "When evening came, his disciples went down to the sea,"}, {"c": 6, "n": 17, "text": "and they entered into the boat, and were going over the sea to Capernaum. It was now dark, and Jesus had not come to them."}, {"c": 6, "n": 18, "text": "The sea was rising by reason of a great wind that blew."}, {"c": 6, "n": 19, "text": "When therefore they had rowed about twenty-five or thirty stadia, they saw Jesus walking on the sea, and drawing near to the boat; and they were afraid."}, {"c": 6, "n": 20, "text": "But he said to them, \"It is I. Don't be afraid.\""}, {"c": 6, "n": 21, "text": "They were willing therefore to receive him into the boat. Immediately the boat was at the land where they were going."}, {"c": 6, "n": 22, "text": "On the next day, the multitude that stood on the other side of the sea saw that there was no other boat there, except the one which his disciples had entered, and that Jesus hadn't entered with his disciples into the boat, but his disciples went away alone."}, {"c": 6, "n": 23, "text": "However boats from Tiberias came near to the place where they ate the bread after the Lord had given thanks."}, {"c": 6, "n": 24, "text": "When the multitude therefore saw that Jesus wasn't there, neither his disciples, they themselves got into the boats, and came to Capernaum, seeking Jesus."}, {"c": 6, "n": 25, "text": "When they found him on the other side of the sea, they asked him, \"Rabbi, when did you come here?\""}, {"c": 6, "n": 26, "text": "Jesus answered them, \"Most assuredly I tell you, you seek me, not because you saw signs, but because you ate of the loaves, and were filled."}, {"c": 6, "n": 27, "text": "Don't work for the food which perishes, but for the food which remains to eternal life, which the Son of Man will give to you. For the Father, even God, has sealed him.\""}, {"c": 6, "n": 28, "text": "They said therefore to him, \"What must we do, that we may work the works of God?\""}, {"c": 6, "n": 29, "text": "Jesus answered them, \"This is the work of God, that you believe in him whom he has sent.\""}, {"c": 6, "n": 30, "text": "They said therefore to him, \"What then do you do for a sign, that we may see, and believe you? What work do you do?"}, {"c": 6, "n": 31, "text": "Our fathers ate the manna in the wilderness. As it is written, 'He gave them bread out of the sky to eat.'\""}, {"c": 6, "n": 32, "text": "Jesus therefore said to them, \"Most assuredly, I tell you, it wasn't Moses who gave you the bread out of heaven, but my Father gives you the true bread out of heaven."}, {"c": 6, "n": 33, "text": "For the bread of God is that which comes down out of heaven, and gives life to the world.\""}, {"c": 6, "n": 34, "text": "They said therefore to him, \"Lord, always give us this bread.\""}, {"c": 6, "n": 35, "text": "Jesus said to them. \"I am the bread of life. He who comes to me will not be hungry, and he who believes in me will never be thirsty."}, {"c": 6, "n": 36, "text": "But I told you that you have seen me, and yet don't believe."}, {"c": 6, "n": 37, "text": "All that which the Father gives me will come to me. Him who comes to me I will in no way throw out."}, {"c": 6, "n": 38, "text": "For I have come down from heaven, not to do my own will, but the will of him who sent me."}, {"c": 6, "n": 39, "text": "This is the will of my Father who sent me, that of all who he has given to me I should lose nothing, but should raise them up at the last day."}, {"c": 6, "n": 40, "text": "This is the will of the one who sent me, that everyone who sees the Son, and believes in him, should have eternal life; and I will raise him up at the last day.\""}, {"c": 6, "n": 41, "text": "The Jews therefore murmured concerning him, because he said, \"I am the bread which came down out of heaven.\""}, {"c": 6, "n": 42, "text": "They said, \"Isn't this Jesus, the son of Joseph, whose father and mother we know? How then does he say, 'I have come down out of heaven?'\""}, {"c": 6, "n": 43, "text": "Therefore Jesus answered them, \"Don't murmur among yourselves."}, {"c": 6, "n": 44, "text": "No one can come to me unless the Father who sent me draws him, and I will raise him up in the last day."}, {"c": 6, "n": 45, "text": "It is written in the prophets, 'They will all be taught by God.' Everyone who hears from the Father, and has learned, comes to me."}, {"c": 6, "n": 46, "text": "Not that any man has seen the Father, except he who is from God. He has seen the Father."}, {"c": 6, "n": 47, "text": "Most assuredly, I tell you, he who believes in me has eternal life."}, {"c": 6, "n": 48, "text": "I am the bread of life."}, {"c": 6, "n": 49, "text": "Your fathers ate the manna in the wilderness, and they died."}, {"c": 6, "n": 50, "text": "This is the bread which comes down out of heaven, that a man may eat of it, and not die."}, {"c": 6, "n": 51, "text": "I am the living bread which came down out of heaven. If anyone eats of this bread, he will live forever. Yes, the bread which I will give is my flesh, for the life of the world.\""}, {"c": 6, "n": 52, "text": "The Jews therefore contended with one another, saying, \"How can this man give us his flesh to eat?\""}, {"c": 6, "n": 53, "text": "Jesus therefore said to them, \"Most assuredly I tell you, unless you eat the flesh of the Son of Man and drink his blood, you don't have life in yourselves."}, {"c": 6, "n": 54, "text": "He who eats my flesh and drinks my blood has eternal life, and I will raise him up at the last day."}, {"c": 6, "n": 55, "text": "For my flesh is food indeed, and my blood is drink indeed."}, {"c": 6, "n": 56, "text": "He who eats my flesh and drinks my blood lives in me, and I in him."}, {"c": 6, "n": 57, "text": "As the living Father sent me, and I live because of the Father; so he who feeds on me, he will also live because of me."}, {"c": 6, "n": 58, "text": "This is the bread which came down out of heaven -- not as our fathers ate the manna, and died. He who eats this bread will live forever.\""}, {"c": 6, "n": 59, "text": "These things he said in the synagogue, as he taught in Capernaum."}, {"c": 6, "n": 60, "text": "Therefore many of his disciples, when they heard this, said, \"This is a hard saying! Who can hear it?\""}, {"c": 6, "n": 61, "text": "But Jesus knowing in himself that his disciples murmured at this, said to them, \"Does this cause you to stumble?"}, {"c": 6, "n": 62, "text": "What if you would see the Son of Man ascending to where he was before?"}, {"c": 6, "n": 63, "text": "It is the spirit who gives life. The flesh profits nothing. The words that I speak to you are spirit, and are life."}, {"c": 6, "n": 64, "text": "But there are some of you who don't believe.\" For Jesus knew from the beginning who they were who didn't believe, and who it was who would betray him."}, {"c": 6, "n": 65, "text": "He said, \"For this cause have I said to you that no one can come to me, except it be given to him by my Father.\""}, {"c": 6, "n": 66, "text": "At this, many of his disciples went back, and walked no more with him."}, {"c": 6, "n": 67, "text": "Jesus said therefore to the twelve, \"You don't also want to go away, do you?\""}, {"c": 6, "n": 68, "text": "Simon Peter answered him, \"Lord, to whom would we go? You have the words of eternal life."}, {"c": 6, "n": 69, "text": "We have come to believe and know that you are the Christ, the Son of the living God.\""}, {"c": 6, "n": 70, "text": "Jesus answered them, \"Didn't I choose you, the twelve, and one of you is a devil?\""}, {"c": 6, "n": 71, "text": "Now he spoke of Judas, the son of Simon Iscariot, for it was he who would betray him, being one of the twelve."}]}, "john_7": {"id": "john_7", "ref": "John 7", "verses": [{"c": 7, "n": 1, "text": "After these things, Jesus walked in Galilee, for he would not walk in Judea, because the Jews sought to kill him."}, {"c": 7, "n": 2, "text": "Now the feast of the Jews, the Feast of Booths, was at hand."}, {"c": 7, "n": 3, "text": "His brothers therefore said to him, \"Depart from here, and go into Judea, that your disciples also may see your works which you do."}, {"c": 7, "n": 4, "text": "For no man does anything in secret, and himself seeks to be known openly. If you do these things, reveal yourself to the world.\""}, {"c": 7, "n": 5, "text": "For even his brothers didn't believe in him."}, {"c": 7, "n": 6, "text": "Jesus therefore said to them, \"My time has not yet come, but your time is always ready."}, {"c": 7, "n": 7, "text": "The world can't hate you, but it hates me, because I testify about it, that its works are evil."}, {"c": 7, "n": 8, "text": "You go up to the feast. I am not yet going up to this feast, because my time is not yet fulfilled.\""}, {"c": 7, "n": 9, "text": "Having said these things to them, he stayed in Galilee."}, {"c": 7, "n": 10, "text": "But when his brothers had gone up to the feast, then he also went up, not publicly, but as it were in secret."}, {"c": 7, "n": 11, "text": "The Jews therefore sought him at the feast, and said, \"Where is he?\""}, {"c": 7, "n": 12, "text": "There was much murmuring among the multitudes concerning him. Some said, \"He is a good man.\" Others said, \"Not so, but he leads the multitude astray.\""}, {"c": 7, "n": 13, "text": "Yet no one spoke openly of him for fear of the Jews."}, {"c": 7, "n": 14, "text": "But when it was now the midst of the feast, Jesus went up into the temple and taught."}, {"c": 7, "n": 15, "text": "The Jews therefore marveled, saying, \"How does this man know letters, having never been educated?\""}, {"c": 7, "n": 16, "text": "Jesus therefore answered them, \"My teaching is not mine, but his who sent me."}, {"c": 7, "n": 17, "text": "If anyone desires to do his will, he will know of the teaching, whether it is from God, or if I speak from myself."}, {"c": 7, "n": 18, "text": "He who speaks from himself seeks his own glory, but he who seeks the glory of him who sent him, the same is true, and no unrighteousness is in him."}, {"c": 7, "n": 19, "text": "Didn't Moses give you the law, and yet none of you keeps the law? Why do you seek to kill me?\""}, {"c": 7, "n": 20, "text": "The multitude answered, \"You have a demon! Who seeks to kill you?\""}, {"c": 7, "n": 21, "text": "Jesus answered them, \"I did one work, and you all marvel because of it."}, {"c": 7, "n": 22, "text": "Moses has given you circumcision (not that it is of Moses, but of the fathers), and on the Sabbath you circumcise a boy."}, {"c": 7, "n": 23, "text": "If a boy receives circumcision on the Sabbath, that the law of Moses may not be broken, are you angry with me, because I made a man every bit whole on the Sabbath?"}, {"c": 7, "n": 24, "text": "Don't judge according to appearance, but judge righteous judgment.\""}, {"c": 7, "n": 25, "text": "Some therefore of them of Jerusalem said, \"Isn't this he whom they seek to kill?"}, {"c": 7, "n": 26, "text": "Behold, he speaks openly, and they say nothing to him. Can it be that the rulers indeed know that this is truly the Christ?"}, {"c": 7, "n": 27, "text": "However we know where this man comes from, but when the Christ comes, no one will know where he comes from.\""}, {"c": 7, "n": 28, "text": "Jesus therefore cried out in the temple, teaching and saying, \"You both know me, and know where I am from. I have not come of myself, but he who sent me is true, whom you don't know."}, {"c": 7, "n": 29, "text": "I know him, because I am from him, and he sent me.\""}, {"c": 7, "n": 30, "text": "They sought therefore to take him. No one laid a hand on him, because his hour was not yet come."}, {"c": 7, "n": 31, "text": "But of the multitude, many believed in him. They said, \"When the Christ comes, will he do more signs than those which this man has done?\""}, {"c": 7, "n": 32, "text": "The Pharisees heard the multitude murmuring these things concerning him, and the chief priests and the Pharisees sent officers to take him."}, {"c": 7, "n": 33, "text": "Then Jesus said, \"Yet a little while, am I with you, then I go to him who sent me."}, {"c": 7, "n": 34, "text": "You will seek me, and won't find me; and where I am, you can't come.\""}, {"c": 7, "n": 35, "text": "The Jews therefore said among themselves, \"Where will this man go that we won't find him? Will he go to the Dispersion among the Greeks, and teach the Greeks?"}, {"c": 7, "n": 36, "text": "What is this word that he said, 'You will seek me, and won't find me; and where I am, you can't come?'\""}, {"c": 7, "n": 37, "text": "Now on the last and greatest day of the feast, Jesus stood and cried out, \"If anyone is thirsty, let him come to me and drink!"}, {"c": 7, "n": 38, "text": "He who believes in me, as the scripture has said, from within him will flow rivers of living water.\""}, {"c": 7, "n": 39, "text": "But he said this about the Spirit, which those believing in him were to receive. For the Holy Spirit was not yet given, because Jesus wasn't yet glorified."}, {"c": 7, "n": 40, "text": "Many of the multitude therefore, when they heard these words, said, \"This is truly the prophet.\""}, {"c": 7, "n": 41, "text": "Others said, \"This is the Christ.\" But some said, \"What, does the Christ come out of Galilee?"}, {"c": 7, "n": 42, "text": "Hasn't the scripture said that the Christ comes of the seed of David, and from Bethlehem, the village where David was?\""}, {"c": 7, "n": 43, "text": "So there arose a division in the multitude because of him."}, {"c": 7, "n": 44, "text": "Some of them would have taken him, but no one laid hands on him."}, {"c": 7, "n": 45, "text": "The officers therefore came to the chief priests and Pharisees, and they said to them, \"Why didn't you bring him?\""}, {"c": 7, "n": 46, "text": "The officers answered, \"No man ever spoke like this man!\""}, {"c": 7, "n": 47, "text": "The Pharisees therefore answered them, \"Are you also led astray?"}, {"c": 7, "n": 48, "text": "Has any of the rulers believed in him, or of the Pharisees?"}, {"c": 7, "n": 49, "text": "But this cursed multitude doesn't know the law.\""}, {"c": 7, "n": 50, "text": "Nicodemus (he who came to him by night, being one of them) said to them,"}, {"c": 7, "n": 51, "text": "\"Does our law judge a man, unless it first hears from him personally and knows what he does?\""}, {"c": 7, "n": 52, "text": "They answered him, \"Are you also from Galilee? Search, and see that no prophet has arisen out of Galilee.\""}, {"c": 7, "n": 53, "text": "Everyone went to his own house,"}]}, "john_8": {"id": "john_8", "ref": "John 8", "verses": [{"c": 8, "n": 1, "text": "but Jesus went to the Mount of Olives."}, {"c": 8, "n": 2, "text": "At dawn, he came again into the temple, and all the people came to him. He sat down, and taught them."}, {"c": 8, "n": 3, "text": "The scribes and the Pharisees brought a woman taken in adultery. Having set her in the midst,"}, {"c": 8, "n": 4, "text": "they told him, \"Teacher, we found this woman in adultery, in the very act."}, {"c": 8, "n": 5, "text": "Now in our law, Moses commanded us to stone such. What then do you say about her?\""}, {"c": 8, "n": 6, "text": "They said this testing him, that they might have something to accuse him of. But Jesus stooped down, and wrote on the ground with his finger, as if he didn't hear."}, {"c": 8, "n": 7, "text": "But when they continued asking him, he lifted himself up, and said to them, \"He who is without sin among you, let him throw the first stone at her.\""}, {"c": 8, "n": 8, "text": "Again he stooped down, and with his finger wrote on the ground."}, {"c": 8, "n": 9, "text": "They, when they heard it, being convicted by their conscience, went out one by one, beginning from the oldest, even to the last. Jesus was left alone with the woman where she was, in the midst."}, {"c": 8, "n": 10, "text": "Jesus lifted himself up, and seeing no one but the woman, said to her, \"Woman, where are they? Did no one condemn you?\""}, {"c": 8, "n": 11, "text": "She said, \"No one, Lord.\" Jesus said, \"Neither do I condemn you. Go your way. From now on, sin no more.\""}, {"c": 8, "n": 12, "text": "Again, therefore, Jesus spoke to them, saying, \"I am the light of the world. He who follows me will not walk in the darkness, but will have the light of life.\""}, {"c": 8, "n": 13, "text": "The Pharisees therefore said to him, \"You testify about yourself. Your witness is not valid.\""}, {"c": 8, "n": 14, "text": "Jesus answered them, \"Even if I testify about myself, my witness is true, for I know where I came from, and where I am going; but you don't know where I came from, or where I am going."}, {"c": 8, "n": 15, "text": "You judge according to the flesh. I judge no one."}, {"c": 8, "n": 16, "text": "Even if I do judge, my judgment is true, for I am not alone, but I am with the Father who sent me."}, {"c": 8, "n": 17, "text": "It's also written in your law that the testimony of two men is valid."}, {"c": 8, "n": 18, "text": "I am he who testifies about myself, and the Father who sent me testifies about me.\""}, {"c": 8, "n": 19, "text": "They said therefore to him, \"Where is your Father?\" Jesus answered, \"You know neither me, nor my Father. If you knew me, you would know my Father also.\""}, {"c": 8, "n": 20, "text": "Jesus spoke these words in the treasury, as he taught in the temple. No one took him, because his hour had not yet come."}, {"c": 8, "n": 21, "text": "Jesus said therefore again to them, \"I am going away, and you will seek me, and will die in your sins. Where I go, you can't come.\""}, {"c": 8, "n": 22, "text": "The Jews therefore said, \"Will he kill himself, that he says, 'Where I am going, you can't come?'\""}, {"c": 8, "n": 23, "text": "He said to them, \"You are from beneath. I am from above. You are of this world. I am not of this world."}, {"c": 8, "n": 24, "text": "I said therefore to you that you will die in your sins; for unless you believe that I am he, you will die in your sins.\""}, {"c": 8, "n": 25, "text": "They said therefore to him, \"Who are you?\" Jesus said to them, \"Just what I have been saying to you from the beginning."}, {"c": 8, "n": 26, "text": "I have many things to speak and to judge concerning you. However he who sent me is true; and the things which I heard from him, these I say to the world.\""}, {"c": 8, "n": 27, "text": "They didn't perceive that he spoke to them about the Father."}, {"c": 8, "n": 28, "text": "Jesus therefore said to them, \"When you have lifted up the Son of Man, then will you know that I am he, and that I do nothing of myself, but as my Father taught me, I say these things."}, {"c": 8, "n": 29, "text": "He who sent me is with me. The Father hasn't left me alone, for I always do the things that are pleasing to him.\""}, {"c": 8, "n": 30, "text": "As he spoke these things, many believed in him."}, {"c": 8, "n": 31, "text": "Jesus therefore said to those Jews who had believed him, \"If you remain in my word, then you are truly my disciples."}, {"c": 8, "n": 32, "text": "You will know the truth, and the truth will make you free.\""}, {"c": 8, "n": 33, "text": "They answered him, \"We are Abraham's seed, and have never yet been in bondage to anyone. How do you say, 'You will be made free?'\""}, {"c": 8, "n": 34, "text": "Jesus answered them, \"Most assuredly I tell you, everyone who commits sin is the bondservant of sin."}, {"c": 8, "n": 35, "text": "A bondservant doesn't live in the house forever. A son remains forever."}, {"c": 8, "n": 36, "text": "If therefore the Son makes you free, you will be free indeed."}, {"c": 8, "n": 37, "text": "I know that you are Abraham's seed, yet you seek to kill me, because my word finds no place in you."}, {"c": 8, "n": 38, "text": "I say the things which I have seen with my Father; and you also do the things which you have seen with your father.\""}, {"c": 8, "n": 39, "text": "They answered him, \"Our father is Abraham.\" Jesus said to them, \"If you were Abraham's children, you would do the works of Abraham."}, {"c": 8, "n": 40, "text": "But now you seek to kill me, a man who has told you the truth, which I heard from God. Abraham didn't do this."}, {"c": 8, "n": 41, "text": "You do the works of your father.\" They said to him, \"We were not born of sexual immorality. We have one Father, God.\""}, {"c": 8, "n": 42, "text": "Therefore Jesus said to them, \"If God were your Father, you would love me, for I came forth and have come from God. For neither have I come of myself, but he sent me."}, {"c": 8, "n": 43, "text": "Why don't you understand my speech? Because you can't hear my word."}, {"c": 8, "n": 44, "text": "You are of your Father, the devil, and it is your desire to do the lusts of your father. He was a murderer from the beginning, and doesn't stand in the truth, because there is no truth in him. When he speaks a lie, he speaks of his own; for he is a liar, and the father of it."}, {"c": 8, "n": 45, "text": "But because I tell the truth, you don't believe me."}, {"c": 8, "n": 46, "text": "Which of you convicts me of sin? If I tell the truth, why do you not believe me?"}, {"c": 8, "n": 47, "text": "He who is of God hears the words of God. For this cause you don't hear, because you are not of God.\""}, {"c": 8, "n": 48, "text": "Then the Jews answered him, \"Don't we say well that you are a Samaritan, and have a demon?\""}, {"c": 8, "n": 49, "text": "Jesus answered, \"I don't have a demon, but I honor my Father, and you dishonor me."}, {"c": 8, "n": 50, "text": "But I don't seek my own glory. There is one who seeks and judges."}, {"c": 8, "n": 51, "text": "Most assuredly, I tell you, if a person keeps my word, he will never see death.\""}, {"c": 8, "n": 52, "text": "Then the Jews said to him, \"Now we know that you have a demon. Abraham died, and the prophets; and you say, 'If a man keeps my word, he will never taste of death.'"}, {"c": 8, "n": 53, "text": "Are you greater than our father, Abraham, who died? The prophets died. Who do you make yourself out to be?\""}, {"c": 8, "n": 54, "text": "Jesus answered, \"If I glorify myself, my glory is nothing. It is my Father who glorifies me, of whom you say that he is our God."}, {"c": 8, "n": 55, "text": "You have not known him, but I know him. If I said, 'I don't know him,' I would be like you, a liar. But I know him, and keep his word."}, {"c": 8, "n": 56, "text": "Your father Abraham rejoiced to see my day. He saw it, and was glad.\""}, {"c": 8, "n": 57, "text": "The Jews therefore said to him, \"You are not yet fifty years old, and have you seen Abraham?\""}, {"c": 8, "n": 58, "text": "Jesus said to them, \"Most assuredly, I tell you, before Abraham was born, I AM.\""}, {"c": 8, "n": 59, "text": "They took up stones therefore to throw at him, but Jesus hid himself, and went out of the temple, going through the midst of them, and so passed by."}]}, "john_9": {"id": "john_9", "ref": "John 9", "verses": [{"c": 9, "n": 1, "text": "As he passed by, he saw a man blind from his birth."}, {"c": 9, "n": 2, "text": "His disciples asked him, \"Rabbi, who sinned, this man or his parents, that he was born blind?\""}, {"c": 9, "n": 3, "text": "Jesus answered, \"Neither did this man sin, nor his parents. But, that the works of God might be revealed in him,"}, {"c": 9, "n": 4, "text": "I must work the works of him who sent me, while it is day. The night is coming, when no one can work."}, {"c": 9, "n": 5, "text": "When I am in the world, I am the light of the world.\""}, {"c": 9, "n": 6, "text": "When he had said this, he spat on the ground, made mud with the saliva, anointed the blind man's eyes with the mud,"}, {"c": 9, "n": 7, "text": "and said to him, \"Go, wash in the pool of Siloam\" (which means \"Sent\"). So he went away, washed, and came seeing."}, {"c": 9, "n": 8, "text": "The neighbors therefore, and those who saw that he was blind, before, said, \"Isn't this he who sat and begged?\""}, {"c": 9, "n": 9, "text": "Others said, \"It is he.\" Still others said, \"He is like him.\" He said, \"I am he.\""}, {"c": 9, "n": 10, "text": "They said therefore to him, \"How were your eyes opened?\""}, {"c": 9, "n": 11, "text": "He answered, \"A man called Jesus made mud, anointed my eyes, and said to me, \"Go to the pool of Siloam, and wash.\" So I went away and washed, and I received sight.\""}, {"c": 9, "n": 12, "text": "Then they asked him, \"Where is he?\" He said, \"I don't know.\""}, {"c": 9, "n": 13, "text": "They brought him who before was blind to the Pharisees."}, {"c": 9, "n": 14, "text": "It was a Sabbath when Jesus made the mud and opened his eyes."}, {"c": 9, "n": 15, "text": "Again therefore the Pharisees also asked him how he received his sight. He said to them, \"He put mud on my eyes, I washed, and I see.\""}, {"c": 9, "n": 16, "text": "Some therefore of the Pharisees said, \"This man is not from God, because he doesn't keep the Sabbath.\" Others said, \"How can a man who is a sinner do such signs?\" There was division among them."}, {"c": 9, "n": 17, "text": "Therefore they asked the blind man again, \"What do you say about him, in that he opened your eyes?\" He said, \"He is a prophet.\""}, {"c": 9, "n": 18, "text": "The Jews therefore did not believe concerning him, that he had been blind, and had received his sight, until they called the parents of him who had received his sight,"}, {"c": 9, "n": 19, "text": "and asked them, \"Is this your son, who you say was born blind? How then does he now see?\""}, {"c": 9, "n": 20, "text": "His parents answered them, \"We know that this is our son, and that he was born blind;"}, {"c": 9, "n": 21, "text": "but how he now sees, we don't know; or who opened his eyes, we don't know. He is of age. Ask him. He will speak for himself.\""}, {"c": 9, "n": 22, "text": "His parents said these things because they feared the Jews; for the Jews had already agreed that if any man would confess him as Christ, he would be put out of the synagogue."}, {"c": 9, "n": 23, "text": "Therefore his parents said, \"He is of age. Ask him.\""}, {"c": 9, "n": 24, "text": "So they called the man who was blind a second time, and said to him, \"Give glory to God. We know that this man is a sinner.\""}, {"c": 9, "n": 25, "text": "He therefore answered, \"I don't know if he is a sinner. One thing I know: that though I was blind, now I see.\""}, {"c": 9, "n": 26, "text": "They said to him again, \"What did he do to you? How did he open your eyes?\""}, {"c": 9, "n": 27, "text": "He answered them, \"I told you already, and you didn't listen. Why do you want to hear it again? Do you also want to become his disciples?\""}, {"c": 9, "n": 28, "text": "They became abusive towards him and said, \"You are his disciple, but we are disciples of Moses."}, {"c": 9, "n": 29, "text": "We know that God has spoken to Moses. But as for this man, we don't know where he comes from.\""}, {"c": 9, "n": 30, "text": "The man answered them, \"How amazing! You don't know where he comes from, yet he opened my eyes."}, {"c": 9, "n": 31, "text": "We know that God doesn't listen to sinners, but if anyone is a worshipper of God, and does his will, he listens to him."}, {"c": 9, "n": 32, "text": "Since the world began it has never been heard of that anyone opened the eyes of a man born blind."}, {"c": 9, "n": 33, "text": "If this man were not from God, he could do nothing.\""}, {"c": 9, "n": 34, "text": "They answered him, \"You were altogether born in sins, and do you teach us?\" They threw him out."}, {"c": 9, "n": 35, "text": "Jesus heard that they had thrown him out, and finding him, he said, \"Do you believe in the Son of God?\""}, {"c": 9, "n": 36, "text": "He answered, \"Who is he, Lord, that I may believe in him?\""}, {"c": 9, "n": 37, "text": "Jesus said to him, \"You have both seen him, and it is he who speaks with you.\""}, {"c": 9, "n": 38, "text": "He said, \"Lord, I believe!\" and he worshipped him."}, {"c": 9, "n": 39, "text": "Jesus said, \"I came into this world for judgment, that those who don't see may see; and that those who see may become blind.\""}, {"c": 9, "n": 40, "text": "Those of the Pharisees who were with him heard these things, and said to him, \"Are we also blind?\""}, {"c": 9, "n": 41, "text": "Jesus said to them, \"If you were blind, you would have no sin; but now you say, 'We see.' Therefore your sin remains."}]}, "john_10": {"id": "john_10", "ref": "John 10", "verses": [{"c": 10, "n": 1, "text": "\"Most assuredly, I tell you, he who doesn't enter by the door into the sheep fold, but climbs up some other way, the same is a thief and a robber."}, {"c": 10, "n": 2, "text": "But he who enters in by the door is the shepherd of the sheep."}, {"c": 10, "n": 3, "text": "The gatekeeper opens the gate for him, and the sheep listen to his voice. He calls his own sheep by name, and leads them out."}, {"c": 10, "n": 4, "text": "Whenever he brings out his own sheep, he goes before them, and the sheep follow him, for they know his voice."}, {"c": 10, "n": 5, "text": "They will by no means follow a stranger, but will flee from him; for they don't know the voice of strangers.\""}, {"c": 10, "n": 6, "text": "Jesus spoke this parable to them, but they didn't understand what he was telling them."}, {"c": 10, "n": 7, "text": "Jesus therefore said to them again, \"Most assuredly, I tell you, I am the sheep's door."}, {"c": 10, "n": 8, "text": "All who came before me are thieves and robbers, but the sheep didn't listen to them."}, {"c": 10, "n": 9, "text": "I am the door. If anyone enters in by me, he will be saved, and will go in and go out, and will find pasture."}, {"c": 10, "n": 10, "text": "The thief only comes to steal, kill, and destroy. I came that they may have life, and may have it abundantly."}, {"c": 10, "n": 11, "text": "I am the good shepherd. The good shepherd lays down his life for the sheep."}, {"c": 10, "n": 12, "text": "He who is a hired hand, and not a shepherd, who doesn't own the sheep, sees the wolf coming, leaves the sheep, and flees. The wolf snatches the sheep, and scatters them."}, {"c": 10, "n": 13, "text": "The hired hand flees because he is a hired hand, and doesn't care for the sheep."}, {"c": 10, "n": 14, "text": "I am the good shepherd. I know my own, and I'm known by my own;"}, {"c": 10, "n": 15, "text": "even as the Father knows me, and I know the Father. I lay down my life for the sheep."}, {"c": 10, "n": 16, "text": "I have other sheep, which are not of this fold. I must bring them also, and they will hear my voice. They will become one flock with one shepherd."}, {"c": 10, "n": 17, "text": "Therefore the Father loves me, because I lay down my life, that I may take it again."}, {"c": 10, "n": 18, "text": "No one takes it away from me, but I lay it down by myself. I have power to lay it down, and I have power to take it again. I received this commandment from my Father.\""}, {"c": 10, "n": 19, "text": "Therefore a division arose again among the Jews because of these words."}, {"c": 10, "n": 20, "text": "Many of them said, \"He has a demon, and is mad! Why do you listen to him?\""}, {"c": 10, "n": 21, "text": "Others said, \"These are not the sayings of one possessed with a demon. Can a demon open the eyes of the blind?\""}, {"c": 10, "n": 22, "text": "It was the Feast of the Dedication at Jerusalem."}, {"c": 10, "n": 23, "text": "It was winter, and Jesus was walking in the temple, in Solomon's porch."}, {"c": 10, "n": 24, "text": "The Jews therefore came around him and said to him, \"How long will you hold us in suspense? If you are the Christ, tell us plainly.\""}, {"c": 10, "n": 25, "text": "Jesus answered them, \"I told you, and you don't believe. The works that I do in my Father's name, these testify about me."}, {"c": 10, "n": 26, "text": "But you don't believe, because you are not of my sheep, as I told you."}, {"c": 10, "n": 27, "text": "My sheep hear my voice, and I know them, and they follow me."}, {"c": 10, "n": 28, "text": "I give eternal life to them. They will never perish, and no one will snatch them out of my hand."}, {"c": 10, "n": 29, "text": "My Father, who has given them to me, is greater than all. No one is able to snatch them out of my Father's hand."}, {"c": 10, "n": 30, "text": "I and the Father are one.\""}, {"c": 10, "n": 31, "text": "Therefore Jews took up stones again to stone him."}, {"c": 10, "n": 32, "text": "Jesus answered them, \"I have shown you many good works from my Father. For which of those works do you stone me?\""}, {"c": 10, "n": 33, "text": "The Jews answered him, \"We don't stone you for a good work, but for blasphemy: because you, being a man, make yourself God.\""}, {"c": 10, "n": 34, "text": "Jesus answered them, \"Isn't it written in your law, 'I said, you are gods?'"}, {"c": 10, "n": 35, "text": "If he called them gods, to whom the word of God came (and the scripture can't be broken),"}, {"c": 10, "n": 36, "text": "Do you say of him whom the Father sanctified and sent into the world, 'You blaspheme,' because I said, 'I am the Son of God?'"}, {"c": 10, "n": 37, "text": "If I don't do the works of my Father, don't believe me."}, {"c": 10, "n": 38, "text": "But if I do them, though you don't believe me, believe the works; that you may know and believe that the Father is in me, and I in the Father.\""}, {"c": 10, "n": 39, "text": "They sought again to seize him, and he went forth out of their hand."}, {"c": 10, "n": 40, "text": "He went away again beyond the Jordan into the place where John was at the first baptizing, and there he stayed."}, {"c": 10, "n": 41, "text": "Many came to him. They said, \"John indeed did no sign, but everything whatever that John said about this man is true.\""}, {"c": 10, "n": 42, "text": "Many believed in him there."}]}, "john_11": {"id": "john_11", "ref": "John 11", "verses": [{"c": 11, "n": 1, "text": "Now a certain man was sick, Lazarus of Bethany, of the village of Mary and her sister, Martha."}, {"c": 11, "n": 2, "text": "It was that Mary who anointed the Lord with ointment, and wiped his feet with her hair, whose brother, Lazarus, was sick."}, {"c": 11, "n": 3, "text": "The sisters therefore sent to him, saying, \"Lord, behold, he for whom you have great affection is sick.\""}, {"c": 11, "n": 4, "text": "But when Jesus heard it, he said, \"This sickness is not to death, but for the glory of God, that God's Son may be glorified by it.\""}, {"c": 11, "n": 5, "text": "Now Jesus loved Martha, and her sister, and Lazarus."}, {"c": 11, "n": 6, "text": "When therefore he heard that he was sick, he stayed at that time two days in the place where he was."}, {"c": 11, "n": 7, "text": "Then after this he said to the disciples, \"Let's go into Judea again.\""}, {"c": 11, "n": 8, "text": "The disciples told him, \"Rabbi, the Jews were just trying to stone you, and are you going there again?\""}, {"c": 11, "n": 9, "text": "Jesus answered, \"Aren't there twelve hours of daylight? If a man walks in the day, he doesn't stumble, because he sees the light of this world."}, {"c": 11, "n": 10, "text": "But if a man walks in the night, he stumbles, because the light isn't in him.\""}, {"c": 11, "n": 11, "text": "He said these things, and after that, he said to them, \"Our friend, Lazarus, has fallen asleep, but I am going so that I may awake him out of sleep.\""}, {"c": 11, "n": 12, "text": "The disciples therefore said to him, \"Lord, if he has fallen asleep, he will recover.\""}, {"c": 11, "n": 13, "text": "Now Jesus had spoken of his death, but they thought that he spoke of taking rest in sleep."}, {"c": 11, "n": 14, "text": "So Jesus said to them plainly then, \"Lazarus is dead."}, {"c": 11, "n": 15, "text": "I am glad for your sakes that I was not there, so that you may believe. Nevertheless, let's go to him.\""}, {"c": 11, "n": 16, "text": "Thomas therefore, who is called Didymus, said to his fellow disciples, \"Let's go also, that we may die with him.\""}, {"c": 11, "n": 17, "text": "So when Jesus came, he found that he had been in the tomb four days already."}, {"c": 11, "n": 18, "text": "Now Bethany was near Jerusalem, about fifteen stadia away."}, {"c": 11, "n": 19, "text": "Many of the Jews had come to Martha and Mary, to console them concerning their brother."}, {"c": 11, "n": 20, "text": "Therefore Martha, when she heard that Jesus was coming, went and met him, but Mary stayed in the house."}, {"c": 11, "n": 21, "text": "Therefore Martha said to Jesus, \"Lord, if you would have been here, my brother wouldn't have died."}, {"c": 11, "n": 22, "text": "Even now I know that, whatever you ask of God, God will give you.\""}, {"c": 11, "n": 23, "text": "Jesus said to her, \"Your brother will rise again.\""}, {"c": 11, "n": 24, "text": "Martha said to him, \"I know that he will rise again in the resurrection at the last day.\""}, {"c": 11, "n": 25, "text": "Jesus said to her, \"I am the resurrection and the life. He who believes in me, though he die, yet will he live."}, {"c": 11, "n": 26, "text": "Whoever lives and believes in me will never die. Do you believe this?\""}, {"c": 11, "n": 27, "text": "She said to him, \"Yes, Lord. I have come to believe that you are the Christ, God's Son, he who comes into the world.\""}, {"c": 11, "n": 28, "text": "When she had said this, she went away, and called Mary, her sister, secretly, saying, \"The Teacher is here, and is calling you.\""}, {"c": 11, "n": 29, "text": "She, when she heard this, arose quickly, and went to him."}, {"c": 11, "n": 30, "text": "Now Jesus had not yet come into the village, but was in the place where Martha met him."}, {"c": 11, "n": 31, "text": "Then the Jews who were with her in the house, and were consoling her, when they saw Mary, that she rose up quickly and went out, followed her, saying, \"She is going to the tomb to weep there.\""}, {"c": 11, "n": 32, "text": "Mary therefore, when she came to where Jesus was, and saw him, fell down at his feet, saying to him, \"Lord, if you would have been here, my brother wouldn't have died.\""}, {"c": 11, "n": 33, "text": "When Jesus therefore saw her weeping, and the Jews weeping who came with her, he groaned in the spirit, and was troubled,"}, {"c": 11, "n": 34, "text": "and said, \"Where have you laid him?\" They told him, \"Lord, come and see.\""}, {"c": 11, "n": 35, "text": "Jesus wept."}, {"c": 11, "n": 36, "text": "The Jews therefore said, \"See how much affection he had for him!\""}, {"c": 11, "n": 37, "text": "Some of them said, \"Couldn't this man, who opened the eyes of him who was blind, have also caused that this man wouldn't die?\""}, {"c": 11, "n": 38, "text": "Jesus therefore, again groaning in himself, came to the tomb. Now it was a cave, and a stone lay against it."}, {"c": 11, "n": 39, "text": "Jesus said, \"Take away the stone.\" Martha, the sister of him who was dead, said to him, \"Lord, by this time there is a stench, for he has been dead four days.\""}, {"c": 11, "n": 40, "text": "Jesus said to her, \"Didn't I tell you that if you believed, you would see God's glory?\""}, {"c": 11, "n": 41, "text": "So they took away the stone from the place where the dead man was lying. Jesus lifted up his eyes, and said, \"Father, I thank you that you listened to me."}, {"c": 11, "n": 42, "text": "I know that you always listen to me, but because of the multitude that stands around I said this, that they may believe that you sent me.\""}, {"c": 11, "n": 43, "text": "When he had said this, he cried with a loud voice, \"Lazarus, come out!\""}, {"c": 11, "n": 44, "text": "He who was dead came out, bound hand and foot with wrappings, and his face was wrapped around with a cloth. Jesus said to them, \"Free him, and let him go.\""}, {"c": 11, "n": 45, "text": "Therefore many of the Jews, who came to Mary and saw that which Jesus did, believed in him."}, {"c": 11, "n": 46, "text": "But some of them went away to the Pharisees, and told them the things which Jesus had done."}, {"c": 11, "n": 47, "text": "The chief priests therefore and the Pharisees gathered a council, and said, \"What are we doing? For this man does many signs."}, {"c": 11, "n": 48, "text": "If we leave him alone like this, everyone will believe in him, and the Romans will come and take away both our place and our nation.\""}, {"c": 11, "n": 49, "text": "But a certain one of them, Caiaphas, being high priest that year, said to them, \"You know nothing at all,"}, {"c": 11, "n": 50, "text": "nor do you take account that it is advantageous for us that one man should die for the people, and that the whole nation not perish.\""}, {"c": 11, "n": 51, "text": "Now he didn't say this of himself, but being high priest that year, he prophesied that Jesus would die for the nation,"}, {"c": 11, "n": 52, "text": "and not for the nation only, but that he might also gather together into one the children of God who are scattered abroad."}, {"c": 11, "n": 53, "text": "So from that day forth they took counsel that they might put him to death."}, {"c": 11, "n": 54, "text": "Jesus therefore walked no more openly among the Jews, but departed from there into the country near the wilderness, into a city called Ephraim. He stayed there with his disciples."}, {"c": 11, "n": 55, "text": "Now the Passover of the Jews was at hand. Many went up to Jerusalem out of the country before the Passover, to purify themselves."}, {"c": 11, "n": 56, "text": "Then they sought for Jesus and spoke one with another, as they stood in the temple, \"What do you think? Isn't he coming to the feast?\""}, {"c": 11, "n": 57, "text": "Now the chief priests and the Pharisees had commanded that if anyone knew where he was, he should report it, that they might seize him."}]}, "john_12": {"id": "john_12", "ref": "John 12", "verses": [{"c": 12, "n": 1, "text": "Therefore six days before the Passover, Jesus came to Bethany, where Lazarus was, who had been dead, whom he raised from the dead."}, {"c": 12, "n": 2, "text": "So they made him a supper there. Martha served, but Lazarus was one of those who sat at the table with him."}, {"c": 12, "n": 3, "text": "Mary, therefore, took a pound of ointment of pure nard, very precious, and anointed the feet of Jesus, and wiped his feet with her hair. The house was filled with the fragrance of the ointment."}, {"c": 12, "n": 4, "text": "Then Judas Iscariot, Simon's son, one of his disciples, who would betray him, said,"}, {"c": 12, "n": 5, "text": "\"Why wasn't this ointment sold for three hundred denarii, and given to the poor?\""}, {"c": 12, "n": 6, "text": "Now he said this, not because he cared for the poor, but because he was a thief, and having the money box, used to steal what was put into it."}, {"c": 12, "n": 7, "text": "But Jesus said, \"Leave her alone. She has kept this for the day of my burial."}, {"c": 12, "n": 8, "text": "For you always have the poor with you, but you don't always have me.\""}, {"c": 12, "n": 9, "text": "A large crowd therefore of the Jews learned that he was there, and they came, not for Jesus' sake only, but that they might see Lazarus also, whom he had raised from the dead."}, {"c": 12, "n": 10, "text": "But the chief priests conspired to also put Lazarus to death,"}, {"c": 12, "n": 11, "text": "because on account of him many of the Jews went away and believed in Jesus."}, {"c": 12, "n": 12, "text": "On the next day a great multitude had come to the feast. When they heard that Jesus was coming to Jerusalem,"}, {"c": 12, "n": 13, "text": "they took the branches of the palm trees, and went out to meet him, and cried out, \"Hosanna! Blessed is he who comes in the name of the Lord, the King of Israel!\""}, {"c": 12, "n": 14, "text": "Jesus, having found a young donkey, sat on it. As it is written,"}, {"c": 12, "n": 15, "text": "\"Don't be afraid, daughter of Zion. Behold, your King comes, sitting on a donkey's colt.\""}, {"c": 12, "n": 16, "text": "His disciples didn't understand these things at first, but when Jesus was glorified, then they remembered that these things were written about him, and that they had done these things to him."}, {"c": 12, "n": 17, "text": "The multitude therefore that was with him when he called Lazarus out of the tomb, and raised him from the dead, was testifying."}, {"c": 12, "n": 18, "text": "For this cause also the multitude went and met him, because they heard that he had done this sign."}, {"c": 12, "n": 19, "text": "The Pharisees therefore said among themselves, \"See how you accomplish nothing. Behold, the world has gone after him.\""}, {"c": 12, "n": 20, "text": "Now there were certain Greeks among those that went up to worship at the feast."}, {"c": 12, "n": 21, "text": "These, therefore, came to Philip, who was from Bethsaida of Galilee, and asked him, saying, \"Sir, we want to see Jesus.\""}, {"c": 12, "n": 22, "text": "Philip came and told Andrew, and in turn, Andrew came with Philip, and they told Jesus."}, {"c": 12, "n": 23, "text": "Jesus answered them, \"The time has come for the Son of Man to be glorified."}, {"c": 12, "n": 24, "text": "Most assuredly I tell you, unless a grain of wheat falls into the earth and dies, it remains by itself alone. But if it dies, it bears much fruit."}, {"c": 12, "n": 25, "text": "He who loves his life will lose it. He who hates his life in this world will keep it to eternal life."}, {"c": 12, "n": 26, "text": "If anyone serves me, let him follow me. Where I am, there will my servant also be. If anyone serves me, the Father will honor him."}, {"c": 12, "n": 27, "text": "\"Now my soul is troubled. What will I say? 'Father, save me from this time?' But for this cause I came to this time."}, {"c": 12, "n": 28, "text": "Father, glorify your name!\" Then there came a voice out of the sky, saying, \"I have both glorified it, and will glorify it again.\""}, {"c": 12, "n": 29, "text": "The multitude therefore, who stood by and heard it, said that it had thundered. Others said, \"An angel has spoken to him.\""}, {"c": 12, "n": 30, "text": "Jesus answered, \"This voice hasn't come for my sake, but for your sakes."}, {"c": 12, "n": 31, "text": "Now is the judgment of this world. Now the prince of this world will be cast out."}, {"c": 12, "n": 32, "text": "I, if I am lifted up from the earth, will draw all men to myself.\""}, {"c": 12, "n": 33, "text": "But he said this, signifying by what kind of death he should die."}, {"c": 12, "n": 34, "text": "The multitude answered him, \"We have heard out of the law that the Christ remains forever. How do you say, 'The Son of Man must be lifted up?' Who is this Son of Man?\""}, {"c": 12, "n": 35, "text": "Jesus therefore said to them, \"Yet a little while the light is with you. Walk while you have the light, that darkness doesn't overtake you. He who walks in the darkness doesn't know where he is going."}, {"c": 12, "n": 36, "text": "While you have the light, believe in the light, that you may become sons of light.\" Jesus said these things, and he departed and hid himself from them."}, {"c": 12, "n": 37, "text": "But though he had done so many signs before them, yet they didn't believe in him,"}, {"c": 12, "n": 38, "text": "that the word of Isaiah the prophet might be fulfilled, which he spoke, \"Lord, who has believed our report? To whom has the arm of the Lord been revealed?\""}, {"c": 12, "n": 39, "text": "For this cause they couldn't believe, for Isaiah said again,"}, {"c": 12, "n": 40, "text": "\"He has blinded their eyes and he hardened their heart, Lest they should see with their eyes, And perceive with their heart, And would turn, And I would heal them.\""}, {"c": 12, "n": 41, "text": "Isaiah said these things when he saw his glory, and he spoke of him."}, {"c": 12, "n": 42, "text": "Nevertheless even of the rulers many believed in him, but because of the Pharisees they didn't confess it, so that they wouldn't be put out of the synagogue,"}, {"c": 12, "n": 43, "text": "for they loved men's approval more than God's approval."}, {"c": 12, "n": 44, "text": "Jesus cried out and said, \"Whoever believes in me, believes not in me, but in him who sent me."}, {"c": 12, "n": 45, "text": "He who sees me sees him who sent me."}, {"c": 12, "n": 46, "text": "I have come as a light into the world, that whoever believes in me may not remain in the darkness."}, {"c": 12, "n": 47, "text": "If anyone listens to my sayings, and doesn't believe, I don't judge him. For I came not to judge the world, but to save the world."}, {"c": 12, "n": 48, "text": "He who rejects me, and doesn't receive my sayings, has one who judges him. The word that I spoke, the same will judge him in the last day."}, {"c": 12, "n": 49, "text": "For I spoke not from myself, but the Father who sent me, he gave me a commandment, what I should say, and what I should speak."}, {"c": 12, "n": 50, "text": "I know that his commandment is eternal life. The things therefore which I speak, even as the Father has said to me, so I speak.\""}]}, "john_13": {"id": "john_13", "ref": "John 13", "verses": [{"c": 13, "n": 1, "text": "Now before the feast of the Passover, Jesus knowing that his time had come that he would depart out of this world to his Father, having loved his own who were in the world, he loved them to the end."}, {"c": 13, "n": 2, "text": "After supper, the devil having already put into the heart of Judas Iscariot, Simon's son, to betray him,"}, {"c": 13, "n": 3, "text": "Jesus, knowing that the Father had given all things into his hands, and that he came forth from God, and was going to God,"}, {"c": 13, "n": 4, "text": "arose from supper, and laid aside his outer garments. He took a towel, and wrapped a towel around his waist."}, {"c": 13, "n": 5, "text": "Then he poured water into the basin, and began to wash the disciples' feet, and to wipe them with the towel that was wrapped around him."}, {"c": 13, "n": 6, "text": "Then he came to Simon Peter. He said to him, \"Lord, do you wash my feet?\""}, {"c": 13, "n": 7, "text": "Jesus answered him, \"You don't know what I am doing now, but you will understand later.\""}, {"c": 13, "n": 8, "text": "Peter said to him, \"You will never wash my feet!\" Jesus answered him, \"If I don't wash you, you have no part with me.\""}, {"c": 13, "n": 9, "text": "Simon Peter said to him, \"Lord, not my feet only, but also my hands and my head!\""}, {"c": 13, "n": 10, "text": "Jesus said to him, \"Someone who has bathed only needs to have their feet washed, but is completely clean. You are clean, but not all of you.\""}, {"c": 13, "n": 11, "text": "For he knew him who would betray him, therefore he said, \"You are not all clean.\""}, {"c": 13, "n": 12, "text": "So when he had washed their feet, put his outer garment back on, and sat down again, he said to them, \"Do you know what I have done to you?"}, {"c": 13, "n": 13, "text": "You call me, 'Teacher' and 'Lord.' You say so correctly, for so I am."}, {"c": 13, "n": 14, "text": "If I then, the Lord and the Teacher, have washed your feet, you also ought to wash one another's feet."}, {"c": 13, "n": 15, "text": "For I have given you an example, that you also should do as I have done to you."}, {"c": 13, "n": 16, "text": "Most assuredly I tell you, a servant is not greater than his lord, neither one who is sent greater than he who sent him."}, {"c": 13, "n": 17, "text": "If you know these things, blessed are you if you do them."}, {"c": 13, "n": 18, "text": "I speak not of you all. I know whom I have chosen. But that the scripture may be fulfilled, 'He who eats bread with me has lifted up his heel against me.'"}, {"c": 13, "n": 19, "text": "From now on, I tell you before it happens, that when it happens, you may believe that I AM."}, {"c": 13, "n": 20, "text": "Most assuredly I tell you, he who receives whoever I send, receives me; and he who receives me, receives him who sent me.\""}, {"c": 13, "n": 21, "text": "When Jesus had said this, he was troubled in the spirit, and testified, \"Most assuredly I tell you that one of you will betray me.\""}, {"c": 13, "n": 22, "text": "The disciples looked at one another, perplexed about whom he spoke."}, {"c": 13, "n": 23, "text": "One of his disciples, whom Jesus loved, was at the table, leaning against Jesus' breast."}, {"c": 13, "n": 24, "text": "Simon Peter therefore beckoned to him, and said to him, \"Tell us who it is of whom he speaks.\""}, {"c": 13, "n": 25, "text": "He, leaning back, as he was, on Jesus' breast, asked him, \"Lord, who is it?\""}, {"c": 13, "n": 26, "text": "Jesus therefore answered, \"It is he who I will give this morsel to when I have dipped it.\" So when he had dipped the morsel, he gave it to Judas, the son of Simon Iscariot."}, {"c": 13, "n": 27, "text": "After the morsel, then Satan entered into him. Jesus therefore said to him, \"What you do, do quickly.\""}, {"c": 13, "n": 28, "text": "Now no man at the table knew why he said this to him."}, {"c": 13, "n": 29, "text": "For some thought, because Judas had the money box, that Jesus said to him, \"Buy what things we need for the feast,\" or that he should give something to the poor."}, {"c": 13, "n": 30, "text": "Therefore, having received that morsel, he went out immediately. It was night."}, {"c": 13, "n": 31, "text": "When he had gone out, Jesus said, \"Now the Son of Man is glorified, and God is glorified in him."}, {"c": 13, "n": 32, "text": "If God is glorified in him, God will also glorify him in himself, and he will glorify him immediately."}, {"c": 13, "n": 33, "text": "Little children, yet a little while I am with you. You will seek me, and as I said to the Jews, 'Where I am going, you can't come,' so now I tell you."}, {"c": 13, "n": 34, "text": "A new commandment I give to you, that you love one another, just like I have loved you; that you also love one another."}, {"c": 13, "n": 35, "text": "By this everyone will know that you are my disciples, if you have love for one another.\""}, {"c": 13, "n": 36, "text": "Simon Peter said to him, \"Lord, where are you going?\" Jesus answered, \"Where I am going, you can't follow now, but you will follow afterwards.\""}, {"c": 13, "n": 37, "text": "Peter said to him, \"Lord, why can't I follow you even now? I will lay down my life for you.\""}, {"c": 13, "n": 38, "text": "Jesus answered him, \"Will you lay down your life for me? Most assuredly I tell you, the rooster won't crow until you have denied me three times."}]}, "john_14": {"id": "john_14", "ref": "John 14", "verses": [{"c": 14, "n": 1, "text": "\"Don't let your heart be troubled. Believe in God. Believe also in me."}, {"c": 14, "n": 2, "text": "In my Father's house are many mansions. If it weren't so, I would have told you. I am going to prepare a place for you."}, {"c": 14, "n": 3, "text": "If I go and prepare a place for you, I will come again, and will receive you to myself; that where I am, you may be there also."}, {"c": 14, "n": 4, "text": "Where I go, you know, and you know the way.\""}, {"c": 14, "n": 5, "text": "Thomas says to him, \"Lord, we don't know where you are going. How can we know the way?\""}, {"c": 14, "n": 6, "text": "Jesus said to him, \"I am the way, the truth, and the life. No one comes to the Father, but by me."}, {"c": 14, "n": 7, "text": "If you had known me, you would have known my Father also. From now on, you know him, and have seen him.\""}, {"c": 14, "n": 8, "text": "Philip said to him, \"Lord, show us the Father, and that will be enough for us.\""}, {"c": 14, "n": 9, "text": "Jesus said to him, \"Have I been with you such a long time, and do you not know me, Philip? He who has seen me has seen the Father. How do you say, 'Show us the Father?'"}, {"c": 14, "n": 10, "text": "Don't you believe that I am in the Father, and the Father in me? The words that I tell you, I speak not from myself; but the Father living in me does his works."}, {"c": 14, "n": 11, "text": "Believe me that I am in the Father, and the Father in me; or else believe me for the very works' sake."}, {"c": 14, "n": 12, "text": "Most assuredly I tell you, he who believes in me, the works that I do, he will do also; and greater works than these will he do; because I am going to my Father."}, {"c": 14, "n": 13, "text": "Whatever you will ask in my name, that will I do, that the Father may be glorified in the Son."}, {"c": 14, "n": 14, "text": "If you will ask anything in my name, that will I do."}, {"c": 14, "n": 15, "text": "If you love me, keep my commandments."}, {"c": 14, "n": 16, "text": "I will pray to the Father, and he will give you another Counselor, that he may be with you forever,"}, {"c": 14, "n": 17, "text": "-- the Spirit of truth, whom the world can't receive; for it doesn't see him, neither knows him. You know him, for he lives with you, and will be in you."}, {"c": 14, "n": 18, "text": "I will not leave you orphans. I will come to you."}, {"c": 14, "n": 19, "text": "Yet a little while, and the world will see me no more; but you will see me. Because I live, you will live also."}, {"c": 14, "n": 20, "text": "In that day you will know that I am in my Father, and you in me, and I in you."}, {"c": 14, "n": 21, "text": "Someone who has my commandments, and keeps them, that person is one who loves me. One who loves me will be loved by my Father, and I will love him, and will reveal myself to him.\""}, {"c": 14, "n": 22, "text": "Judas (not Iscariot) said to him, \"Lord, what will happen that you will reveal yourself to us, and not to the world?\""}, {"c": 14, "n": 23, "text": "Jesus answered him, \"If a man loves me, he will keep my word. My Father will love him, and we will come to him, and make our home with him."}, {"c": 14, "n": 24, "text": "He who doesn't love me doesn't keep my words. The word which you hear isn't mine, but the Father's who sent me."}, {"c": 14, "n": 25, "text": "I have said these things to you, while still living with you."}, {"c": 14, "n": 26, "text": "But the Counselor, the Holy Spirit, whom the Father will send in my name, he will teach you all things, and bring to your memory all that I said to you."}, {"c": 14, "n": 27, "text": "Peace I leave with you. My peace I give to you; not as the world gives, give I to you. Don't let your heart be troubled, neither let it be fearful."}, {"c": 14, "n": 28, "text": "You heard how I told you, 'I go away, and I come to you.' If you loved me, you would have rejoiced, because I said 'I am going to my Father;' for the Father is greater than I."}, {"c": 14, "n": 29, "text": "Now I have told you before it happens so that, when it happens, you may believe."}, {"c": 14, "n": 30, "text": "I will no more speak much with you, for the prince of the world comes, and he has nothing in me."}, {"c": 14, "n": 31, "text": "But that the world may know that I love the Father, and as the Father commanded me, even so I do. Arise, let us go from here."}]}, "john_15": {"id": "john_15", "ref": "John 15", "verses": [{"c": 15, "
