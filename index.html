 were cut out of that which is by nature a wild olive tree, and were grafted contrary to nature into a good olive tree, how much more will these, which are the natural branches, be grafted into their own olive tree?"}, {"c": 11, "n": 25, "text": "For I don't desire, brothers, to have you ignorant of this mystery, so that you won't be wise in your own conceits, that a hardening in part has happened to Israel, until the fullness of the Gentiles have come in,"}, {"c": 11, "n": 26, "text": "and so all Israel will be saved. Even as it is written, \"There will come out of Zion the Deliverer, And he will turn away ungodliness from Jacob."}, {"c": 11, "n": 27, "text": "This is my covenant to them, When I will take away their sins.\""}, {"c": 11, "n": 28, "text": "Concerning the gospel, they are enemies for your sake. But concerning the election, they are beloved for the fathers' sake."}, {"c": 11, "n": 29, "text": "For the gifts and the calling of God are irrevocable."}, {"c": 11, "n": 30, "text": "For as you in time past were disobedient to God, but now have obtained mercy by their disobedience,"}, {"c": 11, "n": 31, "text": "even so these also have now been disobedient, that by the mercy shown to you they may also obtain mercy."}, {"c": 11, "n": 32, "text": "For God has shut up all to disobedience, that he might have mercy on all."}, {"c": 11, "n": 33, "text": "Oh the depth of the riches both of the wisdom and the knowledge of God! How unsearchable are his judgments, and his ways past tracing out!"}, {"c": 11, "n": 34, "text": "\"For who has known the mind of the Lord? Or who has been his counselor?\""}, {"c": 11, "n": 35, "text": "\"Or who has first given to him, And it will be repaid to him again?\""}, {"c": 11, "n": 36, "text": "For of him, and through him, and to him, are all things. To him be the glory for ever! Amen."}]}, "romans_12": {"id": "romans_12", "ref": "Romans 12", "verses": [{"c": 12, "n": 1, "text": "Therefore I beg you, brothers, by the mercies of God, to present your bodies a living sacrifice, holy, acceptable to God, which is your spiritual service."}, {"c": 12, "n": 2, "text": "Don't be fashioned according to this world, but be transformed by the renewing of your mind, so that you may prove what is the good and acceptable and perfect will of God."}, {"c": 12, "n": 3, "text": "For I say, through the grace that was given me, to every man who is among you, not to think of himself more highly than he ought to think; but to think reasonably, as God has apportioned to each person a measure of faith."}, {"c": 12, "n": 4, "text": "For even as we have many members in one body, and all the members don't have the same function,"}, {"c": 12, "n": 5, "text": "so we, who are many, are one body in Christ, and individually members one of another."}, {"c": 12, "n": 6, "text": "Having gifts differing according to the grace that was given to us, if prophecy, let us prophesy according to the proportion of our faith;"}, {"c": 12, "n": 7, "text": "or service, let us give ourselves to service; or he who teaches, to his teaching;"}, {"c": 12, "n": 8, "text": "or he who exhorts, to his exhorting: he who gives, let him do it with liberality; he who rules, with diligence; he who shows mercy, with cheerfulness."}, {"c": 12, "n": 9, "text": "Let love be without hypocrisy. Abhor that which is evil. Cling to that which is good."}, {"c": 12, "n": 10, "text": "In love of the brothers be tenderly affectionate one to another; in honor preferring one another;"}, {"c": 12, "n": 11, "text": "not lagging in diligence; fervent in spirit; serving the Lord;"}, {"c": 12, "n": 12, "text": "rejoicing in hope; enduring in oppression; continuing steadfastly in prayer;"}, {"c": 12, "n": 13, "text": "contributing to the needs of the saints; given to hospitality."}, {"c": 12, "n": 14, "text": "Bless those who persecute you; bless, and don't curse."}, {"c": 12, "n": 15, "text": "Rejoice with those who rejoice. Weep with those who weep."}, {"c": 12, "n": 16, "text": "Be of the same mind one toward another. Don't set your mind on high things, but associate with the humble. Don't be wise in your own conceits."}, {"c": 12, "n": 17, "text": "Repay no one evil for evil. Respect what is honorable in the sight of all men."}, {"c": 12, "n": 18, "text": "If it is possible, as much as it is up to you, be at peace with all men."}, {"c": 12, "n": 19, "text": "Don't seek revenge yourselves, beloved, but give place to God's wrath. For it is written, \"Vengeance belongs to me; I will repay, says the Lord.\""}, {"c": 12, "n": 20, "text": "Therefore \"If your enemy is hungry, feed him. If he is thirsty, give him a drink. For in doing so, you will heap coals of fire on his head.\""}, {"c": 12, "n": 21, "text": "Don't be overcome by evil, but overcome evil with good."}]}, "romans_13": {"id": "romans_13", "ref": "Romans 13", "verses": [{"c": 13, "n": 1, "text": "Let every soul be in subjection to the higher authorities, for there is no authority except from God, and those who be are ordained by God."}, {"c": 13, "n": 2, "text": "Therefore he who resists the authority, withstands the ordinance of God; and those who withstand will receive to themselves judgment."}, {"c": 13, "n": 3, "text": "For rulers are not a terror to the good work, but to the evil. Do you desire to have no fear of the authority? Do that which is good, and you will have praise from the same,"}, {"c": 13, "n": 4, "text": "for he is a servant of God to you for good. But if you do that which is evil, be afraid, for he doesn't bear the sword in vain; for he is a minister of God, an avenger for wrath to him who does evil."}, {"c": 13, "n": 5, "text": "Therefore you need to be in subjection, not only because of the wrath, but also for conscience' sake."}, {"c": 13, "n": 6, "text": "For this reason you also pay taxes, for they are ministers of God's service, attending continually on this very thing."}, {"c": 13, "n": 7, "text": "Give therefore to everyone what you owe: taxes to whom taxes are due; customs to whom customs; respect to whom respect; honor to whom honor."}, {"c": 13, "n": 8, "text": "Owe no one anything, except to love one another; for he who loves his neighbor has fulfilled the law."}, {"c": 13, "n": 9, "text": "For the commandments, \"You shall not commit adultery,\" \"You shall not murder,\" \"You shall not steal,\" \"You shall not give false testimony,\" \"You shall not covet,\" and whatever other commandments there are, are all summed up in this saying, namely, \"You shall love your neighbor as yourself.\""}, {"c": 13, "n": 10, "text": "Love doesn't harm his neighbor. Love therefore is the fulfillment of the law."}, {"c": 13, "n": 11, "text": "This, knowing the time, that it is already time for you to awake out of sleep, for salvation is now nearer to us than when we first believed."}, {"c": 13, "n": 12, "text": "The night is far gone, and the day is near. Let's therefore throw off the works of darkness, and let's put on the armor of light."}, {"c": 13, "n": 13, "text": "Let us walk properly, as in the day; not in reveling and drunkenness, not in sexual promiscuity and lustful acts, and not in strife and jealousy."}, {"c": 13, "n": 14, "text": "But put on the Lord Jesus Christ, and make no provision for the flesh, for its lusts."}]}, "romans_14": {"id": "romans_14", "ref": "Romans 14", "verses": [{"c": 14, "n": 1, "text": "But receive him who is weak in faith, not for judging thoughts."}, {"c": 14, "n": 2, "text": "One man has faith to eat all things, but he who is weak eats herbs."}, {"c": 14, "n": 3, "text": "Don't let him who eats despise him who doesn't eat. Don't let him who doesn't eat judge him who eats, for God has received him."}, {"c": 14, "n": 4, "text": "Who are you who judge the servant of another? To his own lord he stands or falls. Yes, he will be made to stand, for God has power to make him stand."}, {"c": 14, "n": 5, "text": "One man esteems one day above another. Another esteems every day alike. Let each man be fully assured in his own mind."}, {"c": 14, "n": 6, "text": "He who observes the day, observes it to the Lord; and he who does not observe the day, to the Lord he does not observe it. He who eats, eats to the Lord, for he gives God thanks. He who doesn't eat, to the Lord he doesn't eat, and gives God thanks."}, {"c": 14, "n": 7, "text": "For none of us lives to himself, and none dies to himself."}, {"c": 14, "n": 8, "text": "For if we live, we live to the Lord. Or if we die, we die to the Lord. If therefore we live or die, we are the Lord's."}, {"c": 14, "n": 9, "text": "For to this end Christ died, rose, and lived again, that he might be Lord of both the dead and the living."}, {"c": 14, "n": 10, "text": "But you, why do you judge your brother? Or you again, why do you despise your brother? For we will all stand before the judgment seat of Christ."}, {"c": 14, "n": 11, "text": "For it is written, \"'As I live,' says the Lord, 'to me every knee will bow. Every tongue will confess to God.'\""}, {"c": 14, "n": 12, "text": "So then each one of us will give account of himself to God."}, {"c": 14, "n": 13, "text": "Therefore Let's not judge one another any more, but judge this rather, that no man put a stumbling block in his brother's way, or an occasion of falling."}, {"c": 14, "n": 14, "text": "I know, and am persuaded in the Lord Jesus, that nothing is unclean of itself; except that to him who considers anything to be unclean, to him it is unclean."}, {"c": 14, "n": 15, "text": "Yet if because of food your brother is grieved, you walk no longer in love. Don't destroy with your food him for whom Christ died."}, {"c": 14, "n": 16, "text": "Then don't let your good be slandered,"}, {"c": 14, "n": 17, "text": "for the kingdom of God is not eating and drinking, but righteousness, peace, and joy in the Holy Spirit."}, {"c": 14, "n": 18, "text": "For he who serves Christ in these things is acceptable to God and approved by men."}, {"c": 14, "n": 19, "text": "So then, let us follow after things which make for peace, and things whereby we may build one another up."}, {"c": 14, "n": 20, "text": "Don't overthrow God's work for food's sake. All things indeed are clean, however it is evil for that man who creates a stumbling block by eating."}, {"c": 14, "n": 21, "text": "It is good not to eat meat, drink wine nor do anything by which your brother stumbles, is offended, or is made weak."}, {"c": 14, "n": 22, "text": "Do you have faith? Have it to yourself before God. Happy is he who doesn't judge himself in that which he approves."}, {"c": 14, "n": 23, "text": "But he who doubts is condemned if he eats, because it isn't of faith; and whatever is not of faith is sin."}]}, "romans_15": {"id": "romans_15", "ref": "Romans 15", "verses": [{"c": 15, "n": 1, "text": "Now we who are strong ought to bear the weaknesses of the weak, and not to please ourselves."}, {"c": 15, "n": 2, "text": "Let each one of us please his neighbor for that which is good, to be building him up."}, {"c": 15, "n": 3, "text": "For Christ also didn't please himself. But, as it is written, \"The reproaches of those who reproached you fell on me.\""}, {"c": 15, "n": 4, "text": "For whatever things were written before were written for our learning, that through patience and through comfort of the scriptures we might have hope."}, {"c": 15, "n": 5, "text": "Now the God of patience and of comfort grant you to be of the same mind one with another according to Christ Jesus,"}, {"c": 15, "n": 6, "text": "that with one accord you may with one mouth glorify the God and Father of our Lord Jesus Christ."}, {"c": 15, "n": 7, "text": "Therefore receive one another, even as Christ also received you, to the glory of God."}, {"c": 15, "n": 8, "text": "Now I say that Christ has been made a minister of the circumcision for the truth of God, that he might confirm the promises given to the fathers,"}, {"c": 15, "n": 9, "text": "and that the Gentiles might glorify God for his mercy. As it is written, \"Therefore will I give praise to you among the Gentiles, And sing to your name.\""}, {"c": 15, "n": 10, "text": "Again he says, \"Rejoice, you Gentiles, with his people.\""}, {"c": 15, "n": 11, "text": "Again, \"Praise the Lord, all you Gentiles! Let all the peoples praise him.\""}, {"c": 15, "n": 12, "text": "Again, Isaiah says, \"There will be the root of Jesse, He who arises to rule over the Gentiles; On him will the Gentiles hope.\""}, {"c": 15, "n": 13, "text": "Now may the God of hope fill you with all joy and peace in believing, that you may abound in hope, in the power of the Holy Spirit."}, {"c": 15, "n": 14, "text": "I myself am also persuaded about you, my brothers, that you yourselves are full of goodness, filled with all knowledge, able also to admonish others."}, {"c": 15, "n": 15, "text": "But I write the more boldly to you in some measure, as putting you again in memory, because of the grace that was given to me by God,"}, {"c": 15, "n": 16, "text": "that I should be a servant of Christ Jesus to the Gentiles, serving the gospel of God, that the offering up of the Gentiles might be made acceptable, being sanctified by the Holy Spirit."}, {"c": 15, "n": 17, "text": "I have therefore my boasting in Christ Jesus in things pertaining to God."}, {"c": 15, "n": 18, "text": "For I will not dare to speak of any things except those which Christ worked through me, for the obedience of the Gentiles, by word and deed,"}, {"c": 15, "n": 19, "text": "in the power of signs and wonders, in the power of God's Spirit; so that from Jerusalem, and around as far as to Illyricum, I have fully preached the gospel of Christ;"}, {"c": 15, "n": 20, "text": "yes, making it my aim so to preach the gospel, not where Christ was already named, that I might not build on another man's foundation."}, {"c": 15, "n": 21, "text": "But, as it is written, \"They will see, to whom no news of him came. They who haven't heard will understand.\""}, {"c": 15, "n": 22, "text": "Therefore also I was hindered these many times from coming to you,"}, {"c": 15, "n": 23, "text": "but now, no longer having any place in these regions, and having these many years a longing to come to you,"}, {"c": 15, "n": 24, "text": "whenever I journey to Spain, I will come to you. For I hope to see you on my journey, and to be helped on my way there by you, if first I may enjoy your company for a while."}, {"c": 15, "n": 25, "text": "But now, I say, I am going to Jerusalem, serving the saints."}, {"c": 15, "n": 26, "text": "For it has been the good pleasure of Macedonia and Achaia to make a certain contribution for the poor among the saints who are at Jerusalem."}, {"c": 15, "n": 27, "text": "Yes, it has been their good pleasure, and they are their debtors. For if the Gentiles have been made partakers of their spiritual things, they owe it to them also to serve them in fleshly things."}, {"c": 15, "n": 28, "text": "When therefore I have accomplished this, and have sealed to them this fruit, I will go on by you to Spain."}, {"c": 15, "n": 29, "text": "I know that, when I come to you, I will come in the fullness of the blessing of the gospel of Christ."}, {"c": 15, "n": 30, "text": "Now I beg you, brothers, by our Lord Jesus Christ, and by the love of the Spirit, that you strive together with me in your prayers to God for me,"}, {"c": 15, "n": 31, "text": "that I may be delivered from those who are disobedient in Judea, and that my service which I have for Jerusalem may be acceptable to the saints;"}, {"c": 15, "n": 32, "text": "that I may come to you in joy through the will of God, and together with you, find rest."}, {"c": 15, "n": 33, "text": "Now the God of peace be with you all. Amen."}]}, "romans_16": {"id": "romans_16", "ref": "Romans 16", "verses": [{"c": 16, "n": 1, "text": "I commend to you Phoebe, our sister, who is a servant of the assembly that is at Cenchreae,"}, {"c": 16, "n": 2, "text": "that you receive her in the Lord, in a way worthy of the saints, and that you assist her in whatever matter she may need from you, for she herself also has been a helper of many, and of my own self."}, {"c": 16, "n": 3, "text": "Greet Prisca and Aquila, my fellow workers in Christ Jesus,"}, {"c": 16, "n": 4, "text": "who for my life, laid down their own necks; to whom not only I give thanks, but also all the assemblies of the Gentiles."}, {"c": 16, "n": 5, "text": "Greet the assembly that is in their house. Greet Epaenetus, my beloved, who is the first-fruits of Achaia to Christ."}, {"c": 16, "n": 6, "text": "Greet Mary, who labored much for us."}, {"c": 16, "n": 7, "text": "Greet Andronicus and Junias, my relatives and my fellow prisoners, who are notable among the apostles, who also have been in Christ before me."}, {"c": 16, "n": 8, "text": "Greet Amplias, my beloved in the Lord."}, {"c": 16, "n": 9, "text": "Greet Urbanus, our fellow worker in Christ, and Stachys, my beloved."}, {"c": 16, "n": 10, "text": "Greet Apelles, the approved in Christ. Greet those who are of the household of Aristobulus."}, {"c": 16, "n": 11, "text": "Greet Herodion, my kinsman. Greet them of the household of Narcissus, who are in the Lord."}, {"c": 16, "n": 12, "text": "Greet Tryphaena and Tryphosa, who labor in the Lord. Greet Persis, the beloved, who labored much in the Lord."}, {"c": 16, "n": 13, "text": "Greet Rufus, the chosen in the Lord, and his mother and mine."}, {"c": 16, "n": 14, "text": "Greet Asyncritus, Phlegon, Hermes, Patrobas, Hermas, and the brothers who are with them."}, {"c": 16, "n": 15, "text": "Greet Philologus and Julia, Nereus and his sister, and Olympas, and all the saints who are with them."}, {"c": 16, "n": 16, "text": "Greet one another with a holy kiss. The assemblies of Christ greet you."}, {"c": 16, "n": 17, "text": "Now I beg you, brothers, mark those who are causing the divisions and occasions of stumbling, contrary to the doctrine which you learned, and turn away from them."}, {"c": 16, "n": 18, "text": "For those who are such don't serve our Lord, Jesus Christ, but their own belly; and by their smooth and flattering speech, they deceive the hearts of the innocent."}, {"c": 16, "n": 19, "text": "For your obedience has reached all. I rejoice therefore over you. But I desire to have you wise to that which is good, but innocent to that which is evil."}, {"c": 16, "n": 20, "text": "Now the God of peace will crush Satan under your feet swiftly. The grace of our Lord Jesus Christ be with you."}, {"c": 16, "n": 21, "text": "Timothy, my fellow worker, greets you, as do Lucius, Jason, and Sosipater, my relatives."}, {"c": 16, "n": 22, "text": "I, Tertius, who write the letter, greet you in the Lord."}, {"c": 16, "n": 23, "text": "Gaius, my host and host of the whole assembly, greets you. Erastus, the treasurer of the city, greets you, as does Quartus, the brother."}, {"c": 16, "n": 24, "text": "The grace of our Lord Jesus Christ be with you all! Amen."}]}, "luke_1": {"id": "luke_1", "ref": "Luke 1", "verses": [{"c": 1, "n": 1, "text": "Because many have undertaken to draw up a narrative concerning those matters which have been fulfilled among us,"}, {"c": 1, "n": 2, "text": "even as they delivered them to us, who from the beginning were eyewitnesses and ministers of the word,"}, {"c": 1, "n": 3, "text": "it seemed good to me also, having traced the course of all things accurately from the first, to write to you in order, most excellent Theophilus;"}, {"c": 1, "n": 4, "text": "that you might know the certainty concerning the things in which you were instructed."}, {"c": 1, "n": 5, "text": "There was in the days of Herod, the king of Judea, a certain priest named Zacharias, of the priestly division of Abijah. He had a wife of the daughters of Aaron, and her name was Elizabeth."}, {"c": 1, "n": 6, "text": "They were both righteous before God, walking blamelessly in all the commandments and ordinances of the Lord."}, {"c": 1, "n": 7, "text": "But they had no child, because Elizabeth was barren, and they both were well advanced in years."}, {"c": 1, "n": 8, "text": "Now it happened, while he executed the priest's office before God in the order of his division,"}, {"c": 1, "n": 9, "text": "according to the custom of the priest's office, his lot was to enter into the temple of the Lord and burn incense."}, {"c": 1, "n": 10, "text": "The whole multitude of the people were praying outside at the hour of incense."}, {"c": 1, "n": 11, "text": "An angel of the Lord appeared to him, standing on the right side of the altar of incense."}, {"c": 1, "n": 12, "text": "Zacharias was troubled when he saw him, and fear fell on him."}, {"c": 1, "n": 13, "text": "But the angel said to him, \"Don't be afraid, Zacharias, because your request has been heard, and your wife, Elizabeth, will bear you a son, and you shall call his name John."}, {"c": 1, "n": 14, "text": "You will have joy and gladness; and many will rejoice at his birth."}, {"c": 1, "n": 15, "text": "For he will be great in the sight of the Lord, and he will drink no wine nor strong drink. He will be filled with the Holy Spirit, even from his mother's womb."}, {"c": 1, "n": 16, "text": "He will turn many of the children of Israel to the Lord, their God."}, {"c": 1, "n": 17, "text": "He will go before his face in the spirit and power of Elijah, 'to turn the hearts of the fathers to the children,' and the disobedient to the wisdom of the just; to make ready a people prepared for the Lord.\""}, {"c": 1, "n": 18, "text": "Zacharias said to the angel, \"How can I be sure of this? For I am an old man, and my wife is well advanced in years.\""}, {"c": 1, "n": 19, "text": "The angel answered him, \"I am Gabriel, who stands in the presence of God. I was sent to speak to you, and to bring you this good news."}, {"c": 1, "n": 20, "text": "Behold, you will be silent and not able to speak, until the day that these things will happen, because you didn't believe my words, which will be fulfilled in their proper time.\""}, {"c": 1, "n": 21, "text": "The people were waiting for Zacharias, and they marveled while he delayed in the temple."}, {"c": 1, "n": 22, "text": "When he came out, he could not speak to them, and they perceived that he had seen a vision in the temple. He continued making signs to them, and remained mute."}, {"c": 1, "n": 23, "text": "It happened, when the days of his service were fulfilled, he departed to his house."}, {"c": 1, "n": 24, "text": "After these days Elizabeth, his wife, conceived, and she hid herself five months, saying,"}, {"c": 1, "n": 25, "text": "\"Thus has the Lord done to me in the days in which he looked at me, to take away my reproach among men.\""}, {"c": 1, "n": 26, "text": "Now in the sixth month, the angel Gabriel was sent from God to a city of Galilee, named Nazareth,"}, {"c": 1, "n": 27, "text": "to a virgin pledged to be married to a man whose name was Joseph, of the house of David. The virgin's name was Mary."}, {"c": 1, "n": 28, "text": "Having come in to her, the angel said, \"Rejoice, you highly favored one! The Lord is with you. Blessed are you among women!\""}, {"c": 1, "n": 29, "text": "But when she saw him, she was greatly troubled at the saying, and considered what kind of salutation this might be."}, {"c": 1, "n": 30, "text": "The angel said to her, \"Don't be afraid, Mary, for you have found favor with God."}, {"c": 1, "n": 31, "text": "Behold, you will conceive in your womb, and bring forth a son, and will call his name JESUS."}, {"c": 1, "n": 32, "text": "He will be great, and will be called the Son of the Most High. The Lord God will give to him the throne of his father, David,"}, {"c": 1, "n": 33, "text": "and he will reign over the house of Jacob forever. There will be no end of his kingdom.\""}, {"c": 1, "n": 34, "text": "Mary said to the angel, \"How will this be, seeing I am a virgin?\""}, {"c": 1, "n": 35, "text": "The angel answered her, \"The Holy Spirit will come on you, and the power of the Most High will overshadow you. Therefore also the holy one which is born from you will be called the Son of God."}, {"c": 1, "n": 36, "text": "Behold, Elizabeth, your relative, also has conceived a son in her old age; and this is the sixth month with her who was called barren."}, {"c": 1, "n": 37, "text": "For no word from God will be void of power.\""}, {"c": 1, "n": 38, "text": "Mary said, \"Behold, the handmaid of the Lord; be it to me according to your word.\" The angel departed from her."}, {"c": 1, "n": 39, "text": "Mary arose in those days and went into the hill country with haste, into a city of Judah,"}, {"c": 1, "n": 40, "text": "and entered into the house of Zacharias and greeted Elizabeth."}, {"c": 1, "n": 41, "text": "It happened, when Elizabeth heard Mary's greeting, the baby leaped in her womb, and Elizabeth was filled with the Holy Spirit."}, {"c": 1, "n": 42, "text": "She called out with a loud voice, and said, \"Blessed are you among women, and blessed is the fruit of your womb!"}, {"c": 1, "n": 43, "text": "Why am I so favored, that the mother of my Lord should come to me?"}, {"c": 1, "n": 44, "text": "For behold, when the voice of your greeting came into my ears, the baby leaped in my womb for joy!"}, {"c": 1, "n": 45, "text": "Blessed is she who believed, for there will be a fulfillment of the things which have been spoken to her from the Lord!\""}, {"c": 1, "n": 46, "text": "Mary said, \"My soul magnifies the Lord."}, {"c": 1, "n": 47, "text": "My spirit has rejoiced in God my Savior,"}, {"c": 1, "n": 48, "text": "For he has looked at the humble state of his handmaid. For behold, from now on, all generations will call me blessed."}, {"c": 1, "n": 49, "text": "For he who is mighty has done to me great things; Holy is his name."}, {"c": 1, "n": 50, "text": "His mercy is for generations of generations on those who fear him."}, {"c": 1, "n": 51, "text": "He has shown strength with his arm. He has scattered the proud in the imagination of their heart."}, {"c": 1, "n": 52, "text": "He has put down princes from their thrones. Has exalted the lowly."}, {"c": 1, "n": 53, "text": "He has filled the hungry with good things. He has sent the rich away empty."}, {"c": 1, "n": 54, "text": "He has given help to Israel, his servant, that he might remember mercy"}, {"c": 1, "n": 55, "text": "(As he spoke to our fathers) Toward Abraham and his seed forever.\""}, {"c": 1, "n": 56, "text": "Mary stayed with her about three months, and returned to her house."}, {"c": 1, "n": 57, "text": "Now the time that Elizabeth should give birth was fulfilled, and she brought forth a son."}, {"c": 1, "n": 58, "text": "Her neighbors and her relatives heard that the Lord had magnified his mercy towards her; and they rejoiced with her."}, {"c": 1, "n": 59, "text": "It happened on the eighth day, that they came to circumcise the child; and they would have called him Zacharias, after the name of the father."}, {"c": 1, "n": 60, "text": "His mother answered, \"Not so; but he will be called John.\""}, {"c": 1, "n": 61, "text": "They said to her, \"There is no one among your relatives who is called by this name.\""}, {"c": 1, "n": 62, "text": "They made signs to his father, what he would have him called."}, {"c": 1, "n": 63, "text": "He asked for a writing tablet, and wrote, \"His name is John.\" They all marveled."}, {"c": 1, "n": 64, "text": "His mouth was opened immediately, and his tongue freed, and he spoke, blessing God."}, {"c": 1, "n": 65, "text": "Fear came on all who lived around them, and all these sayings were talked about throughout all the hill country of Judea."}, {"c": 1, "n": 66, "text": "All who heard them laid them up in their heart, saying, \"What then will this child be?\" The hand of the Lord was with him."}, {"c": 1, "n": 67, "text": "His father, Zacharias, was filled with the Holy Spirit, and prophesied, saying,"}, {"c": 1, "n": 68, "text": "\"Blessed be the Lord, the God of Israel, For he has visited and worked redemption for his people;"}, {"c": 1, "n": 69, "text": "Has raised up a horn of salvation for us in the house of his servant David"}, {"c": 1, "n": 70, "text": "(As he spoke by the mouth of his holy prophets who have been from of old),"}, {"c": 1, "n": 71, "text": "Salvation from our enemies, and from the hand of all who hate us;"}, {"c": 1, "n": 72, "text": "To show mercy towards our fathers, To remember his holy covenant,"}, {"c": 1, "n": 73, "text": "The oath which he spoke to Abraham, our father,"}, {"c": 1, "n": 74, "text": "To grant to us that we, being delivered out of the hand of our enemies, should serve him without fear,"}, {"c": 1, "n": 75, "text": "In holiness and righteousness before him all the days of our life."}, {"c": 1, "n": 76, "text": "And you, child, will be called a prophet of the Most High, For you will go before the face of the Lord to make ready his ways,"}, {"c": 1, "n": 77, "text": "To give knowledge of salvation to his people by the remission of their sins,"}, {"c": 1, "n": 78, "text": "Because of the tender mercy of our God, Whereby the dawn from on high will visit us,"}, {"c": 1, "n": 79, "text": "To shine on those who sit in darkness and the shadow of death; To guide our feet into the way of peace.\""}, {"c": 1, "n": 80, "text": "The child grew, and grew strong in spirit, and was in the desert until the day of his public appearance to Israel."}]}, "luke_2": {"id": "luke_2", "ref": "Luke 2", "verses": [{"c": 2, "n": 1, "text": "Now it happened in those days, that a decree went out from Caesar Augustus that all the world should be enrolled."}, {"c": 2, "n": 2, "text": "This was the first enrollment made when Quirinius was governor of Syria."}, {"c": 2, "n": 3, "text": "All went to enroll themselves, everyone to his own city."}, {"c": 2, "n": 4, "text": "Joseph also went up from Galilee, out of the city of Nazareth, into Judea, to the city of David, which is called Bethlehem, because he was of the house and family of David;"}, {"c": 2, "n": 5, "text": "to enroll himself with Mary, who was pledged to be married to him as wife, being great with child."}, {"c": 2, "n": 6, "text": "It happened, while they were there, that the day had come that she should give birth."}, {"c": 2, "n": 7, "text": "She brought forth her firstborn son, and she wrapped him in bands of cloth, and laid him in a feeding trough, because there was no room for them in the inn."}, {"c": 2, "n": 8, "text": "There were shepherds in the same country staying in the field, and keeping watch by night over their flock."}, {"c": 2, "n": 9, "text": "Behold, an angel of the Lord stood by them, and the glory of the Lord shone around them, and they were terrified."}, {"c": 2, "n": 10, "text": "The angel said to them, \"Don't be afraid, for behold, I bring you good news of great joy which will be to all the people."}, {"c": 2, "n": 11, "text": "For there is born to you, this day, in the city of David, a Savior, who is Christ the Lord."}, {"c": 2, "n": 12, "text": "This is the sign to you: you will find a baby wrapped in strips of cloth, lying in a feeding trough.\""}, {"c": 2, "n": 13, "text": "Suddenly, there was with the angel a multitude of the heavenly host praising God, and saying,"}, {"c": 2, "n": 14, "text": "\"Glory to God in the highest, On earth peace, good will toward men.\""}, {"c": 2, "n": 15, "text": "It happened, when the angels went away from them into the sky, that the shepherds said one to another, \"Let's go to Bethlehem, now, and see this thing that has happened, which the Lord has made known to us.\""}, {"c": 2, "n": 16, "text": "They came with haste, and found both Mary and Joseph, and the baby lying in the feeding trough."}, {"c": 2, "n": 17, "text": "When they saw it, they publicized widely the saying which was spoken to them about this child."}, {"c": 2, "n": 18, "text": "All who heard it wondered at the things which were spoken to them by the shepherds."}, {"c": 2, "n": 19, "text": "But Mary kept all these sayings, pondering them in her heart."}, {"c": 2, "n": 20, "text": "The shepherds returned, glorifying and praising God for all the things that they had heard and seen, even as it was spoken to them."}, {"c": 2, "n": 21, "text": "When eight days were fulfilled for the circumcision of the child, his name was called JESUS, which was given by the angel before he was conceived in the womb."}, {"c": 2, "n": 22, "text": "When the days of their purification according to the law of Moses were fulfilled, they brought him up to Jerusalem, to present him to the Lord"}, {"c": 2, "n": 23, "text": "(as it is written in the law of the Lord, \"Every male who opens the womb shall be called holy to the Lord\"),"}, {"c": 2, "n": 24, "text": "and to offer a sacrifice according to that which is said in the law of the Lord, \"A pair of turtledoves, or two young pigeons.\""}, {"c": 2, "n": 25, "text": "Behold, there was a man in Jerusalem whose name was Simeon; and this man was righteous and devout, looking for the consolation of Israel, and the Holy Spirit was on him."}, {"c": 2, "n": 26, "text": "It had been revealed to him by the Holy Spirit that he should not see death, before he had seen the Lord's Christ."}, {"c": 2, "n": 27, "text": "He came in the Spirit into the temple. When the parents brought in the child, Jesus, that they might do concerning him according to the custom of the law,"}, {"c": 2, "n": 28, "text": "then he received him into his arms, and blessed God, and said,"}, {"c": 2, "n": 29, "text": "\"Now let you your servant depart, Lord, According to your word, in peace;"}, {"c": 2, "n": 30, "text": "For my eyes have seen your salvation,"}, {"c": 2, "n": 31, "text": "Which you have prepared before the face of all peoples;"}, {"c": 2, "n": 32, "text": "A light for revelation to the Gentiles, The glory of your people Israel.\""}, {"c": 2, "n": 33, "text": "Joseph and his mother were marveling at the things which were spoken concerning him,"}, {"c": 2, "n": 34, "text": "and Simeon blessed them, and said to Mary, his mother, \"Behold, this child is set for the falling and the rising of many in Israel, and for a sign which is spoken against."}, {"c": 2, "n": 35, "text": "Yes, a sword will pierce through your own soul, that thoughts out of many hearts may be revealed.\""}, {"c": 2, "n": 36, "text": "There was one Anna, a prophetess, the daughter of Phanuel, of the tribe of Asher (she was of a great age, having lived with a husband seven years from her virginity,"}, {"c": 2, "n": 37, "text": "and she had been a widow for about eighty-four years), who didn't depart from the temple, worshipping with fastings and petitions night and day."}, {"c": 2, "n": 38, "text": "Coming up at that very hour, she gave thanks to the Lord, and spoke of him to all those who were looking for redemption in Jerusalem."}, {"c": 2, "n": 39, "text": "When they had accomplished all things that were according to the law of the Lord, they returned into Galilee, to their own city, Nazareth."}, {"c": 2, "n": 40, "text": "The child grew, and grew strong in spirit, filled with wisdom, and the grace of God was on him."}, {"c": 2, "n": 41, "text": "His parents went every year to Jerusalem at the feast of the Passover."}, {"c": 2, "n": 42, "text": "When he was twelve years old, they went up to Jerusalem according to the custom of the feast,"}, {"c": 2, "n": 43, "text": "and when they had fulfilled the days, as they were returning, the boy, Jesus, stayed behind in Jerusalem. Joseph and his mother didn't know it,"}, {"c": 2, "n": 44, "text": "but supposing him to be in the company, they went a day's journey, and they looked for him among their relatives and acquaintances."}, {"c": 2, "n": 45, "text": "When they didn't find him, they returned to Jerusalem, looking for him."}, {"c": 2, "n": 46, "text": "It happened, after three days they found him in the temple, sitting in the midst of the teachers, both listening to them, and asking them questions."}, {"c": 2, "n": 47, "text": "All who heard him were amazed at his understanding and his answers."}, {"c": 2, "n": 48, "text": "When they saw him, they were astonished, and his mother said to him, \"Son, why have you treated us this way? Behold, your father and I were anxiously looking for you.\""}, {"c": 2, "n": 49, "text": "He said to them, \"Why were you looking for me? Didn't you know that I must be in my Father's house?\""}, {"c": 2, "n": 50, "text": "They didn't understand the saying which he spoke to them."}, {"c": 2, "n": 51, "text": "He went down with them, and came to Nazareth. He was subject to them, and his mother kept all these sayings in her heart."}, {"c": 2, "n": 52, "text": "Jesus advanced in wisdom and stature, and in favor with God and men."}]}, "luke_3": {"id": "luke_3", "ref": "Luke 3", "verses": [{"c": 3, "n": 1, "text": "Now in the fifteenth year of the reign of Tiberius Caesar, Pontius Pilate being governor of Judea, and Herod being tetrarch of Galilee, and his brother Philip tetrarch of the region of Ituraea and Trachonitis, and Lysanias tetrarch of Abilene,"}, {"c": 3, "n": 2, "text": "in the high priesthood of Annas and Caiaphas, the word of God came to John, the son of Zacharias, in the wilderness."}, {"c": 3, "n": 3, "text": "He came into all the region around the Jordan, preaching the baptism of repentance to remission of sins."}, {"c": 3, "n": 4, "text": "As it is written in the book of the words of Isaiah the prophet, \"The voice of one crying in the wilderness, 'Make ready the way of the Lord. Make his paths straight."}, {"c": 3, "n": 5, "text": "Every valley will be filled. Every mountain and hill will be brought low. The crooked will become straight, And the rough ways smooth."}, {"c": 3, "n": 6, "text": "All flesh will see God's salvation.'\""}, {"c": 3, "n": 7, "text": "He said therefore to the multitudes who went out to be baptized by him, \"You offspring of vipers, who warned you to flee from the wrath to come?"}, {"c": 3, "n": 8, "text": "Bring forth therefore fruits worthy of repentance, and don't begin to say among yourselves, 'We have Abraham for our father;' for I tell you that God is able to raise up children to Abraham from these stones!"}, {"c": 3, "n": 9, "text": "Even now the ax also lies at the root of the trees. Every tree therefore that doesn't bring forth good fruit is cut down, and thrown into the fire.\""}, {"c": 3, "n": 10, "text": "The multitudes asked him, \"What then must we do?\""}, {"c": 3, "n": 11, "text": "He answered them, \"He who has two coats, let him give to him who has none. He who has food, let him do likewise.\""}, {"c": 3, "n": 12, "text": "Tax collectors also came to be baptized, and they said to him, \"Teacher, what must we do?\""}, {"c": 3, "n": 13, "text": "He said to them, \"Extort no more than that which is appointed you.\""}, {"c": 3, "n": 14, "text": "Soldiers also asked him, saying, \"What about us? What must we do?\" He said to them, \"Extort from no one by violence, neither accuse anyone wrongfully. Be content with your wages.\""}, {"c": 3, "n": 15, "text": "As the people were in expectation, and all men reasoned in their hearts concerning John, whether perhaps he was the Christ,"}, {"c": 3, "n": 16, "text": "John answered them all, \"I indeed baptize you with water, but he comes who is mightier than I, the latchet of whose sandals I am not worthy to loosen. He will baptize you in the Holy Spirit and fire,"}, {"c": 3, "n": 17, "text": "whose fan is in his hand, and he will thoroughly cleanse his threshing floor, and will gather the wheat into his barn; but he will burn up the chaff with unquenchable fire.\""}, {"c": 3, "n": 18, "text": "Then with many other exhortations he preached good news to the people,"}, {"c": 3, "n": 19, "text": "but Herod the tetrarch, being reproved by him for Herodias, his brother's wife, and for all the evil things which Herod had done,"}, {"c": 3, "n": 20, "text": "added this also to them all, that he shut up John in prison."}, {"c": 3, "n": 21, "text": "Now it happened, when all the people were baptized, that, Jesus also having been baptized, and praying, the sky was opened,"}, {"c": 3, "n": 22, "text": "and the Holy Spirit descended in a bodily form, as a dove, on him, and a voice came out of the sky, saying \"You are my beloved Son. In you I am well pleased.\""}, {"c": 3, "n": 23, "text": "Jesus himself, when he began to teach, was about thirty years old, being the son (as was supposed) of Joseph, the son of Heli,"}, {"c": 3, "n": 24, "text": "the son of Matthat, the son of Levi, the son of Melchi, the son of Jannai, the son of Joseph,"}, {"c": 3, "n": 25, "text": "the son of Mattathias, the son of Amos, the son of Nahum, the son of Esli, the son of Naggai,"}, {"c": 3, "n": 26, "text": "the son of Maath, the son of Mattathias, the son of Semein, the son of Joseph, the son of Judah,"}, {"c": 3, "n": 27, "text": "the son of Joanan, the son of Rhesa, the son of Zerubbabel, the son of Shealtiel, the son of Neri,"}, {"c": 3, "n": 28, "text": "the son of Melchi, the son of Addi, the son of Cosam, the son of Elmodam, the son of Er,"}, {"c": 3, "n": 29, "text": "the son of Josa, the son of Eliezer, the son of Jorim, the son of Matthat, the son of Levi,"}, {"c": 3, "n": 30, "text": "the son of Simeon, the son of Judah, the son of Joseph, the son of Jonan, the son of Eliakim,"}, {"c": 3, "n": 31, "text": "the son of Melea, the son of Menan, the son of Mattatha, the son of Nathan, the son of David,"}, {"c": 3, "n": 32, "text": "the son of Jesse, the son of Obed, the son of Boaz, the son of Salmon, the son of Nahshon,"}, {"c": 3, "n": 33, "text": "the son of Amminadab, the son of Aram, the son of Joram, the son of Hezron, the son of Perez, the son of Judah,"}, {"c": 3, "n": 34, "text": "the son of Jacob, the son of Isaac, the son of Abraham, the son of Terah, the son of Nahor,"}, {"c": 3, "n": 35, "text": "the son of Serug, the son of Reu, the son of Peleg, the son of Eber, the son of Shelah"}, {"c": 3, "n": 36, "text": "the son of Cainan, the son of Arphaxad, the son of Shem, the son of Noah, the son of Lamech,"}, {"c": 3, "n": 37, "text": "the son of Methuselah, the son of Enoch, the son of Jared, the son of Mahalaleel, the son of Cainan,"}, {"c": 3, "n": 38, "text": "the son of Enos, the son of Seth, the son of Adam, the son of God."}]}, "luke_4": {"id": "luke_4", "ref": "Luke 4", "verses": [{"c": 4, "n": 1, "text": "Jesus, full of the Holy Spirit, returned from the Jordan, and was led by the Spirit into the wilderness"}, {"c": 4, "n": 2, "text": "for forty days, being tempted by the devil. He ate nothing in those days. Afterward, when they were completed, he was hungry."}, {"c": 4, "n": 3, "text": "The devil said to him, \"If you are the Son of God, command this stone to become bread.\""}, {"c": 4, "n": 4, "text": "Jesus answered him, saying,\"It is written, 'Man will not live by bread alone, but by every word of God.'\""}, {"c": 4, "n": 5, "text": "The devil, leading him up on a high mountain, showed him all the kingdoms of the inhabited world in a moment of time."}, {"c": 4, "n": 6, "text": "The devil said to him, \"I will give you all this authority, and their glory, for it has been delivered to me; and I give it to whomever I want."}, {"c": 4, "n": 7, "text": "If you therefore will worship before me, it will all be yours.\""}, {"c": 4, "n": 8, "text": "Jesus answered him, \"Get behind me Satan! For it is written, 'You will worship the Lord your God, and him only will you serve.'\""}, {"c": 4, "n": 9, "text": "He led him to Jerusalem, and set him on the pinnacle of the temple, and said to him, \"If you are the Son of God, cast yourself down from here,"}, {"c": 4, "n": 10, "text": "for it is written, 'He will give his angels charge concerning you, to guard you;'"}, {"c": 4, "n": 11, "text": "and, 'On their hands they will bear you up, Lest perhaps you dash your foot against a stone.'\""}, {"c": 4, "n": 12, "text": "Jesus answering, said to him, \"It has been said, 'You shall not tempt the Lord your God.'\""}, {"c": 4, "n": 13, "text": "When the devil had completed every temptation, he departed from him for awhile."}, {"c": 4, "n": 14, "text": "Jesus returned in the power of the Spirit to Galilee, and news about him spread through all the surrounding area."}, {"c": 4, "n": 15, "text": "He taught in their synagogues, being glorified by all."}, {"c": 4, "n": 16, "text": "He came to Nazareth, where he had been brought up. He entered, as was his custom, into the synagogue on the Sabbath day, and stood up to read."}, {"c": 4, "n": 17, "text": "The book of the prophet Isaiah was handed to him. He opened the book, and found the place where it was written,"}, {"c": 4, "n": 18, "text": "\"The Spirit of the Lord is on me, Because he anointed me to preach good news to the poor. He has sent me to heal the brokenhearted, To proclaim release to the captives, Recovering of sight to the blind, To deliver those who are crushed,"}, {"c": 4, "n": 19, "text": "And to proclaim the acceptable year of the Lord.\""}, {"c": 4, "n": 20, "text": "He closed the book, gave it back to the attendant, and sat down. The eyes of all in the synagogue were fastened on him."}, {"c": 4, "n": 21, "text": "He began to tell them, \"Today, this scripture has been fulfilled in your hearing.\""}, {"c": 4, "n": 22, "text": "All testified about him, and wondered at the words of grace which proceeded out of his mouth, and they said, \"Isn't this Joseph's son?\""}, {"c": 4, "n": 23, "text": "He said to them, \"Doubtless you will tell me this parable, 'Physician, heal yourself. Whatever we have heard done at Capernaum, do also here in your hometown.'\""}, {"c": 4, "n": 24, "text": "He said, \"Most assuredly I tell you, no prophet is acceptable in his hometown."}, {"c": 4, "n": 25, "text": "But truly I tell you, there were many widows in Israel in the days of Elijah, when the the sky was shut up three years and six months, when a great famine came over all the land."}, {"c": 4, "n": 26, "text": "Elijah was sent to none of them, except only to Zarephath, in the land of Sidon, to a woman who was a widow."}, {"c": 4, "n": 27, "text": "There were many lepers in Israel in the time of Elisha the prophet, yet not one of them was cleansed, except Naaman, the Syrian.\""}, {"c": 4, "n": 28, "text": "They were all filled with wrath in the synagogue, as they heard these things;"}, {"c": 4, "n": 29, "text": "and they rose up, and threw him out of the city, and led him to the brow of the hill that their city was built on, that they might throw him off the cliff."}, {"c": 4, "n": 30, "text": "But he, passing through the midst of them, went his way."}, {"c": 4, "n": 31, "text": "He came down to Capernaum, a city of Galilee. He was teaching them on the Sabbath day,"}, {"c": 4, "n": 32, "text": "and they were astonished at his teaching, for his word was with authority."}, {"c": 4, "n": 33, "text": "In the synagogue there was a man who had a spirit of an unclean demon, and he cried out with a loud voice,"}, {"c": 4, "n": 34, "text": "saying, \"Ah! what have we to do with you, Jesus of Nazareth? Have you come to destroy us? I know you who you are: the Holy One of God!\""}, {"c": 4, "n": 35, "text": "Jesus rebuked him, saying, \"Be silent, and come out of him!\" When the demon had thrown him down in their midst, he came out of him, having done him no harm."}, {"c": 4, "n": 36, "text": "Amazement came on all, and they spoke together, one with another, saying, \"What is this word? For with authority and power he commands the unclean spirits, and they come out!\""}, {"c": 4, "n": 37, "text": "News about him went forth into every place of the surrounding region."}, {"c": 4, "n": 38, "text": "He rose up from the synagogue, and entered into Simon's house. Simon's mother-in-law was afflicted with a great fever, and they begged him for her."}, {"c": 4, "n": 39, "text": "He stood over her, and rebuked the fever; and it left her. Immediately she rose up and ministered to them."}, {"c": 4, "n": 40, "text": "When the sun was setting, all those who had any sick with various diseases brought them to him; and he laid his hands on every one of them, and healed them."}, {"c": 4, "n": 41, "text": "Demons also came out from many, crying out, and saying, \"You are the Christ, the Son of God!\" Rebuking them, he didn't allow them to speak, because they knew that he was the Christ."}, {"c": 4, "n": 42, "text": "When it was day, he came out and went into an uninhabited place, and the multitudes looked for him, and came to him, and held on to him, so that he wouldn't go away from them."}, {"c": 4, "n": 43, "text": "But he said to them, \"I must preach the good news of the kingdom of God to the other cities also; for this reason I have been sent.\""}, {"c": 4, "n": 44, "text": "He was preaching in the synagogues of Galilee."}]}, "luke_5": {"id": "luke_5", "ref": "Luke 5", "verses": [{"c": 5, "n": 1, "text": "Now it happened, while the multitude pressed on him and heard the word of God, that he was standing by the lake of Gennesaret."}, {"c": 5, "n": 2, "text": "He saw two boats standing by the lake, but the fishermen had gone out of them, and were washing their nets."}, {"c": 5, "n": 3, "text": "He entered into one of the boats, which was Simon's, and asked him to put out a little from the land. He sat down and taught the multitudes out of the boat."}, {"c": 5, "n": 4, "text": "When he had finished speaking, he said to Simon, \"Put out into the deep, and let down your nets for a catch.\""}, {"c": 5, "n": 5, "text": "Simon answered him, \"Master, we worked all night, and took nothing; but at your word I will let down the net.\""}, {"c": 5, "n": 6, "text": "When they had done this, they caught a great multitude of fish, and their net was breaking."}, {"c": 5, "n": 7, "text": "They beckoned to their partners in the other boat, that they should come and help them. They came, and filled both boats, so that they began to sink."}, {"c": 5, "n": 8, "text": "But Simon Peter, when he saw it, fell down at Jesus' knees, saying, \"Depart from me, for I am a sinful man, Lord.\""}, {"c": 5, "n": 9, "text": "For he was amazed, and all who were with him, at the catch of fish which they had caught;"}, {"c": 5, "n": 10, "text": "and so also were James and John, sons of Zebedee, who were partners with Simon. Jesus said to Simon, \"Don't be afraid. From now on you will catch men alive.\""}, {"c": 5, "n": 11, "text": "When they had brought their boats to land, they left everything, and followed him."}, {"c": 5, "n": 12, "text": "It happened, while he was in one of the cities, behold, there was a man full of leprosy. When he saw Jesus, he fell on his face, and begged him, saying, \"Lord, if you want to, you can make me clean.\""}, {"c": 5, "n": 13, "text": "He stretched forth his hand, and touched him, saying, \"I want to. Be made clean.\" Immediately the leprosy departed from him."}, {"c": 5, "n": 14, "text": "He charged him to tell no one, \"But go your way, and show yourself to the priest, and offer for your cleansing, according to what Moses commanded, for a testimony to them.\""}, {"c": 5, "n": 15, "text": "But the report concerning him spread much more, and great multitudes came together to hear, and to be healed by him of their infirmities."}, {"c": 5, "n": 16, "text": "But he withdrew himself into the desert, and prayed."}, {"c": 5, "n": 17, "text": "It happened on one of those days, that he was teaching; and there were Pharisees and teachers of the law sitting by, who had come out of every village of Galilee, Judea, and Jerusalem. The power of the Lord was with him to heal them."}, {"c": 5, "n": 18, "text": "Behold, men brought a paralyzed man on a cot, and they sought to bring him in to lay before him."}, {"c": 5, "n": 19, "text": "Not finding a way to bring him in because of the multitude, they went up to the housetop, and let him down through the tiles with his cot into the midst before Jesus."}, {"c": 5, "n": 20, "text": "Seeing their faith, he said to him, \"Man, your sins are forgiven you.\""}, {"c": 5, "n": 21, "text": "The scribes and the Pharisees began to reason, saying, \"Who is this that speaks blasphemies? Who can forgive sins, but God alone?\""}, {"c": 5, "n": 22, "text": "But Jesus, perceiving their thoughts, answered them, \"Why are you reasoning so in your hearts?"}, {"c": 5, "n": 23, "text": "Which is easier to say, 'Your sins are forgiven you;' or to say, 'Arise and walk?'"}, {"c": 5, "n": 24, "text": "But that you may know that the Son of Man has authority on earth to forgive sins\" (he said to the paralyzed man), \"I tell you, arise, and take up your cot, and go to your house.\""}, {"c": 5, "n": 25, "text": "Immediately he rose up before them, and took up that which he was laying on, and departed to his house, glorifying God."}, {"c": 5, "n": 26, "text": "Amazement took hold on all, and they glorified God. They were filled with fear, saying, \"We have seen strange things today.\""}, {"c": 5, "n": 27, "text": "After these things he went out, and saw a tax collector, named Levi, sitting at the tax office, and said to him, \"Follow me.\""}, {"c": 5, "n": 28, "text": "He left everything, and rose up and followed him."}, {"c": 5, "n": 29, "text": "Levi made him a great feast for him in his house. There was a great crowd of tax collectors and others who were reclining with them."}, {"c": 5, "n": 30, "text": "Their scribes and the Pharisees murmured against his disciples, saying, \"Why do you eat and drink with the tax collectors and sinners?\""}, {"c": 5, "n": 31, "text": "Jesus answered them, \"Those who are healthy have no need for a physician, but those who are sick do."}, {"c": 5, "n": 32, "text": "I have not come to call the righteous, but sinners to repentance.\""}, {"c": 5, "n": 33, "text": "They said to him, \"Why do John's disciples often fast and pray, likewise also the disciples of the Pharisees, but yours eat and drink?\""}, {"c": 5, "n": 34, "text": "He said to them, \"Can you make the friends of the bridegroom fast, while the bridegroom is with them?"}, {"c": 5, "n": 35, "text": "But the days will come when the bridegroom will be taken away from them. Then will they fast in those days.\""}, {"c": 5, "n": 36, "text": "He also told a parable to them. \"No one puts a piece from a new garment on an old garment, or else he will tear the new, and also the piece from the new will not match the old."}, {"c": 5, "n": 37, "text": "No one puts new wine into old wineskins, or else the new wine will burst the skins, and it will be spilled, and the skins will be destroyed."}, {"c": 5, "n": 38, "text": "But new wine must be put into fresh wineskins, and both are preserved."}, {"c": 5, "n": 39, "text": "No man having drunk old wine immediately desires new, for he says, 'The old is better.'\""}]}, "luke_6": {"id": "luke_6", "ref": "Luke 6", "verses": [{"c": 6, "n": 1, "text": "Now it happened on the second Sabbath after the first, that he was going through the grain fields, and his disciples plucked the heads of grain, and ate, rubbing them in their hands."}, {"c": 6, "n": 2, "text": "But some of the Pharisees said to them, \"Why do you do that which is not lawful to do on the Sabbath day?\""}, {"c": 6, "n": 3, "text": "Jesus, answering them, said, \"Haven't you read this, what David did, when he was hungry, he, and those who were with him;"}, {"c": 6, "n": 4, "text": "how he entered into the house of God, and took and ate the show bread, and gave also to those who were with him, which is not lawful to eat except for the priests alone?\""}, {"c": 6, "n": 5, "text": "He said to them, \"The Son of Man is lord of the Sabbath.\""}, {"c": 6, "n": 6, "text": "It also happened on another Sabbath, that he entered into the synagogue and taught. There was a man there, and his right hand was withered."}, {"c": 6, "n": 7, "text": "The scribes and the Pharisees watched him, to see whether he would heal on the Sabbath, that they might find an accusation against him."}, {"c": 6, "n": 8, "text": "But he knew their thoughts; and he said to the man who had the withered hand, \"Rise up, and stand in the middle.\" He arose and stood."}, {"c": 6, "n": 9, "text": "Then Jesus said to them, \"I will ask you something: Is it lawful on the Sabbath to do good, or to do harm? To save a life, or to kill?\""}, {"c": 6, "n": 10, "text": "He looked around at them all, and said to him, \"Stretch out your hand.\" He did, and his hand was restored as sound as the other."}, {"c": 6, "n": 11, "text": "But they were filled with rage, and talked with one another about what they might do to Jesus."}, {"c": 6, "n": 12, "text": "It happened in these days, that he went out into the mountain to pray, and he continued all night in prayer to God."}, {"c": 6, "n": 13, "text": "When it was day, he called his disciples, and from them he chose twelve, whom he also named apostles:"}, {"c": 6, "n": 14, "text": "Simon, whom he also named Peter; Andrew, his brother; James; John; Philip; Bartholomew;"}, {"c": 6, "n": 15, "text": "Matthew; Thomas; James, the son of Alphaeus; Simon, who was called the Zealot;"}, {"c": 6, "n": 16, "text": "Judas the son of James; and Judas Iscariot, who also became a traitor."}, {"c": 6, "n": 17, "text": "He came down with them, and stood on a level place, with a crowd of his disciples, and a great number of the people from all Judea and Jerusalem, and the sea coast of Tyre and Sidon, who came to hear him, and to be healed of their diseases;"}, {"c": 6, "n": 18, "text": "also those who were troubled with unclean spirits, and they were being healed."}, {"c": 6, "n": 19, "text": "All the multitude sought to touch him, for power came forth from him, and healed them all."}, {"c": 6, "n": 20, "text": "He lifted up his eyes to his disciples, and said, \"Blessed are you poor, for yours is the kingdom of God."}, {"c": 6, "n": 21, "text": "\"Blessed are you who hunger now, for you will be filled. \"Blessed are you who weep now, for you will laugh."}, {"c": 6, "n": 22, "text": "\"Blessed are you when men shall hate you, and when they shall separate you from them and reproach you, and throw out your name as evil, for the Son of Man's sake."}, {"c": 6, "n": 23, "text": "Rejoice in that day, and leap for joy, for behold, your reward is great in heaven, for their fathers did the same thing to the prophets."}, {"c": 6, "n": 24, "text": "\"But woe to you who are rich! For you have received your consolation."}, {"c": 6, "n": 25, "text": "\"Woe to you, you who are full now! For you will be hungry. \"Woe to you, you who laugh now! For you will mourn and weep."}, {"c": 6, "n": 26, "text": "\"Woe, when men will speak well of you! For their fathers did the same thing to the false prophets."}, {"c": 6, "n": 27, "text": "But I tell you who hear, love your enemies, do good to those who hate you,"}, {"c": 6, "n": 28, "text": "bless them who curse you, and pray for those who insult you."}, {"c": 6, "n": 29, "text": "To him who strikes you on the cheek, offer also the other; and from him who takes away your cloak, don't withhold your coat also."}, {"c": 6, "n": 30, "text": "Give to everyone who asks you, and don't ask him who takes away your goods to give them back again."}, {"c": 6, "n": 31, "text": "\"As you desire that men should do to you, likewise do to them also."}, {"c": 6, "n": 32, "text": "If you love those who love you, what credit is that to you? For even sinners love those who love them."}, {"c": 6, "n": 33, "text": "If you do good to those who do good to you, what credit is that to you? For even sinners do the same."}, {"c": 6, "n": 34, "text": "If you lend to those from whom you hope to receive, what credit is that to you? Even sinners lend to sinners, to receive back as much."}, {"c": 6, "n": 35, "text": "But love your enemies, and do good, and lend, expecting nothing back; and your reward will be great, and you will be sons of the Most High; for he is kind toward the unthankful and evil."}, {"c": 6, "n": 36, "text": "Therefore be merciful, even as your Father is also merciful."}, {"c": 6, "n": 37, "text": "Don't judge, and you will not be judged. Don't condemn, and you will not be condemned. Set free, and you will be set free."}, {"c": 6, "n": 38, "text": "Give, and it will be given to you, good measure, pressed down, shaken together, and running over, will they give into your bosom. For with the same measure you measure it will be measured back to you.\""}, {"c": 6, "n": 39, "text": "He spoke a parable to them. \"Can the blind guide the blind? Won't they both fall into a pit?"}, {"c": 6, "n": 40, "text": "A disciple is not above his teacher, but everyone when he is fully trained will be like his teacher."}, {"c": 6, "n": 41, "text": "Why do you see the speck of chaff that is in your brother's eye, but don't consider the beam that is in your own eye?"}, {"c": 6, "n": 42, "text": "Or how can you tell your brother, 'Brother, let me remove the speck of chaff that is in your eye,' when you yourself don't see the beam that is in your own eye? You hypocrite! First remove the beam from your own eye, and then you can see clearly to remove the speck of chaff that is in your brother's eye."}, {"c": 6, "n": 43, "text": "For there is no good tree that brings forth rotten fruit; nor again a rotten tree that brings forth good fruit."}, {"c": 6, "n": 44, "text": "For each tree is known by its own fruit. For people don't gather figs from thorns, nor do they gather grapes from a bramble bush."}, {"c": 6, "n": 45, "text": "The good man out of the good treasure of his heart brings forth that which is good, and the evil man out of the evil treasure of his heart brings forth that which is evil, for out of the abundance of the heart, his mouth speaks."}, {"c": 6, "n": 46, "text": "Why do you call me, 'Lord, Lord,' and don't do the things which I say?"}, {"c": 6, "n": 47, "text": "Everyone who comes to me, and hears my words, and does them, I will show you who he is like."}, {"c": 6, "n": 48, "text": "He is like a man building a house, who dug and went deep, and laid a foundation on the rock. When a flood arose, the stream broke against that house, and could not shake it, because it was founded on the rock."}, {"c": 6, "n": 49, "text": "But he who hears, and doesn't do, is like a man who built a house on the earth without a foundation, against which the stream broke, and immediately it fell, and the ruin of that house was great.\""}]}, "luke_7": {"id": "luke_7", "ref": "Luke 7", "verses": [{"c": 7, "n": 1, "text": "After he had finished speaking in the hearing of the people, he entered into Capernaum."}, {"c": 7, "n": 2, "text": "A certain centurion's servant, who was dear to him, was sick and at the point of death."}, {"c": 7, "n": 3, "text": "When he heard about Jesus, he sent to him elders of the Jews, asking him to come and save his servant."}, {"c": 7, "n": 4, "text": "When they came to Jesus, they begged him earnestly, saying, \"He is worthy for you to do this for him,"}, {"c": 7, "n": 5, "text": "for he loves our nation, and he built our synagogue for us.\""}, {"c": 7, "n": 6, "text": "Jesus went with them. When he was now not far from the house, the centurion sent friends to him, saying to him, \"Lord, don't trouble yourself, for I am not worthy for you to come under my roof."}, {"c": 7, "n": 7, "text": "Therefore I didn't even think myself worthy to come to you; but say the word, and my servant will be healed."}, {"c": 7, "n": 8, "text": "For I also am a man placed under authority, having under myself soldiers. I tell this one, 'Go!' and he goes; and to another, 'Come!' and he comes; and to my servant, 'Do this,' and he does it.\""}, {"c": 7, "n": 9, "text": "When Jesus heard these things, he marveled at him, and turned and said to the multitude who followed him, \"I tell you, I have not found so great faith, no, not in Israel.\""}, {"c": 7, "n": 10, "text": "Those who were sent, returning to the house, found that the servant who had been sick was well."}, {"c": 7, "n": 11, "text": "It happened soon afterwards, that he went to a city called Nain. Many of his disciples went with him, along with a great multitude."}, {"c": 7, "n": 12, "text": "Now when he drew near to the gate of the city, behold, one who was dead was carried out, the only son of his mother, and she was a widow. Many people of the city were with her."}, {"c": 7, "n": 13, "text": "When the Lord saw her, he had compassion on her, and said to her, \"Don't cry.\""}, {"c": 7, "n": 14, "text": "He came near and touched the coffin, and the bearers stood still. He said, \"Young man, I tell you, arise!\""}, {"c": 7, "n": 15, "text": "He who was dead sat up, and began to speak. He gave him to his mother."}, {"c": 7, "n": 16, "text": "Fear took hold on all, and they glorified God, saying, \"A great prophet has arisen among us,\" and, \"God has visited his people.\""}, {"c": 7, "n": 17, "text": "This report went out concerning him in the whole of Judea, and in all the surrounding region."}, {"c": 7, "n": 18, "text": "The disciples of John told him about all these things."}, {"c": 7, "n": 19, "text": "John, calling to himself two of his disciples, sent them to Jesus, saying, \"Are you he who comes, or should we look for another?\""}, {"c": 7, "n": 20, "text": "When the men had come to him, they said, \"John the Baptizer has sent us to you, saying, 'Are you he who comes, or should we look for another?'\""}, {"c": 7, "n": 21, "text": "In that hour he cured many of diseases and plagues and evil spirits; and to many who were blind he gave sight."}, {"c": 7, "n": 22, "text": "Jesus answered them, \"Go and tell John the things which you have seen and heard: that the blind receive their sight, the lame walk, the lepers are cleansed, the deaf hear, the dead are raised up, and the poor have good news preached to them."}, {"c": 7, "n": 23, "text": "Blessed is he who is not offended by me.\""}, {"c": 7, "n": 24, "text": "When John's messengers had departed, he began to tell the multitudes about John, \"What did you go out into the wilderness to see? A reed shaken by the wind?"}, {"c": 7, "n": 25, "text": "But what did you go out to see? A man clothed in soft clothing? Behold, those who are gorgeously dressed, and live delicately, are in kings' courts."}, {"c": 7, "n": 26, "text": "But what did you go out to see? A prophet? Yes, I tell you, and much more than a prophet."}, {"c": 7, "n": 27, "text": "This is he of whom it is written, 'Behold, I send my messenger before your face, Who will prepare your way before you.'"}, {"c": 7, "n": 28, "text": "\"For I tell you, among those who are born of women there is not a greater prophet than John the Baptizer, yet he who is least in the kingdom of God is greater than he.\""}, {"c": 7, "n": 29, "text": "When all the people and the tax collectors heard this, they justified God, being baptized with John's baptism."}, {"c": 7, "n": 30, "text": "But the Pharisees and the lawyers rejected the counsel of God, not being baptized by him themselves."}, {"c": 7, "n": 31, "text": "The Lord said, \"To what then will I liken the men of this generation? What are they like?"}, {"c": 7, "n": 32, "text": "They are like children who sit in the marketplace, and call one to another, saying, 'We piped to you, and you didn't dance. We mourned, and you didn't weep.'"}, {"c": 7, "n": 33, "text": "For John the Baptizer came neither eating bread nor drinking wine, and you say, 'He has a demon.'"}, {"c": 7, "n": 34, "text": "The Son of Man has come eating and drinking, and you say, 'Behold, a gluttonous man, and a drunkard; a friend of tax collectors and sinners!'"}, {"c": 7, "n": 35, "text": "Wisdom is justified by all her children.\""}, {"c": 7, "n": 36, "text": "One of the Pharisees invited him to eat with him. He entered into the Pharisee's house, and sat at the table."}, {"c": 7, "n": 37, "text": "Behold, a woman in the city who was a sinner, when she knew that he was reclining in the Pharisee's house, she brought an alabaster jar of ointment."}, {"c": 7, "n": 38, "text": "Standing behind at his feet weeping, she began to wet his feet with her tears, and she wiped them with the hair of her head, kissed his feet, and anointed them with the ointment."}, {"c": 7, "n": 39, "text": "Now when the Pharisee who had invited him saw it, he said to himself, \"This man, if he were a prophet, would have perceived who and what kind of woman this is who touches him, that she is a sinner.\""}, {"c": 7, "n": 40, "text": "Jesus answered him, \"Simon, I have something to tell you.\" He said, \"Teacher, say on.\""}, {"c": 7, "n": 41, "text": "\"A certain lender had two debtors. The one owed five hundred denarii, and the other fifty."}, {"c": 7, "n": 42, "text": "When they couldn't pay, he forgave them both. Which of them therefore will love him most?\""}, {"c": 7, "n": 43, "text": "Simon answered, \"He, I suppose, to whom he forgave the most.\" He said to him, \"You have judged correctly.\""}, {"c": 7, "n": 44, "text": "Turning to the woman, he said to Simon, \"Do you see this woman? I entered into your house, and you gave me no water for my feet, but she has wet my feet with her tears, and wiped them with the hair of her head."}, {"c": 7, "n": 45, "text": "You gave me no kiss, but she, since the time I came in, has not ceased to kiss my feet."}, {"c": 7, "n": 46, "text": "You didn't anoint my head with oil, but she has anointed my feet with ointment."}, {"c": 7, "n": 47, "text": "Therefore I tell you, her sins, which are many, are forgiven, for she loved much. But to whom little is forgiven, the same loves little.\""}, {"c": 7, "n": 48, "text": "He said to her, \"Your sins are forgiven.\""}, {"c": 7, "n": 49, "text": "Those who sat at the table with him began to say to themselves, \"Who is this who even forgives sins?\""}, {"c": 7, "n": 50, "text": "He said to the woman, \"Your faith has saved you. Go in peace.\""}]}, "luke_8": {"id": "luke_8", "ref": "Luke 8", "verses": [{"c": 8, "n": 1, "text": "It happened soon afterwards, that he went about through cities and villages, preaching and bringing the good news of the kingdom of God, and with him the twelve,"}, {"c": 8, "n": 2, "text": "and certain women who had been healed of evil spirits and infirmities: Mary who was called Magdalene, from whom seven demons had gone out;"}, {"c": 8, "n": 3, "text": "and Joanna, the wife of Chuzas, Herod's steward, Susanna; and many others; who ministered to them from their possessions."}, {"c": 8, "n": 4, "text": "When a great multitude came together, and people from every city were coming to him, he spoke by a parable."}, {"c": 8, "n": 5, "text": "\"The farmer went out to sow his seed. As he sowed, some fell by the road, and it was trampled under foot, and the birds of the sky devoured it."}, {"c": 8, "n": 6, "text": "Other seed fell on the rock, and as soon as it grew, it withered away, because it had no moisture."}, {"c": 8, "n": 7, "text": "Other fell amid the thorns, and the thorns grew with it, and choked it."}, {"c": 8, "n": 8, "text": "Other fell into the good ground, and grew, and brought forth fruit one hundred times.\" As he said these things, he called out, \"He who has ears to hear, let him hear!\""}, {"c": 8, "n": 9, "text": "Then his disciples asked him, \"What does this parable mean?\""}, {"c": 8, "n": 10, "text": "He said, \"To you it is given to know the mysteries of the kingdom of God, but to the rest in parables; that 'seeing they may not see, and hearing they may not understand.'"}, {"c": 8, "n": 11, "text": "Now the parable is this: The seed is the word of God."}, {"c": 8, "n": 12, "text": "Those by the road are those who hear, then the devil comes, and takes away the word from their heart, that they may not believe and be saved."}, {"c": 8, "n": 13, "text": "Those on the rock are they who, when they hear, receive the word with joy; but these have no root, who believe for a while, and fall away in time of temptation."}, {"c": 8, "n": 14, "text": "That which fell among the thorns, these are those who have heard, and as they go on their way they are choked with cares, riches, and pleasures of life, and bring no fruit to maturity."}, {"c": 8, "n": 15, "text": "That in the good ground, these are such as in an honest and good heart, having heard the word, hold it tightly, and bring forth fruit with patience."}, {"c": 8, "n": 16, "text": "\"No one, when he has lit a lamp, covers it with a container, or puts it under a bed; but puts it on a stand, that those who enter in may see the light."}, {"c": 8, "n": 17, "text": "For nothing is hidden, that will not be revealed; nor anything secret, that will not be known and come to light."}, {"c": 8, "n": 18, "text": "Be careful therefore how you hear. For whoever has, to him will be given; and whoever doesn't have, from him will be taken away even that which he thinks he has.\""}, {"c": 8, "n": 19, "text": "His mother and brothers came to him, and they could not come near him for the crowd."}, {"c": 8, "n": 20, "text": "It was told him by some saying, \"Your mother and your brothers stand outside, desiring to see you.\""}, {"c": 8, "n": 21, "text": "But he answered them, \"My mother and my brothers are these who hear the word of God, and do it.\""}, {"c": 8, "n": 22, "text": "Now it happened on one of those days, that he entered into a boat, himself and his disciples, and he said to them, \"Let's go over to the other side of the lake.\" So they launched out."}, {"c": 8, "n": 23, "text": "But as they sailed, he fell asleep. A wind storm came down on the lake, and they were taking on dangerous amounts of water."}, {"c": 8, "n": 24, "text": "They came to him, and awoke him, saying, \"Master, master, we are dying!\" He awoke, and rebuked the wind and the raging of the water, and they ceased, and it was calm."}, {"c": 8, "n": 25, "text": "He said to them, \"Where is your faith?\" Being afraid they marveled, saying one to another, \"Who is this, then, that he commands even the winds and the water, and they obey him?\""}, {"c": 8, "n": 26, "text": "They arrived at the country of the Gadarenes, which is opposite Galilee."}, {"c": 8, "n": 27, "text": "When Jesus stepped ashore, a certain man out of the city met him, who had demons for a long time. He wore no clothes, and didn't live in a house, but in the tombs."}, {"c": 8, "n": 28, "text": "When he saw Jesus, he cried out, and fell down before him, and with a loud voice said, \"What do I have to do with you, Jesus, you Son of the Most High God? I beg you, don't torment me!\""}, {"c": 8, "n": 29, "text": "For Jesus was commanding the unclean spirit to come out of the man. For the unclean spirit had often seized the man. He was kept under guard, and bound with chains and fetters. Breaking the bands apart, he was driven by the demon into the desert."}, {"c": 8, "n": 30, "text": "Jesus asked him, \"What is your name?\" He said, \"Legion,\" for many demons had entered into him."}, {"c": 8, "n": 31, "text": "They begged him who he would not command them to go into the abyss."}, {"c": 8, "n": 32, "text": "Now there was there a herd of many pigs feeding on the mountain, and they begged him that he would allow them to enter into those. He allowed them."}, {"c": 8, "n": 33, "text": "The demons came out from the man, and entered into the pigs, and the herd rushed down the steep bank into the lake, and were drowned."}, {"c": 8, "n": 34, "text": "When those who fed them saw what had happened, they fled, and told it in the city and in the country."}, {"c": 8, "n": 35, "text": "People went out to see what had happened. They came to Jesus, and found the man from whom the demons were gone out, sitting, clothed and in his right mind, at the feet of Jesus; and they were afraid."}, {"c": 8, "n": 36, "text": "Those who saw it told them how he who was possessed with demons was healed."}, {"c": 8, "n": 37, "text": "All the people of the surrounding country of the Gadarenes asked him to depart from them, for they were very much afraid. He entered into the boat, and returned."}, {"c": 8, "n": 38, "text": "But the man from whom the demons had gone out begged him that he might go with him, but Jesus sent him away, saying,"}, {"c": 8, "n": 39, "text": "\"Return to your house, and declare what great things God has done for you.\" He went his way, proclaiming throughout the whole city what great things Jesus had done for him."}, {"c": 8, "n": 40, "text": "It happened, as Jesus returned, the multitude welcomed him, for they were all waiting for him."}, {"c": 8, "n": 41, "text": "Behold, there came a man named Jairus, and he was a ruler of the synagogue. He fell down at Jesus' feet, and begged him to come into his house,"}, {"c": 8, "n": 42, "text": "for he had an only daughter, about twelve years of age, and she was dying. But as he went, the multitudes thronged him."}, {"c": 8, "n": 43, "text": "A woman who had a flow of blood for twelve years, who had spent all her living on physicians, and could not be healed by any,"}, {"c": 8, "n": 44, "text": "came behind him, and touched the fringe of his cloak, and immediately the flow of her blood stopped."}, {"c": 8, "n": 45, "text": "Jesus said, \"Who touched me?\" When all denied, Peter and those with him said, \"Master, the multitudes press and jostle you, and you say, 'Who touched me?'\""}, {"c": 8, "n": 46, "text": "But Jesus said, \"Someone did touch me, for I perceived that power has gone out of me.\""}, {"c": 8, "n": 47, "text": "When the woman saw that she was not hidden, she came trembling, and falling down before him declared to him in the presence of all the people the reason why she had touched him, and how she was healed immediately."}, {"c": 8, "n": 48, "text": "He said to her, \"Daughter, cheer up. Your faith has made you well. Go in peace.\""}, {"c": 8, "n": 49, "text": "While he still spoke, one from the ruler of the synagogue's house came, saying to him, \"Your daughter is dead. Don't trouble the Teacher.\""}, {"c": 8, "n": 50, "text": "But Jesus hearing it, answered him, \"Don't be afraid. Only believe, and she will be healed.\""}, {"c": 8, "n": 51, "text": "When he came to the house, he didn't allow anyone to enter in, except Peter, John, James, the father of the girl, and her mother."}, {"c": 8, "n": 52, "text": "All were weeping, and mourning her, but he said, \"Don't weep. She isn't dead, but sleeping.\""}, {"c": 8, "n": 53, "text": "They laughed him to scorn, knowing that she was dead."}, {"c": 8, "n": 54, "text": "But he put them all outside, and taking her by the hand, he called, saying, \"Little girl, arise!\""}, {"c": 8, "n": 55, "text": "Her spirit returned, and she rose up immediately. He commanded that something be given to her to eat."}, {"c": 8, "n": 56, "text": "Her parents were amazed, but he charged them to tell no one what had been done."}]}, "luke_9": {"id": "luke_9", "ref": "Luke 9", "verses": [{"c": 9, "n": 1, "text": "He called the twelve together, and gave them power and authority over all demons, and to cure diseases."}, {"c": 9, "n": 2, "text": "He sent them forth to preach the kingdom of God, and to heal the sick."}, {"c": 9, "n": 3, "text": "He said to them, \"Take nothing for your journey -- neither staffs, nor wallet, nor bread, nor money; neither have two coats apiece."}, {"c": 9, "n": 4, "text": "Into whatever house you enter, stay there, and depart from there."}, {"c": 9, "n": 5, "text": "As many as don't receive you, when you depart from that city, shake off even the dust from your feet for a testimony against them.\""}, {"c": 9, "n": 6, "text": "They departed, and went throughout the villages, preaching the gospel, and healing everywhere."}, {"c": 9, "n": 7, "text": "Now Herod, the tetrarch, heard of all that was done by him; and he was very perplexed, because it was said by some that John had risen from the dead,"}, {"c": 9, "n": 8, "text": "and by some that Elijah had appeared, and by others that one of the old prophets had risen again."}, {"c": 9, "n": 9, "text": "Hero
