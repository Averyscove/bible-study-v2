ear."}, {"c": 21, "n": 31, "text": "Even so you also, when you see these things happening, know that the kingdom of God is near."}, {"c": 21, "n": 32, "text": "Most assuredly I tell you, this generation will not pass away until all things are accomplished."}, {"c": 21, "n": 33, "text": "Heaven and earth will pass away, but my words will by no means pass away."}, {"c": 21, "n": 34, "text": "\"So be careful, or your hearts will be loaded down with carousing, drunkenness, and cares of this life, and that day will come on you suddenly."}, {"c": 21, "n": 35, "text": "For it will come like a snare on all those who dwell on the surface of all the earth."}, {"c": 21, "n": 36, "text": "Therefore be watchful all the time, asking that you may be counted worthy to escape all these things that will happen, and to stand before the Son of Man.\""}, {"c": 21, "n": 37, "text": "Every day Jesus was teaching in the temple, and every night he went out, and spent the night on the mountain that is called Olivet."}, {"c": 21, "n": 38, "text": "All the people came early in the morning to him in the temple, to hear him."}]}, "luke_22": {"id": "luke_22", "ref": "Luke 22", "verses": [{"c": 22, "n": 1, "text": "Now the feast of unleavened bread drew near, which is called the Passover."}, {"c": 22, "n": 2, "text": "The chief priests and the scribes sought how they might put him to death, for they feared the people."}, {"c": 22, "n": 3, "text": "Satan entered into Judas, who was called Iscariot, being numbered with the twelve."}, {"c": 22, "n": 4, "text": "He went away, and talked with the chief priests and captains about how he might deliver him to them."}, {"c": 22, "n": 5, "text": "They were glad, and agreed to give him money."}, {"c": 22, "n": 6, "text": "He consented, and sought an opportunity to deliver him to them in the absence of the multitude."}, {"c": 22, "n": 7, "text": "The day of unleavened bread came, on which the Passover must be sacrificed."}, {"c": 22, "n": 8, "text": "He sent Peter and John, saying, \"Go and prepare the Passover for us, that we may eat.\""}, {"c": 22, "n": 9, "text": "They said to him, \"Where do you want us to prepare?\""}, {"c": 22, "n": 10, "text": "He said to them, \"Behold, when you have entered into the city, a man carrying a pitcher of water will meet you. Follow him into the house which he enters."}, {"c": 22, "n": 11, "text": "Tell the master of the house, 'The Teacher says to you, \"Where is the guest room, where I may eat the Passover with my disciples?\"'"}, {"c": 22, "n": 12, "text": "He will show you a large, furnished upper room. Make preparations there.\""}, {"c": 22, "n": 13, "text": "They went, found things as he had told them, and they prepared the Passover."}, {"c": 22, "n": 14, "text": "When the hour had come, he sat down with the twelve apostles."}, {"c": 22, "n": 15, "text": "He said to them, \"I have earnestly desired to eat this Passover with you before I suffer,"}, {"c": 22, "n": 16, "text": "for I tell you, I will no longer by any means eat of it until it is fulfilled in the kingdom of God.\""}, {"c": 22, "n": 17, "text": "He received a cup, and when he had given thanks, he said, \"Take this, and share it among yourselves,"}, {"c": 22, "n": 18, "text": "for I tell you, I will not drink at all again from the fruit of the vine, until the kingdom of God comes.\""}, {"c": 22, "n": 19, "text": "He took bread, and when he had given thanks, he broke it, and gave to them, saying, \"This is my body which is given for you. Do this in memory of me.\""}, {"c": 22, "n": 20, "text": "He took the cup in like manner after supper, saying, \"This cup is the new covenant in my blood, that which is poured out for you."}, {"c": 22, "n": 21, "text": "But behold, the hand of him who betrays me is with me on the table."}, {"c": 22, "n": 22, "text": "The Son of Man indeed goes, as it has been determined, but woe to that man through whom he is betrayed!\""}, {"c": 22, "n": 23, "text": "They began to question among themselves, which of them it was that would do this thing."}, {"c": 22, "n": 24, "text": "There arose also a contention among them, which of them was considered to be greatest."}, {"c": 22, "n": 25, "text": "He said to them, \"The kings of the Gentiles lord it over them, and those who have authority over them are called 'benefactors.'"}, {"c": 22, "n": 26, "text": "But not so with you. But one who is the greater among you, let him become as the lesser, and one who is governing, as one who serves."}, {"c": 22, "n": 27, "text": "For who is greater, one who sits at the table, or one who serves? Isn't it he who sits at the table? But I am in the midst of you as one who serves."}, {"c": 22, "n": 28, "text": "But you are those who have continued with me in my temptations."}, {"c": 22, "n": 29, "text": "I appoint to you a kingdom, even as my Father appointed to me,"}, {"c": 22, "n": 30, "text": "that you may eat and drink at my table in my kingdom. You will sit on thrones, judging the twelve tribes of Israel.\""}, {"c": 22, "n": 31, "text": "The Lord said, \"Simon, Simon, behold, Satan asked to have you, that he might sift you as wheat,"}, {"c": 22, "n": 32, "text": "but I prayed for you, that your faith wouldn't fail. You, when once you have turned again, establish your brothers.\""}, {"c": 22, "n": 33, "text": "He said to him, \"Lord, I am ready to go with you both to prison and to death!\""}, {"c": 22, "n": 34, "text": "He said, \"I tell you, Peter, the rooster will by no means crow today, before you deny that you know me three times.\""}, {"c": 22, "n": 35, "text": "He said to them, \"When I sent you out without purse, and wallet, and shoes, did you lack anything?\" They said, \"Nothing.\""}, {"c": 22, "n": 36, "text": "Then he said to them, \"But now, whoever has a purse, let him take it, and likewise a wallet. Whoever has none, let him sell his cloak, and buy a sword."}, {"c": 22, "n": 37, "text": "For I tell you that this which is written must still be fulfilled in me: 'He was counted with the lawless.' For that which concerns me has an end.\""}, {"c": 22, "n": 38, "text": "They said, \"Lord, behold, here are two swords.\" He said to them, \"That is enough.\""}, {"c": 22, "n": 39, "text": "He came out, and went, as his custom was, to the Mount of Olives. His disciples also followed him."}, {"c": 22, "n": 40, "text": "When he was at the place, he said to them, \"Pray that you don't enter into temptation.\""}, {"c": 22, "n": 41, "text": "He was withdrawn from them about a stone's throw, and he knelt down and prayed,"}, {"c": 22, "n": 42, "text": "saying, \"Father, if you are willing, remove this cup from me. Nevertheless, not my will, but yours, be done.\""}, {"c": 22, "n": 43, "text": "An angel from heaven appeared to him, strengthening him."}, {"c": 22, "n": 44, "text": "Being in agony he prayed more earnestly. His sweat became like great drops of blood falling down on the ground."}, {"c": 22, "n": 45, "text": "When he rose up from his prayer, he came to the disciples, and found them sleeping because of grief,"}, {"c": 22, "n": 46, "text": "and said to them, \"Why do you sleep? Rise and pray that you may not enter into temptation.\""}, {"c": 22, "n": 47, "text": "While he was still speaking, behold, a multitude, and he who was called Judas, one of the twelve, went in front of them. He came near to Jesus to kiss him."}, {"c": 22, "n": 48, "text": "But Jesus said to him, \"Judas, do you betray the Son of Man with a kiss?\""}, {"c": 22, "n": 49, "text": "When those who were around him saw what was about to happen, they said, \"Lord, shall we strike with the sword?\""}, {"c": 22, "n": 50, "text": "A certain one of them struck the servant of the high priest, and cut off his right ear."}, {"c": 22, "n": 51, "text": "But Jesus answered, \"Let me at least do this\" -- and he touched his ear, and healed him."}, {"c": 22, "n": 52, "text": "Jesus said to the chief priests, captains of the temple, and elders, who had come against him, \"Have you come out as against a robber, with swords and clubs?"}, {"c": 22, "n": 53, "text": "When I was with you in the temple daily, you didn't stretch out your hands against me. But this is your hour, and the power of darkness.\""}, {"c": 22, "n": 54, "text": "They seized him, and led him away, and brought him into the high priest's house. But Peter followed from a distance."}, {"c": 22, "n": 55, "text": "When they had kindled a fire in the midst of the court, and had sat down together, Peter sat in the midst of them."}, {"c": 22, "n": 56, "text": "A certain servant girl saw him as he sat in the light, and looking intently at him, said, \"This man also was with him.\""}, {"c": 22, "n": 57, "text": "He denied Jesus, saying, \"Woman, I don't know him.\""}, {"c": 22, "n": 58, "text": "After a little while someone else saw him, and said, \"You also are one of them!\" But Peter answered, \"Man, I am not!\""}, {"c": 22, "n": 59, "text": "After about one hour passed, another confidently affirmed, saying, \"Truly this man also was with him, for he is a Galilean!\""}, {"c": 22, "n": 60, "text": "But Peter said, \"Man, I don't know what you are talking about!\" Immediately, while he was still speaking, a rooster crowed."}, {"c": 22, "n": 61, "text": "The Lord turned, and looked at Peter. Peter remembered the Lord's word, how he said to him, \"Before the rooster crows you will deny me three times.\""}, {"c": 22, "n": 62, "text": "He went out, and wept bitterly."}, {"c": 22, "n": 63, "text": "The men who held Jesus mocked him and beat him."}, {"c": 22, "n": 64, "text": "Having blindfolded him, they struck him on the face and asked him, \"Prophesy! Who is the one who struck you?\""}, {"c": 22, "n": 65, "text": "They spoke many other things against him, insulting him."}, {"c": 22, "n": 66, "text": "As soon as it was day, the assembly of the elders of the people was gathered together, both chief priests and scribes, and they led him away into their council, saying,"}, {"c": 22, "n": 67, "text": "\"If you are the Christ, tell us.\" But he said to them, \"If I tell you, you won't believe,"}, {"c": 22, "n": 68, "text": "and if I ask, you will in no way answer me or let me go."}, {"c": 22, "n": 69, "text": "From now on, the Son of Man will be seated at the right hand of the power of God.\""}, {"c": 22, "n": 70, "text": "They all said, \"Are you then the Son of God?\" He said to them, \"You say it, because I AM.\""}, {"c": 22, "n": 71, "text": "They said, \"Why do we need any more witness? For we ourselves have heard from his own mouth!\""}]}, "luke_23": {"id": "luke_23", "ref": "Luke 23", "verses": [{"c": 23, "n": 1, "text": "The whole company of them rose up and brought him before Pilate."}, {"c": 23, "n": 2, "text": "They began to accuse him, saying, \"We found this man perverting the nation, forbidding paying taxes to Caesar, and saying that he himself is Christ, a king.\""}, {"c": 23, "n": 3, "text": "Pilate asked him, \"Are you the King of the Jews?\" He answered him, \"So you say.\""}, {"c": 23, "n": 4, "text": "Pilate said to the chief priests and the multitudes, \"I find no basis for a charge against this man.\""}, {"c": 23, "n": 5, "text": "But they insisted, saying, \"He stirs up the people, teaching throughout all Judea, beginning from Galilee even to this place.\""}, {"c": 23, "n": 6, "text": "But when Pilate heard Galilee mentioned, he asked if the man was a Galilean."}, {"c": 23, "n": 7, "text": "When he found out that he was in Herod's jurisdiction, he sent him to Herod, who was also in Jerusalem in those days."}, {"c": 23, "n": 8, "text": "Now when Herod saw Jesus, he was exceedingly glad, for he had wanted to see him for a long time, because he had heard many things about him. He hoped to see some miracle done by him."}, {"c": 23, "n": 9, "text": "He questioned him with many words, but he gave no answers."}, {"c": 23, "n": 10, "text": "The chief priests and the scribes stood, vehemently accusing him."}, {"c": 23, "n": 11, "text": "Herod with his soldiers humiliated him and mocked him. Dressing him in luxurious clothing, they sent him back to Pilate."}, {"c": 23, "n": 12, "text": "Herod and Pilate became friends with each other that very day, for before that they were enemies with each other."}, {"c": 23, "n": 13, "text": "Pilate called together the chief priests and the rulers and the people,"}, {"c": 23, "n": 14, "text": "and said to them, \"You brought this man to me as one that perverts the people, and see, I have examined him before you, and found no basis for a charge against this man concerning those things of which you accuse him."}, {"c": 23, "n": 15, "text": "Neither has Herod, for I sent you to him, and see, nothing worthy of death has been done by him."}, {"c": 23, "n": 16, "text": "I will therefore chastise him and release him.\""}, {"c": 23, "n": 17, "text": "Now he had to release one prisoner to them at the feast."}, {"c": 23, "n": 18, "text": "But they all cried out together, saying, \"Away with this man! Release to us Barabbas!\" --"}, {"c": 23, "n": 19, "text": "one who was thrown into prison for a certain revolt in the city, and for murder."}, {"c": 23, "n": 20, "text": "Pilate spoke to them again, desiring to release Jesus,"}, {"c": 23, "n": 21, "text": "but they shouted, saying, \"Crucify! Crucify him!\""}, {"c": 23, "n": 22, "text": "He said to them the third time, \"Why? What evil has this man done? I have found no capital crime in him. I will therefore chastise him and release him.\""}, {"c": 23, "n": 23, "text": "But they were urgent with loud voices, asking that he might be crucified. Their voices and the voices of the chief priests prevailed."}, {"c": 23, "n": 24, "text": "Pilate adjudged that what they asked for should be done."}, {"c": 23, "n": 25, "text": "He released him who had been thrown into prison for insurrection and murder, for whom they asked, but he delivered Jesus up to their will."}, {"c": 23, "n": 26, "text": "When they led him away, they grabbed one Simon of Cyrene, coming from the country, and laid on him the cross, to carry it after Jesus."}, {"c": 23, "n": 27, "text": "A great multitude of the people followed him, including women who also mourned and lamented him."}, {"c": 23, "n": 28, "text": "But Jesus, turning to them, said, \"Daughters of Jerusalem, don't weep for me, but weep for yourselves and for your children."}, {"c": 23, "n": 29, "text": "For behold, the days are coming in which they will say, 'Blessed are the barren, the wombs that never bore, and the breasts that never nursed.'"}, {"c": 23, "n": 30, "text": "Then will they begin to tell the mountains, 'Fall on us!' and to the hills, 'Cover us.'"}, {"c": 23, "n": 31, "text": "For if they do these things in the green tree, what will be done in the dry?\""}, {"c": 23, "n": 32, "text": "There were also others, two criminals, led with him to be put to death."}, {"c": 23, "n": 33, "text": "When they came to the place that is called The Skull, they crucified him there with the criminals, one on the right and the other on the left."}, {"c": 23, "n": 34, "text": "Jesus said, \"Father, forgive them, for they don't know what they are doing.\" Dividing his garments among them, they cast lots."}, {"c": 23, "n": 35, "text": "The people stood watching. The rulers with them also scoffed at him, saying, \"He saved others. Let him save himself, if this is the Christ of God, his chosen one!\""}, {"c": 23, "n": 36, "text": "The soldiers also mocked him, coming to him and offering him vinegar,"}, {"c": 23, "n": 37, "text": "and saying, \"If you are the King of the Jews, save yourself!\""}, {"c": 23, "n": 38, "text": "An inscription was also written over him in letters of Greek, Latin, and Hebrew: \"THIS IS THE KING OF THE JEWS.\""}, {"c": 23, "n": 39, "text": "One of the criminals who was hanged insulted him, saying, \"If you are the Christ, save yourself and us!\""}, {"c": 23, "n": 40, "text": "But the other answered, and rebuking him said, \"Don't you even fear God, seeing you are in the same condemnation?"}, {"c": 23, "n": 41, "text": "And we indeed justly, for we receive the due reward for our deeds, but this man has done nothing wrong.\""}, {"c": 23, "n": 42, "text": "He said to Jesus, \"Lord, remember me when you come into your kingdom.\""}, {"c": 23, "n": 43, "text": "He said to him, \"Most assuredly I tell you, today you will be with me in Paradise.\""}, {"c": 23, "n": 44, "text": "It was now about the sixth hour, and darkness came over the whole land until the ninth hour."}, {"c": 23, "n": 45, "text": "The sun was darkened, and the veil of the temple was torn in two."}, {"c": 23, "n": 46, "text": "Jesus, crying with a loud voice, said, \"Father, into your hands I commit my spirit!\" Having said this, he breathed his last."}, {"c": 23, "n": 47, "text": "When the centurion saw what was done, he glorified God, saying, \"Certainly this was a righteous man.\""}, {"c": 23, "n": 48, "text": "All the multitudes that came together to see this, when they saw the things that were done, returned beating their breasts."}, {"c": 23, "n": 49, "text": "All his acquaintances, and the women who followed with him from Galilee, stood far away, watching these things."}, {"c": 23, "n": 50, "text": "Behold, a man named Joseph, who was a member of the council, a good and righteous man"}, {"c": 23, "n": 51, "text": "(he had not consented to their counsel and deed), from Arimathaea, a city of the Jews, who was also waiting for the kingdom of God:"}, {"c": 23, "n": 52, "text": "this man went to Pilate, and asked for Jesus' body."}, {"c": 23, "n": 53, "text": "He took it down, and wrapped it in a linen cloth, and laid him in a tomb that was cut in stone, where no man had ever yet lain."}, {"c": 23, "n": 54, "text": "It was the day of the Preparation, and the Sabbath was coming on."}, {"c": 23, "n": 55, "text": "The women, who had come with him out of Galilee, followed after, and saw the tomb, and how his body was laid."}, {"c": 23, "n": 56, "text": "They returned, and prepared spices and ointments. On the Sabbath they rested according to the commandment."}]}, "luke_24": {"id": "luke_24", "ref": "Luke 24", "verses": [{"c": 24, "n": 1, "text": "But on the first day of the week, at early dawn, they and some others came to the tomb, bringing the spices which they had prepared."}, {"c": 24, "n": 2, "text": "They found the stone rolled away from the tomb."}, {"c": 24, "n": 3, "text": "They entered in, and didn't find the Lord Jesus' body."}, {"c": 24, "n": 4, "text": "It happened, while they were greatly perplexed about this, behold, two men stood by them in dazzling clothing."}, {"c": 24, "n": 5, "text": "Becoming terrified, they bowed their faces down to the earth. They said to them, \"Why do you seek the living among the dead?"}, {"c": 24, "n": 6, "text": "He isn't here, but is risen. Remember what he told you when he was still in Galilee,"}, {"c": 24, "n": 7, "text": "saying that the Son of Man must be delivered up into the hands of sinful men, and be crucified, and the third day rise again?\""}, {"c": 24, "n": 8, "text": "They remembered his words,"}, {"c": 24, "n": 9, "text": "returned from the tomb, and told all these things to the eleven, and to all the rest."}, {"c": 24, "n": 10, "text": "Now they were Mary Magdalene, Joanna, and Mary the mother of James. The other women with them told these things to the apostles."}, {"c": 24, "n": 11, "text": "These words seemed to them to be nonsense, and they didn't believe them."}, {"c": 24, "n": 12, "text": "But Peter got up and ran to the tomb. Stooping and looking in, he saw the strips of linen lying by themselves, and he departed to his home, wondering what had happened."}, {"c": 24, "n": 13, "text": "Behold, two of them were going that very day to a village named Emmaus, which was sixty stadia from Jerusalem."}, {"c": 24, "n": 14, "text": "They talked with each other about all of these things which had happened."}, {"c": 24, "n": 15, "text": "It happened, while they talked and questioned together, that Jesus himself came near, and went with them."}, {"c": 24, "n": 16, "text": "But their eyes were kept from recognizing him."}, {"c": 24, "n": 17, "text": "He said to them, \"What are you talking about as you walk, and are sad?\""}, {"c": 24, "n": 18, "text": "One of them, named Cleopas, answered him, \"Are you the only one travelling in Jerusalem who doesn't know the things which have happened there in these days?\""}, {"c": 24, "n": 19, "text": "He said to them, \"What things?\" They said to him, \"The things concerning Jesus, the Nazarene, who was a prophet mighty in deed and word before God and all the people;"}, {"c": 24, "n": 20, "text": "and how the chief priests and our rulers delivered him up to be condemned to death, and crucified him."}, {"c": 24, "n": 21, "text": "But we hoped that it was he who would redeem Israel. Yes, and besides all this, it is now the third day since these things happened."}, {"c": 24, "n": 22, "text": "Also, certain women of our company amazed us, having been early at the tomb;"}, {"c": 24, "n": 23, "text": "and when they didn't find his body, they came saying that they had also seen a vision of angels, who said that he was alive."}, {"c": 24, "n": 24, "text": "Some of us went to the tomb, and found it just like the women had said, but they didn't see him.\""}, {"c": 24, "n": 25, "text": "He said to them, \"Foolish men, and slow of heart to believe in all that the prophets have spoken!"}, {"c": 24, "n": 26, "text": "Didn't the Christ have to suffer these things, and to enter into his glory?\""}, {"c": 24, "n": 27, "text": "Beginning from Moses and from all the prophets, he interpreted to them in all the scriptures the things concerning himself."}, {"c": 24, "n": 28, "text": "They drew near to the village, where they were going, and he acted like he would go further."}, {"c": 24, "n": 29, "text": "They urged him, saying, \"Stay with us, for it is almost evening, and the day is almost over.\" He went in to stay with them."}, {"c": 24, "n": 30, "text": "It happened, when he had sat down at the table with them, he took the bread and gave thanks. Breaking it, he gave to them."}, {"c": 24, "n": 31, "text": "Their eyes were opened, and they recognized him, and he vanished out of their sight."}, {"c": 24, "n": 32, "text": "They said one to another, \"Wasn't our heart burning within us, while he spoke to us along the way, and while he opened the scriptures to us?\""}, {"c": 24, "n": 33, "text": "They rose up that very hour, and returned to Jerusalem, and found the eleven gathered together, and those who were with them,"}, {"c": 24, "n": 34, "text": "saying, \"The Lord is risen indeed, and has appeared to Simon!\""}, {"c": 24, "n": 35, "text": "They related the things that happened along the way, and how he was recognized by them in the breaking of the bread."}, {"c": 24, "n": 36, "text": "As they said these things, Jesus himself stood in the midst of them, and said to them, \"Peace be to you.\""}, {"c": 24, "n": 37, "text": "But they were terrified and filled with fear, and supposed that they saw a spirit."}, {"c": 24, "n": 38, "text": "He said to them, \"Why are you troubled? Why do questionings arise in your hearts?"}, {"c": 24, "n": 39, "text": "See my hands and my feet, that it is I myself. Touch me and see, for a spirit doesn't have flesh and bones, as you see that I have.\""}, {"c": 24, "n": 40, "text": "When he had said this, he showed them his hands and his feet."}, {"c": 24, "n": 41, "text": "While they still didn't believe for joy, and wondered, he said to them, \"Do you have anything here to eat?\""}, {"c": 24, "n": 42, "text": "They gave him a piece of a broiled fish and some honeycomb."}, {"c": 24, "n": 43, "text": "He took it, and ate in front of them."}, {"c": 24, "n": 44, "text": "He said to them, \"This is what I told you, while I was still with you, that all things must be fulfilled, which are written in the law of Moses, the prophets, and the psalms, concerning me.\""}, {"c": 24, "n": 45, "text": "Then he opened their minds, that they might understand the scriptures."}, {"c": 24, "n": 46, "text": "He said to them, \"Thus it is written, and thus it was necessary for the Christ to suffer and to rise from the dead the third day,"}, {"c": 24, "n": 47, "text": "and that repentance and remission of sins should be preached in his name to all the nations, beginning at Jerusalem."}, {"c": 24, "n": 48, "text": "You are witnesses of these things."}, {"c": 24, "n": 49, "text": "Behold, I send forth the promise of my Father on you. But wait in the city of Jerusalem until you are clothed with power from on high.\""}, {"c": 24, "n": 50, "text": "He led them out as far as to Bethany, and he lifted up his hands, and blessed them."}, {"c": 24, "n": 51, "text": "It happened, while he blessed them, that he withdrew from them, and was carried up into heaven."}, {"c": 24, "n": 52, "text": "They worshipped him, and returned to Jerusalem with great joy,"}, {"c": 24, "n": 53, "text": "and were continually in the temple, praising and blessing God. Amen."}]}, "acts_1": {"id": "acts_1", "ref": "Acts 1", "verses": [{"c": 1, "n": 1, "text": "The first book I wrote, Theophilus, concerned all that Jesus began both to do and to teach,"}, {"c": 1, "n": 2, "text": "until the day in which he was received up, after he had given commandment through the Holy Spirit to the apostles whom he had chosen."}, {"c": 1, "n": 3, "text": "To these he also showed himself alive after his suffering by many proofs, appearing to them over a period of forty days, and spoke about God's kingdom."}, {"c": 1, "n": 4, "text": "Being assembled together with them, he charged them, \"Don't depart from Jerusalem, but wait for the promise of the Father, which you heard from me."}, {"c": 1, "n": 5, "text": "For John indeed baptized with water, but you will be baptized in the Holy Spirit not many days from now.\""}, {"c": 1, "n": 6, "text": "Therefore, when they had come together, they asked him, \"Lord, are you now restoring the kingdom to Israel?\""}, {"c": 1, "n": 7, "text": "He said to them, \"It isn't for you to know times or seasons which the Father has set within His own authority."}, {"c": 1, "n": 8, "text": "But you will receive power when the Holy Spirit has come on you. You will be witnesses to me in Jerusalem, in all Judea and Samaria, and to the uttermost parts of the earth.\""}, {"c": 1, "n": 9, "text": "When he had said these things, as they were looking, he was taken up, and a cloud received him out of their sight."}, {"c": 1, "n": 10, "text": "While they were looking steadfastly into the sky as he went, behold, two men stood by them in white clothing,"}, {"c": 1, "n": 11, "text": "who also said, \"You men of Galilee, why do you stand looking into the sky? This Jesus, who was received up from you into the sky will come back in the same way as you saw him going into the sky.\""}, {"c": 1, "n": 12, "text": "Then they returned to Jerusalem from the mountain called Olivet, which is near Jerusalem, a Sabbath day's journey away."}, {"c": 1, "n": 13, "text": "When they had come in, they went up into the upper chamber, where they were staying; that is Peter, John, James, Andrew, Philip, Thomas, Bartholomew, Matthew, James the son of Alphaeus, Simon the Zealot, and Judas the son of James."}, {"c": 1, "n": 14, "text": "All these with one accord continued steadfastly in prayer and supplication, with the women, and Mary, the mother of Jesus, and with his brothers."}, {"c": 1, "n": 15, "text": "In these days, Peter stood up in the midst of the disciples (and there was a multitude of persons gathered together, about one hundred twenty), and said,"}, {"c": 1, "n": 16, "text": "\"Brothers, it was necessary that this Scripture should be fulfilled, which the Holy Spirit spoke before by the mouth of David concerning Judas, who was guide to those who took Jesus."}, {"c": 1, "n": 17, "text": "For he was numbered with us, and received his portion in this ministry."}, {"c": 1, "n": 18, "text": "Now this man obtained a field with the reward for his wickedness, and falling headlong, his body burst open, and all his intestines gushed out."}, {"c": 1, "n": 19, "text": "It became known to everyone who lived in Jerusalem that in their language that field was called 'Akeldama,' that is, 'The field of blood.'"}, {"c": 1, "n": 20, "text": "For it is written in the book of Psalms, 'Let his habitation be made desolate, Let no one dwell therein,' and, 'Let another take his office.'"}, {"c": 1, "n": 21, "text": "Of the men therefore who have accompanied us all the time that the Lord Jesus went in and went out among us,"}, {"c": 1, "n": 22, "text": "beginning from the baptism of John, to the day that he was received up from us, of these must one become a witness with us of his resurrection.\""}, {"c": 1, "n": 23, "text": "They put forward two, Joseph called Barsabbas, who was surnamed Justus, and Matthias."}, {"c": 1, "n": 24, "text": "They prayed, and said, \"You, Lord, who know the hearts of all men, show which one of these two you have chosen"}, {"c": 1, "n": 25, "text": "to take part in this ministry and apostleship from which Judas fell away, that he might go to his own place.\""}, {"c": 1, "n": 26, "text": "They drew lots for them, and the lot fell on Matthias, and he was numbered with the eleven apostles."}]}, "acts_2": {"id": "acts_2", "ref": "Acts 2", "verses": [{"c": 2, "n": 1, "text": "Now when the day of Pentecost had come, they were all with one accord in one place."}, {"c": 2, "n": 2, "text": "Suddenly there came from the sky a sound like the rushing of a mighty wind, and it filled all the house where they were sitting."}, {"c": 2, "n": 3, "text": "Tongues like fire appeared and were distributed to them, and it sat on each one of them."}, {"c": 2, "n": 4, "text": "They were all filled with the Holy Spirit, and began to speak with other languages, as the Spirit gave them the ability to speak."}, {"c": 2, "n": 5, "text": "Now there were dwelling at Jerusalem Jews, devout men, from every nation under the sky."}, {"c": 2, "n": 6, "text": "When this sound was heard, the multitude came together, and were bewildered, because everyone heard them speaking in his own language."}, {"c": 2, "n": 7, "text": "They were all amazed and marveled, saying to one another, \"Behold, aren't all these who speak Galileans?"}, {"c": 2, "n": 8, "text": "How do we hear, everyone in our own native language?"}, {"c": 2, "n": 9, "text": "Parthians, Medes, Elamites, and people from Mesopotamia, Judea, Cappadocia, Pontus, Asia,"}, {"c": 2, "n": 10, "text": "Phrygia, Pamphylia, Egypt, the parts of Libya around Cyrene, visitors from Rome, both Jews and proselytes,"}, {"c": 2, "n": 11, "text": "Cretans and Arabians: we hear them speaking in our languages the mighty works of God!\""}, {"c": 2, "n": 12, "text": "They were all amazed, and were perplexed, saying one to another, \"What does this mean?\""}, {"c": 2, "n": 13, "text": "Others, mocking, said, \"They are filled with new wine.\""}, {"c": 2, "n": 14, "text": "But Peter, standing up with the eleven, lifted up his voice, and spoke out to them, \"You men of Judea, and all you who dwell at Jerusalem, let this be known to you, and listen to my words."}, {"c": 2, "n": 15, "text": "For these aren't drunken, as you suppose, seeing it is only the third hour of the day."}, {"c": 2, "n": 16, "text": "But this is what has been spoken through the prophet Joel:"}, {"c": 2, "n": 17, "text": "'It will be in the last days, says God, I will pour forth of my Spirit on all flesh. Your sons and your daughters will prophesy. Your young men will see visions. Your old men will dream dreams."}, {"c": 2, "n": 18, "text": "Yes, and on my servants and on my handmaidens in those days, I will pour out my Spirit, and they will prophesy."}, {"c": 2, "n": 19, "text": "I will show wonders in the the sky above, And signs on the earth beneath; Blood, and fire, and billows of smoke."}, {"c": 2, "n": 20, "text": "The sun will be turned into darkness, And the moon into blood, Before the great and glorious day of the Lord comes."}, {"c": 2, "n": 21, "text": "It will be, that whoever will call on the name of the Lord will be saved.'"}, {"c": 2, "n": 22, "text": "\"You men of Israel, hear these words. Jesus of Nazareth, a man approved by God to you by mighty works and wonders and signs which God did by him in the midst of you, even as you yourselves know,"}, {"c": 2, "n": 23, "text": "him, being delivered up by the determined counsel and foreknowledge of God, you have taken by the hand of lawless men, crucified and killed;"}, {"c": 2, "n": 24, "text": "whom God raised up, having freed him from the agony of death, because it was not possible that he should be held by it."}, {"c": 2, "n": 25, "text": "For David says concerning him, 'I saw the Lord always before my face, For he is on my right hand, that I should not be moved."}, {"c": 2, "n": 26, "text": "Therefore my heart was glad, and my tongue rejoiced. Moreover my flesh also will dwell in hope;"}, {"c": 2, "n": 27, "text": "Because you will not leave my soul in Hades, Neither will you allow your Holy One to see decay."}, {"c": 2, "n": 28, "text": "You made known to me the ways of life. You will make me full of gladness with your presence.'"}, {"c": 2, "n": 29, "text": "\"Brothers, I may tell you freely of the patriarch David, that he both died and was buried, and his tomb is with us to this day."}, {"c": 2, "n": 30, "text": "Therefore, being a prophet, and knowing that God had sworn with an oath to him that of the fruit of his body, according to the flesh, he would raise up the Christ to sit on his throne,"}, {"c": 2, "n": 31, "text": "he foreseeing this spoke about the resurrection of the Christ, that neither was his soul left in Hades, nor did his flesh see decay."}, {"c": 2, "n": 32, "text": "This Jesus God raised up, whereof we all are witnesses."}, {"c": 2, "n": 33, "text": "Being therefore exalted by the right hand of God, and having received from the Father the promise of the Holy Spirit, he has poured forth this, which you now see and hear."}, {"c": 2, "n": 34, "text": "For David didn't ascend into the heavens, but he says himself, 'The Lord said to my Lord, \"Sit by my right hand,"}, {"c": 2, "n": 35, "text": "Until I make your enemies the footstool of your feet.\"'"}, {"c": 2, "n": 36, "text": "\"Let all the house of Israel therefore know assuredly that God has made him both Lord and Christ, this Jesus whom you crucified.\""}, {"c": 2, "n": 37, "text": "Now when they heard this, they were cut to the heart, and said to Peter and the rest of the apostles, \"Brothers, what will we do?\""}, {"c": 2, "n": 38, "text": "Peter said to them, \"Repent, and be baptized, everyone of you, in the name of Jesus Christ for the forgiveness of sins, and you will receive the gift of the Holy Spirit."}, {"c": 2, "n": 39, "text": "For to you is the promise, and to your children, and to all who are far off, even as many as the Lord our God will call to himself.\""}, {"c": 2, "n": 40, "text": "With many other words he testified, and exhorted them, saying, \"Save yourselves from this crooked generation!\""}, {"c": 2, "n": 41, "text": "Then those who gladly received his word were baptized. There were added that day about three thousand souls."}, {"c": 2, "n": 42, "text": "They continued steadfastly in the apostles' teaching and fellowship, in the breaking of bread, and prayer."}, {"c": 2, "n": 43, "text": "Fear came on every soul, and many wonders and signs were done through the apostles."}, {"c": 2, "n": 44, "text": "All who believed were together, and had all things common."}, {"c": 2, "n": 45, "text": "They sold their possessions and goods, and distributed them to all, according as anyone had need."}, {"c": 2, "n": 46, "text": "Day by day, continuing steadfastly with one accord in the temple, and breaking bread at home, they took their food with gladness and singleness of heart,"}, {"c": 2, "n": 47, "text": "praising God, and having favor with all the people. The Lord added to the assembly day by day those who were being saved."}]}, "acts_3": {"id": "acts_3", "ref": "Acts 3", "verses": [{"c": 3, "n": 1, "text": "Peter and John were going up into the temple at the hour of prayer, the ninth hour."}, {"c": 3, "n": 2, "text": "A certain man who was lame from his mother's womb was being carried, whom they laid daily at the door of the temple which is called Beautiful, to ask alms of those who entered into the temple."}, {"c": 3, "n": 3, "text": "Seeing Peter and John about to go into the temple, he asked to receive alms."}, {"c": 3, "n": 4, "text": "Peter, fastening his eyes on him, with John, said, \"Look at us.\""}, {"c": 3, "n": 5, "text": "He listened to them, expecting to receive something from them."}, {"c": 3, "n": 6, "text": "But Peter said, \"Silver and gold have I none, but what I have, that I give you. In the name of Jesus Christ of Nazareth, rise and walk!\""}, {"c": 3, "n": 7, "text": "He took him by the right hand, and raised him up. Immediately his feet and his ankle bones received strength."}, {"c": 3, "n": 8, "text": "Leaping up, he stood, and began to walk. He entered with them into the temple, walking, leaping, and praising God."}, {"c": 3, "n": 9, "text": "All the people saw him walking and praising God."}, {"c": 3, "n": 10, "text": "They recognized him, that it was he who sat begging for alms at the Beautiful Gate of the temple. They were filled with wonder and amazement at that which had happened to him."}, {"c": 3, "n": 11, "text": "As the lame man who was healed held Peter and John, all the people ran together to them in the porch that is called Solomon's, greatly wondering."}, {"c": 3, "n": 12, "text": "When Peter saw it, he answered to the people, \"You men of Israel, why do you marvel at this man? Why do you fasten your eyes on us, as though by our own power or godliness we had made him walk?"}, {"c": 3, "n": 13, "text": "The God of Abraham, Isaac, and Jacob, the God of our fathers, has glorified his Servant Jesus, whom you delivered up, and denied before the face of Pilate, when he had determined to release him."}, {"c": 3, "n": 14, "text": "But you denied the Holy and Righteous One, and asked for a murderer to be granted to you,"}, {"c": 3, "n": 15, "text": "and killed the Prince of life, whom God raised from the dead, whereof we are witnesses."}, {"c": 3, "n": 16, "text": "By faith in his name has his name made this man strong, whom you see and know. Yes, the faith which is through him has given him this perfect soundness in the presence of you all."}, {"c": 3, "n": 17, "text": "\"Now, brothers, I know that you did this in ignorance, as did also your rulers."}, {"c": 3, "n": 18, "text": "But the things which God announced by the mouth of all his prophets, that Christ should suffer, he thus fulfilled."}, {"c": 3, "n": 19, "text": "Repent therefore, and turn again, that your sins may be blotted out, that so there may come times of refreshing from the presence of the Lord,"}, {"c": 3, "n": 20, "text": "and that he may send Christ Jesus, who was ordained for you before,"}, {"c": 3, "n": 21, "text": "whom the heaven must receive until the times of restoration of all things, whereof God spoke by the mouth of his holy prophets that have been from ancient times."}, {"c": 3, "n": 22, "text": "For Moses indeed said to the fathers, 'The Lord God will raise up a prophet to you from among your brothers, like me. You will listen to him in all things whatever he says to you."}, {"c": 3, "n": 23, "text": "It will be, that every soul that will not listen to that prophet will be utterly destroyed from among the people.'"}, {"c": 3, "n": 24, "text": "Yes, and all the prophets from Samuel and those who followed after, as many as have spoken, they also told of these days."}, {"c": 3, "n": 25, "text": "You are the sons of the prophets, and of the covenant which God made with our fathers, saying to Abraham, 'In your seed will all the families of the earth be blessed.'"}, {"c": 3, "n": 26, "text": "God, having raised up his servant, Jesus, sent him to you first, to bless you, in turning away everyone of you from your wickedness.\""}]}, "acts_4": {"id": "acts_4", "ref": "Acts 4", "verses": [{"c": 4, "n": 1, "text": "As they spoke to the people, the priests and the captain of the temple and the Sadducees came to them,"}, {"c": 4, "n": 2, "text": "being upset because they taught the people and proclaimed in Jesus the resurrection from the dead."}, {"c": 4, "n": 3, "text": "They laid hands on them, and put them in custody until the next day, for it was now evening."}, {"c": 4, "n": 4, "text": "But many of those who heard the word believed, and the number of the men came to be about five thousand."}, {"c": 4, "n": 5, "text": "It happened in the morning, that their rulers, elders, and scribes were gathered together in Jerusalem."}, {"c": 4, "n": 6, "text": "Annas the high priest was there, with Caiaphas, John, Alexander, and as many as were relatives of the high priest."}, {"c": 4, "n": 7, "text": "When they had stood them in the midst, they inquired, \"By what power, or in what name, have you done this?\""}, {"c": 4, "n": 8, "text": "Then Peter, filled with the Holy Spirit, said to them, \"You rulers of the people, and elders of Israel,"}, {"c": 4, "n": 9, "text": "if we are examined today concerning a good deed done to a crippled man, by what means this man has been healed,"}, {"c": 4, "n": 10, "text": "be it known to you all, and to all the people of Israel, that in the name of Jesus Christ of Nazareth, whom you crucified, whom God raised from the dead, in him does this man stand here before you whole."}, {"c": 4, "n": 11, "text": "He is 'the stone which was regarded as worthless by you, the builders, which was made the head of the corner.'"}, {"c": 4, "n": 12, "text": "There is salvation in none other, for neither is there any other name under heaven, that is given among men, in which we must be saved!\""}, {"c": 4, "n": 13, "text": "Now when they saw the boldness of Peter and John, and had perceived that they were unlearned and ignorant men, they marveled. They recognized that they had been with Jesus."}, {"c": 4, "n": 14, "text": "Seeing the man who was healed standing with them, they could say nothing against it."}, {"c": 4, "n": 15, "text": "But when they had commanded them to go aside out of the council, they conferred among themselves,"}, {"c": 4, "n": 16, "text": "saying, \"What will we do to these men? Because indeed a notable miracle has been done through them, as can be plainly seen by all who dwell in Jerusalem, and we can't deny it."}, {"c": 4, "n": 17, "text": "But so that this spreads no further among the people, let's threaten them, that from now on they don't speak to anyone in this name.\""}, {"c": 4, "n": 18, "text": "They called them, and charged them not to speak at all nor teach in the name of Jesus."}, {"c": 4, "n": 19, "text": "But Peter and John answered them, \"Whether it is right in the sight of God to listen to you rather than to God, judge for yourselves,"}, {"c": 4, "n": 20, "text": "for we can't help telling the things which we saw and heard.\""}, {"c": 4, "n": 21, "text": "They, when they had further threatened them, let them go, finding no way to punish them, because of the people; for everyone glorified God for that which was done."}, {"c": 4, "n": 22, "text": "For the man was more than forty years old, on whom this miracle of healing was performed."}, {"c": 4, "n": 23, "text": "Being let go, they came to their own company, and reported all that the chief priests and the elders had said to them."}, {"c": 4, "n": 24, "text": "They, when they heard it, lifted up their voice to God with one accord, and said, \"O Lord, you are God, who made the heaven, the earth, the sea, and all that is in them;"}, {"c": 4, "n": 25, "text": "who by the mouth of your servant, David, said, 'Why do the nations rage, And the peoples plot a vain thing?"}, {"c": 4, "n": 26, "text": "The kings of the earth take a stand, And the rulers take council together, Against the Lord, and against his Christ.'"}, {"c": 4, "n": 27, "text": "For truly, in this city against your holy servant, Jesus, whom you anointed, both Herod and Pontius Pilate, with the Gentiles and the people of Israel, were gathered together"}, {"c": 4, "n": 28, "text": "to do whatever your hand and your council foreordained to happen."}, {"c": 4, "n": 29, "text": "Now, Lord, look at their threats, and grant to your servants to speak your word with all boldness,"}, {"c": 4, "n": 30, "text": "while you stretch forth your hand to heal; and that signs and wonders may be done through the name of your holy Servant Jesus.\""}, {"c": 4, "n": 31, "text": "When they had prayed, the place was shaken where they were gathered together. They were all filled with the Holy Spirit, and they spoke the word of God with boldness."}, {"c": 4, "n": 32, "text": "The multitude of those who believed were of one heart and soul. Not one of them claimed that anything of the things which he possessed was his own, but they had all things common."}, {"c": 4, "n": 33, "text": "With great power, the apostles gave their testimony of the resurrection of the Lord Jesus. Great grace was on them all."}, {"c": 4, "n": 34, "text": "For neither was there among them any who lacked, for as many as were owners of lands or houses sold them, and brought the prices of the things that were sold,"}, {"c": 4, "n": 35, "text": "and laid them at the apostles' feet, and distribution was made to each, according as anyone had need."}, {"c": 4, "n": 36, "text": "Joses, who by the apostles was surnamed Barnabas (which is, being interpreted, Son of Exhortation), a Levite, a man of Cyprus by race,"}, {"c": 4, "n": 37, "text": "having a field, sold it, and brought the money and laid it at the apostles' feet."}]}, "acts_5": {"id": "acts_5", "ref": "Acts 5", "verses": [{"c": 5, "n": 1, "text": "But a certain man named Ananias, with Sapphira, his wife, sold a possession,"}, {"c": 5, "n": 2, "text": "and kept back part of the price, his wife also being aware of it, and brought a certain part, and laid it at the apostles' feet."}, {"c": 5, "n": 3, "text": "But Peter said, \"Ananias, why has Satan filled your heart to lie to the Holy Spirit, and to keep back part of the price of the land?"}, {"c": 5, "n": 4, "text": "While you kept it, didn't it remain your own? After it was sold, wasn't it in your power? How is it that you have conceived this thing in your heart? You haven't lied to men, but to God.\""}, {"c": 5, "n": 5, "text": "Ananias, hearing these words, fell down and died. Great fear came on all who heard these things."}, {"c": 5, "n": 6, "text": "The young men arose and wrapped him up, and they carried him out and buried him."}, {"c": 5, "n": 7, "text": "About three hours later, his wife, not knowing what was had happened, came in."}, {"c": 5, "n": 8, "text": "Peter answered her, \"Tell me whether you sold the land for so much.\" She said, \"Yes, for so much.\""}, {"c": 5, "n": 9, "text": "But Peter asked her, \"How is it that you have agreed together to tempt the Spirit of the Lord? Behold, the feet of those who have buried your husband are at the door, and they will carry you out.\""}, {"c": 5, "n": 10, "text": "She fell down immediately at his feet, and died. The young men came in and found her dead, and they carried her out and buried her by her husband."}, {"c": 5, "n": 11, "text": "Great fear came on the whole assembly, and on all who heard these things."}, {"c": 5, "n": 12, "text": "By the hands of the apostles many signs and wonders were done among the people. They were all with one accord in Solomon's porch."}, {"c": 5, "n": 13, "text": "None of the rest dared to join them, however the people honored them."}, {"c": 5, "n": 14, "text": "More believers were added to the Lord, multitudes of both men and women."}, {"c": 5, "n": 15, "text": "They even carried out the sick into the streets, and laid them on cots and mattresses, so that as Peter came by, at the least his shadow might overshadow some of them."}, {"c": 5, "n": 16, "text": "Multitudes also came together from the cities around Jerusalem, bringing sick people, and those who were tormented by unclean spirits: and they were all healed."}, {"c": 5, "n": 17, "text": "But the high priest rose up, and all those who were with him (which is the sect of the Sadducees), and they were filled with jealousy,"}, {"c": 5, "n": 18, "text": "and laid hands on the apostles, and put them in public custody."}, {"c": 5, "n": 19, "text": "But an angel of the Lord opened the prison doors by night, and brought them out, and said,"}, {"c": 5, "n": 20, "text": "\"Go stand and speak in the temple to the people all the words of this life.\""}, {"c": 5, "n": 21, "text": "When they heard this, they entered into the temple about daybreak, and taught. But the high priest came, and those who were with him, and called the council together, and all the senate of the children of Israel, and sent to the prison to have them brought."}, {"c": 5, "n": 22, "text": "But the officers who came didn't find them in the prison. They returned and reported,"}, {"c": 5, "n": 23, "text": "\"We found the prison shut and locked, and the guards standing before the doors, but when we had opened it up, we found no one inside.\""}, {"c": 5, "n": 24, "text": "Now when the high priest, the captain of the temple, and the chief priests heard these words, they were very perplexed about them and what might become of this."}, {"c": 5, "n": 25, "text": "One came and told them, \"Behold, the men whom you put in prison are in the temple, standing and teaching the people.\""}, {"c": 5, "n": 26, "text": "Then the captain went with the officers, and brought them without violence, for they were afraid that the people might stone them."}, {"c": 5, "n": 27, "text": "When they had brought them, they set them before the council. The high priest questioned them,"}, {"c": 5, "n": 28, "text": "saying, \"Didn't we strictly charge you not to teach in this name? Behold, you have filled Jerusalem with your teaching, and intend to bring this man's blood on us.\""}, {"c": 5, "n": 29, "text": "But Peter and the apostles answered, \"We must obey God rather than men."}, {"c": 5, "n": 30, "text": "The God of our fathers raised up Jesus, whom you killed, hanging him on a tree."}, {"c": 5, "n": 31, "text": "God exalted him with his right hand to be a Prince and a Savior, to give repentance to Israel, and remission of sins."}, {"c": 5, "n": 32, "text": "We are His witnesses of these things; and so also is the Holy Spirit, whom God has given to those who obey him.\""}, {"c": 5, "n": 33, "text": "But they, when they heard this, were cut to the heart, and determined to kill them."}, {"c": 5, "n": 34, "text": "But one stood up in the council, a Pharisee named Gamaliel, a teacher of the law, honored by all the people, and commanded to take the apostles out a little while."}, {"c": 5, "n": 35, "text": "He said to them, \"You men of Israel, be careful concerning these men, what you are about to do."}, {"c": 5, "n": 36, "text": "For before these days Theudas rose up, making himself out to be somebody; to whom a number of men, about four hundred, joined themselves: who was slain; and all, as many as obeyed him, were dispersed, and came to nothing."}, {"c": 5, "n": 37, "text": "After this man, Judas of Galilee rose up in the days of the enrollment, and drew away some people after him. He also perished, and all, as many as obeyed him, were scattered abroad."}, {"c": 5, "n": 38, "text": "Now I tell you, refrain from these men, and leave them alone. For if this counsel or this work is of men, it will be overthrown."}, {"c": 5, "n": 39, "text": "But if it is of God, you will not be able to overthrow it, and you would be found even to be fighting against God.\""}, {"c": 5, "n": 40, "text": "They agreed with him. When they had called the apostles to them, they beat them and charged them not to speak in the name of Jesus, and let them go."}, {"c": 5, "n": 41, "text": "They therefore departed from the presence of the council, rejoicing that they were counted worthy to suffer dishonor for Jesus' name."}, {"c": 5, "n": 42, "text": "Every day, in the temple and at home, they never stopped teaching and preaching Jesus, the Christ."}]}, "acts_6": {"id": "acts_6", "ref": "Acts 6", "verses": [{"c": 6, "n": 1, "text": "Now in those days, when the number of the disciples was multiplying, there arose a grumbling of the Grecian Jews against the Hebrews because their widows were neglected in the daily service."}, {"c": 6, "n": 2, "text": "The twelve called the multitude of the disciples to them and said, \"It is not appropriate for us to forsake the word of God and serve tables."}, {"c": 6, "n": 3, "text": "Therefore select from among you, brothers, seven men of good report, full of the Holy Spirit and of wisdom, whom we may appoint over this business."}, {"c": 6, "n": 4, "text": "But we will continue steadfastly in prayer and in the ministry of the word.\""}, {"c": 6, "n": 5, "text": "These words pleased the whole multitude. They chose Stephen, a man full of faith and of the Holy Spirit, Philip, Prochorus, Nicanor, Timon, Parmenas, and Nicolaus, a proselyte of Antioch;"}, {"c": 6, "n": 6, "text": "whom they set before the apostles. When they had prayed, they laid their hands on them."}, {"c": 6, "n": 7, "text": "The word of God increased and the number of the disciples multiplied in Jerusalem exceedingly. A great company of the priests were obedient to the faith."}, {"c": 6, "n": 8, "text": "Stephen, full of faith and power, performed great wonders and signs among the people."}, {"c": 6, "n": 9, "text": "But some of those who were of the synagogue called \"The Libertines,\" and of the Cyrenians, of the Alexandrians, and of those of Cilicia and Asia arose, disputing with Stephen."}, {"c": 6, "n": 10, "text": "They weren't able to withstand the wisdom and the Spirit by which he spoke."}, {"c": 6, "n": 11, "text": "Then they secretly induced men who said, \"We have heard him speak blasphemous words against Moses and God.\""}, {"c": 6, "n": 12, "text": "They stirred up the people, the elders, and the scribes, and came on him and seized him, and brought him in to the council,"}, {"c": 6, "n": 13, "text": "and set up false witnesses who said, \"This man never stops speaking blasphemous words against this holy place and the law."}, {"c": 6, "n": 14, "text": "For we have heard him say that this Jesus of Nazareth will destroy this place, and will change the customs which Moses delivered to us.\""}, {"c": 6, "n": 15, "text": "All who sat in the council, fastening their eyes on him, saw his face like it was the face of an angel."}]}, "acts_7": {"id": "acts_7", "ref": "Acts 7", "verses": [{"c": 7, "n": 1, "text": "The high priest said, \"Are these things so?\""}, {"c": 7, "n": 2, "text": "He said, \"Brothers and fathers, listen. The God of glory appeared to our father Abraham, when he was in Mesopotamia, before he lived in Haran,"}, {"c": 7, "n": 3, "text": "and said to him, 'Get out of your land, and from your relatives, and come into a land which I will show you.'"}, {"c": 7, "n": 4, "text": "Then he came out of the land of the Chaldaeans, and lived in Haran. From there, when his father was dead, God moved him into this land, where you are now living."}, {"c": 7, "n": 5, "text": "He gave him no inheritance in it, no, not so much as to set his foot on. He promised that he would give it to him in possession, and to his seed after him, when he still had no child."}, {"c": 7, "n": 6, "text": "God spoke thus, that his seed would live as aliens in a strange land, and that they would be enslaved and mistreated for four hundred years."}, {"c": 7, "n": 7, "text": "'I will judge the nation to which they will be in bondage,' said God, 'and after that will they come out, and serve me in this place.'"}, {"c": 7, "n": 8, "text": "He gave him the covenant of circumcision. So Abraham became the father of Isaac, and circumcised him the eighth day. Isaac became the father of Jacob, and Jacob became the father of the twelve patriarchs."}, {"c": 7, "n": 9, "text": "\"The patriarchs, moved with jealousy against Joseph, sold him into Egypt. God was with him,"}, {"c": 7, "n": 10, "text": "and delivered him out of all his afflictions, and gave him favor and wisdom before Pharaoh, king of Egypt. He made him governor over Egypt and all his house."}, {"c": 7, "n": 11, "text": "Now a famine came over all the land of Egypt and Canaan, and great affliction. Our fathers found no food."}, {"c": 7, "n": 12, "text": "But when Jacob heard that there was grain in Egypt, he sent forth our fathers the first time."}, {"c": 7, "n": 13, "text": "On the second time Joseph was made known to his brothers, and Joseph's race was revealed to Pharaoh."}, {"c": 7, "n": 14, "text": "Joseph sent, and called Jacob, his father, to him, and all his relatives, seventy-five souls."}, {"c": 7, "n": 15, "text": "Jacob went down into Egypt, and he died, himself and our fathers,"}, {"c": 7, "n": 16, "text": "and they were brought back to Shechem, and laid in the tomb that Abraham bought for a price in silver from the sons of Hamor of Shechem."}, {"c": 7, "n": 17, "text": "\"But as the time of the promise came close which God swore to Abraham, the people grew and multiplied in Egypt,"}, {"c": 7, "n": 18, "text": "until there arose a different king, who didn't know Joseph."}, {"c": 7, "n": 19, "text": "The same dealt slyly with our race, and mistreated our fathers, that they should throw out their babies, so that they wouldn't stay alive."}, {"c": 7, "n": 20, "text": "At that time Moses was born, and was exceedingly handsome. He was nourished three months in his father's house."}, {"c": 7, "n": 21, "text": "When he was thrown out, Pharaoh's daughter took him up, and reared him as her own son."}, {"c": 7, "n": 22, "text": "Moses was instructed in all the wisdom of the Egyptians. He was mighty in his words and works."}, {"c": 7, "n": 23, "text": "But when he was forty years old, it came into his heart to visit his brothers, the children of Israel."}, {"c": 7, "n": 24, "text": "Seeing one of them suffer wrong, he defended him, and avenged him who was oppressed, striking the Egyptian."}, {"c": 7, "n": 25, "text": "He supposed that his brothers understood that God, by his hand, was giving them deliverance; but they didn't understand."}, {"c": 7, "n": 26, "text": "The day following, he appeared to them as they fought, and urged them to be at peace again, saying, 'Sirs, you are brothers. Why do you wrong one to another?'"}, {"c": 7, "n": 27, "text": "But he who did his neighbor wrong pushed him away, saying, 'Who made you a ruler and a judge over us?"}, {"c": 7, "n": 28, "text": "Do you want to kill me, as you killed the Egyptian yesterday?'"}, {"c": 7, "n": 29, "text": "Moses fled at this saying, and became an alien in the land of Midian, where he became the father of two sons."}, {"c": 7, "n": 30, "text": "\"When forty years were fulfilled, an angel of the Lord appeared to him in the wilderness of Mount Sinai, in a flame of fire in a bush."}, {"c": 7, "n": 31, "text": "When Moses saw it, he wondered at the sight. As he came close to see, a voice of the Lord came to him,"}, {"c": 7, "n": 32, "text": "'I am the God of your fathers, the God of Abraham, the God of Isaac, and the God of Jacob.' Moses trembled, and dared not look."}, {"c": 7, "n": 33, "text": "The Lord said to him, 'Take your sandals off of your feet, for the place where you stand is holy ground."}, {"c": 7, "n": 34, "text": "I have surely seen the affliction of my people that is in Egypt, and have heard their groaning. I have come down to deliver them. Now come, I will send you into Egypt.'"}, {"c": 7, "n": 35, "text": "\"This Moses, whom they refused, saying, 'Who made you a ruler and a judge?' -- God has sent him as both a ruler and a deliverer with the hand of the angel who appeared to him in the bush."}, {"c": 7, "n": 36, "text": "This man led them forth, having worked wonders and signs in Egypt, in the Red Sea, and in the wilderness forty years."}, {"c": 7, "n": 37, "text": "This is that Moses, who said to the children of Israel, 'The Lord God will raise up a prophet to you from among your brothers, like me.'"}, {"c": 7, "n": 38, "text": "This is he who was in the assembly in the wilderness with the angel that spoke to him in the Mount Sinai, and with our fathers, who received living oracles to give to us,"}, {"c": 7, "n": 39, "text": "to whom our fathers wouldn't be obedient, but rejected him, and turned back in their hearts to Egypt,"}, {"c": 7, "n": 40, "text": "saying to Aaron, 'Make us gods that will go before us, for as for this Moses, who led us forth out of the land of Egypt, we don't know what has become of him.'"}, {"c": 7, "n": 41, "text": "They made a calf in those days, and brought a sacrifice to the idol, and rejoiced in the works of their hands."}, {"c": 7, "n": 42, "text": "But God turned, and gave them up to serve the host of the sky, as it is written in the book of the prophets, 'Did you offer to me slain animals and sacrifices Forty years in the wilderness, O house of Israel?"}, {"c": 7, "n": 43, "text": "You took up the tent of Moloch, The star of your god Rephan, The figures which you made to worship. I will carry you away beyond Babylon.'"}, {"c": 7, "n": 44, "text": "\"Our fathers had the tent of the testimony in the wilderness, even as he who spoke to Moses appointed, that he should make it according to the pattern that he had seen."}, {"c": 7, "n": 45, "text": "Which also our fathers, in their turn, brought in with Joshua when they entered into the possession of the nations, whom God drove out before the face of our fathers, to the days of David,"}, {"c": 7, "n": 46, "text": "who found favor in the sight of God, and asked to find a habitation for the God of Jacob."}, {"c": 7, "n": 47, "text": "But Solomon built him a house."}, {"c": 7, "n": 48, "text": "However, the Most High doesn't dwell in temples made with hands, as the prophet says,"}, {"c": 7, "n": 49, "text": "'heaven is my throne, And the earth the footstool of my feet. What kind of house will you build me?' says the Lord; 'Or what is the place of my rest?"}, {"c": 7, "n": 50, "text": "Didn't my hand make all these things?'"}, {"c": 7, "n": 51, "text": "\"You stiff-necked and uncircumcised in heart and ears, you always resist the Holy Spirit! As your fathers did, so you do."}, {"c": 7, "n": 52, "text": "Which of the prophets didn't your fathers persecute? They killed those who foretold the coming of the Righteous One, of whom you have now become betrayers and murderers."}, {"c": 7, "n": 53, "text": "You received the law as it was ordained by angels, and didn't keep it!\""}, {"c": 7, "n": 54, "text": "Now when they heard these things, they were cut to the heart, and they gnashed at him with their teeth."}, {"c": 7, "n": 55, "text": "But he, being full of the Holy Spirit, looked up steadfastly into heaven, and saw the glory of God, and Jesus standing on the right hand of God,"}, {"c": 7, "n": 56, "text": "and said, \"Behold, I see the heavens opened, and the Son of Man standing on the right hand of God!\""}, {"c": 7, "n": 57, "text": "But they cried out with a loud voice, and stopped their ears, and rushed at him with one accord."}, {"c": 7, "n": 58, "text": "They threw him out of the city, and stoned him. The witnesses placed their garments at the feet of a young man named Saul."}, {"c": 7, "n": 59, "text": "They stoned Stephen, as he called on the Lord, saying, \"Lord Jesus, receive my Spirit!\""}, {"c": 7, "n": 60, "text": "He kneeled down, and cried with a loud voice, \"Lord, don't hold this sin against them!\" When he had said this, he fell asleep."}]}, "acts_8": {"id": "acts_8", "ref": "Acts 8", "verses": [{"c": 8, "n": 1, "text": "Saul was consenting to his death. A great persecution arose against the assembly which was in Jerusalem in that day. They were all scattered abroad throughout the regions of Judea and Samaria, except for the apostles."}, {"c": 8, "n": 2, "text": "Devout men buried Stephen, and lamented greatly over him."}, {"c": 8, "n": 3, "text": "But Saul ravaged the assembly, entering into every house, and dragged both men and women off to prison."}, {"c": 8, "n": 4, "text": "Therefore those who were scattered abroad went around preaching the word."}, {"c": 8, "n": 5, "text": "Philip went down to the city of Samaria, and proclaimed to them the Christ."}, {"c": 8, "n": 6, "text": "The multitudes listened with one accord to the things that were spoken by Philip, when they heard and saw the signs which he did."}, {"c": 8, "n": 7, "text": "For unclean spirits came out of many of those who had them. They came out, crying with a loud voice. Many who had been paralyzed and lame were healed."}, {"c": 8, "n": 8, "text": "There was great joy in that city."}, {"c": 8, "n": 9, "text": "But there was a certain man, Simon by name, who had used sorcery in the city before, and amazed the people of Samaria, making himself out to be some great one,"}, {"c": 8, "n": 10, "text": "to whom they all listened, from the least to the greatest, saying, \"This man is that great power of God.\""}, {"c": 8, "n": 11, "text": "They listened to him, because for a long time he had amazed them with his sorceries."}, {"c": 8, "n": 12, "text": "But when they believed Philip preaching good news concerning the kingdom of God and the name of Jesus Christ, they were baptized, both men and women."}, {"c": 8, "n": 13, "text": "Simon himself also believed. Being baptized, he continued with Philip. Seeing signs and great miracles done, he was amazed."}, {"c": 8, "n": 14, "text": "Now when the apostles who were at Jerusalem heard that Samaria had received the word of God, they sent Peter and John to them,"}, {"c": 8, "n": 15, "text": "who, when they had come down, prayed for them, that they might receive the Holy Spirit;"}, {"c": 8, "n": 16, "text": "for as yet he had fallen on none of them. They had only been baptized into the name of the Lord Jesus."}, {"c": 8, "n": 17, "text": "Then they laid their hands on them, and they received the Holy Spirit."}, {"c": 8, "n": 18, "text": "Now when Simon saw that the Holy Spirit was given through the laying on of the apostles' hands, he offered them money,"}, {"c": 8, "n": 19, "text": "saying, \"Give me also this power, that whoever I lay my hands on may receive the Holy Spirit.\""}, {"c": 8, "n": 20, "text": "But Peter said to him, \"May your silver perish with you, because you thought you could obtain the gift of God with money!"}, {"c": 8, "n": 21, "text": "You have neither part nor lot in this matter, for your heart isn't right before God."}, {"c": 8, "n": 22, "text": "Repent therefore of this, your wickedness, and ask God if perhaps the thought of your heart may be forgiven you."}, {"c": 8, "n": 23, "text": "For I see that you are in the gall of bitterness and in the bondage of iniquity.\""}, {"c": 8, "n": 24, "text": "Simon answered, \"Pray for me to the Lord, that none of the things which you have spoken come on me.\""}, {"c": 8, "n": 25, "text": "They therefore, when they had testified and spoken the word of the Lord, returned to Jerusalem, and preached the gospel to many villages of the Samaritans."}, {"c": 8, "n": 26, "text": "But an angel of the Lord spoke to Philip, saying, \"Arise, and go toward the south to the way that goes down from Jerusalem to Gaza. This is a desert.\""}, {"c": 8, "n": 27, "text": "He arose and went. Behold, there was a man of Ethiopia, a eunuch of great authority under Candace, queen of the Ethiopians, who was over all her treasure, who had come to Jerusalem to worship."}, {"c": 8, "n": 28, "text": "He was returning and sitting in his chariot, and was reading the prophet Isaiah."}, {"c": 8, "n": 29, "text": "The Spirit said to Philip, \"Go near, and join yourself to this chariot.\""}, {"c": 8, "n": 30, "text": "Philip ran to him, and heard him reading Isaiah the prophet, and said, \"Do you understand you what you are reading?\""}, {"c": 8, "n": 31, "text": "He said, \"How can I, unless someone explains it to me?\" He begged Philip to come up and sit with him."}, {"c": 8, "n": 32, "text": "Now the passage of the Scripture which he was reading was this, \"He was led as a sheep to the slaughter. As a lamb before his shearer is silent, So he doesn't open his mouth."}, {"c": 8, "n": 33, "text": "In his humiliation, his judgment was taken away. Who will declare His generations? For his life is taken from the earth.\""}, {"c": 8, "n": 34, "text": "The eunuch answered Philip, \"Please tell who the prophet is talking about: about himself, or about some other?\""}, {"c": 8, "n": 35, "text": "Philip opened his mouth, and beginning from this Scripture, preached to him Jesus."}, {"c": 8, "n": 36, "text": "As they went on the way, they came to some water, and the eunuch said, \"Behold, here is water. What is keeping me from being baptized?\""}, {"c": 8, "n": 37, "text": "dummy verses inserted by amos"}, {"c": 8, "n": 38, "text": "He commanded the chariot to stand still, and they both went down into the water, both Philip and the eunuch, and he baptized him."}, {"c": 8, "n": 39, "text": "When they came up out of the water, the Spirit of the Lord caught Philip away, and the eunuch didn't see him any more, for he went on his way rejoicing."}, {"c": 8, "n": 40, "text": "But Philip was found at Azotus. Passing through, he preached the gospel to all the cities, until he came to Caesarea."}]}, "acts_9": {"id": "acts_9", "ref": "Acts 9", "verses": [{"c": 9, "n": 1, "text": "But Saul, still breathing threats and slaughter against the disciples of the Lord, went to the high priest,"}, {"c": 9, "n": 2, "text": "and asked for letters from him to the synagogues of Damascus, that if he found any who were of the Way, whether men or women, he might bring them bound to Jerusalem."}, {"c": 9, "n": 3, "text": "As he traveled, it happened that he got close to Damascus, and suddenly a light from the sky shone around him."}, {"c": 9, "n": 4, "text": "He fell on the earth, and heard a voice saying to him, \"Saul, Saul, why do you persecute me?\""}, {"c": 9, "n": 5, "text": "He said, \"Who are you, Lord?\" The Lord said, \"I am Jesus, whom you are persecuting."}, {"c": 9, "n": 6, "text": "But rise up, and enter into the city, and you will be told what you must do.\""}, {"c": 9, "n": 7, "text": "The men who traveled with him stood speechless, hearing the voice, but seeing no one."}, {"c": 9, "n": 8, "text": "Saul arose from the ground, and when his eyes were opened, he saw no one. They led him by the hand, and brought him into Damascus."}, {"c": 9, "n": 9, "text": "He was without sight for three days, and neither ate nor drank."}, {"c": 9, "n": 10, "text": "Now there was a certain disciple at Damascus named Ananias. The Lord said to him in a vision, \"Ananias!\" He said, \"Behold, it's me, Lord.\""}, {"c": 9, "n": 11, "text": "The Lord said to him, \"Arise, and go to the street which is called Straight, and inquire in the house of Judas for one named Saul, a man of Tarsus. For behold, he is praying,"}, {"c": 9, "n": 12, "text": "and in a vision he has seen a man named Ananias coming in, and laying his hands on him, that he might receive his sight.\""}, {"c": 9, "n": 13, "text": "But Ananias answered, \"Lord, I have heard from many about this man, how much evil he did to your saints at Jerusalem."}, {"c": 9, "n": 14, "text": "Here he has authority from the chief priests to bind all who call on your name.\""}, {"c": 9, "n": 15, "text": "But the Lord said to him, \"Go your way, for he is my chosen vessel to bear my name before the nations and kings, and the children of Israel."}, {"c": 9, "n": 16, "text": "For I will show him how many things he must suffer for my name's sake.\""}, {"c": 9, "n": 17, "text": "Ananias departed, and entered into the house. Laying his hands on him, he said, \"Brother Saul, the Lord, who appeared to you in the way which you came, has sent me, that you may receive your sight, and be filled with the Holy Spirit.\""}, {"c": 9, "n": 18, "text": "Immediately there fell from his eyes as it were scales, and he received his sight. He arose and was baptized."}, {"c": 9, "n": 19, "text": "He took food and was strengthened. Saul stayed several days with the disciples who were at Damascus."}, {"c": 9, "n": 20, "text": "Immediately in the synagogues he proclaimed the Christ, that he is the Son of God."}, {"c": 9, "n": 21, "text": "All who heard him were amazed, and said, \"Isn't this he who in Jerusalem made havoc of those who called on this name? And he had come here intending to bring them bound before the chief priests!\""}, {"c": 9, "n": 22, "text": "But Saul increased more in strength, and confounded the Jews who lived at Damascus, proving that this is the Christ."}, {"c": 9, "n": 23, "text": "When many days were fulfilled, the Jews conspired together to kill him,"}, {"c": 9, "n": 24, "text": "but their plot became known to Saul. They watched the gates both day and night that they might kill him,"}, {"c": 9, "n": 25, "text": "but his disciples took him by night, and let him down through the wall, lowering him in a basket."}, {"c": 9, "n": 26, "text": "When Saul had come to Jerusalem, he tried to join himself to the disciples. They were all afraid of him, not believing that he was a disciple."}, {"c": 9, "n": 27, "text": "But Barnabas took him, and brought him to the apostles, and declared to them how he had seen the Lord in the way, and that he had spoken to him, and how at Damascus he had preached boldly in the name of Jesus."}, {"c": 9, "n": 28, "text": "He was with them going in and going out at Jerusalem,"}, {"c": 9, "n": 29, "text": "preaching boldly in the name of the Lord. He spoke and disputed against the Grecian Jews, but they were seeking to kill him."}, {"c": 9, "n": 30, "text": "When the brothers knew it, they brought him down to Caesarea, and sent him out to Tarsus."}, {"c": 9, "n": 31, "text": "So the assemblies throughout all Judea and Galilee and Samaria had peace, and were built up. They were multiplied, walking in the fear of the Lord and in the comfort of the Holy Spirit."}, {"c": 9, "n": 32, "text": "It happened, as Peter went throughout all those parts, he came down also to the saints who lived at Lydda."}, {"c": 9, "n": 33, "text": "There he found a certain man named Aeneas, who had been bedridden for eight years, because he was paralyzed."}, {"c": 9, "n": 34, "text": "Peter said to him, \"Aeneas, Jesus Christ heals you. Get up and make your bed!\" Immediately he arose."}, {"c": 9, "n": 35, "text": "All who lived at Lydda and in Sharon saw him, and they turned to the Lord."}, {"c": 9, "n": 36, "text": "Now there was at Joppa a certain disciple named Tabitha, which when translated, means Dorcas. This woman was full of good works and acts of mercy which she did."}, {"c": 9, "n": 37, "text": "It happened in those days that she fell sick, and died. When they had washed her, they laid her in an upper chamber."}, {"c": 9, "n": 38, "text": "As Lydda was near Joppa, the disciples, hearing that Peter was there, sent two men to him, imploring him not to delay in coming to them."}, {"c": 9, "n": 39, "text": "Peter got up and went with them. When he had come, they brought him into the upper chamber. All the widows stood by him weeping, and showing the coats and garments which Dorcas made while she was with them."}, {"c": 9, "n": 40, "text": "Peter put them all out, and kneeled down and prayed. Turning to the body, he said, \"Tabitha, get up!\" She opened her eyes, and when she saw Peter, she sat up."}, {"c": 9, "n": 41, "text": "He gave her his hand, and raised her up. Calling the saints and widows, he presented her alive."}, {"c": 9, "n": 42, "text": "It became known throughout all Joppa, and many believed in the Lord."}, {"c": 9, "n": 43, "text": "It happened, that he stayed many days in Joppa with one Simon, a tanner."}]}, "acts_10": {"id": "acts_10", "ref": "Acts 10", "verses": [{"c": 10, "n": 1, "text": "Now there was a certain man in Caesarea, Cornelius by name, a centurion of what was called the Italian Regiment,"}, {"c": 10, "n": 2, "text": "a devout man, and one who feared God with all his house, who gave alms generously to the people, and always prayed to God."}, {"c": 10, "n": 3, "text": "At about the ninth hour of the day, he clearly saw in a vision an angel of God coming to him, and saying to him, \"Cornelius!\""}, {"c": 10, "n": 4, "text": "He, fastening his eyes on him, and being frightened, said, \"What is it, Lord?\" He said to him, \"Your prayers and your alms have gone up for a memorial before God."}, {"c": 10, "n": 5, "text": "Now send men to Joppa, and get one Simon, who is surnamed Peter."}, {"c": 10, "n": 6, "text": "He lodges with one Simon a tanner, whose house is by the seaside.\""}, {"c": 10, "n": 7, "text": "When the angel who spoke to him had departed, Cornelius called two of his household servants, and a devout soldier of those who waited on him continually."}, {"c": 10, "n": 8, "text": "Having explained everything to them, he sent them to Joppa."}, {"c": 10, "n": 9, "text": "Now on the next day, as they were on their journey, and got close to the city, Peter went up on the housetop to pray, at about noon."}, {"c": 10, "n": 10, "text": "He became hungry, and desired to eat, but while they were preparing, he fell into a trance."}, {"c": 10, "n": 11, "text": "He saw heaven opened, and a certain container descending to him, like a great sheet, let down by four corners on the earth,"}, {"c": 10, "n": 12, "text": "in which were all kinds of four-footed animals of the earth, wild animals, reptiles, and birds of the sky."}, {"c": 10, "n": 13, "text": "A voice came to him, \"Rise, Peter, kill and eat!\""}, {"c": 10, "n": 14, "text": "But Peter said, \"Not so, Lord; for I have never eaten anything that is common or unclean.\""}, {"c": 10, "n": 15, "text": "A voice came to him again the second time, \"What God has cleansed, you must not make unholy.\""}, {"c": 10, "n": 16, "text": "This was done three times, and immediately the vessel was received up into heaven."}, {"c": 10, "n": 17, "text": "Now while Peter was very perplexed in himself what the vision which he had seen might mean, behold, the men who were sent by Cornelius, having made inquiry for Simon's house, stood before the gate,"}, {"c": 10, "n": 18, "text": "and called and asked whether Simon, who was surnamed Peter, was lodging there."}, {"c": 10, "n": 19, "text": "While Peter thought about the vision, the Spirit said to him, \"Behold, three men seek you."}, {"c": 10, "n": 20, "text": "But arise, get down, and go with them, doubting nothing; for I have sent them.\""}, {"c": 10, "n": 21, "text": "Peter went down to the men, and said, \"Behold, I am he whom you seek. Why have you come?\""}, {"c": 10, "n": 22, "text": "They said, \"Cornelius a centurion, a righteous man and one who fears God, and well spoken of by all the nation of the Jews, was directed by a holy angel to invite you to his house, and to listen to what you say."}, {"c": 10, "n": 23, "text": "So he called them in and lodged them. On the next day Peter arose and went out with them, and some of the brothers from Joppa accompanied him."}, {"c": 10, "n": 24, "text": "On the next day they entered into Caesarea. Cornelius was waiting for them, having called together his relatives and his near friends."}, {"c": 10, "n": 25, "text": "When it happened that Peter entered, Cornelius met him, and fell down at his feet, and worshipped him."}, {"c": 10, "n": 26, "text": "But Peter raised him up, saying, \"Stand up! I myself am also a man.\""}, {"c": 10, "n": 27, "text": "As he talked with him, he went in,
