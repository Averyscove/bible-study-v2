teous."}, {"c": 3, "n": 34, "text": "Surely he mocks the mockers, But he gives grace to the humble."}, {"c": 3, "n": 35, "text": "The wise will inherit glory, But shame will be the promotion of fools."}]}, "isa_9": {"id": "isa_9", "ref": "Isaiah 9", "verses": [{"c": 9, "n": 1, "text": "But there shall be no gloom to her who was in anguish. In the former time he brought into contempt the land of Zebulun and the land of Naphtali; but in the latter time has he made it glorious, by the way of the sea, beyond the Jordan, Galilee of the nations."}, {"c": 9, "n": 2, "text": "The people who walked in darkness have seen a great light: those who lived in the land of the shadow of death, on them has the light shined."}, {"c": 9, "n": 3, "text": "You have multiplied the nation, you have increased their joy: they joy before you according to the joy in harvest, as men rejoice when they divide the spoil."}, {"c": 9, "n": 4, "text": "For the yoke of his burden, and the staff of his shoulder, the rod of his oppressor, you have broken as in the day of Midian."}, {"c": 9, "n": 5, "text": "For all the armor of the armed man in the tumult, and the garments rolled in blood, shall be for burning, for fuel of fire."}, {"c": 9, "n": 6, "text": "For to us a child is born, to us a son is given; and the government shall be on his shoulder: and his name shall be called Wonderful, Counselor, Mighty God, Everlasting Father, Prince of Peace."}, {"c": 9, "n": 7, "text": "Of the increase of his government and of peace there shall be no end, on the throne of David, and on his kingdom, to establish it, and to uphold it with justice and with righteousness from henceforth even forever. The zeal of Yahweh of Hosts will perform this."}, {"c": 9, "n": 8, "text": "The Lord sent a word into Jacob, and it has lighted on Israel."}, {"c": 9, "n": 9, "text": "All the people shall know, [even] Ephraim and the inhabitant of Samaria, who say in pride and in arrogance of heart,"}, {"c": 9, "n": 10, "text": "The bricks are fallen, but we will build with hewn stone; the sycamores are cut down, but we will put cedars in their place."}, {"c": 9, "n": 11, "text": "Therefore Yahweh will set up on high against him the adversaries of Rezin, and will stir up his enemies,"}, {"c": 9, "n": 12, "text": "the Syrians before, and the Philistines behind; and they shall devour Israel with open mouth. For all this his anger is not turned away, but his hand is stretched out still."}, {"c": 9, "n": 13, "text": "Yet the people have not turned to him who struck them, neither have they sought Yahweh of Hosts."}, {"c": 9, "n": 14, "text": "Therefore Yahweh will cut off from Israel head and tail, palm-branch and rush, in one day."}, {"c": 9, "n": 15, "text": "The elder and the honorable man, he is the head; and the prophet who teaches lies, he is the tail."}, {"c": 9, "n": 16, "text": "For those who lead this people cause them to err; and those who are led of them are destroyed."}, {"c": 9, "n": 17, "text": "Therefore the Lord will not rejoice over their young men, neither will he have compassion on their fatherless and widows; for everyone is profane and an evil-doer, and every mouth speaks folly. For all this his anger is not turned away, but his hand is stretched out still."}, {"c": 9, "n": 18, "text": "For wickedness burns as the fire; it devours the briers and thorns; yes, it kindles in the thickets of the forest, and they roll upward in a column of smoke."}, {"c": 9, "n": 19, "text": "Through the wrath of Yahweh of hosts is the land burnt up; and the people are as the fuel of fire: no man spares his brother."}, {"c": 9, "n": 20, "text": "One shall snatch on the right hand, and be hungry; and he shall eat on the left hand, and they shall not be satisfied: they shall eat every man the flesh of his own arm:"}, {"c": 9, "n": 21, "text": "Manasseh, Ephraim; and Ephraim, Manasseh; and they together shall be against Judah. For all this his anger is not turned away, but his hand is stretched out still."}]}, "isa_52_53": {"id": "isa_52_53", "ref": "Isaiah 52–53", "verses": [{"c": 52, "n": 1, "text": "Awake, awake, put on your strength, Zion; put on your beautiful garments, Jerusalem, the holy city: for henceforth there shall no more come into you the uncircumcised and the unclean."}, {"c": 52, "n": 2, "text": "Shake yourself from the dust; arise, sit [on your throne], Jerusalem: loose yourself from the bonds of your neck, captive daughter of Zion."}, {"c": 52, "n": 3, "text": "For thus says Yahweh, You were sold for nothing; and you shall be redeemed without money."}, {"c": 52, "n": 4, "text": "For thus says the Lord Yahweh, My people went down at the first into Egypt to sojourn there: and the Assyrian has oppressed them without cause."}, {"c": 52, "n": 5, "text": "Now therefore, what do I here, says Yahweh, seeing that my people is taken away for nothing? those who rule over them do howl, says Yahweh, and my name continually all the day is blasphemed."}, {"c": 52, "n": 6, "text": "Therefore my people shall know my name: therefore [they shall know] in that day that I am he who does speak; behold, it is I."}, {"c": 52, "n": 7, "text": "How beautiful on the mountains are the feet of him who brings good news, who publishes peace, who brings good news of good, who publishes salvation, who says to Zion, Your God reigns!"}, {"c": 52, "n": 8, "text": "The voice of your watchmen! they lift up the voice, together do they sing; for they shall see eye to eye, when Yahweh returns to Zion."}, {"c": 52, "n": 9, "text": "Break forth into joy, sing together, you waste places of Jerusalem; for Yahweh has comforted his people, he has redeemed Jerusalem."}, {"c": 52, "n": 10, "text": "Yahweh has made bare his holy arm in the eyes of all the nations; and all the ends of the earth have seen the salvation of our God."}, {"c": 52, "n": 11, "text": "Depart you, depart you, go you out from there, touch no unclean thing; go you out of the midst of her; cleanse yourselves, you who bear the vessels of Yahweh."}, {"c": 52, "n": 12, "text": "For you shall not go out in haste, neither shall you go by flight: for Yahweh will go before you; and the God of Israel will be your rearward."}, {"c": 52, "n": 13, "text": "Behold, my servant shall deal wisely, he shall be exalted and lifted up, and shall be very high."}, {"c": 52, "n": 14, "text": "Like as many were astonished at you (his visage was so marred more than any man, and his form more than the sons of men),"}, {"c": 52, "n": 15, "text": "so shall he sprinkle many nations; kings shall shut their mouths at him: for that which had not been told them shall they see; and that which they had not heard shall they understand."}, {"c": 53, "n": 1, "text": "Who has believed our message? and to whom has the arm of Yahweh been revealed?"}, {"c": 53, "n": 2, "text": "For he grew up before him as a tender plant, and as a root out of a dry ground: he has no form nor comeliness; and when we see him, there is no beauty that we should desire him."}, {"c": 53, "n": 3, "text": "He was despised, and rejected of men; a man of sorrows, and acquainted with grief: and as one from whom men hide their face he was despised; and we didn't respect him."}, {"c": 53, "n": 4, "text": "Surely he has borne our infirmities, and carried our sorrows; yet we esteemed him stricken, struck of God, and afflicted."}, {"c": 53, "n": 5, "text": "But he was wounded for our transgressions, he was bruised for our iniquities; the chastisement of our peace was on him; and with his stripes we are healed."}, {"c": 53, "n": 6, "text": "All we like sheep have gone astray; we have turned everyone to his own way; and Yahweh has laid on him the iniquity of us all."}, {"c": 53, "n": 7, "text": "He was oppressed, yet when he was afflicted he didn't open his mouth; as a lamb that is led to the slaughter, and as a sheep that before its shearers is mute, so he didn't open his mouth."}, {"c": 53, "n": 8, "text": "By oppression and judgment he was taken away; and as for his generation, who [among them] considered that he was cut off out of the land of the living for the disobedience of my people to whom the stroke [was due]?"}, {"c": 53, "n": 9, "text": "They made his grave with the wicked, and with a rich man in his death; although he had done no violence, neither was any deceit in his mouth."}, {"c": 53, "n": 10, "text": "Yet it pleased Yahweh to bruise him; he has put him to grief: when you shall make his soul an offering for sin, he shall see [his] seed, he shall prolong his days, and the pleasure of Yahweh shall prosper in his hand."}, {"c": 53, "n": 11, "text": "He shall see of the travail of his soul, [and] shall be satisfied: by the knowledge of himself shall my righteous servant justify many; and he shall bear their iniquities."}, {"c": 53, "n": 12, "text": "Therefore will I divide him a portion with the great, and he shall divide the spoil with the strong; because he poured out his soul to death, and was numbered with the transgressors: yet he bore the sin of many, and made intercession for the transgressors."}]}, "mv_john_3_16": {"id": "mv_john_3_16", "ref": "John 3:16", "verses": [{"c": 3, "n": 16, "text": "For God so loved the world, that he gave his one and only Son, that whoever believes in him should not perish, but have eternal life."}]}, "mv_john_14_6": {"id": "mv_john_14_6", "ref": "John 14:6", "verses": [{"c": 14, "n": 6, "text": "Jesus said to him, \"I am the way, the truth, and the life. No one comes to the Father, but by me."}]}, "mv_rom_3_23": {"id": "mv_rom_3_23", "ref": "Romans 3:23", "verses": [{"c": 3, "n": 23, "text": "for all have sinned, and fall short of the glory of God;"}]}, "mv_rom_5_8": {"id": "mv_rom_5_8", "ref": "Romans 5:8", "verses": [{"c": 5, "n": 8, "text": "But God commends his own love toward us, in that while we were yet sinners, Christ died for us."}]}, "mv_rom_6_23": {"id": "mv_rom_6_23", "ref": "Romans 6:23", "verses": [{"c": 6, "n": 23, "text": "For the wages of sin is death, but the free gift of God is eternal life in Christ Jesus our Lord."}]}, "mv_rom_8_1": {"id": "mv_rom_8_1", "ref": "Romans 8:1", "verses": [{"c": 8, "n": 1, "text": "There is therefore now no condemnation to those who are in Christ Jesus, who don't walk according to the flesh, but according to the Spirit."}]}, "mv_eph_2_8_9": {"id": "mv_eph_2_8_9", "ref": "Ephesians 2:8–9", "verses": [{"c": 2, "n": 8, "text": "for by grace you have been saved through faith, and that not of yourselves; it is the gift of God,"}, {"c": 2, "n": 9, "text": "not of works, that no one would boast."}]}, "mv_psa_23_1": {"id": "mv_psa_23_1", "ref": "Psalm 23:1", "verses": [{"c": 23, "n": 1, "text": "Yahweh is my shepherd: I shall lack nothing."}]}};
window.COMMENTARY = {"john_1": {"summary": "John opens not with a manger but with eternity: the Word who was with God, who was God, who became flesh and lived among us. John the Baptist points witnesses to Jesus, who in turn calls his first followers.", "lessons": ["Jesus is not just a teacher who became divine — John insists he was God from the beginning.", "True witnesses point past themselves. John the Baptist's whole job was to deflect attention onto someone else.", "Faith starts as an invitation: \"Come and see.\" Jesus did not argue people into following him; he invited them to look."], "tension": "Treating Jesus as merely a wise human or merely a distant deity both miss John's point. The chapter holds together a real human (\"flesh\") and the eternal Word — losing either side breaks the gospel John is telling."}, "john_2": {"summary": "Jesus' first sign turns water into wine at a wedding in Cana, then he clears the temple of merchants. The chapter pairs abundance with cleansing.", "lessons": ["Jesus' first miracle was at a celebration, not a crisis — God meets ordinary joy, not just emergency.", "Worship can be corrupted by commerce. Jesus' anger was directed at religion that exploited people seeking God.", "Belief built only on seeing miracles is shallow; Jesus \"did not entrust himself to them, because he knew all people\" (v. 24)."], "tension": "Don't read the temple cleansing as Jesus endorsing ungoverned anger. The text shows targeted, prophetic action against exploitation — not a license for personal rage."}, "john_3": {"summary": "Nicodemus, a religious teacher, comes to Jesus by night. Jesus tells him a person must be \"born again\" of the Spirit to enter God's kingdom, and the conversation moves to John 3:16 — God's love sending the Son so whoever believes might have eternal life.", "lessons": ["Spiritual rebirth is a work of the Spirit, not a self-improvement project.", "God's posture toward the world is love, not condemnation (v. 17).", "People often reject light not for lack of evidence but because they prefer the dark (v. 19)."], "tension": "\"Born again\" has been weaponized to demand a single emotional conversion experience as proof of salvation. The text describes a Spirit-driven transformation — it does not prescribe the shape of every person's story."}, "john_4": {"summary": "Jesus crosses ethnic and gender lines to speak with a Samaritan woman at a well. He offers her \"living water\" and reveals that he is the Messiah; she becomes the first evangelist in John, bringing her town to Jesus.", "lessons": ["Jesus initiates conversations across the lines other people will not cross.", "The thirst for meaning is real — but only Christ claims to satisfy it permanently.", "True worship is not about location (Jerusalem vs. the mountain) but about \"spirit and truth\" (v. 24)."], "tension": "The chapter is not about earning Jesus' attention by being a good person — the woman's life had been complicated. It's about Jesus reaching across barriers people had built to keep \"the right kind of people\" close."}, "john_5": {"summary": "Jesus heals a man paralyzed for 38 years on the Sabbath, sparking a confrontation with religious leaders. He responds by claiming a unique relationship with the Father — and that the Father has given him authority to give life and judge.", "lessons": ["Religious rules can become a way to avoid the actual work of mercy.", "Jesus claims an authority no human teacher claimed — \"the Son does what he sees the Father doing\" (v. 19).", "Studying scripture is empty if it does not lead you to the One scripture points to (v. 39)."], "tension": "Don't read \"sin no more lest a worse thing happen\" (v. 14) as Jesus blaming all suffering on personal sin. He says the opposite in John 9. The line is to that man, not a universal formula."}, "john_6": {"summary": "Jesus feeds five thousand, walks on water, then declares himself the \"bread of life.\" Many disciples find his teaching too hard and leave. Peter answers: \"Lord, to whom shall we go? You have the words of eternal life.\"", "lessons": ["Crowds love miracles but often miss the meaning behind them — the people wanted bread, not a Savior.", "Real discipleship will at some point feel costly enough that some walk away.", "When you don't understand, staying with Jesus can be a faithful choice — like Peter, you may not have a better answer."], "tension": "The bread of life imagery is rich but contested across traditions (eucharistic, metaphorical, spiritual). Don't let denominational debates eclipse the pastoral point: Jesus himself is what sustains you."}, "john_7": {"summary": "Jesus teaches at the Feast of Tabernacles amid divided opinions about him. Some say he's a good man; others say he deceives people; the leaders try to arrest him. Jesus claims he speaks the words of the One who sent him.", "lessons": ["Public opinion about Jesus has always been divided — that hasn't changed.", "Spiritual conviction comes from doing God's will, not from arguing about it (v. 17).", "\"Out of his heart will flow rivers of living water\" (v. 38) — those who come to Jesus become a source of life for others."], "tension": "The chapter shows people forming opinions on partial information. Don't make confident judgments about anyone — including Jesus — based on rumor or single encounters."}, "john_8": {"summary": "A woman is brought to Jesus, caught in adultery, with her accusers demanding she be stoned. Jesus deflects: \"Let him without sin cast the first stone.\" Later he tells listeners the truth will set them free, and claims, \"Before Abraham was, I AM.\"", "lessons": ["Jesus refuses to weaponize law against the vulnerable.", "He does not excuse the woman either — he tells her, \"Go and sin no more.\" Mercy and truth held together.", "Freedom comes from truth, not from removing all constraints (v. 32)."], "tension": "\"Don't judge\" memes pull this chapter out of context. Jesus does not say sin doesn't matter — he says self-righteous people are not in a position to administer the verdict."}, "john_9": {"summary": "Jesus heals a man born blind. The disciples assume sin caused the blindness; Jesus rejects that. The healed man is interrogated, his parents are afraid, and he ends up worshiping Jesus — while the religious leaders, who claim to see, become more spiritually blind.", "lessons": ["Suffering is not always punishment for someone's sin.", "Real faith often grows under pressure — the blind man's testimony sharpens with every interrogation.", "Claiming you already see can be the very thing keeping you in the dark (v. 41)."], "tension": "The chapter directly contradicts the prosperity-gospel reflex that bad things happen because someone did something wrong. It also resists the opposite reflex that suffering is meaningless."}, "john_10": {"summary": "Jesus calls himself the Good Shepherd who knows his sheep, and they know his voice. He lays down his life for them voluntarily. He claims, \"I and the Father are one.\"", "lessons": ["Following Jesus is relational, not just intellectual — sheep know the shepherd's voice.", "Jesus' death was not accidental or imposed: \"No one takes [my life] from me\" (v. 18).", "There are \"other sheep not of this fold\" — God's circle is wider than any one tribe assumed."], "tension": "Beware reading verse 28 (\"no one will snatch them out of my hand\") as a license for spiritual passivity. Christians have argued for centuries about perseverance and assurance — the text gives comfort, not a formula."}, "john_11": {"summary": "Lazarus dies; Jesus delays, then arrives and weeps with the family before raising Lazarus from the dead. He declares, \"I am the resurrection and the life.\" The miracle becomes the trigger for the leaders to plot his execution.", "lessons": ["Jesus weeps at death even when he knows what's coming next — grief and hope are not enemies.", "Resurrection is not just a future event; it is a person.", "Sometimes the very thing that proves Jesus' power is what makes powerful people decide to kill him."], "tension": "Don't expect every prayer for healing to end like Lazarus' did. Jesus' delay caused real grief, and the chapter normalizes that grief. The miracle is also the exception — most people who died that week stayed dead."}, "john_12": {"summary": "Mary anoints Jesus' feet with expensive perfume. Jesus enters Jerusalem to crowds shouting \"Hosanna.\" He predicts his death and says: \"Unless a grain of wheat falls into the earth and dies, it remains alone; but if it dies, it bears much fruit.\"", "lessons": ["Extravagant devotion can look wasteful to people without eyes for it.", "Jesus chose the cross — \"What shall I say, 'Father, save me from this hour'? But for this purpose I came to this hour\" (v. 27).", "Crowds that shout praise one week shout for crucifixion the next. Public approval is a poor measure of truth."], "tension": "Judas' \"the money should go to the poor\" objection sounded righteous. The chapter warns against using justice rhetoric to cover other motives — a sword that cuts both political directions."}, "john_13": {"summary": "On the night of his arrest, Jesus washes his disciples' feet — including Judas'. He gives them a \"new commandment\": love one another as he has loved them. He predicts both Judas' betrayal and Peter's denial.", "lessons": ["Authority in Jesus' kingdom looks like the towel and basin, not the throne.", "Love is the mark of his followers — not theology, gifts, or moral performance (v. 35).", "Jesus serves Judas knowing what Judas will do. Service is not contingent on the other person deserving it."], "tension": "\"Love one another\" sounds soft. It is not — it is the hardest commandment, especially for people you actually have to live with. Don't romanticize it."}, "john_14": {"summary": "Jesus comforts his disciples on the eve of his death. He promises to prepare a place for them, declares himself \"the way, the truth, and the life,\" and promises the Holy Spirit who will be their advocate.", "lessons": ["Belief in God and belief in Jesus are tied together — \"believe in God; believe also in me\" (v. 1).", "Christianity makes a sharp claim: Jesus is the way to the Father.", "The Spirit is not a vague force; he is given to teach and remind disciples of what Jesus said."], "tension": "John 14:6 has been used both as comfort to the doubting and as a weapon against people of other faiths. The verse was spoken to anxious disciples, not as a debate point. Hold its claim and its tone together."}, "john_15": {"summary": "Jesus uses the image of the vine and branches: apart from him, branches wither. He commands his followers to abide in his love and to love one another, warning that the world will hate them as it hated him.", "lessons": ["Fruit comes from connection, not effort. \"Apart from me you can do nothing\" (v. 5).", "The pruning that hurts is what makes the branch fruitful.", "Loving like Jesus will provoke opposition — popularity is not a sign of faithfulness."], "tension": "Don't use \"the world will hate you\" as a reason to assume every conflict you have proves you're right. Sometimes you're hated for Jesus; sometimes you're hated because you're being a jerk. The chapter assumes the first; it doesn't excuse the second."}, "john_16": {"summary": "Jesus prepares his disciples for what's coming: persecution, his departure, and the arrival of the Spirit who will guide them into truth. He admits their grief — but says it will turn to joy that no one can take away.", "lessons": ["Jesus' departure was a feature, not a bug: \"It is to your advantage that I go away\" (v. 7) — so the Spirit could come.", "Sorrow is not the final word for those in Christ; it is the labor before joy (v. 21).", "Honesty about coming difficulty is a kind of love. He doesn't promise it will be easy, only that he has \"overcome the world.\""], "tension": "The chapter promises peace \"in me,\" not the absence of trouble (v. 33). Don't read the Christian life as freedom from suffering — read it as a different relationship to suffering."}, "john_17": {"summary": "Jesus prays — for himself, for his disciples, and for all who would later believe through their message. The central request: that his followers be one, as he and the Father are one.", "lessons": ["Eternal life, in Jesus' definition, is to know the Father and the Son (v. 3) — relationship, not just duration.", "Unity among Christians is not optional or strategic — it is what Jesus prayed for the night before he died.", "Jesus prays for his followers' protection, not their removal from the world (v. 15)."], "tension": "Christian unity does not mean uniformity, and division has often grown out of real convictions. The prayer holds for unity — but it does not erase the work of discernment. Hold both."}, "john_18": {"summary": "Jesus is arrested in the garden, tried before religious leaders, and questioned by Pilate. Peter denies him three times. Jesus tells Pilate, \"My kingdom is not of this world.\"", "lessons": ["Jesus walks toward arrest deliberately — even healing the servant whose ear Peter cut off.", "Peter, who promised loyalty, fails. Confidence in your own faithfulness is fragile.", "Christ's kingdom does not advance through violence — \"if my kingdom were of this world, my servants would have been fighting\" (v. 36)."], "tension": "\"What is truth?\" — Pilate's question. The chapter does not answer it directly; it shows Truth standing in front of him, refused. Don't read this as Jesus being passive — read it as a different kind of authority."}, "john_19": {"summary": "Pilate has Jesus flogged, then yields to the crowd's demand for crucifixion. Jesus is mocked, nailed to a cross between two others, and dies after declaring \"It is finished.\" He is buried in a borrowed tomb.", "lessons": ["The cross is not a defeat but the completion of a mission — \"it is finished\" is a statement of accomplishment.", "Pilate had the power and used it badly. Many people in power still trade truth for political safety.", "Even at the cross Jesus cared for his mother (vv. 26-27) — love does its small, particular work to the very end."], "tension": "Christian art has often softened crucifixion into iconography. Read the actual chapter: it was an ugly, public, state-sponsored execution. Don't lose the horror — the love of God shows up there."}, "john_20": {"summary": "Mary Magdalene finds the tomb empty. Jesus appears to her, then to the disciples, then to Thomas, who refuses to believe without seeing. The chapter ends: these things were written that you may believe.", "lessons": ["Resurrection witnesses are not the people the culture would have invented — Mary Magdalene is the first to see Jesus alive.", "Doubt is not the opposite of faith; faith with honest questions is what Jesus meets in Thomas.", "John writes for one purpose: that you might believe Jesus is the Christ and have life in his name (v. 31)."], "tension": "\"Blessed are those who have not seen and yet have believed\" (v. 29) is not anti-evidence; it is solidarity with later disciples like you, who can't have what Thomas had. Faith isn't gullibility, but it isn't a lab experiment either."}, "john_21": {"summary": "Jesus appears to disciples who have gone back to fishing, gives them a miraculous catch, and shares breakfast with them on the beach. He restores Peter — three questions to match three denials — and tells him, \"Follow me.\"", "lessons": ["Failure is not the end of vocation — Peter denied Jesus and was restored to lead.", "Jesus meets you in the ordinary (a fishing trip, breakfast) as much as in the dramatic.", "\"Follow me\" is the same call he gave at the start. Discipleship is the long obedience back to the same simple thing."], "tension": "Peter immediately compares his future to John's: \"Lord, what about him?\" Jesus refuses the comparison. Don't measure your following by anyone else's path."}, "romans_1": {"summary": "Paul introduces the gospel as the power of God for salvation, then describes humanity's deep moral confusion: people knew God and turned from him, exchanging truth for lies. The chapter ends with a stark catalog of broken behavior.", "lessons": ["Romans treats the gospel as power, not just information (v. 16).", "Idolatry — making created things ultimate — is the root sin from which the others flow.", "Suppressing truth has consequences for how a society lives, not just what it believes."], "tension": "The end of Romans 1 has been used as a hammer against specific sins (especially sexual ones) while readers ignore Romans 2 — which turns the same hammer on the reader. Read 1 and 2 together; Paul did not intend chapter 1 to be quoted alone."}, "romans_2": {"summary": "Paul pivots: those who judge others are doing the same things. God's judgment is impartial. He confronts religious confidence — being a Jew (or a religious insider) does not exempt anyone from the same standard.", "lessons": ["Spotting other people's sin clearly often means you are blind to your own.", "God judges by the heart, not by religious credentials.", "Real religion is internal — \"a Jew inwardly\" (v. 29) — not just outward markers."], "tension": "Don't read \"do not judge\" as \"never make moral assessments.\" Paul is making moral assessments throughout this chapter. He is warning against the specific vice of judging others by a standard you exempt yourself from."}, "romans_3": {"summary": "The verdict: \"all have sinned and fall short of the glory of God\" (v. 23). But Paul announces the heart of the gospel: God's righteousness has been revealed in Jesus, given as a gift, received by faith — for everyone who believes.", "lessons": ["Universal sin is not just a religious idea; it is the diagnosis the rest of the gospel addresses.", "Salvation is a gift you receive, not a wage you earn (v. 24).", "Faith does not abolish God's justice — Christ's death is what makes God both just and the one who justifies (v. 26)."], "tension": "\"By faith\" has been pitted against \"by works\" so sharply that some readers conclude behavior doesn't matter. Romans 2 just said it does. The book holds both — works don't earn salvation, but faith without changed life isn't the faith Paul means."}, "romans_4": {"summary": "Paul argues from Abraham's life that righteousness has always been by faith, not by ethnic or religious credentials. Abraham was counted righteous before circumcision, before the law, before he had any visible reason to hope.", "lessons": ["Faith is not denying reality; it is trusting God against appearances (v. 19).", "God's promise reaches through one nation to all peoples.", "Justification by faith was never a New Testament novelty — it was always the way."], "tension": "\"Just have more faith\" can become a cudgel for people whose prayers aren't answered. Abraham's faith was strong but not because he engineered it — God credited it to him. Faith is a relationship with a faithful God, not a personal achievement."}, "romans_5": {"summary": "Through Christ, believers have peace with God, access to grace, and hope. Paul contrasts Adam (whose sin brought death to all) with Christ (whose obedience brings life to all who believe). \"While we were still sinners, Christ died for us.\"", "lessons": ["Suffering produces character; character produces hope (vv. 3-4).", "Christ's love is not contingent on your having gotten your life together first (v. 8).", "What Adam broke, Christ more than restored — \"how much more\" is the rhythm of the chapter."], "tension": "Don't take the Adam/Christ parallel as a denial of personal responsibility. Paul is telling a story bigger than individual choices, but he is not removing them — see chapter 6."}, "romans_6": {"summary": "If grace covers sin, should we sin more so grace abounds? Paul's answer: God forbid. Believers have died with Christ and are raised to a new life. They are no longer slaves to sin.", "lessons": ["Grace is not a license; it is a liberation.", "Baptism dramatizes a death and a resurrection: the old self with Christ on the cross, a new self walking out the tomb.", "Whatever you obey is your master — sin or righteousness (v. 16)."], "tension": "\"You are not under law but under grace\" can be misread as moral lawlessness. Paul means the opposite: under grace you actually have power to live differently, which the law never gave you."}, "romans_7": {"summary": "Paul describes a painful inner conflict: \"I do not do the good I want, but the evil I do not want is what I keep doing.\" The law is good, but it exposes sin without giving the strength to overcome it. The cry: \"Wretched man that I am! Who will deliver me?\"", "lessons": ["The struggle to do right and failing is not unique to you — it is the human condition apart from grace.", "Knowing what's right does not give you the power to do it.", "The chapter ends in honesty before it ends in victory: deliverance comes through Jesus Christ (v. 25)."], "tension": "Christians have argued for centuries whether Romans 7 describes Paul before or after conversion. The pastoral point survives the debate: even mature Christians have a real inner war, and the answer is always Christ — not better effort."}, "romans_8": {"summary": "There is no condemnation for those in Christ. The Spirit gives life and adoption as God's children. Suffering is real but cannot separate believers from the love of Christ. Paul ends with one of the great affirmations in scripture.", "lessons": ["The Christian's standing is not based on performance but on union with Christ (v. 1).", "The Spirit prays for you when you don't know how to pray (v. 26).", "Nothing — death, life, present, future — can separate you from God's love in Christ (vv. 38-39)."], "tension": "\"All things work together for good\" (v. 28) is often quoted to people in pain in ways that minimize their grief. Paul's claim is enormous, but the chapter assumes ongoing suffering, not its absence. Don't speed past the groaning to get to the comfort."}, "romans_9": {"summary": "Paul grieves over his fellow Israelites who have not received Christ. He defends God's freedom to have mercy on whom he has mercy. He uses the image of a potter and clay: who are you, O man, to answer back to God?", "lessons": ["God's plans run deeper than human assumptions about who's in and who's out.", "Paul's heart grieves for those outside the gospel — not coldly debating, but weeping (v. 2).", "Faith is the boundary line, not ethnicity or religious heritage."], "tension": "Romans 9 is the single most contested chapter on predestination. Calvinists and Arminians both quote it. Don't pretend the question is settled. Hold the chapter's emphasis on God's sovereign mercy alongside Romans 10's emphasis on personal faith."}, "romans_10": {"summary": "Paul wishes his people would be saved. Salvation comes by confessing Jesus as Lord and believing in the heart that God raised him from the dead. \"Faith comes by hearing, and hearing by the word of Christ.\"", "lessons": ["The gospel is genuinely available — \"whoever calls on the name of the Lord will be saved\" (v. 13).", "Faith requires a messenger — someone telling someone else (v. 14-15).", "Religious zeal without knowledge is not enough (v. 2)."], "tension": "Holding this chapter alongside Romans 9 is the work. Both the divine initiative and the human response are real. Pretending one cancels the other is the heresy of every age."}, "romans_11": {"summary": "Has God rejected Israel? No. Paul describes a partial hardening that has opened the door to the Gentiles, and warns Gentile believers against arrogance toward the Jewish people. He ends in worship: \"How unsearchable are his judgments.\"", "lessons": ["God's plan includes both Israel and the nations — they are not in competition.", "Gentile believers are grafted into a tree they did not plant (v. 17). Humility is the only fitting posture.", "\"From him and through him and to him are all things\" (v. 36) — God's purposes are larger than we can map."], "tension": "Christian history has used Romans to fuel anti-Jewish theology. Paul is the opposite: he warns Gentiles against arrogance toward Israel and grieves for his own people. Read carefully against centuries of misuse."}, "romans_12": {"summary": "In view of God's mercies, present your bodies as a living sacrifice. Be transformed by the renewal of your mind. Use your gifts. Love sincerely. Bless those who persecute you. Overcome evil with good.", "lessons": ["Worship is not just what happens on Sunday — your whole life is the offering (v. 1).", "Transformation is mental work — \"the renewal of your mind\" (v. 2). What you take in shapes what you become.", "Christian ethics are surprisingly practical: live in harmony, weep with those who weep, do not avenge yourselves."], "tension": "\"Do not be conformed to this world\" has been used to justify cultural withdrawal. Paul means something deeper than aesthetic separation — non-conformity to the world's pattern of getting even, status-seeking, and revenge."}, "romans_13": {"summary": "Paul tells believers to be subject to governing authorities. He calls love the fulfillment of the law, summarizing the commandments: \"love your neighbor as yourself.\" \"The night is far gone; the day is at hand.\"", "lessons": ["Authority structures, however imperfect, generally serve human flourishing.", "All the moral commandments are summed up in love (v. 9).", "The end is closer than yesterday — live as though that's true."], "tension": "Romans 13 has been used to silence Christian protest of unjust regimes. The text was written under Rome, not as a blanket endorsement of any state. Acts shows the same Paul refusing to obey when authorities forbid the gospel. Hold the principle and the prophetic tradition together."}, "romans_14": {"summary": "Christians disagree on disputed matters — food, sacred days, conscience issues. Paul tells them not to despise or judge each other. Each person should be fully convinced in their own mind, and act in love toward those who differ.", "lessons": ["Some things are worth dividing over; many things aren't.", "Your liberty matters less than your brother or sister's faith (v. 21).", "Whatever does not proceed from faith is sin — for the person whose conscience says no, doing it anyway is sin (v. 23)."], "tension": "The hard work is discerning which issues are \"disputed matters\" and which are central. Paul does not give a formula. He gives a posture: humility on lesser things, courage on the gospel."}, "romans_15": {"summary": "Paul calls the strong to bear with the weak. Christ welcomed both Jew and Gentile to glorify God. Paul shares his mission — preaching where Christ has not been named — and his travel plans.", "lessons": ["Christian maturity bears with those who are not yet there.", "Hope is grounded in scripture's instruction (v. 4) — not feelings about the future.", "Mission frequently goes where it isn't yet established (v. 20)."], "tension": "\"Bear with the failings of the weak\" is easy to quote against people you find annoying. Paul means to give grace, not to dismiss them as inferior."}, "romans_16": {"summary": "Paul greets a long list of co-workers, including many women, and warns against those who cause divisions. He ends with a doxology to the God who can establish believers according to the gospel.", "lessons": ["Ministry is collaborative — Paul names dozens of people without whom his work would have failed.", "Watch for those who use slick speech to deceive (v. 18).", "Be wise about good, innocent about evil (v. 19)."], "tension": "The list includes Phoebe (a deacon), Junia (\"prominent among the apostles\"), Priscilla (named before her husband). However your tradition reads women's roles, the text shows that early Christianity ran on women's labor."}, "luke_1": {"summary": "Luke writes an orderly account for Theophilus. The angel Gabriel announces births to Zechariah (John the Baptist) and to Mary (Jesus). Mary's response — the Magnificat — celebrates a God who lifts up the lowly.", "lessons": ["Luke's gospel is not myth or rumor — he writes after carefully investigating eyewitness accounts (v. 3).", "God meets ordinary people: an old priest, a young woman from Nazareth.", "The arrival of Christ is good news for the poor and trouble for the proud (vv. 51-53)."], "tension": "The Magnificat reads like a manifesto for the powerless. People with comfort have spiritualized it for centuries. Read it the way Mary spoke it — as concrete reversal, not abstract piety."}, "luke_2": {"summary": "Jesus is born in Bethlehem during a Roman census. Angels announce his birth to shepherds — the night-shift outsiders. The infant is dedicated at the temple, where elderly Simeon and Anna recognize him. As a boy, he stays behind in the temple.", "lessons": ["The first announcement of the Messiah's birth went to people the religious establishment ignored.", "The child Jesus' identity was visible to those waiting for him; political power barely noticed.", "\"Did you not know I must be about my Father's business?\" (v. 49) — Jesus' mission was not invented later."], "tension": "Christmas culture has wrapped the birth narrative in sentimentality. Read it again: an unmarried teenager, a forced political relocation, animals, a refugee story. The tenderness is real; the romance is largely ours."}, "luke_3": {"summary": "John the Baptist preaches a baptism of repentance and confronts the crowds, the soldiers, and the tax collectors with practical applications. Jesus is baptized; the Spirit descends; a voice from heaven affirms him. Luke gives Jesus' genealogy back to Adam.", "lessons": ["John demanded fruit, not just feelings — share clothes, don't extort, be content with your wages.", "Jesus' baptism identifies him with the people he came to save.", "Luke traces Jesus to Adam — he is not just Israel's Messiah but the new representative of humanity."], "tension": "John's harsh language (\"brood of vipers\") was directed at religious insiders, not outsiders. Don't borrow his tone for use against the wrong audience."}, "luke_4": {"summary": "Jesus is tempted in the wilderness and answers each temptation with scripture. He returns to Nazareth, reads from Isaiah — \"good news to the poor\" — and applies it to himself. The hometown crowd tries to throw him off a cliff.", "lessons": ["Even the Son of God used scripture to navigate temptation.", "Jesus' mission statement (vv. 18-19) named the poor, captives, blind, and oppressed first.", "Familiarity can make Jesus' message feel offensive — the people who knew him longest rejected him hardest."], "tension": "The temptations in the wilderness all involved using power for self. Beware the spiritual versions still on offer: the celebrity pastor, the religious empire, the influence built on visibility rather than character."}, "luke_5": {"summary": "Jesus calls Simon, James, and John from their fishing boats; heals a leper; forgives and heals a paralytic. He calls Levi the tax collector and dines with sinners. He teaches that new wine needs new wineskins.", "lessons": ["Jesus called working people — not the educated religious elite — as his core team.", "He didn't avoid people the religious world considered impure; he sought them out.", "New realities require new structures. Don't pour the gospel into systems built to resist it."], "tension": "\"New wineskins\" has been used to justify any preferred change. Jesus is not endorsing novelty for its own sake — he is announcing that the kingdom he brings won't fit old religious containers."}, "luke_6": {"summary": "Conflict over Sabbath rules. Jesus chooses twelve apostles and delivers a sermon: blessings on the poor, hungry, weeping, and hated; woes on the rich, full, laughing, and admired. Love your enemies. Judge not. Build on the rock.", "lessons": ["Jesus' beatitudes name reversal: the kingdom changes who is considered blessed.", "Loving enemies is not a strategy; it is what makes you children of the Most High (v. 35).", "Hearing his words and not doing them is a house with no foundation."], "tension": "\"Judge not\" is one of the most quoted lines in scripture and one of the most decontextualized. Jesus is not banning moral judgment — he is warning against hypocritical judgment from people with logs in their own eyes."}, "luke_7": {"summary": "Jesus heals a centurion's servant and raises a widow's son. John the Baptist sends from prison asking if he is the one. A sinful woman anoints Jesus' feet at a Pharisee's dinner; her many sins are forgiven because she loved much.", "lessons": ["Even John the Baptist had moments of doubt (\"are you the one?\"). Doubt is not the end of faith.", "The woman whose sins were many loved much — gratitude is proportional to awareness of what's been forgiven.", "Jesus did not protect his reputation from contact with the wrong people."], "tension": "Don't romanticize the woman's tears as the necessary template for repentance. The text doesn't make her shape your shape. It shows what love looks like when forgiveness has actually landed."}, "luke_8": {"summary": "Jesus teaches in parables (the sower), calms a storm, casts out a legion of demons, heals a bleeding woman, and raises Jairus's daughter. Women fund his ministry from their resources.", "lessons": ["The same word lands differently in different soils — the issue isn't the seed but the heart that receives it.", "Faith, even shaky faith, is what Jesus responds to (\"who touched me?\").", "His ministry was funded by women out of their own means (v. 3) — quietly, without spectacle."], "tension": "The parable of the sower is often used to label other people as bad soil. Jesus told it to provoke self-examination, not categorization of others."}, "luke_9": {"summary": "Jesus sends out the twelve, feeds five thousand, is transfigured, predicts his death, and \"sets his face\" toward Jerusalem. He calls disciples to take up their cross and lose their lives to find them.", "lessons": ["Mission and discipleship are inseparable — Jesus sent the twelve before they were polished.", "Following Jesus means daily choice, not a one-time decision (v. 23).", "He set his face toward Jerusalem knowing what was waiting (v. 51) — courage in the long obedience."], "tension": "\"Whoever loses his life will save it\" can be misused to demand self-erasure from people who already have too little self. Jesus is talking to people clinging to their own importance, not people being trampled."}, "luke_10": {"summary": "Jesus sends seventy-two on mission. He tells the parable of the Good Samaritan in answer to \"who is my neighbor?\" He visits Mary and Martha; Mary chooses the better part by sitting at his feet.", "lessons": ["Mission is not just for an elite few — Jesus sent 72 ordinary disciples.", "Your neighbor is whoever needs you — including the foreigner you would normally avoid.", "Activity for Jesus is not a substitute for time with Jesus."], "tension": "Mary vs. Martha has been turned into a personality competition. The text isn't condemning service — it's saying that on this occasion Mary chose what mattered more. Don't let the contemplation/action divide become a club for either side."}, "luke_11": {"summary": "Jesus teaches the Lord's Prayer, urges persistent prayer, and casts out a demon. He confronts religious hypocrites with a series of woes — cleaning the outside of the cup while the inside is full of greed.", "lessons": ["Prayer can be simple and honest — \"Father…give us…forgive us…lead us\" (vv. 2-4).", "Persistence in prayer is not nagging God; it is keeping the relationship alive.", "Religion that cleans the outside but not the heart misses what God cares about (v. 39)."], "tension": "The harsh language at religious leaders should not become a script for Christians today against people they disagree with. Jesus had earned that authority and standing; we usually have not."}, "luke_12": {"summary": "Jesus warns against hypocrisy and greed, tells the parable of the rich fool, urges trust in God's provision, and calls disciples to be ready when the master returns. He says he came to bring division, not just peace.", "lessons": ["Your life does not consist in the abundance of your possessions (v. 15).", "Worry adds nothing — God knows what you need (vv. 22-31).", "Following Jesus can divide families. He knows. He is honest about it (v. 51)."], "tension": "\"Don't worry about your life\" sounds glib if you don't know where the next meal is coming from. Jesus said it to people in real precarity. The chapter is not a prescription against careful planning; it's against the slow strangulation of fear."}, "luke_13": {"summary": "Jesus calls people to repent, telling parables about a fig tree given more time, the kingdom growing like a mustard seed, and a narrow door. He laments over Jerusalem.", "lessons": ["Tragedy is not a verdict on the victim — \"do you think they were worse sinners? No\" (v. 2).", "The kingdom often starts small and unimpressive.", "Some people will be surprised at the door — assumed insiders aren't, and unexpected outsiders are."], "tension": "The narrow door has been used to fence in or out. Jesus' tone is not triumphalist — he weeps over Jerusalem in the same chapter. Hold the door's narrowness with the heart that grieves over those outside."}, "luke_14": {"summary": "Jesus heals on the Sabbath, teaches about humility at table, and tells the parable of the great banquet — the invited refused, so the master sends servants to bring in the poor and disabled. He spells out the cost of discipleship.", "lessons": ["Take the lower seat — God will lift up the humble (v. 11).", "When you give a feast, invite those who can't repay you.", "Discipleship has a cost; count it before you sign on (v. 28)."], "tension": "\"Hate your father and mother\" (v. 26) is a Semitic comparison, not a literal command. It means: when loyalties conflict, Jesus comes first. Don't read it as license to neglect family."}, "luke_15": {"summary": "Three parables on what is lost and found: a sheep, a coin, and a son. The father sees the prodigal coming from far off and runs to him. The older brother stays outside, angry that grace is being given to the wrong person.", "lessons": ["God seeks what is lost — the search is initiated by him.", "Coming back to the Father is met with running, embracing, and feasting, not lecturing.", "Religious faithfulness can hide the same disease the prodigal had: a transactional view of the Father."], "tension": "The chapter is often called \"The Prodigal Son.\" The point is two sons. The story ends with the older brother outside, and we don't know what he chose. Don't assume you're not him."}, "luke_16": {"summary": "The shrewd manager. Warnings against loving money. The rich man and Lazarus — a beggar at the gate, both die, and the chasm between them in the next life can't be crossed.", "lessons": ["Use money strategically for kingdom purposes — even the dishonest manager understood urgency.", "You cannot serve both God and money (v. 13). The two will eventually compete.", "What you do with the suffering at your gate matters more than you think."], "tension": "The afterlife details in the rich man parable have been mined for systematic theology. Parables aren't blueprints. The point is the urgency of right action now, not a map of what's next."}, "luke_17": {"summary": "Jesus warns against causing others to stumble, teaches forgiveness, increases the disciples' faith, heals ten lepers (only one returns thanks — a Samaritan), and speaks of the coming kingdom.", "lessons": ["Forgiving repeatedly is not weakness; it is faithfulness (vv. 3-4).", "Gratitude is the response of the spiritually awake — only one in ten returned.", "The kingdom of God is in your midst already (v. 21), not just in the future."], "tension": "\"Increase our faith\" gets answered with a comment about mustard-seed faith. Don't read that as Jesus dismissing the request. He is telling them faith's power is not its size — small faith aimed at a real God moves things."}, "luke_18": {"summary": "The persistent widow. The Pharisee and tax collector. Jesus blesses children. A rich young ruler walks away sad. Jesus heals a blind beggar who calls him \"Son of David.\"", "lessons": ["Don't give up praying — even an unjust judge yielded to persistence.", "The tax collector goes home justified, not the religious man — beware self-congratulation in prayer.", "Wealth can be the very thing that keeps you from following."], "tension": "\"Sell all you have\" was directed at one man, whose specific stronghold was money. Jesus didn't tell every disciple this. Don't read it as universal — read it as: he sees what owns you, and he will name it."}, "luke_19": {"summary": "Zacchaeus the tax collector climbs a tree to see Jesus, who calls him by name and goes to his house — and Zacchaeus repents publicly. The parable of the ten minas. Jesus enters Jerusalem to crowds, weeps over the city, and clears the temple.", "lessons": ["Salvation finds the person willing to break dignity to see Jesus (the tree).", "Real repentance is concrete — Zacchaeus gives back four times what he stole (v. 8).", "Jesus weeps over the city that is about to crucify him. Love that doesn't soften under rejection."], "tension": "The parable of the minas is sometimes used to push hustle-culture values onto Christian life. The point is faithfulness with what's been entrusted, not a theology of business growth."}, "luke_20": {"summary": "Religious leaders question Jesus' authority. He tells the parable of the wicked tenants. He answers questions on taxes, resurrection, and the messianic Son of David. He warns against scribes who devour widows' houses.", "lessons": ["\"Render to Caesar\" — earthly authority and divine authority are not the same thing, but they are not enemies either.", "Resurrection is not a continuation of married life but a new mode of existence.", "Religious leaders who exploit the vulnerable will face stricter judgment, not lighter (v. 47)."], "tension": "The Caesar/God answer has been used to justify almost any political position. Jesus' answer was deliberately ambiguous, not a formula for Christian civic engagement. The hard work of discernment was left for his followers."}, "luke_21": {"summary": "A widow drops two small coins in the temple offering — Jesus says she gave more than the rich. He predicts the temple's destruction and signs of the end. He tells disciples to watch and pray.", "lessons": ["God measures gifts by what they cost the giver, not by their public size.", "Difficult times will come — don't be shaken by them or distracted from the long faithfulness.", "Watchfulness is not anxiety; it is sober readiness."], "tension": "End-times language in Luke 21 has been mined for prediction charts. Jesus warns specifically against being misled by people claiming to know the time. Hold the chapter as moral preparation, not eschatological calendar."}, "luke_22": {"summary": "Judas plots betrayal. Jesus shares the Last Supper, foretells Peter's denial, prays in Gethsemane, is arrested, and is denied by Peter three times before the rooster crows.", "lessons": ["The Lord's Supper is grounded in his body broken and blood poured out — not a metaphor he invented but a fact he interpreted.", "\"Not my will, but yours, be done\" (v. 42) — submission was costly to Jesus too.", "Even the closest disciples can fail under pressure. So can you."], "tension": "Peter's denial gets a lot of attention. So does his restoration. Don't fixate on the failure without the recovery — the chapter is laying foundation for what John 21 completes."}, "luke_23": {"summary": "Jesus is tried before Pilate and Herod, then handed over to be crucified. Two criminals are crucified with him; one mocks him, the other says \"remember me when you come into your kingdom\" — Jesus answers, \"today you will be with me in paradise.\" He dies, and a centurion declares him innocent.", "lessons": ["Salvation can come at the very end. The thief had no time to do good works; he had only faith.", "Jesus prayed for those crucifying him — \"Father, forgive them, they don't know what they're doing\" (v. 34).", "His death wasn't a failure mistakenly recognized as victory. It was a deliberate sacrifice."], "tension": "The thief's \"deathbed conversion\" is sometimes used to justify deferring spiritual life until the end. The text shows mercy is real for whoever turns — but you don't know when your end is, and most don't have that final clarity."}, "luke_24": {"summary": "Women find the tomb empty. Two disciples on the road to Emmaus walk with the risen Jesus without recognizing him until he breaks bread. Jesus appears to the disciples, opens their minds to scripture, and ascends.", "lessons": ["Sometimes the risen Christ is walking with you and you don't see it yet.", "Scripture makes sense in light of the resurrection (v. 27). The whole story bends toward Christ.", "His mission continues through them — \"you are witnesses of these things\" (v. 48)."], "tension": "The Emmaus story is sometimes preached as a guarantee that Jesus walks with every grieving believer in identifiable ways. He may, but the text makes no such promise to repeat. Read it as testimony, not template."}, "acts_1": {"summary": "Jesus appears for forty days, commissions the disciples to be witnesses, and ascends. They wait in Jerusalem and pray, choosing Matthias to replace Judas.", "lessons": ["The mission is global from the start — \"Jerusalem, Judea, Samaria, and the ends of the earth\" (v. 8).", "Waiting and prayer come before action.", "Following Jesus is not a solo project — they replaced Judas because the team mattered."], "tension": "\"Why do you stand looking up?\" The early disciples were tempted to stargaze instead of move. Devotion can become a way to avoid the work it should empower."}, "acts_2": {"summary": "The Spirit comes at Pentecost. Disciples speak in many languages. Peter preaches; about 3,000 are baptized. The early community shares everything, devotes itself to teaching, fellowship, breaking bread, and prayer.", "lessons": ["The Spirit empowers ordinary disciples for extraordinary witness.", "The first sermon was about Jesus crucified and risen — not religion, ethics, or politics.", "Authentic community shares — possessions, meals, prayer, life."], "tension": "The pooled possessions in Acts 2 have been used both to justify and to dismiss Christian socialism. The text describes voluntary generosity within a specific community in crisis, not a universal economic blueprint."}, "acts_3": {"summary": "Peter and John heal a lame man at the temple gate. Peter preaches in Solomon's Portico, calling people to repentance and faith in Jesus.", "lessons": ["\"Silver and gold I do not have, but what I have I give\" (v. 6) — what you have to give may not be money.", "Healing is not about Peter's power but Jesus' name.", "Repentance brings \"times of refreshing from the presence of the Lord\" (v. 19)."], "tension": "The man was lame from birth and was healed. Most lame people in Jerusalem that day were not. Don't read this as a promise that all healing happens on demand. Acts itself shows Paul leaving Trophimus sick (2 Tim 4:20)."}, "acts_4": {"summary": "Peter and John are arrested for preaching the resurrection. Before the Sanhedrin, Peter declares: \"There is no other name under heaven by which we must be saved.\" The believers pray for boldness and the place is shaken.", "lessons": ["The boldness of the apostles came from being with Jesus (v. 13).", "\"We must obey God rather than men\" — there are limits to civic compliance.", "Persecution drove them to prayer, not to despair."], "tension": "Acts 4:12 is one of Christianity's most controversial verses in pluralistic settings. Don't soften it past recognition; don't deploy it as a club. Hold it as Peter held it: under arrest, in love, before authorities."}, "acts_5": {"summary": "Ananias and Sapphira lie about their gift and die. Apostles perform many signs. They are arrested again; an angel frees them. Gamaliel advises caution: \"if it is of God, you will not be able to overthrow it.\"", "lessons": ["Lying to God in the name of community generosity is its own kind of sin.", "Gamaliel's wisdom: if a movement is human, it dies on its own; if it is from God, opposition fails.", "The apostles \"rejoiced that they were counted worthy to suffer\" (v. 41) — a posture worth examining."], "tension": "The Ananias and Sapphira story is uncomfortable. It is not a template for church discipline today. It is a one-time, foundational moment showing that the new community would not be built on lies."}, "acts_6": {"summary": "A dispute arises over the daily food distribution to widows. Seven men are appointed to handle it, freeing the apostles for prayer and preaching. Stephen, one of the seven, is seized for blasphemy.", "lessons": ["Practical complaints in church are not distractions from spiritual work — they require leaders.", "Delegation is not a failure of leadership but a feature of it.", "The same Stephen who served tables also became the church's first martyr — service and witness fused."], "tension": "The \"first deacons\" model has been read in many ways across traditions. Don't get too tangled in offices. The text shows a flexible community sorting practical problems with spiritual seriousness."}, "acts_7": {"summary": "Stephen recounts Israel's story before the Sanhedrin — Abraham, Joseph, Moses, the prophets — showing how Israel repeatedly rejected the messengers God sent. He calls his hearers stiff-necked. They stone him to death; he prays for their forgiveness as he dies.", "lessons": ["Stephen reads Israel's history as a pattern of rejecting God's messengers, ending with Jesus.", "His final prayer — \"do not hold this sin against them\" — echoes Jesus on the cross.", "Saul stood there, watching."], "tension": "Stephen's speech has been weaponized for anti-Jewish theology. Stephen is a Jew speaking to Jewish leaders about Jewish history — it is internal critique, not a Gentile attack on a foreign people. Read it that way."}, "acts_8": {"summary": "Persecution scatters Christians. Philip preaches in Samaria. Simon the magician tries to buy spiritual power. Philip is led to baptize an Ethiopian eunuch on the road to Gaza.", "lessons": ["Persecution didn't kill the church — it spread it.", "Spiritual power is not for sale (v. 20).", "The Spirit leads people to specific encounters — Philip didn't choose the road; he was sent."], "tension": "The eunuch's question \"what prevents me from being baptized?\" was about a man explicitly excluded from temple worship. The barrier was real; the gospel removed it. Don't miss the radicalism."}, "acts_9": {"summary": "Saul, persecuting Christians, is met by the risen Christ on the road to Damascus. He is blinded, then healed by Ananias, baptized, and begins preaching Jesus. Peter heals Aeneas and raises Tabitha.", "lessons": ["Christ confronts his persecutors face-to-face, not just symbolically.", "Ananias was right to be wary, and right to obey anyway.", "Conversion does not mean immediate trust from those you previously hurt — Saul had to earn it (v. 26)."], "tension": "Don't expect every conversion to come with a Damascus-road dramatic event. Most don't. Paul's was visible; most are quiet. The point is the new direction, not the spectacle."}, "acts_10": {"summary": "Cornelius, a God-fearing Roman centurion, has a vision. Peter has a vision telling him not to call any food unclean. Peter visits Cornelius' household; the Spirit falls on the Gentiles; they are baptized.", "lessons": ["God shows no partiality — \"in every nation anyone who fears him is acceptable\" (v. 35).", "Sometimes God works on both ends of a meeting before the people involved know what's coming.", "The Spirit can move on people you didn't think were ready, in front of people who didn't think they should be there."], "tension": "The \"unclean food\" vision was about people, not just diet. Apply carefully — not every food taboo is now Christian liberty, and not every cultural inclusion now is a fresh Acts 10."}, "acts_11": {"summary": "Peter is criticized for eating with Gentiles. He explains his vision and the Spirit's outpouring; the Jerusalem leaders accept it. Believers in Antioch begin reaching Greeks; the church there sends relief to Judea during a famine.", "lessons": ["Even Peter had to defend the inclusion of Gentiles to other Christians.", "Disciples were first called \"Christians\" in Antioch — a name given by outsiders, marking them as Christ-followers.", "When one part of the church suffered, another part sent help."], "tension": "Peter changed his practice based on what God did, not on his own preferences. That kind of obedience often confuses other Christians. Be willing to be misunderstood by your own team."}, "acts_12": {"summary": "Herod kills James. Peter is arrested; the church prays earnestly; an angel frees him. Herod, accepting praise as a god, is struck down.", "lessons": ["Two faithful apostles, two outcomes: James died, Peter was rescued. God's sovereignty is not a formula.", "Earnest prayer is a real instrument in God's hands.", "Pride that accepts divine honor for itself courts disaster."], "tension": "Don't read the chapter as proof that earnest enough prayer always rescues. James' death is in the same chapter. Both are the sovereign work of the same God."}, "acts_13": {"summary": "The Antioch church sends Paul and Barnabas. They preach in Cyprus and Pisidian Antioch. Paul confronts a sorcerer, then preaches in a synagogue — many believe, including Gentiles, but Jewish leaders incite opposition.", "lessons": ["Mission begins in worship and fasting (v. 2). The Spirit speaks where the church is listening.", "Paul preaches the resurrection as the decisive proof of who Jesus is.", "Rejection by some becomes opening to others — \"we are turning to the Gentiles\" (v. 46)."], "tension": "The pattern of rejection-then-Gentile-mission has been used to fuel supersessionism (the church replacing Israel). Paul does not say that here. He keeps preaching to Jews everywhere he goes; Romans 9–11 still wrestles with the question."}, "acts_14": {"summary": "Paul and Barnabas are mistaken for gods in Lystra; Paul is then stoned and left for dead. They appoint elders in each church and return to Antioch reporting all God had done.", "lessons": ["Crowds swing fast — gods one day, attempted murder victims the next.", "Paul and Barnabas refused divine credit even when offered it (v. 15).", "Establishing leadership before leaving was part of mission, not an afterthought."], "tension": "Paul's stoning isn't followed by a triumphant healing narrative — he just gets up and keeps going. Some Christian suffering doesn't get the dramatic vindication. It just gets endured and continued."}, "acts_15": {"summary": "The Jerusalem Council debates whether Gentile believers must be circumcised and follow the law of Moses. They decide no, asking only for a few practices that ease fellowship between Jews and Gentiles. Paul and Barnabas later split over whether to take Mark.", "lessons": ["Major theological questions can be worked out by leaders together — not by individual edict.", "Gentiles are not second-class Christians who must adopt Jewish practice.", "Even apostles disagreed sharply (Paul/Barnabas) and the work continued through both."], "tension": "The Council's decision is not a model for every modern church dispute. It is a model of process: scripture, testimony, mission consideration, and shared judgment. Don't extract its specific decisions; learn its method."}, "acts_16": {"summary": "Paul takes Timothy. The Spirit redirects them to Macedonia. Lydia is converted in Philippi. Paul casts out a fortune-telling spirit and is jailed; an earthquake opens the prison; the jailer is converted.", "lessons": ["Sometimes God closes doors to point you to a different one (v. 7).", "The first European convert was a businesswoman, not a religious official.", "Paul and Silas sang in prison before the earthquake came. Worship before deliverance."], "tension": "The jailer's \"what must I do to be saved?\" is one of the few cases of an explicit answer in scripture (\"believe in the Lord Jesus\"). It is the answer; it is not a salvation formula to apply to everyone identically."}, "acts_17": {"summary": "Paul preaches in Thessalonica and Berea (\"the Bereans examined the scriptures daily\"). In Athens, he engages Stoic and Epicurean philosophers, points to their altar \"to an unknown god,\" and proclaims Christ and the resurrection.", "lessons": ["Examining scripture for yourself — even checking the apostle — is a faithful posture (v. 11).", "Paul met cultures on their own terms, quoting their poets, before pointing to Christ.", "The resurrection was the dividing line — not God in general, but Jesus risen from the dead."], "tension": "The \"meeting people where they are\" reading of Acts 17 has sometimes turned into shapeless cultural accommodation. Paul did meet them; he also called them to repent and named Christ. The bridge has to lead somewhere."}, "acts_18": {"summary": "Paul stays in Corinth eighteen months, working as a tentmaker with Priscilla and Aquila. He preaches in synagogues until opposition forces him out. He visits other cities; Apollos is mentored by Priscilla and Aquila in Ephesus.", "lessons": ["Apostolic ministry was funded partly by Paul's own labor — tentmaking and gospel work were not enemies.", "Priscilla and Aquila — a couple — quietly trained one of the church's most gifted teachers.", "Mentoring matters as much as preaching."], "tension": "Paul's \"I will go to the Gentiles\" line in Corinth is sometimes used to support pulling away from people who reject the gospel. Read carefully — he kept preaching to Jews wherever he went next. The line was situation-specific."}, "acts_19": {"summary": "Paul ministers two years in Ephesus. Many burn their occult books. The silversmiths riot, fearing the gospel will hurt Artemis-tied business. The town clerk dismisses the crowd.", "lessons": ["Real conversion shows up in what people stop doing — they burned valuable books.", "The gospel often runs into entrenched economic interests, not just religious ones.", "The riot wasn't about truth; it was about lost income (v. 27)."], "tension": "Don't assume that opposition is always proof of faithfulness. Sometimes it is. Sometimes Christians make themselves the issue. The Ephesus opposition was caused by Christ's actual reach — not Paul's personality."}, "acts_20": {"summary": "Paul revives Eutychus, who fell from a window during a long sermon. He gives a farewell speech to the Ephesian elders, predicting hardship and warning against false teachers from within. \"It is more blessed to give than to receive.\"", "lessons": ["Even good preachers can preach too long — Paul did it once, and a young man fell.", "False teachers most often arise from within (v. 30).", "Service for Jesus often costs more than money — \"I do not count my life of any value\" (v. 24)."], "tension": "Paul's farewell is sometimes turned into a romantic vision of pastoral martyrdom. Read it instead as honest leadership — naming what was coming, including financial integrity (\"I coveted no one's silver,\" v. 33)."}, "acts_21": {"summary": "Despite warnings, Paul travels to Jerusalem. He participates in a temple rite to show his ongoing respect for Jewish custom. A riot erupts; Paul is arrested.", "lessons": ["The Spirit can warn without forbidding — Paul went anyway, and the friends accepted his decision (\"the will of the Lord be done,\" v. 14).", "Paul's gospel didn't require him to disrespect his own heritage.", "Mob accusations can be vague and contradictory; due process matters."], "tension": "Paul's decision to go to Jerusalem despite prophetic warnings has been read both ways — was he obedient or stubborn? The text doesn't fully resolve it. Sometimes faithful people make hard calls in the dark."}, "acts_22": {"summary": "Paul addresses the crowd in Hebrew, recounting his Damascus-road conversion and his commission to the Gentiles. The crowd erupts when he mentions the Gentile mission. He uses his Roman citizenship to avoid flogging.", "lessons": ["Personal testimony is a powerful tool — Paul used his often.", "The word \"Gentiles\" was the trigger that drove the crowd over the edge — gospel inclusion is not always welcome.", "Citizenship rights are legitimate to use, even by Christians under persecution."], "tension": "Paul's appeal to Roman citizenship is not a counterargument to Christian non-resistance. He never appealed to violence; he appealed to law. Use the framework you have to protect mission, not to dominate."}, "acts_23": {"summary": "Paul before the Sanhedrin divides the Pharisees and Sadducees over the question of resurrection. A plot to kill him is uncovered by his nephew. He is moved to Caesarea under heavy guard.", "lessons": ["Paul was a strategic communicator — he knew where his audience's fault lines were.", "God uses ordinary providences (a young nephew's tip-off) to preserve mission.", "Resurrection remained the central issue dividing him from his accusers."], "tension": "Paul's tactical division of the council can look manipulative. The text presents it as truthful (he was a Pharisee, and resurrection was the issue) — but he also knew it would create chaos. Honesty deployed strategically is still honesty."}, "acts_24": {"summary": "Paul stands trial before Felix the governor. He defends himself, answering the charges and reasoning with Felix about \"righteousness, self-control, and the coming judgment.\" Felix is afraid but procrastinates, hoping for a bribe; Paul stays in prison two years.", "lessons": ["\"A clear conscience toward God and people\" (v. 16) is something Paul actively maintained.", "Conviction without repentance is just discomfort — Felix was alarmed and did nothing.", "Sometimes faithful witnesses sit in prison for years without resolution."], "tension": "Paul's two years in custody under Felix don't get a triumphant chapter. They were just slow. Don't measure faithfulness by visible result; some seasons God uses are quiet and long."}, "acts_25": {"summary": "Paul appeals to Caesar, ensuring his case will go to Rome. Festus consults Herod Agrippa, who agrees to hear Paul.", "lessons": ["Paul used the legal system to push his mission — appealing to Caesar got him to Rome.", "Even minor administrative decisions become tools in God's larger purposes.", "Festus admits he has no real charge against Paul (v. 27) — innocence does not always mean release."], "tension": "Paul's strategic legal moves remind us that faith is not opposed to careful planning. Don't read \"trust God\" as \"don't think.\" He did both."}, "acts_26": {"summary": "Paul gives his fullest defense before Agrippa, recounting his conversion and mission. Agrippa replies, \"In a short time would you persuade me to be a Christian?\" Paul responds, \"I would to God that whether short or long, all who hear me today might become as I am — except for these chains.\"", "lessons": ["Paul's testimony was Christ-centered, not self-centered, even though he is telling his own story.", "He told his story to people who could free him without softening the gospel call.", "Agrippa's \"almost\" was a tragedy — almost is not yes."], "tension": "\"In a short time\" is sometimes preached as Agrippa being on the brink of conversion. The Greek is ambiguous and may be sarcastic. Don't read every \"almost\" as nearly there; many were not."}, "acts_27": {"summary": "Paul, prisoner, sails for Rome. The ship is caught in a storm for two weeks. Paul, ignored at first, eventually leads — encouraging the crew, urging them to eat. The ship runs aground; everyone survives.", "lessons": ["Christian leadership often emerges in crisis from people without official authority.", "Paul respected practical action — he urged people to eat, even as he gave a spiritual message.", "God's deliverance can be \"all 276 made it to land,\" even when it costs the ship."], "tension": "The promise that all on board would be saved didn't mean comfort — the ship was lost, the journey delayed, the prisoner Paul still in chains. Salvation in this chapter is survival, not triumph."}, "acts_28": {"summary": "Paul reaches Malta, is bitten by a viper without harm, heals the chief's father, and finally reaches Rome. He preaches there for two years \"with all boldness and without hindrance\" — and Acts ends without telling us what happens next.", "lessons": ["The unfinished ending is the point — the mission keeps going.", "Paul preached in chains in Rome and the gospel kept moving.", "\"With all boldness and without hindrance\" — the closing words say nothing kept the message from going forward."], "tension": "Acts ends without a tidy resolution. Paul's eventual martyrdom isn't even narrated. Luke seems to want you to feel the story is still being written — and your part in it matters."}, "gen_1_3": {"summary": "Genesis 1–3 tells how God created the world good, made humans in his image, and gave them work and dignity. Adam and Eve, tempted by the serpent, distrust God and break the one boundary they were given. Death and broken relationships enter the world — but God already speaks of an offspring who will crush the serpent.", "lessons": ["Humans are made in God's image — male and female — with inherent worth, not earned status.", "The first human sin was distrust of God's word and character, not a list of behaviors.", "Even in the curse, there is a seed of promise (3:15) — the rest of the Bible follows that thread."], "tension": "Christians have read these chapters in many ways — literal, literary, both. Don't get so tangled in age-of-the-earth debates that you miss the spiritual truths the text most insists on: God created, humans are made in his image, sin entered through distrust."}, "gen_12": {"summary": "God calls Abram out of his country, promising land, descendants, and that through him all nations will be blessed. Abram obeys. In Egypt during a famine, he passes off his wife as his sister out of fear — and God protects them in spite of his failure.", "lessons": ["God's calling almost always involves leaving something familiar.", "The promise to Abram included blessing for all peoples — Israel was always for the world.", "Even the patriarch had a real failure of faith almost immediately. God's plan held anyway."], "tension": "Don't romanticize Abraham. Genesis is honest about his fear, his lies, his manipulation. Faith and failure ran in the same person — and the story keeps going through both."}, "gen_22": {"summary": "God tests Abraham, telling him to sacrifice his son Isaac. Abraham obeys; at the last moment God provides a ram instead. The mountain is named \"the Lord will provide.\"", "lessons": ["Real faith is willing to surrender what God has given — even what God promised.", "God provides the substitute. The ram in the thicket prefigures the lamb of God in John 1:29.", "The hardest tests of faith are usually about whether you trust God's character, not about whether you have enough belief."], "tension": "This text has horrified readers for centuries — and has been used to justify dangerous sacrifices. Read it carefully: God stops Abraham. The point is not that God demands child sacrifice — the surrounding cultures did, and Israel was being weaned from that. God provides what he could have demanded."}, "exo_1_3": {"summary": "Israel multiplies in Egypt. A new pharaoh enslaves them and orders Hebrew boys killed. Moses is rescued and raised in the palace. After killing an Egyptian and fleeing, he meets God in a burning bush and is sent back to Pharaoh.", "lessons": ["God hears the cry of the oppressed (3:7) — even when
