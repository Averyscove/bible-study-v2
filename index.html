it seems he's silent.", "Moses' qualifications — palace upbringing, wilderness years — were both shaped by God before the call came.", "\"I AM WHO I AM\" (3:14) — God names himself by his being, not by his function."], "tension": "The 80-year delay before Moses' call has been used to romanticize \"God's timing.\" That's true, but it's also a reminder that for the slaves in Egypt those decades were brutal. God's patience is not a comforting abstraction — it costs."}, "exo_12": {"summary": "The first Passover: Israel kills a lamb, smears its blood on their doorposts, and the death angel passes over their homes. Pharaoh finally lets Israel go. They leave by night, eating in haste.", "lessons": ["Salvation comes through the death of a substitute — the lamb in your place.", "Passover became Israel's defining memory. Identity is shaped by what you remember.", "Bread without yeast — leaving in haste. Sometimes God's deliverance doesn't wait for you to be ready."], "tension": "Christians often read Passover backward through the cross. Don't lose what it meant first — a real act of God for a real enslaved people. The cross fulfills it; it does not erase it."}, "exo_20": {"summary": "God gives the Ten Commandments at Sinai: no other gods, no idols, honor God's name, keep the Sabbath, honor parents, do not murder, no adultery, no stealing, no lying, no coveting.", "lessons": ["The commandments begin with God's identity (\"I am the Lord your God\") — relationship before requirement.", "Worship and ethics are not separable — the first four commands shape the next six.", "Coveting is a heart command — sin is internal, not just external."], "tension": "The Ten Commandments have been treated both as the eternal moral law and as Old Covenant artifacts replaced by Christ. Most Christians hold a middle path: their moral force continues; their ceremonial framing was fulfilled. Hold both with care."}, "psa_23": {"summary": "David's psalm of trust. The Lord is my shepherd. Even in the valley of the shadow of death, I will fear no evil. Goodness and mercy will follow me all my days.", "lessons": ["God's care is intimately personal — \"my\" shepherd, not just a shepherd.", "The valley is part of the path, not a detour. God walks with you through it.", "Goodness and mercy don't precede you; they follow you. Even your failures don't outpace God's care."], "tension": "Psalm 23 is most often read at funerals. It can become wallpaper. Read it as if for the first time — David wrote it as a king who knew enemies, betrayal, and grief. The comfort is hard-won."}, "psa_51": {"summary": "David's psalm of repentance after his adultery with Bathsheba and the murder of her husband. He doesn't make excuses. He pleads for mercy, a clean heart, the Spirit not to be taken from him, and a contrite spirit as the offering God wants.", "lessons": ["Real repentance starts with naming the sin specifically — David doesn't generalize.", "God wants a broken and contrite heart more than a religious offering (v. 17).", "Forgiveness restores joy — but renewal is a process: \"create in me a clean heart\" (v. 10)."], "tension": "Don't romanticize David's fall. He sinned grievously and the consequences in 2 Samuel were severe. Forgiveness from God did not erase the wreckage among people."}, "psa_91": {"summary": "Whoever dwells in the shelter of the Most High will rest in his shadow. He will deliver you from snare and disease. Angels will bear you up. \"With long life I will satisfy him.\"", "lessons": ["Trust is the posture, not formula — \"because he loves me, I will rescue him\" (v. 14).", "God's protection is real, even when it doesn't look like absence of trouble.", "Faith \"under his wings\" is sheltered, not invulnerable."], "tension": "Satan quoted Psalm 91 to Jesus in the wilderness as a temptation. Don't use this psalm to test God — \"jump and you'll be caught.\" It is a promise of protection in the calling, not a prosperity guarantee for every prayer."}, "pro_1": {"summary": "Proverbs opens with the purpose of the book — to give wisdom and understanding. \"The fear of the Lord is the beginning of knowledge.\" A father warns his son against the lure of bad company, while wisdom cries out in the streets to those who will listen.", "lessons": ["Wisdom starts with reverence for God, not raw IQ.", "Beware company that promises easy gain — \"come with us, let us lie in wait for blood\" (v. 11).", "Wisdom calls out publicly. People who reject her don't lack access; they lack response."], "tension": "Proverbs makes promises (\"if you accept my words…you will find the knowledge of God\") that read like guarantees. The book's own ending (Job, Ecclesiastes) complicates them. Read Proverbs as wise generalizations about how the world tends to work — not contractual guarantees."}, "pro_3": {"summary": "Trust in the Lord with all your heart and lean not on your own understanding. Honor God with your wealth. Do not despise the Lord's discipline. Wisdom is more profitable than silver.", "lessons": ["Trusting God includes acknowledging him in all your ways (v. 6) — not compartmentalized faith.", "God's discipline is evidence of love, not rejection (v. 12).", "Real wealth is wisdom — most things people chase are downstream of it."], "tension": "\"Trust in the Lord with all your heart\" can become a way to avoid hard thinking. Proverbs is a book of careful observation. Trusting God doesn't mean turning your brain off — it means using it under his rule."}, "isa_9": {"summary": "In a time of darkness, Isaiah promises a great light. A child will be born — \"Wonderful Counselor, Mighty God, Everlasting Father, Prince of Peace.\" His government will know no end, and the throne of David will be established forever.", "lessons": ["The promise of the Messiah came in a time of national despair, not strength.", "The titles given to him are divine — this is no ordinary king.", "Peace, in the biblical sense, is a kingdom that endures, not just a feeling."], "tension": "Christians read Isaiah 9 as fulfilled in Jesus. Jewish readers often see it as a prophecy still unfolding, or about Hezekiah, or both. Hold the New Testament's reading without dismissing the original Israelite hope it spoke to."}, "isa_52_53": {"summary": "The Servant Song. The servant is despised, rejected, a man of sorrows. \"He was pierced for our transgressions, crushed for our iniquities; the punishment that brought us peace was on him, and by his wounds we are healed.\" He bore the sin of many.", "lessons": ["The Messiah was foretold as a sufferer, not a conquering hero.", "Substitution is not a New Testament invention — Isaiah named it 700 years earlier.", "Silence under suffering is not weakness — \"like a sheep before its shearers\" was the strength of the servant."], "tension": "Christians read Isaiah 53 as the clearest Old Testament portrait of Christ's death. Many Jewish interpreters read the servant as Israel itself — a faithful people suffering on behalf of the nations. Both readings have merit. The chapter does not have to mean only one thing to mean what Christians say it does about Jesus."}, "mv_john_3_16": {"summary": "God's love for the world is so deep that he gave his one and only Son, so that whoever believes in him would not perish but have eternal life.", "lessons": ["God's love is the cause of the gospel, not its effect.", "Faith — not effort — is the means of receiving eternal life.", "The offer is universal: \"whoever\" — no one is excluded by category."], "tension": "John 3:16 has become so familiar that its scandal can be lost: God did not just send a message, he gave his Son. Don't let memorization fade the cost."}, "mv_john_14_6": {"summary": "Jesus answers Thomas: \"I am the way, and the truth, and the life. No one comes to the Father except through me.\"", "lessons": ["Jesus does not point at a way; he claims to be it.", "Truth, life, and access to God are concentrated in his person, not just his teaching.", "The exclusivity of the claim is the cost — he is the way, not a way."], "tension": "This verse is comfort to anxious disciples and offense to pluralistic culture. Hold both. Jesus said it in a tender moment to people he was about to leave, not as a debate weapon."}, "mv_rom_3_23": {"summary": "All have sinned and fall short of the glory of God.", "lessons": ["The diagnosis is universal — there is no \"better\" group.", "Sin isn't only what you've done; it's what you've fallen short of (the glory of God).", "Honest acknowledgment of this is the doorway into the gospel."], "tension": "Quoted alone, this verse is bad news. Quoted alongside Romans 3:24, it is the setup for grace. Always pair them when you teach this."}, "mv_rom_5_8": {"summary": "God shows his love for us in this: while we were still sinners, Christ died for us.", "lessons": ["God did not wait for us to be lovable.", "The cross is the proof of God's love, not just the consequence of sin.", "Love that waits for the beloved to deserve it is not what scripture means by love."], "tension": "Don't let \"while we were still sinners\" become a romantic abstraction. The actual condition was active rebellion, not just imperfection. The grace is bigger than sentimentality can hold."}, "mv_rom_6_23": {"summary": "The wages of sin is death, but the free gift of God is eternal life in Christ Jesus our Lord.", "lessons": ["Sin pays — and what it pays is death.", "Eternal life is a gift, not a paycheck.", "The contrast is total: wages vs. gift, death vs. life."], "tension": "\"Free gift\" gets quoted to dismiss the cost. The gift was free to you because it was bought by Christ at his own expense. Free is not cheap."}, "mv_rom_8_1": {"summary": "There is therefore now no condemnation for those who are in Christ Jesus.", "lessons": ["The believer's standing before God is settled, not fluctuating with mood or performance.", "\"In Christ\" is the location of safety — not in your own consistency.", "Now means now. Not eventually. Not after enough good days."], "tension": "Some traditions add the second half (\"who walk not according to the flesh\") and use it to condition the promise on behavior. Most modern translations note this clause appears later. The unconditional reading is truer to Paul's argument and to comfort an anxious conscience."}, "mv_eph_2_8_9": {"summary": "By grace you have been saved through faith. This is not your own doing; it is the gift of God — not a result of works, so that no one may boast.", "lessons": ["Grace is the source; faith is the channel; salvation is the gift.", "Even your faith is something received, not produced.", "Boasting has no place in Christian identity."], "tension": "Verse 10 — usually skipped — says \"created in Christ Jesus for good works.\" Grace removes works as the cause of salvation, not as the consequence of it. Hold both verses together."}, "mv_psa_23_1": {"summary": "The Lord is my shepherd; I shall not want.", "lessons": ["God's care is personal — \"my\" shepherd.", "Contentment is rooted in who is leading, not what you have.", "\"I shall not want\" is a confession of faith more than an inventory."], "tension": "\"I shall not want\" doesn't mean nothing will be missing — David himself wanted things he didn't always get. It means the deepest hunger has a Shepherd, even when surface hungers don't."}};
</script>
<script>

const PLAN = [
  { id: 'phase1', title: 'Meet Jesus Directly', book: 'Gospel of John',
    purpose: 'Understand who Jesus is, why He came, His death, and His resurrection.',
    items: [
      { id: 'john_1',  title: 'John 1',  subtitle: 'Who Jesus is' },

      { id: 'john_7',  title: 'John 7',  subtitle: 'Jesus’ teaching' },
      { id: 'john_8',  title: 'John 8',  subtitle: 'Truth and freedom' },
      { id: 'john_9',  title: 'John 9',  subtitle: 'Healing the blind man' },
      { id: 'john_10', title: 'John 10', subtitle: 'The good shepherd' },
      { id: 'john_11', title: 'John 11', subtitle: 'Lazarus raised' },

      { id: 'john_14', title: 'John 14', subtitle: 'The way, the truth, and the life' },
      { id: 'john_15', title: 'John 15', subtitle: 'Abiding in Christ' },
      { id: 'john_16', title: 'John 16', subtitle: 'The Holy Spirit and coming sorrow / joy' },
      { id: 'john_17', title: 'John 17', subtitle: 'Jesus’ prayer' },

// Estimate read time per chapter (words / 200 wpm + 60s pad for reflection)
const READING_WPM = 200;
function estimateReadMinutes(data) {
  if (!data) return 3;
  const words = data.verses.reduce((a, v) => a + v.text.split(/\s+/).length, 0);
  return Math.max(2, Math.round(words / READING_WPM));
}

/* =================== State =================== */
const STORAGE_KEY = 'biblestudy_v1';  // keep v1 key so existing data carries over
const state = loadState();
let saveTimer = null;
let remoteSaveTimer = null;
let currentUser = null;       // { uid, email } or null
let authReady = false;        // true once initial auth state is known
let initialSyncDone = false;  // true after we've reconciled local + remote on login
let syncStatus = 'idle';      // 'idle' | 'syncing' | 'synced' | 'error' | 'offline-only'
let authMode = 'signin';      // 'signin' | 'signup' | 'forgot'
let authMessage = null;       // { type: 'error'|'success', text: string }

function defaultState() {
  return {
    progress: {}, notes: {}, memory: {}, coreMessage: {}, readQ: {},
    settings: { voice: '', rate: 0.95, fontSize: 18, theme: 'auto', repeatVerse: false },
    lastViewed: null,
    bookmarks: {},
    streak: { lastDate: null, current: 0, max: 0, days: {} },
    readTime: {},
    updatedAt: 0,
    // v2 community: cached locally for fast renders, source of truth lives in /profiles & /groups
    community: {
      profile: null,            // { displayName, bio, level, favoriteBooks, joinedAt }
      memberships: {},          // { [gid]: { role, joinedAt } }
      mutedUsers: {},           // { [uid]: true } — local mute, doesn't sync
      lastSeen: {},             // { [gid]: timestamp } — for "new posts since you last visited"
    },
  };
}
function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return Object.assign(defaultState(), JSON.parse(raw));
  } catch (e) {}
  return defaultState();
}
function persist({ skipRemote = false } = {}) {
  state.updatedAt = Date.now();
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) {}
  }, 250);
  if (!skipRemote && currentUser && initialSyncDone) scheduleRemoteSave();
}
function scheduleRemoteSave({ immediate = false } = {}) {
  clearTimeout(remoteSaveTimer);
  const delay = immediate ? 0 : 1200;
  remoteSaveTimer = setTimeout(() => doRemoteSave(), delay);
}
async function doRemoteSave() {
  if (!currentUser || !window.bsDb?.available) return;
  setSync('syncing');
  const result = await window.bsDb.saveUser(currentUser.uid, snapshotForSave());
  if (result?.error) setSync('error');
  else { setSync('synced'); state.lastSyncedAt = Date.now(); }
}
async function flushRemoteSave() {
  // Cancel pending debounce and save right now
  if (remoteSaveTimer) { clearTimeout(remoteSaveTimer); remoteSaveTimer = null; await doRemoteSave(); }
}
async function manualSyncNow() {
  if (!currentUser || !window.bsDb?.available) {
    toast('Sign in to sync across devices');
    return;
  }
  setSync('syncing');
  // Pull remote first
  const remote = await window.bsDb.loadUser(currentUser.uid);
  // Merge with local — guarantees no data loss in either direction
  const merged = mergeStates(state, remote);
  const remoteWasNewer = remote && (remote.updatedAt || 0) > (state.updatedAt || 0);
  applyMerged(merged);
  state.updatedAt = Date.now();
  state.lastSyncedAt = Date.now();
  // Push merged state back so cloud has the union
  await window.bsDb.saveUser(currentUser.uid, snapshotForSave());
  setSync('synced');
  render();
  toast(remoteWasNewer ? 'Synced — pulled and merged ✓' : 'Synced — your data is in the cloud ✓');
}
function snapshotForSave() {
  // Don't sync the local-only audio voice (different devices have different voices)
  const { settings, ...rest } = state;
  const { voice, ...syncSettings } = settings || {};
  return { ...rest, settings: syncSettings };
}
function setSync(status) {
  syncStatus = status;
  // Update the chip in place if visible
  const chip = document.querySelector('.sync-chip');
  if (!chip) return;
  chip.classList.remove('syncing', 'error');
  if (status === 'syncing') chip.classList.add('syncing');
  if (status === 'error') chip.classList.add('error');
}

/* =================== Date helpers =================== */
function today() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function daysBetween(a, b) {
  return Math.round((new Date(b) - new Date(a)) / 86400000);
}
function updateStreakOnRead() {
  const t = today();
  if (state.streak.days[t]) return; // already counted today
  state.streak.days[t] = true;
  if (state.streak.lastDate) {
    const gap = daysBetween(state.streak.lastDate, t);
    if (gap === 1) state.streak.current = (state.streak.current || 0) + 1;
    else if (gap === 0) {} // shouldn't happen
    else state.streak.current = 1;
  } else {
    state.streak.current = 1;
  }
  state.streak.max = Math.max(state.streak.max || 0, state.streak.current);
  state.streak.lastDate = t;
  persist();
}
function currentStreakAdjusted() {
  // If they haven't read today and didn't read yesterday, streak is 0.
  if (!state.streak.lastDate) return 0;
  const gap = daysBetween(state.streak.lastDate, today());
  if (gap > 1) return 0;
  return state.streak.current || 0;
}

/* =================== TTS =================== */
const tts = {
  voices: [], utter: null, isPlaying: false,
  currentChunkIdx: 0, chunks: [], onIndex: null, repeatVerse: false,
  loadVoices() {
    if (!('speechSynthesis' in window)) return;
    this.voices = speechSynthesis.getVoices().filter(v => v.lang.startsWith('en'));
    if (this.voices.length === 0) {
      speechSynthesis.onvoiceschanged = () => {
        this.voices = speechSynthesis.getVoices().filter(v => v.lang.startsWith('en'));
        document.querySelectorAll('select[id^="voice-select"]').forEach(el => populateVoices(el));
      };
    }
  },
  pickVoice() {
    const saved = state.settings.voice;
    if (saved) { const v = this.voices.find(v => v.name === saved); if (v) return v; }
    const preferred = ['Samantha','Daniel','Karen','Moira','Tessa','Allison','Ava','Tom',
                       'Google US English','Microsoft Aria','Microsoft Guy'];
    for (const n of preferred) { const v = this.voices.find(x => x.name.includes(n)); if (v) return v; }
    return this.voices.find(v => v.lang === 'en-US') || this.voices[0] || null;
  },
  stop() {
    speechSynthesis.cancel();
    this.isPlaying = false;
    this.currentChunkIdx = 0;
    this.chunks = [];
    if (this.onIndex) this.onIndex(-1);
  },
  speak(chunks, onIndex, opts = {}) {
    this.stop();
    if (!chunks.length) return;
    this.chunks = chunks;
    this.onIndex = onIndex;
    this.currentChunkIdx = opts.startIdx || 0;
    this.isPlaying = true;
    this.repeatVerse = !!opts.repeatVerse;
    this._speakNext();
  },
  _speakNext() {
    if (this.currentChunkIdx >= this.chunks.length) {
      this.isPlaying = false;
      if (this.onIndex) this.onIndex(-1);
      return;
    }
    const u = new SpeechSynthesisUtterance(this.chunks[this.currentChunkIdx]);
    const v = this.pickVoice();
    if (v) u.voice = v;
    u.rate = state.settings.rate || 0.95;
    u.pitch = 1; u.volume = 1;
    u.onend = () => {
      if (this.repeatVerse && this.isPlaying) { /* stay on same chunk */ }
      else this.currentChunkIdx++;
      if (this.isPlaying) this._speakNext();
    };
    u.onerror = () => { this.currentChunkIdx++; if (this.isPlaying) this._speakNext(); };
    this.utter = u;
    if (this.onIndex) this.onIndex(this.currentChunkIdx);
    speechSynthesis.speak(u);
  }
};

/* =================== Routing =================== */
let view = { name: 'welcome' };
function setView(v) {
  view = { ...view, ...v, name: v.name };
  if (v.chapterId) state.lastViewed = { phaseId: v.phaseId, chapterId: v.chapterId };
  persist();
  tts.stop();
  // Stop reading-time tracker
  if (readingTimer.chapterId && readingTimer.chapterId !== v.chapterId) readingTimer.stop();
  // Tear down community listeners when leaving a group view
  if (v.name !== 'community-group' && communityListeners.size > 0) {
    teardownCommunityListeners();
  }
  render();
  window.scrollTo(0, 0);
  // Start tracker if we entered a chapter
  if (v.chapterId) readingTimer.start(v.chapterId);
  // Spin up community listeners on group entry
  if (v.name === 'community-group' && currentUser && state.community.profile?.displayName) {
    setupCommunityListeners(v.groupSlug);
  }
}

/* =================== Community listener lifecycle =================== */
// Active onSnapshot unsubscribe functions, keyed by purpose ('posts:gid', 'messages:gid', etc.)
const communityListeners = new Map();
// Real-time data caches keyed similarly
const communityCache = {
  posts: {},      // { [gid]: [...post docs] }
  messages: {},   // { [gid]: [...message docs] }
  memberCounts: {} // { [gid]: number }
};

function teardownCommunityListeners() {
  for (const [, unsub] of communityListeners) {
    try { unsub(); } catch (e) {}
  }
  communityListeners.clear();
}

async function setupCommunityListeners(gid) {
  if (!gid || !window.bsCommunityDb?.available) return;
  // If we already have listeners for this gid, nothing to do
  if (communityListeners.has(`posts:${gid}`)) return;
  teardownCommunityListeners();

  // Listen to discussion posts. The callback also wires up a reply listener
  // for each visible post (and tears down listeners for posts that are gone).
  const unsubPosts = window.bsCommunityDb.listenToPosts(gid, (posts) => {
    communityCache.posts[gid] = posts;
    syncRepliesListeners(gid, posts);
    if (view.name === 'community-group' && view.groupSlug === gid) render();
  });
  communityListeners.set(`posts:${gid}`, unsubPosts);

  // Listen to chat messages (descending order, newest first; we reverse for display).
  const unsubMessages = window.bsCommunityDb.listenToMessages(gid, (messages) => {
    communityCache.messages[gid] = messages;
    if (view.name === 'community-group' && view.groupSlug === gid && view.groupTab === 'chat') {
      render();
      // Auto-scroll the chat to the bottom on new messages
      requestAnimationFrame(() => {
        const list = document.querySelector('.chat-list');
        if (list) list.scrollTop = list.scrollHeight;
      });
    }
  });
  communityListeners.set(`messages:${gid}`, unsubMessages);

  // Refresh member count and current user's membership status
  refreshGroupMembership(gid);
}

// Reconcile reply listeners against the current post list:
// - Add a listener for any post that doesn't have one yet
// - Tear down listeners for posts that no longer exist
function syncRepliesListeners(gid, posts) {
  if (!communityCache.replies) communityCache.replies = {};
  const wantedKeys = new Set(posts.map(p => `replies:${gid}:${p.id}`));
  // Tear down stale
  for (const [key, unsub] of communityListeners) {
    if (key.startsWith(`replies:${gid}:`) && !wantedKeys.has(key)) {
      try { unsub(); } catch (e) {}
      communityListeners.delete(key);
    }
  }
  // Set up fresh
  for (const p of posts) {
    const key = `replies:${gid}:${p.id}`;
    if (communityListeners.has(key)) continue;
    const unsub = window.bsCommunityDb.listenToReplies(gid, p.id, (replies) => {
      communityCache.replies[p.id] = replies;
      if (view.name === 'community-group' && view.groupSlug === gid) render();
    });
    communityListeners.set(key, unsub);
  }
}

async function refreshGroupMembership(gid) {
  if (!currentUser || !window.bsCommunityDb?.available) return;
  const [count, isMember] = await Promise.all([
    window.bsCommunityDb.countMembers(gid),
    window.bsCommunityDb.isMember(gid, currentUser.uid)
  ]);
  communityCache.memberCounts[gid] = count;
  if (!state.community.memberships) state.community.memberships = {};
  if (isMember) {
    state.community.memberships[gid] = state.community.memberships[gid] || { role: 'member', joinedAt: Date.now() };
  } else {
    delete state.community.memberships[gid];
  }
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) {}
  if (view.name === 'community-group' && view.groupSlug === gid) render();
}

/* =================== Helpers =================== */
function findPhase(id) { return PLAN.find(p => p.id === id); }
function findItem(pid, cid) { const p = findPhase(pid); return p ? p.items.find(i => i.id === cid) : null; }
function findItemAndPhase(cid) { for (const p of PLAN) { const it = p.items.find(i => i.id === cid); if (it) return { phase: p, item: it }; } return null; }
function nextChapter(pid, cid) {
  const p = findPhase(pid);
  if (!p) return null;
  const idx = p.items.findIndex(i => i.id === cid);
  if (idx < p.items.length - 1) return { phaseId: pid, chapterId: p.items[idx+1].id };
  const pi = PLAN.findIndex(x => x.id === pid);
  if (pi < PLAN.length - 1) { const np = PLAN[pi+1]; return { phaseId: np.id, chapterId: np.items[0].id }; }
  return null;
}
function nextUnreadChapter() {
  for (const p of PLAN) for (const it of p.items)
    if (!isDone(it.id)) return { phaseId: p.id, chapterId: it.id };
  return null;
}
function isDone(id) { return !!(state.progress[id] && state.progress[id].done); }
function markDone(id, done = true) {
  if (done) {
    state.progress[id] = { done: true, doneAt: Date.now() };
    updateStreakOnRead();
  }
  else delete state.progress[id];
  persist();
  // Important state changes — push to cloud immediately, don't wait for debounce
  if (currentUser && initialSyncDone) scheduleRemoteSave({ immediate: true });
}
function phaseProgress(p) {
  const total = p.items.length;
  const done = p.items.filter(i => isDone(i.id)).length;
  return { done, total, pct: total ? done/total : 0 };
}
function totalProgress() {
  let total = 0, done = 0;
  for (const p of PLAN) { total += p.items.length; done += p.items.filter(i => isDone(i.id)).length; }
  return { done, total, pct: total ? done/total : 0 };
}
function guessBookKey(id) {
  if (id.startsWith('john_') || id.startsWith('mv_john')) return 'john';
  if (id.startsWith('romans_') || id.startsWith('mv_rom')) return 'romans';
  if (id.startsWith('luke_')) return 'luke';
  if (id.startsWith('acts_')) return 'acts';
  if (id.startsWith('gen')) return 'genesis';
  if (id.startsWith('exo')) return 'exodus';
  if (id.startsWith('psa') || id.startsWith('mv_psa')) return 'psalms';
  if (id.startsWith('pro')) return 'proverbs';
  if (id.startsWith('isa')) return 'isaiah';
  if (id.startsWith('mv_eph')) return 'ephesians';
  return null;
}
function bookmarkKey(chapterId, c, n) { return `${chapterId}|${c}|${n}`; }

/* =================== Reading time tracker =================== */
const readingTimer = {
  chapterId: null, startTs: 0,
  start(id) { this.stop(); this.chapterId = id; this.startTs = Date.now(); },
  stop() {
    if (!this.chapterId || !this.startTs) return;
    const sec = Math.round((Date.now() - this.startTs)/1000);
    if (sec > 5 && sec < 3600) { // sane range
      state.readTime[this.chapterId] = (state.readTime[this.chapterId] || 0) + sec;
      persist();
    }
    this.chapterId = null; this.startTs = 0;
  }
};
window.addEventListener('beforeunload', () => readingTimer.stop());

// Sync hooks: flush pending writes on hide; pull from cloud on focus
let lastFocusPullAt = 0;
async function onAppHide() {
  readingTimer.stop();
  // Flush any pending remote save before the OS suspends us
  if (currentUser && initialSyncDone) {
    try { await flushRemoteSave(); } catch (e) {}
  }
}
async function onAppShow() {
  if (view.name === 'chapter' && view.chapterId) readingTimer.start(view.chapterId);
  if (!currentUser || !window.bsDb?.available || !initialSyncDone) return;
  if (Date.now() - lastFocusPullAt < 5000) return;
  lastFocusPullAt = Date.now();
  try {
    const remote = await window.bsDb.loadUser(currentUser.uid);
    if (!remote) { setSync('synced'); return; }
    // If remote is meaningfully ahead, merge it in
    if ((remote.updatedAt || 0) > (state.updatedAt || 0)) {
      const merged = mergeStates(state, remote);
      applyMerged(merged);
      setSync('synced');
      state.lastSyncedAt = Date.now();
      render();
      toast('Synced from another device ✓');
    } else {
      setSync('synced');
    }
  } catch (e) {}
}
document.addEventListener('visibilitychange', () => {
  if (document.hidden) onAppHide();
  else onAppShow();
});
window.addEventListener('pagehide', onAppHide);
window.addEventListener('pageshow', onAppShow);

/* =================== Merge =================== */
// Combines local state with remote state without losing data.
// - progress: union (keep all done chapters, prefer earlier doneAt)
// - notes: per-field, longer text wins; both sides preserved if non-empty
// - bookmarks: union by key, oldest addedAt wins
// - memory / coreMessage / readQ: OR (once true, stays true)
// - streak: union of days; max of current/best; latest lastDate
// - readTime: max per chapter
// - settings / lastViewed: take whichever side has newer updatedAt
function mergeStates(local, remote) {
  if (!remote) return local;
  if (!local) return remote;
  const out = defaultState();
  const localNewer = (local.updatedAt || 0) >= (remote.updatedAt || 0);

  // progress — union, preserve earliest doneAt
  out.progress = { ...(remote.progress || {}) };
  for (const k in (local.progress || {})) {
    const lv = local.progress[k], rv = out.progress[k];
    if (!rv) out.progress[k] = lv;
    else if ((lv?.doneAt || 0) && (lv?.doneAt < (rv?.doneAt || Infinity))) out.progress[k] = lv;
  }

  // notes — per-field merge
  const allNoteIds = new Set([...Object.keys(remote.notes || {}), ...Object.keys(local.notes || {})]);
  out.notes = {};
  for (const k of allNoteIds) {
    const l = (local.notes || {})[k] || {};
    const r = (remote.notes || {})[k] || {};
    const m = {};
    for (const f of ['jesus', 'stood_out', 'question', 'prayer']) {
      const lv = l[f] || '', rv = r[f] || '';
      if (lv && rv) m[f] = lv.length >= rv.length ? lv : rv;
      else m[f] = lv || rv;
    }
    if (Object.values(m).some(v => v)) out.notes[k] = m;
  }

  // bookmarks — union, prefer earlier addedAt for same key
  out.bookmarks = { ...(remote.bookmarks || {}) };
  for (const k in (local.bookmarks || {})) {
    const lv = local.bookmarks[k];
    const rv = out.bookmarks[k];
    if (!rv) out.bookmarks[k] = lv;
    else if ((lv?.addedAt || 0) && (lv.addedAt < (rv.addedAt || Infinity))) out.bookmarks[k] = lv;
  }

  // booleans: memory, coreMessage, readQ → OR
  const orMerge = (la, ra) => {
    const o = {};
    const allKeys = new Set([...Object.keys(la || {}), ...Object.keys(ra || {})]);
    for (const k of allKeys) o[k] = !!((la || {})[k] || (ra || {})[k]);
    return o;
  };
  out.memory = orMerge(local.memory, remote.memory);
  out.coreMessage = orMerge(local.coreMessage, remote.coreMessage);
  out.readQ = orMerge(local.readQ, remote.readQ);

  // streak — union of days, max stats, latest lastDate
  const ls = local.streak || {}, rs = remote.streak || {};
  out.streak = {
    days: { ...(rs.days || {}), ...(ls.days || {}) },
    current: Math.max(ls.current || 0, rs.current || 0),
    max: Math.max(ls.max || 0, rs.max || 0),
    lastDate: [ls.lastDate, rs.lastDate].filter(Boolean).sort().pop() || null,
  };

  // readTime — max per chapter
  const allRT = new Set([...Object.keys(local.readTime || {}), ...Object.keys(remote.readTime || {})]);
  out.readTime = {};
  for (const k of allRT) {
    out.readTime[k] = Math.max((local.readTime || {})[k] || 0, (remote.readTime || {})[k] || 0);
  }

  // settings/lastViewed — newer side wins
  out.settings = (localNewer ? local.settings : remote.settings) || defaultState().settings;
  out.lastViewed = (localNewer ? local.lastViewed : remote.lastViewed) || null;

  // updatedAt — max of the two (will get bumped to Date.now() by next persist)
  out.updatedAt = Math.max(local.updatedAt || 0, remote.updatedAt || 0);
  out.lastSyncedAt = Date.now();
  return out;
}

function applyMerged(merged, { keepLocalVoice = true } = {}) {
  const localVoice = keepLocalVoice ? (state.settings?.voice || '') : merged.settings?.voice;
  Object.assign(state, defaultState(), merged);
  if (!state.settings) state.settings = defaultState().settings;
  if (keepLocalVoice) state.settings.voice = localVoice;
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) {}
}

async function reconcileWithRemote() {
  if (!currentUser || !window.bsDb?.available) {
    initialSyncDone = true;
    return;
  }
  setSync('syncing');
  const remote = await window.bsDb.loadUser(currentUser.uid);

  if (!remote) {
    // Cloud is empty for this account — push current local up
    state.updatedAt = Date.now();
    state.lastSyncedAt = Date.now();
    await window.bsDb.saveUser(currentUser.uid, snapshotForSave());
  } else {
    // Always merge — never overwrite. This protects against data loss
    // when one device pushes empty state before the other syncs up.
    const merged = mergeStates(state, remote);
    applyMerged(merged);
    // Push merged result back if it's different from what we just loaded
    state.updatedAt = Date.now();
    await window.bsDb.saveUser(currentUser.uid, snapshotForSave());
  }
  initialSyncDone = true;
  setSync('synced');
  render();
}

function setupAuthListener() {
  if (!window.bsAuth?.available) {
    authReady = true;
    syncStatus = 'offline-only';
    render();
    return;
  }
  window.bsAuth.onAuthChanged((user) => {
    if (user) {
      currentUser = { uid: user.uid, email: user.email };
      try { localStorage.setItem('biblestudy_skipauth', '0'); } catch (e) {}
      skipAuth = false;
    } else {
      currentUser = null;
      initialSyncDone = false;
      // Clear cached community profile when signed out
      if (state.community) state.community.profile = null;
    }
    authReady = true;
    if (currentUser) {
      reconcileWithRemote();
      loadCommunityProfile();
    } else {
      render();
    }
  });
}

// Load (or refresh) the user's public profile from /profiles/{uid}
async function loadCommunityProfile() {
  if (!currentUser || !window.bsCommunityDb?.available) return;
  const profile = await window.bsCommunityDb.loadProfile(currentUser.uid);
  if (!state.community) state.community = defaultState().community;
  state.community.profile = profile || null;
  // Persist locally so we don't flash the setup screen on next reload before Firestore replies
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) {}
  // Re-render only if user is currently looking at a community view
  if (view.name === 'community' || view.name === 'community-group') render();
}

async function saveCommunityProfile(patch) {
  if (!currentUser || !window.bsCommunityDb?.available) {
    return { error: 'Sign in required.' };
  }
  const merged = { ...(state.community.profile || {}), ...patch };
  // Trim and validate
  if (!merged.displayName || merged.displayName.trim().length < 2) {
    return { error: 'Display name must be at least 2 characters.' };
  }
  merged.displayName = merged.displayName.trim().slice(0, 32);
  if (merged.bio) merged.bio = merged.bio.slice(0, 280);
  if (!['first-time', 'going-deeper', 'serious-study', 'unspecified'].includes(merged.level)) {
    merged.level = 'unspecified';
  }
  if (!Array.isArray(merged.favoriteBooks)) merged.favoriteBooks = [];
  if (!merged.joinedAt) merged.joinedAt = Date.now();

  const r = await window.bsCommunityDb.saveProfile(currentUser.uid, merged);
  if (r.error) return r;
  state.community.profile = merged;
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) {}
  return { ok: true };
}

  if (state.settings.theme === 'light') document.documentElement.classList.add('light');
  else if (state.settings.theme === 'dark') document.documentElement.classList.add('dark');
  else document.documentElement.classList.add('auto-theme');

  const tp = totalProgress();
  const streak = currentStreakAdjusted();

  // Auth gate — show login screen when needed
  if (shouldShowAuth() && view.name !== 'settings') {

    bindEvents();
    return;
  }

  let body = '';
  if (view.name === 'welcome') body = renderWelcome();
  else if (view.name === 'phase') body = renderPhase(view.phaseId);

  else if (view.name === 'memory') body = renderMemory();
  else if (view.name === 'practice') body = renderPractice(view.mvId);
  else if (view.name === 'core') body = renderCore();
  else if (view.name === 'bookmarks') body = renderBookmarks();
  else if (view.name === 'search') body = renderSearch();
  else if (view.name === 'community') body = renderCommunity();
  else if (view.name === 'community-group') body = renderCommunityGroup(view.groupSlug, view.groupTab || 'discussions');

  else if (view.name === 'settings') body = renderSettings();

  app.innerHTML = `
    <header class="topbar">

        <button class="icon-btn" data-act="home" title="Home" aria-label="Home">${iconHome}</button>

        <button class="icon-btn" data-act="search" title="Search" aria-label="Search">${iconSearch}</button>
        <button class="icon-btn" data-act="community" title="Community" aria-label="Community">${iconCommunity}</button>
        <button class="icon-btn" data-act="settings" title="Settings" aria-label="Settings">${iconGear}</button>
      </div>
      <div class="progress-row">
        <span>${tp.done} / ${tp.total}</span>
        <div class="progress-bar"><div class="progress-fill" style="width:${(tp.pct*100).toFixed(1)}%"></div></div>
        <span>${(tp.pct*100).toFixed(0)}%</span>
      </div>
      <nav class="tabs">
        ${PLAN.map(p => `<button class="tab ${view.name==='phase'&&view.phaseId===p.id?'active':''}" data-tab-phase="${p.id}">${escape(p.book)}</button>`).join('')}
        <button class="tab ${view.name==='memory'||view.name==='practice'?'active':''}" data-tab="memory">Memory</button>
        <button class="tab ${view.name==='bookmarks'?'active':''}" data-tab="bookmarks">Bookmarks</button>

  if (view.name === 'bookmarks') return 'Bookmarks';

function renderAuthScreen() {
  const isSignup = authMode === 'signup';
  const isForgot = authMode === 'forgot';

              : isForgot ? 'Reset Your Password'
              : 'Sign In';

    : isForgot
    ? 'Enter your email and we\'ll send a reset link.'
    : 'Welcome back. Sign in to continue where you left off.';

  const msg = authMessage
    ? `<div class="auth-${authMessage.type}">${escape(authMessage.text)}</div>`
    : '';
  const submitLabel = isSignup ? 'Create Account' : isForgot ? 'Send Reset Email' : 'Sign In';
  const altLine = isSignup

function renderChapter(phaseId, chapterId) {

  const mins = estimateReadMinutes(data);

  // Group verses by chapter

  for (const v of data.verses) {
    if (!byChapter[v.c]) byChapter[v.c] = [];
    byChapter[v.c].push(v);

  const multiCh = Object.keys(byChapter).length > 1;

  // Render verses with drop cap on first, bookmark indicator
  const scriptureHtml = Object.entries(byChapter).map(([ch, vs], gi) => {
    const heading = multiCh ? `<div class="ch-heading">Chapter ${ch}</div>` : '';
    return heading + '<p>' + vs.map((v, vi) => {
      const isFirst = (vi === 0 && gi === 0);
      const bm = state.bookmarks[bookmarkKey(chapterId, v.c, v.n)];
      const cls = 'v' + (bm ? ' bookmarked' : '');
      let textHtml;

      return `<span class="${cls}" data-vidx="${verseIdx(data, v)}" data-c="${v.c}" data-n="${v.n}"><span class="vn">${v.n}</span>${textHtml}</span>`;
    }).join('') + '</p>';

  const bookKey = guessBookKey(chapterId);
  const firstCh = data.verses[0]?.c || 1;
  const bibleIsCode = BIBLE_IS_BOOK[bookKey];

      <div class="reader-head">
        ${ornLine()}
        <div class="ref-meta">Phase ${romanize(phaseIdx+1)} · ~${mins} min</div>
        <h2>${escape(item.title)}</h2>

      </div>
      <div class="audio-bar">
        <div class="audio-row">

          <button class="repeat-toggle ${state.settings.repeatVerse?'on':''}" data-act="toggle-repeat" title="Repeat current verse">${iconRepeat} Repeat verse</button>
          <span class="audio-meta" id="audio-status"></span>
        </div>
        <div class="audio-controls">
          <select class="audio-select" id="voice-select" data-act="set-voice"></select>
          <select class="audio-select" id="rate-select" data-act="set-rate">
            <option value="0.8">0.8×</option><option value="0.9">0.9×</option>
            <option value="0.95">0.95×</option><option value="1">1.0×</option>
            <option value="1.1">1.1×</option><option value="1.25">1.25×</option>
          </select>

        </div>

      <div class="scripture" id="scripture">${scriptureHtml}</div>
      <div class="ornament-divider"><svg><use href="#orn-line"/></svg></div>
      ${renderCommentary(chapterId)}
      <div class="reflection">
        <h3><span class="orn">${ornFleuron()}</span>What this chapter shows me about Jesus</h3>
        <p class="prompt">Pause. What did you see about Him today?</p>
        <textarea data-note="${chapterId}" data-field="jesus" placeholder="Write a sentence or two…">${escape(notes.jesus || '')}</textarea>

function renderPractice(mvId) {
  const mv = MEMORY_VERSES.find(x => x.id === mvId);
  const data = CHAPTERS[mvId];
  if (!mv || !data) return renderMemory();
  const text = data.verses.map(v => v.text).join(' ');
  const words = text.split(/(\s+)/);  // keep whitespace
  const hideLevel = practiceMode.hideLevel; // 0, 30, 50, 80, 100

  // Determine which words to hide: same seed per verse so it's stable
  if (!practiceMode.hiddenSet || practiceMode.lastVerse !== mvId || practiceMode.lastLevel !== hideLevel) {
    practiceMode.hiddenSet = computeHidden(words, hideLevel);
    practiceMode.lastVerse = mvId;
    practiceMode.lastLevel = hideLevel;
    practiceMode.revealed = new Set();
  }
  const hidden = practiceMode.hiddenSet;
  const revealed = practiceMode.revealed;

  const wordsHtml = words.map((w, i) => {
    if (!w.trim()) return w; // whitespace
    const isHidden = hidden.has(i);
    if (!isHidden) return `<span class="word">${escape(w)}</span>`;
    if (revealed.has(i)) return `<span class="word revealed" data-i="${i}">${escape(w)}</span>`;
    return `<span class="word hidden" data-i="${i}" data-act="reveal">${escape(w)}</span>`;
  }).join('');

  return `
    <div class="practice-host">
      <div class="phase-hero">
        ${ornLine()}
        <h2>Practice</h2>
        <p class="purpose">Tap a hidden word to reveal it. Try saying the verse from memory first.</p>
      </div>
      <div class="practice-card">
        <div class="practice-ref">${escape(mv.ref)}</div>
        <div class="practice-text">${wordsHtml}</div>
      </div>
      <div class="practice-controls">
        <button class="audio-btn ${hideLevel===30?'':'secondary'}" data-act="hide" data-level="30">Hide 30%</button>
        <button class="audio-btn ${hideLevel===50?'':'secondary'}" data-act="hide" data-level="50">Hide 50%</button>
        <button class="audio-btn ${hideLevel===80?'':'secondary'}" data-act="hide" data-level="80">Hide 80%</button>
        <button class="audio-btn secondary" data-act="hide" data-level="0">Show all</button>
        <button class="audio-btn secondary" data-act="hide" data-level="${hideLevel}" data-reshuffle="1">Shuffle</button>
        <button class="audio-btn secondary" data-act="speak-mv" data-id="${mvId}">${iconPlay} Listen</button>
      </div>
      <div style="text-align:center;margin-top:14px;">
        <button class="mv-btn done-btn ${state.memory[mvId]?'is-done':''}" data-act="toggle-mv" data-id="${mvId}">${state.memory[mvId]?'✓ Memorized':'Mark memorized'}</button>
        <button class="mv-btn" data-tab="memory" style="margin-left:6px;">All verses</button>
      </div>
    </div>
  `;
}

const practiceMode = { hideLevel: 30, hiddenSet: null, revealed: new Set(), lastVerse: null, lastLevel: null };

function computeHidden(words, level) {
  const idxs = [];
  for (let i = 0; i < words.length; i++) if (words[i].trim().length >= 3) idxs.push(i);
  if (level === 0) return new Set();
  if (level === 100) return new Set(idxs);
  // shuffle
  for (let i = idxs.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i+1));
    [idxs[i], idxs[j]] = [idxs[j], idxs[i]];
  }
  const n = Math.round(idxs.length * level / 100);
  return new Set(idxs.slice(0, n));
}

/* =================== Search =================== */
const searchState = { query: '', results: [] };
function runSearch(q) {
  q = q.trim().toLowerCase();
  if (q.length < 2) return [];
  const out = [];
  for (const id in CHAPTERS) {
    const data = CHAPTERS[id];
    for (const v of data.verses) {
      if (v.text.toLowerCase().includes(q)) {
        const phaseInfo = findItemAndPhase(id);
        out.push({
          kind: 'verse', chapterId: id, c: v.c, n: v.n, text: v.text,
          ref: phaseInfo ? `${phaseInfo.item.title} ${v.c}:${v.n}` : `${v.c}:${v.n}`,
          phaseId: phaseInfo?.phase.id
        });
        if (out.length > 40) break;
      }
    }
    if (out.length > 40) break;
  }
  // notes
  for (const id in state.notes) {
    const n = state.notes[id];
    const phaseInfo = findItemAndPhase(id);
    if (!phaseInfo) continue;
    for (const f of ['jesus', 'stood_out', 'question', 'prayer']) {
      if (n[f] && n[f].toLowerCase().includes(q)) {
        out.push({
          kind: 'note', chapterId: id, field: f, text: n[f],
          ref: `Note · ${phaseInfo.item.title}`, phaseId: phaseInfo.phase.id
        });
        if (out.length > 60) break;
      }
    }
    if (out.length > 60) break;
  }
  return out;
}
function highlight(text, q) {
  if (!q) return escape(text);
  const lower = text.toLowerCase();
  const ql = q.toLowerCase();
  let i = 0, html = '';
  while (i < text.length) {
    const idx = lower.indexOf(ql, i);
    if (idx === -1) { html += escape(text.slice(i)); break; }
    html += escape(text.slice(i, idx)) + '<mark>' + escape(text.slice(idx, idx+q.length)) + '</mark>';
    i = idx + q.length;
  }
  return html;
}
function renderSearch() {
  const q = searchState.query;
  const results = q.length >= 2 ? runSearch(q) : [];
  const hint = q.length === 0 ? 'Search across all chapters and your reflection notes.'
              : q.length < 2 ? 'Keep typing…'
              : results.length === 0 ? `No matches for "${escape(q)}"`
              : `${results.length} match${results.length===1?'':'es'}`;
  return `
    <div class="search-host">
      <div class="search-input-wrap">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
        <input class="search-input" id="search-input" type="search" placeholder="Search verses and notes…" value="${escape(q)}" autocomplete="off">
      </div>
      <div class="phase-stats" style="text-align:left;margin:0 0 10px;text-transform:none;letter-spacing:0;font-size:12px;font-family:var(--serif);font-style:italic;color:var(--ink-dim);">
        ${hint}
      </div>
      <div>
        ${results.map(r => {
          if (r.kind === 'verse') {
            return `<button class="search-result" data-act="open" data-phase="${r.phaseId}" data-chapter="${r.chapterId}">
              <div class="where">${iconBookmark} ${escape(r.ref)}</div>
              <div class="text">${highlight(r.text, q)}</div>
            </button>`;
          } else {
            return `<button class="search-result" data-act="open" data-phase="${r.phaseId}" data-chapter="${r.chapterId}">
              <div class="where">${iconQuill} ${escape(r.ref)}</div>
              <div class="text">${highlight(r.text, q)}</div>
            </button>`;
          }
        }).join('')}
      </div>
    </div>
  `;
}

function renderCommunityGroup(slug, tab) {
  if (!currentUser) return renderCommunitySignIn();
  if (!state.community.profile || !state.community.profile.displayName) {
    return renderCommunityProfileSetup();
  }
  const g = findGroup(slug);
  if (!g) return `<div class="content"><p>Group not found.</p></div>`;
  const levelLabel = COMMUNITY_LEVEL_LABEL[g.level] || '';
  const tabKey = (tab === 'chat') ? 'chat' : 'discussions';
  const isMember = !!(state.community.memberships && state.community.memberships[slug]);
  const memberCount = communityCache.memberCounts[slug];
  const memberCountText = (memberCount === undefined)
    ? '…'
    : (memberCount === 1 ? '1 member' : `${memberCount} members`);

  // Join / leave strip — sits above the tabs
  const joinStrip = `
    <div class="group-join-strip">
      <div class="gjs-meta">
        <span class="gjs-count">👥 ${memberCountText}</span>
        ${isMember ? '<span class="gjs-state">You\'re in</span>' : ''}
      </div>
      ${isMember
        ? `<button class="btn-secondary gjs-btn" data-act="leave-group" data-slug="${escape(slug)}">Leave group</button>`
        : `<button class="btn-primary gjs-btn" data-act="join-group" data-slug="${escape(slug)}">Join group</button>`
      }
    </div>
  `;

  const tabsHtml = `
    <nav class="group-tabs">
      <button class="group-tab ${tabKey==='discussions'?'active':''}" data-act="group-tab" data-slug="${escape(slug)}" data-tab="discussions">Discussions</button>
      <button class="group-tab ${tabKey==='chat'?'active':''}" data-act="group-tab" data-slug="${escape(slug)}" data-tab="chat">Chat</button>
    </nav>
  `;

  let body = '';
  if (tabKey === 'discussions') {
    const welcome = g.welcomePost;
    const startersHtml = g.starters.map((body) => `
      <article class="group-post">
        <div class="group-post-head">
          <span class="group-post-author">${escape(COMMUNITY_TEAM_NAME)}</span>
          <span class="group-post-meta">starter prompt</span>
        </div>
        <div class="group-post-body">${escape(body).replace(/\n/g, '<br>')}</div>
      </article>
    `).join('');

    // Real posts from Firestore (newest first; we render them above the seed pinned/starters)
    const realPosts = communityCache.posts[slug] || [];
    const replyCache = communityCache.replies || {};
    const openReplyTo = window._openReplyTo;

    const renderReply = (r, parentSlug, parentPid) => {
      const rts = r.createdAt?.toDate ? r.createdAt.toDate() : null;
      const rwhen = rts ? formatTimeAgo(rts.getTime()) : 'just now';
      const isOwnReply = r.authorUid === currentUser?.uid;
      return `
        <div class="group-reply" data-rid="${escape(r.id)}">
          <div class="group-reply-head">
            <span class="group-reply-author">${escape(r.authorName || 'Unknown')}</span>
            <span class="group-reply-meta">${escape(rwhen)}${isOwnReply ? ' · you' : ''}</span>
          </div>
          <div class="group-reply-body">${escape(r.body).replace(/\n/g, '<br>')}</div>
          ${isOwnReply
            ? `<div class="group-reply-actions"><button class="auth-link" data-act="delete-reply" data-slug="${escape(parentSlug)}" data-pid="${escape(parentPid)}" data-rid="${escape(r.id)}">Delete</button></div>`
            : ''}
        </div>
      `;
    };

    const realPostsHtml = realPosts.map(p => {
      const ts = p.createdAt?.toDate ? p.createdAt.toDate() : null;
      const when = ts ? formatTimeAgo(ts.getTime()) : 'just now';
      const isOwn = p.authorUid === currentUser?.uid;
      const replies = replyCache[p.id] || [];
      const replyCount = replies.length;
      const isReplyComposerOpen = openReplyTo === p.id;
      const replyComposer = (isMember && isReplyComposerOpen) ? `
        <form class="reply-composer" id="reply-composer" data-slug="${escape(slug)}" data-pid="${escape(p.id)}">
          <textarea name="body" rows="2" maxlength="2000" placeholder="Write a reply…" required minlength="1" autofocus></textarea>
          <div class="composer-actions">
            <button type="button" class="auth-link" data-act="cancel-reply">Cancel</button>
            <button type="submit" class="btn-primary">Reply</button>
          </div>
        </form>
      ` : '';

      return `
        <article class="group-post" data-pid="${escape(p.id)}">
          <div class="group-post-head">
            <span class="group-post-author">${escape(p.authorName || 'Unknown')}</span>
            <span class="group-post-meta">${escape(when)}${isOwn ? ' · your post' : ''}</span>
          </div>
          <div class="group-post-body">${escape(p.body).replace(/\n/g, '<br>')}</div>
          <div class="group-post-actions">
            ${isMember ? `<button class="auth-link" data-act="toggle-reply-composer" data-pid="${escape(p.id)}">${isReplyComposerOpen ? 'Close reply' : 'Reply'}${replyCount ? ` · ${replyCount}` : ''}</button>` : ''}
            ${isOwn ? `<button class="auth-link" data-act="delete-post" data-slug="${escape(slug)}" data-pid="${escape(p.id)}">Delete</button>` : ''}
          </div>
          ${replyCount > 0 ? `<div class="group-replies">${replies.map(r => renderReply(r, slug, p.id)).join('')}</div>` : ''}
          ${replyComposer}
        </article>
      `;
    }).join('');

    // Composer — shown only to members
    const composer = isMember ? `
      <form class="post-composer" id="post-composer" data-slug="${escape(slug)}">
        <textarea name="body" rows="3" maxlength="2000" placeholder="Share what stood out, ask a question, start a conversation. Up to 2000 characters." required minlength="1"></textarea>
        <div class="composer-actions">
          <span class="composer-hint">Posts are visible to everyone in this group.</span>
          <button type="submit" class="btn-primary">Post</button>
        </div>
      </form>
    ` : `
      <div class="group-empty-state">Join the group to post in this discussion.</div>
    `;

    body = `
      ${composer}
      ${realPostsHtml || (isMember ? '<div class="group-empty-state group-empty-soft">No posts yet. Start the first conversation.</div>' : '')}
      <div class="group-section-divider">Seeded by ${escape(COMMUNITY_TEAM_NAME)}</div>
      <article class="group-post pinned">
        <div class="group-post-head">
          <span class="group-post-author">${escape(COMMUNITY_TEAM_NAME)}</span>
          <span class="group-post-meta">📌 pinned · ${escape(welcome.title)}</span>
        </div>
        <div class="group-post-body">${escape(welcome.body).replace(/\n/g, '<br>')}</div>
      </article>
      ${startersHtml}
    `;
  } else {
    // Chat tab — descending from Firestore, reversed here for chronological display
    const rawMessages = communityCache.messages[slug] || [];
    const messages = [...rawMessages].reverse(); // oldest → newest
    const messagesHtml = messages.map(m => {
      const ts = m.createdAt?.toDate ? m.createdAt.toDate() : null;
      const when = ts ? formatTimeAgo(ts.getTime()) : 'just now';
      const isOwn = m.authorUid === currentUser?.uid;
      return `
        <div class="chat-msg ${isOwn ? 'own' : ''}" data-mid="${escape(m.id)}">
          <div class="chat-msg-meta">
            <span class="chat-msg-author">${escape(m.authorName || 'Unknown')}</span>
            <span class="chat-msg-time">${escape(when)}</span>
          </div>
          <div class="chat-msg-body">${escape(m.body).replace(/\n/g, '<br>')}</div>
          ${isOwn ? `<button class="chat-msg-del" data-act="delete-message" data-slug="${escape(slug)}" data-mid="${escape(m.id)}" title="Delete">×</button>` : ''}
        </div>
      `;
    }).join('');

    const composer = isMember ? `
      <form class="chat-composer" id="chat-composer" data-slug="${escape(slug)}">
        <input
          type="text"
          name="body"
          maxlength="2000"
          placeholder="Type a message…"
          autocomplete="off"
          autocapitalize="sentences"
          required
          minlength="1">
        <button type="submit" class="btn-primary" aria-label="Send">Send</button>
      </form>
    ` : `
      <div class="chat-not-member">Join the group to send messages in chat.</div>
    `;

    const emptyState = (messages.length === 0)
      ? `<div class="group-empty-state group-empty-soft">No chatter yet. ${isMember ? 'Be the first to say hi.' : 'Join the group to start the conversation.'}</div>`
      : '';

    body = `
      <div class="group-chat">
        <div class="chat-list">
          <div class="chat-msg seed">
            <div class="chat-msg-meta">
              <span class="chat-msg-author">${escape(COMMUNITY_TEAM_NAME)}</span>
              <span class="chat-msg-time">welcome</span>
            </div>
            <div class="chat-msg-body">${escape(g.chatOpener)}</div>
          </div>
          ${emptyState}
          ${messagesHtml}
        </div>
        ${composer}
      </div>
    `;
  }

  return `
    <div class="group-page">
      <button class="back-link" data-act="community">‹ Community</button>
      <div class="reader-head">
        ${ornLine()}
        <div class="ref-meta">${escape(levelLabel)}</div>
        <h2>${escape(g.name)}</h2>
        <div class="sub">${escape(g.tagline)}</div>
      </div>
      <div class="group-description">${escape(g.description)}</div>
      ${joinStrip}
      ${tabsHtml}
      <div class="group-tab-content">${body}</div>
    </div>
  `;
}

/* =================== Bind events =================== */
let _bound = false;
function bindEvents() {
  if (!_bound) {
    document.body.addEventListener('click', onClick);
    document.body.addEventListener('input', onInput);
    document.body.addEventListener('change', onChange);
    document.body.addEventListener('submit', onSubmit);
    _bound = true;
  }
  const voiceSel = document.getElementById('voice-select');
  if (voiceSel) populateVoices(voiceSel);
  const voiceSel2 = document.getElementById('voice-select-settings');
  if (voiceSel2) populateVoices(voiceSel2, true);
  const rateSel = document.getElementById('rate-select');
  if (rateSel) {
    rateSel.value = state.settings.rate;
    rateSel.addEventListener('change', () => { state.settings.rate = parseFloat(rateSel.value); persist(); });
  }
  const sc = document.getElementById('scripture');
  if (sc) sc.style.fontSize = state.settings.fontSize + 'px';
  const si = document.getElementById('search-input');
  if (si) {
    si.focus();
    si.addEventListener('input', () => { searchState.query = si.value; rerenderSearchResults(); });
  }
  // Chat: scroll list to bottom on every render so latest message is in view
  const chatList = document.querySelector('.chat-list');
  if (chatList) {
    requestAnimationFrame(() => { chatList.scrollTop = chatList.scrollHeight; });
  }
}

function rerenderSearchResults() {
  const main = document.querySelector('main');
  if (main) main.innerHTML = renderSearch();
  const si = document.getElementById('search-input');
  if (si) {
    si.focus();
    si.setSelectionRange(si.value.length, si.value.length);
    si.addEventListener('input', () => { searchState.query = si.value; rerenderSearchResults(); });
  }
}

function populateVoices(sel, isSettings = false) {
  if (!('speechSynthesis' in window)) { sel.innerHTML = '<option>Not supported</option>'; sel.disabled = true; return; }
  if (tts.voices.length === 0) tts.loadVoices();
  const opts = ['<option value="">Default voice</option>'];
  for (const v of tts.voices) {
    opts.push(`<option value="${escape(v.name)}" ${state.settings.voice === v.name?'selected':''}>${escape(v.name)} (${v.lang})</option>`);
  }
  sel.innerHTML = opts.join('');
  sel.value = state.settings.voice || '';
  sel.onchange = () => { state.settings.voice = sel.value; persist(); if (isSettings) toast('Voice saved'); };
}

function onClick(e) {
  // verse tap to bookmark
  const verseEl = e.target.closest('.scripture .v');
  if (verseEl && view.name === 'chapter') { return toggleBookmark(verseEl); }

  const t = e.target.closest('[data-act],[data-tab],[data-tab-phase]');
  if (!t) return;

  if (t.dataset.tab === 'memory') return setView({ name: 'memory' });
  if (t.dataset.tab === 'core') return setView({ name: 'core' });
  if (t.dataset.tab === 'bookmarks') return setView({ name: 'bookmarks' });
  if (t.dataset.tabPhase) return setView({ name: 'phase', phaseId: t.dataset.tabPhase });

  const act = t.dataset.act;
  if (!act) return;

  if (act === 'home') return setView({ name: 'welcome' });
  if (act === 'settings') return setView({ name: 'settings' });
  if (act === 'search') return setView({ name: 'search' });
  if (act === 'community') return setView({ name: 'community' });
  if (act === 'open-group') return setView({ name: 'community-group', groupSlug: t.dataset.slug, groupTab: 'discussions' });
  if (act === 'group-tab') return setView({ name: 'community-group', groupSlug: t.dataset.slug, groupTab: t.dataset.tab });
  if (act === 'community-auth-mode') {
    window._communityAuthMode = t.dataset.mode;
    window._communityAuthMessage = null;
    return render();
  }
  if (act === 'community-back') return setView({ name: 'community' });
  if (act === 'edit-profile') {
    // Force the profile setup screen even if profile exists
    state.community.profile = state.community.profile || {};
    return setView({ name: 'community-profile' });
  }
  if (act === 'community-sign-out') {
    if (confirm('Sign out? You\'ll keep your reading and notes on this device, but you\'ll need to sign in to see the community again.')) {
      window.bsAuth.signOut();
    }
    return;
  }
  if (act === 'join-group') {
    const slug = t.dataset.slug;
    const dn = state.community.profile?.displayName || '';
    t.disabled = true;
    window.bsCommunityDb.joinGroup(slug, currentUser.uid, dn).then((r) => {
      if (r.error) {
        toast('Could not join: ' + r.error);
        t.disabled = false;
        return;
      }
      // Optimistic local cache update
      if (!state.community.memberships) state.community.memberships = {};
      state.community.memberships[slug] = { role: 'member', joinedAt: Date.now() };
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) {}
      refreshGroupMembership(slug);
      toast('Joined ✓');
    });
    return;
  }
  if (act === 'leave-group') {
    const slug = t.dataset.slug;
    if (!confirm('Leave this group? Your past posts stay; you stop seeing the group in your list.')) return;
    t.disabled = true;
    window.bsCommunityDb.leaveGroup(slug, currentUser.uid).then((r) => {
      if (r.error) {
        toast('Could not leave: ' + r.error);
        t.disabled = false;
        return;
      }
      if (state.community.memberships) delete state.community.memberships[slug];
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) {}
      refreshGroupMembership(slug);
      toast('Left the group');
    });
    return;
  }
  if (act === 'delete-post') {
    const slug = t.dataset.slug;
    const pid = t.dataset.pid;
    if (!confirm('Delete this post? This cannot be undone.')) return;
    window.bsCommunityDb.deletePost(slug, pid).then((r) => {
      if (r.error) toast('Could not delete: ' + r.error);
      else toast('Post deleted');
    });
    return;
  }
  if (act === 'toggle-reply-composer') {
    const pid = t.dataset.pid;
    window._openReplyTo = (window._openReplyTo === pid) ? null : pid;
    return render();
  }
  if (act === 'cancel-reply') {
    window._openReplyTo = null;
    return render();
  }
  if (act === 'delete-reply') {
    const slug = t.dataset.slug;
    const pid = t.dataset.pid;
    const rid = t.dataset.rid;
    if (!confirm('Delete this reply?')) return;
    window.bsCommunityDb.deleteReply(slug, pid, rid).then((r) => {
      if (r.error) toast('Could not delete: ' + r.error);
      else toast('Reply deleted');
    });
    return;
  }
  if (act === 'delete-message') {
    const slug = t.dataset.slug;
    const mid = t.dataset.mid;
    if (!confirm('Delete this message?')) return;
    window.bsCommunityDb.deleteMessage(slug, mid).then((r) => {
      if (r.error) toast('Could not delete: ' + r.error);
      else toast('Message deleted');
    });
    return;
  }
  if (act === 'open') return setView({ name: 'chapter', phaseId: t.dataset.phase, chapterId: t.dataset.chapter });
  if (act === 'open-bm') {
    const phaseInfo = findItemAndPhase(t.dataset.id);
    if (phaseInfo) setView({ name: 'chapter', phaseId: phaseInfo.phase.id, chapterId: t.dataset.id });
    return;
  }
  if (act === 'copy-bm') {
    const bm = state.bookmarks[t.dataset.key];
    if (bm) {
      const txt = `"${bm.text}"\n— ${bm.ref}`;
      if (navigator.clipboard) navigator.clipboard.writeText(txt).then(() => toast('Copied'));
      else toast('Copy unavailable');
    }
    return;
  }
  if (act === 'remove-bm') {
    delete state.bookmarks[t.dataset.key];
    persist(); render(); toast('Removed');
    return;
  }
  if (act === 'play') return playChapter();
  if (act === 'stop') return stopChapter();
  if (act === 'toggle-repeat') {
    state.settings.repeatVerse = !state.settings.repeatVerse;
    tts.repeatVerse = state.settings.repeatVerse;
    persist();
    t.classList.toggle('on');
    toast(state.settings.repeatVerse ? 'Repeating current verse' : 'Repeat off');
    return;
  }
  if (act === 'toggle-done') {
    const id = t.dataset.chapter;
    const wasDone = isDone(id);
    markDone(id, !wasDone);
    if (!wasDone) {
      const n = nextChapter(view.phaseId, id);
      const newStreak = currentStreakAdjusted();
      toast(newStreak >= 2 ? `Chapter complete · ${newStreak} day streak` : 'Chapter complete  ✦');
      if (n) setTimeout(() => setView({ name: 'chapter', phaseId: n.phaseId, chapterId: n.chapterId }), 700);
      else { toast('You finished the plan ❦'); setTimeout(() => setView({ name: 'welcome' }), 1200); }
    } else { render(); }
    return;
  }
  if (act === 'toggle-mv') {
    state.memory[t.dataset.id] = !state.memory[t.dataset.id]; persist(); render();
    return;
  }
  if (act === 'practice') return setView({ name: 'practice', mvId: t.dataset.id });
  if (act === 'speak-mv') {
    const data = CHAPTERS[t.dataset.id];
    if (data) tts.speak(data.verses.map(v => v.text), () => {});
    return;
  }
  if (act === 'hide') {
    practiceMode.hideLevel = parseInt(t.dataset.level, 10);
    if (t.dataset.reshuffle) practiceMode.lastVerse = null;
    practiceMode.lastLevel = null;
    render();
    return;
  }
  if (act === 'reveal') {
    const i = parseInt(t.dataset.i, 10);
    practiceMode.revealed.add(i);
    render();
    return;
  }
  if (act === 'toggle-cm') {
    const i = +t.dataset.i; state.coreMessage[i] = !state.coreMessage[i]; persist(); render();
    return;
  }
  if (act === 'toggle-rq') {
    const i = +t.dataset.i; state.readQ[i] = !state.readQ[i]; persist(); render();
    return;
  }
  if (act === 'export') return exportNotes();
  if (act === 'reset') {
    if (confirm('Reset ALL progress, notes, bookmarks, and streak? This cannot be undone.')) {
      localStorage.removeItem(STORAGE_KEY);
      Object.assign(state, defaultState());
      render(); toast('Reset complete');
    }
    return;
  }

  // ===== Auth actions =====
  if (act === 'auth-mode') {
    authMode = t.dataset.mode;
    authMessage = null;
    render();
    return;
  }
  if (act === 'skip-auth') {
    skipAuth = true;
    try { localStorage.setItem('biblestudy_skipauth', '1'); } catch (e) {}
    syncStatus = 'offline-only';
    render();
    return;
  }
  if (act === 'show-auth') {
    skipAuth = false;
    try { localStorage.setItem('biblestudy_skipauth', '0'); } catch (e) {}
    authMode = 'signin';
    authMessage = null;
    setView({ name: 'welcome' });
    return;
  }
  if (act === 'sign-out') return handleSignOut();
  if (act === 'sync-now') return manualSyncNow();
}

function formatTimeAgo(ts) {
  if (!ts) return '';
  const sec = Math.round((Date.now() - ts) / 1000);
  if (sec < 5) return 'just now';
  if (sec < 60) return `${sec}s ago`;
  const min = Math.round(sec / 60);
  if (min < 60) return `${min} min ago`;
  const hr = Math.round(min / 60);
  if (hr < 24) return `${hr} hr ago`;
  const d = Math.round(hr / 24);
  return `${d}d ago`;
}

function toggleBookmark(verseEl) {
  const cid = view.chapterId;
  const data = CHAPTERS[cid];
  if (!data) return;
  const c = parseInt(verseEl.dataset.c, 10);
  const n = parseInt(verseEl.dataset.n, 10);
  const v = data.verses.find(x => x.c===c && x.n===n);
  if (!v) return;
  const item = findItem(view.phaseId, cid);
  const ref = `${item.title} ${c}:${n}`;
  const key = bookmarkKey(cid, c, n);
  if (state.bookmarks[key]) {
    delete state.bookmarks[key];
    verseEl.classList.remove('bookmarked');
    toast('Bookmark removed');
  } else {
    state.bookmarks[key] = { id: cid, c, n, ref, text: v.text, addedAt: Date.now() };
    verseEl.classList.add('bookmarked');
    toast('Bookmarked');
  }
  persist();
}

function onInput(e) {
  const ta = e.target.closest('textarea[data-note]');
  if (ta) {
    const id = ta.dataset.note, field = ta.dataset.field;
    if (!state.notes[id]) state.notes[id] = {};
    state.notes[id][field] = ta.value;
    persist();
    return;
  }
  if (e.target.id === 'rate-input') {
    state.settings.rate = parseFloat(e.target.value);
    document.getElementById('rate-sub').textContent = state.settings.rate + '×';
    persist();
  }
  if (e.target.id === 'font-input') {
    state.settings.fontSize = parseInt(e.target.value, 10);
    document.getElementById('font-sub').textContent = state.settings.fontSize + 'px';
    persist();
  }
}

function onChange(e) {
  if (e.target.id === 'theme-select') { state.settings.theme = e.target.value; persist(); render(); }
}

function onSubmit(e) {
  if (e.target.id === 'auth-form') {
    e.preventDefault();
    const emailEl = document.getElementById('auth-email');
    const pwEl = document.getElementById('auth-password');
    const email = emailEl ? emailEl.value : '';
    const password = pwEl ? pwEl.value : '';
    window._authEmail = email;
    if (authMode === 'signup') return handleSignUp(email, password);
    if (authMode === 'forgot') return handleSendReset(email);
    return handleSignIn(email, password);
  }

  // Community sign-in form (entry into community without leaving the community view)
  if (e.target.id === 'community-auth-form') {
    e.preventDefault();
    const email = (document.getElementById('ca-email')?.value || '').trim();
    const password = document.getElementById('ca-password')?.value || '';
    window._communityAuthEmail = email;
    window._communityAuthMessage = null;
    if (!email || !password) {
      window._communityAuthMessage = { type: 'error', text: 'Enter email and password.' };
      return render();
    }
    const mode = window._communityAuthMode || 'signin';
    const fn = mode === 'signup' ? window.bsAuth.signUp : window.bsAuth.signIn;
    fn(email, password).then((r) => {
      if (r.error) {
        window._communityAuthMessage = { type: 'error', text: r.error };
        render();
      }
      // On success, the auth listener will fire; loadCommunityProfile() and render() take over.
    });
    return;
  }

  // Discussion post composer (community group page)
  if (e.target.id === 'post-composer') {
    e.preventDefault();
    const form = e.target;
    const slug = form.dataset.slug;
    const body = form.elements.body.value.trim();
    if (!body) return;
    const submitBtn = form.querySelector('button[type="submit"]');
    if (submitBtn) { submitBtn.disabled = true; submitBtn.textContent = 'Posting…'; }
    window.bsCommunityDb.createPost(slug, {
      authorUid: currentUser.uid,
      authorName: state.community.profile?.displayName || 'Unknown',
      body
    }).then((r) => {
      if (submitBtn) { submitBtn.disabled = false; submitBtn.textContent = 'Post'; }
      if (r.error) {
        toast('Could not post: ' + r.error);
        return;
      }
      form.elements.body.value = '';
      toast('Posted ✓');
      // The onSnapshot listener will re-render with the new post
    });
    return;
  }

  // Chat composer (group's Chat tab)
  if (e.target.id === 'chat-composer') {
    e.preventDefault();
    const form = e.target;
    const slug = form.dataset.slug;
    const input = form.elements.body;
    const body = input.value.trim();
    if (!body) return;
    const submitBtn = form.querySelector('button[type="submit"]');
    if (submitBtn) submitBtn.disabled = true;
    input.disabled = true;
    window.bsCommunityDb.sendMessage(slug, {
      authorUid: currentUser.uid,
      authorName: state.community.profile?.displayName || 'Unknown',
      body
    }).then((r) => {
      if (submitBtn) submitBtn.disabled = false;
      input.disabled = false;
      if (r.error) {
        toast('Could not send: ' + r.error);
        return;
      }
      input.value = '';
      // Re-focus so the user can keep typing
      requestAnimationFrame(() => input.focus());
    });
    return;
  }

  // Reply composer (under a discussion post)
  if (e.target.id === 'reply-composer') {
    e.preventDefault();
    const form = e.target;
    const slug = form.dataset.slug;
    const pid = form.dataset.pid;
    const body = form.elements.body.value.trim();
    if (!body) return;
    const submitBtn = form.querySelector('button[type="submit"]');
    if (submitBtn) { submitBtn.disabled = true; submitBtn.textContent = 'Replying…'; }
    window.bsCommunityDb.createReply(slug, pid, {
      authorUid: currentUser.uid,
      authorName: state.community.profile?.displayName || 'Unknown',
      body
    }).then((r) => {
      if (submitBtn) { submitBtn.disabled = false; submitBtn.textContent = 'Reply'; }
      if (r.error) {
        toast('Could not reply: ' + r.error);
        return;
      }
      window._openReplyTo = null;
      toast('Replied ✓');
      // The replies listener will re-render with the new reply
    });
    return;
  }

  // Profile create/edit form
  if (e.target.id === 'profile-form') {
    e.preventDefault();
    const form = e.target;
    const displayName = form.elements.displayName.value;
    const bio = form.elements.bio.value;
    const level = form.elements.level.value;
    const favoriteBooks = Array.from(form.querySelectorAll('input[name="favoriteBooks"]:checked')).map(cb => cb.value);
    window._profileMessage = null;
    saveCommunityProfile({ displayName, bio, level, favoriteBooks }).then((r) => {
      if (r.error) {
        window._profileMessage = { type: 'error', text: r.error };
        render();
        return;
      }
      window._profileMessage = { type: 'success', text: 'Profile saved.' };
      // After first-time setup, drop them into the community list
      if (view.name === 'community') render();
      else setView({ name: 'community' });
    });
    return;
  }
}

function playChapter() {
  const data = CHAPTERS[view.chapterId]; if (!data) return;
  if (!('speechSynthesis' in window)) return toast('Voice not supported on this browser');
  if (tts.voices.length === 0) tts.loadVoices();
  const playBtn = document.getElementById('play-btn');
  const stopBtn = document.getElementById('stop-btn');
  const status = document.getElementById('audio-status');
  if (tts.isPlaying) {
    speechSynthesis.pause(); tts.isPlaying = false;
    playBtn.innerHTML = iconPlay + ' Resume'; if (status) status.textContent = 'Paused';
    return;
  }
  if (speechSynthesis.paused) {
    speechSynthesis.resume(); tts.isPlaying = true;
    playBtn.innerHTML = iconPause + ' Pause'; if (status) status.textContent = 'Reading…';
    return;
  }
  tts.speak(data.verses.map(v => v.text), (idx) => {
    document.querySelectorAll('.scripture .v.speaking').forEach(el => el.classList.remove('speaking'));
    if (idx >= 0) {
      const el = document.querySelector(`.scripture .v[data-vidx="${idx}"]`);
      if (el) {
        el.classList.add('speaking');
        try { el.scrollIntoView({ behavior: 'smooth', block: 'center' }); } catch (e) {}
      }
      if (status) status.textContent = `Reading… ${idx+1} / ${data.verses.length}`;
      if (playBtn) playBtn.innerHTML = iconPause + ' Pause';
      if (stopBtn) stopBtn.disabled = false;
    } else {
      if (status) status.textContent = 'Done';
      if (playBtn) playBtn.innerHTML = iconPlay + ' Listen';
      if (stopBtn) stopBtn.disabled = true;
    }
  }, { repeatVerse: state.settings.repeatVerse });
}

function stopChapter() {
  tts.stop();
  document.querySelectorAll('.scripture .v.speaking').forEach(el => el.classList.remove('speaking'));
  const playBtn = document.getElementById('play-btn');
  const stopBtn = document.getElementById('stop-btn');
  const status = document.getElementById('audio-status');
  if (playBtn) playBtn.innerHTML = iconPlay + ' Listen';
  if (stopBtn) stopBtn.disabled = true;
  if (status) status.textContent = '';
}

function exportNotes() {
  const lines = ['Bible Study Notes — Starting with Christ', '='.repeat(46), '',
                 `Exported ${new Date().toLocaleString()}`, ''];
  // Notes by phase
  for (const p of PLAN) {
    let phaseHasContent = false;
    const phaseLines = [`\n# ${p.title}`, `(${p.book} — ${p.purpose})\n`];
    for (const it of p.items) {
      const n = state.notes[it.id];
      const done = isDone(it.id) ? ' [✓]' : '';
      if (n && Object.values(n).some(v => v && v.trim())) {
        phaseHasContent = true;
        phaseLines.push(`\n## ${it.title}${done}`);
        if (n.jesus) phaseLines.push(`About Jesus: ${n.jesus}`);
        if (n.stood_out) phaseLines.push(`Stood out: ${n.stood_out}`);
        if (n.question) phaseLines.push(`Question: ${n.question}`);
        if (n.prayer) phaseLines.push(`Prayer: ${n.prayer}`);
      } else if (isDone(it.id)) {
        phaseHasContent = true;
        phaseLines.push(`${it.title}${done}`);
      }
    }
    if (phaseHasContent) lines.push(...phaseLines);
  }
  // Bookmarks
  const bms = Object.values(state.bookmarks||{}).sort((a,b) => a.addedAt - b.addedAt);
  if (bms.length > 0) {
    lines.push('\n\n# BOOKMARKS\n');
    for (const bm of bms) {
      lines.push(`\n${bm.ref}`);
      lines.push(`"${bm.text}"`);
    }
  }
  const blob = new Blob([lines.join('\n')], { type: 'text/plain' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `bible-study-notes-${new Date().toISOString().slice(0,10)}.txt`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
  toast('Notes exported');
}

/* =================== Util =================== */
function escape(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]));
}

/* =================== Service worker — guaranteed offline =================== */
function installServiceWorker() {
  if (!('serviceWorker' in navigator)) return;
  // Skip when opened locally (file://) since service workers require http(s)
  if (location.protocol !== 'http:' && location.protocol !== 'https:') return;

  let refreshing = false;
  navigator.serviceWorker.addEventListener('controllerchange', () => {
    if (refreshing) return;
    refreshing = true;
    window.location.reload();
  });

  navigator.serviceWorker.register('./sw.js').then((reg) => {
    // Periodic background update check (every hour while open)
    setInterval(() => { try { reg.update(); } catch (e) {} }, 60 * 60 * 1000);

    // If a worker is already waiting on first load, surface the banner
    if (reg.waiting && navigator.serviceWorker.controller) {
      showUpdateBanner(reg.waiting);
    }

    reg.addEventListener('updatefound', () => {
      const w = reg.installing;
      if (!w) return;
      w.addEventListener('statechange', () => {
        if (w.state === 'installed' && navigator.serviceWorker.controller) {
          showUpdateBanner(w);
        }
      });
    });
  }).catch(() => {/* fail silently — app still works without SW */});
}

function showUpdateBanner(worker) {
  if (document.querySelector('.update-banner')) return;
  const banner = document.createElement('div');
  banner.className = 'update-banner';
  banner.innerHTML = '<span>New version available</span><button>Refresh</button>';
  banner.querySelector('button').addEventListener('click', () => {
    worker.postMessage('skipWaiting');
  });
  document.body.appendChild(banner);
  // animate in
  requestAnimationFrame(() => banner.classList.add('show'));
}

/* =================== Init =================== */
tts.loadVoices();
view = { name: 'welcome' };
render();
installServiceWorker();

// Wait for the Firebase module to finish loading before wiring auth
if (window.bsAuth?.available) {
  setupAuthListener();
} else {
  window.addEventListener('bs-firebase-ready', () => setupAuthListener(), { once: true });
  // Fallback: if module never loads (offline first visit), still proceed
  setTimeout(() => { if (!authReady) { authReady = true; syncStatus = 'offline-only'; render(); } }, 4000);
}

window.addEventListener('beforeunload', () => {
  if (saveTimer) { clearTimeout(saveTimer); localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
});
